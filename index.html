9ede\u7684\u9023\u7e8c\u8ecc\u8de1\uff0c\u9810\u6e2c\u4e0b\u4e00\u6bb5\u53ef\u80fd\u884c\u99db\u8def\u7dda"], "ans": "C", "inferred": false, "expl": "\u3010\u7b54\u6848C\u3011CNN \u6700\u9069\u7528\u60c5\u5883\u3002\n\u2717(A) \u6642\u9593\u5e8f\u5217\u9810\u6e2c\u9069\u5408 RNN/LSTM\u3002\n\u2717(B) \u5c0d\u8a71\u5e8f\u5217\u9069\u5408 RNN/Transformer\u3002\n\u2713(C) \u76e3\u8996\u5668\u5f71\u50cf\u8fa8\u8b58\u7f3a\u8ca8\u4e26\u6a19\u4f4d\u7f6e\u6b63\u662f CNN \u5f37\u9805\uff08\u7a7a\u9593\u5c40\u90e8\u7279\u5fb5+\u5f71\u50cf\u5206\u5272\uff09\u3002\n\u2717(D) GPS \u8ecc\u8de1\u5e8f\u5217\u9069\u5408 RNN\u3002"}, {"id": "115_1_s1_49", "exam": "115\u5e74\u7b2c\u4e00\u6b21 \u79d1\u76ee\u4e00\uff08AI\u57fa\u790e\uff09", "examId": "115_1_s1", "no": 49, "q": "\u67d0 AI \u79d1\u6280\u516c\u53f8\u5728\u5de5\u696d\u7f3a\u9677\u6aa2\u6e2c\u9818\u57df\u5df2\u6709\u6210\u719f\u7684\u8fa8\u8b58\u7522\u54c1\u7d93\u9a57\u3002\u73fe\u6b32\u8207\u65b0\u5ba2\u6236\u5408\u4f5c\u958b\u767c\u4e00\u9805\u985e\u4f3c\u7522\u54c1\u7684\u8868\u9762\u7455\u75b5\u6aa2\u6e2c\u7cfb\u7d71\uff0c\u4f46\u56e0\u65b0\u7522\u54c1\u91cf\u7522\u4e0d\u4e45\uff0c\u6a19\u8a3b\u6a23\u672c\u6975\u70ba\u7a00\u5c11\u4e14\u5c08\u5bb6\u6a19\u8a3b\u6210\u672c\u9ad8\u6602\u3002\u5728\u4e0d\u5927\u5e45\u589e\u52a0\u6a19\u8a3b\u9810\u7b97\u7684\u524d\u63d0\u4e0b\uff0c\u4e0b\u5217\u54ea\u4e00\u7a2e\u505a\u6cd5\u6700\u80fd\u5229\u7528\u8a72\u516c\u53f8\u65e2\u6709\u7684\u6280\u8853\u512a\u52e2\u4f86\u63d0\u5347\u6a21\u578b\u8868\u73fe\uff1f", "opts": ["\u589e\u52a0\u6a21\u578b\u53c3\u6578\u898f\u6a21\uff0c\u4f7f\u6a21\u578b\u5177\u5099\u66f4\u5f37\u8868\u9054\u80fd\u529b", "\u900f\u904e\u8cc7\u6599\u589e\u5f37(Data Augmentation)\u64f4\u5c55\u5f71\u50cf\u8b8a\u5316\uff0c\u4ee5\u63d0\u5347\u6a21\u578b\u7a69\u5b9a\u6027", "\u91cd\u65b0\u8490\u96c6\u5927\u91cf\u5f71\u50cf\u4e26\u9032\u884c\u5b8c\u6574\u4eba\u5de5\u6a19\u8a3b", "\u63a1\u7528\u9077\u79fb\u5b78\u7fd2(Transfer Learning)\uff0c\u5229\u7528\u65e2\u6709\u9810\u8a13\u7df4\u6a21\u578b\u9032\u884c\u8abf\u6574"], "ans": "D", "inferred": false, "expl": "\u3010\u7b54\u6848D\u3011\u6a23\u672c\u5c11+\u5c08\u5bb6\u8cb4+\u4e0d\u589e\u9810\u7b97+\u5229\u7528\u65e2\u6709\u6280\u8853\u3002\n\u2717(A) \u589e\u52a0\u53c3\u6578\u91cf\u5728\u5c11\u6a23\u672c\u4e0b\u53cd\u800c\u904e\u64ec\u5408\u3002\n\u2717(B) \u8cc7\u6599\u589e\u5f37\u6709\u7528\u4f46\u4e0d\u662f\u300c\u5229\u7528\u65e2\u6709\u5de5\u696d\u7f3a\u9677\u6a21\u578b\u300d\u7684\u6838\u5fc3\u512a\u52e2\u3002\n\u2717(C) \u91cd\u65b0\u8490\u96c6\u5927\u91cf\u5f71\u50cf\u9055\u53cd\u300c\u4e0d\u589e\u9810\u7b97\u300d\u524d\u63d0\u3002\n\u2713(D) \u9077\u79fb\u5b78\u7fd2\u4f7f\u7528\u65e2\u6709\u5de5\u696d\u7f3a\u9677\u9810\u8a13\u7df4\u6a21\u578b\u5fae\u8abf\uff0c\u6700\u5927\u5316\u65e2\u6709\u6280\u8853\u512a\u52e2\uff0c\u6b63\u89e3\u3002"}, {"id": "115_1_s1_50", "exam": "115\u5e74\u7b2c\u4e00\u6b21 \u79d1\u76ee\u4e00\uff08AI\u57fa\u790e\uff09", "examId": "115_1_s1", "no": 50, "q": "\u67d0\u91ab\u9662\u4f7f\u7528\u6a5f\u5668\u5b78\u7fd2\u6a21\u578b\u7be9\u6aa2\u764c\u75c7\u60a3\u8005\u3002\u6a21\u578b\u9810\u6e2c\u7d50\u679c\u6703\u6c7a\u5b9a\u54ea\u4e9b\u75c5\u4eba\u9700\u8981\u9032\u4e00\u6b65\u6aa2\u67e5\u3002\u9662\u65b9\u975e\u5e38\u91cd\u8996\u76e1\u91cf\u627e\u51fa\u6240\u6709\u53ef\u80fd\u7684\u764c\u75c7\u60a3\u8005\uff0c\u5373\u5e0c\u671b\u964d\u4f4e\u6f0f\u8a3a(Missed Diagnosis)\u98a8\u96aa\uff0c\u5373\u4fbf\u9019\u53ef\u80fd\u589e\u52a0\u4e00\u4e9b\u8aa4\u5224\u3002\u4e0b\u5217\u54ea\u4e00\u500b\u8a55\u4f30\u6307\u6a19\u6700\u80fd\u53cd\u6620\u6a21\u578b\u627e\u51fa\u764c\u75c7\u60a3\u8005\u7684\u80fd\u529b\uff1f", "opts": ["\u7cbe\u6e96\u7387(Precision)", "\u53ec\u56de\u7387(Recall)", "\u5047\u967d\u6027\u7387(False Positive Rate)", "ROC-AUC \u66f2\u7dda"], "ans": "B", "inferred": false, "expl": "\u3010\u7b54\u6848B\u3011\u91cd\u8996\u627e\u51fa\u6240\u6709\u764c\u75c7\u60a3\u8005\uff08\u964d\u6f0f\u8a3a\uff09\u3002\n\u2717(A) Precision \u95dc\u6ce8\u9810\u6e2c\u70ba\u967d\u6027\u4e2d\u771f\u967d\u6027\u7684\u6bd4\u4f8b\uff0c\u8207\u6f0f\u5831\u7121\u95dc\u3002\n\u2713(B) Recall = TP/(TP+FN) \u8861\u91cf\u771f\u6b63\u764c\u75c7\u60a3\u8005\u4e2d\u88ab\u627e\u51fa\u7684\u6bd4\u4f8b\uff0c\u964d\u6f0f\u8a3a=\u63d0\u9ad8 Recall\uff0c\u6b63\u89e3\u3002\n\u2717(C) \u5047\u967d\u6027\u7387\u662f\u8aa4\u5831\u7387\u3002\n\u2717(D) AUC \u662f\u6574\u9ad4\u6307\u6a19\uff0c\u4e0d\u76f4\u63a5\u91dd\u5c0d\u6f0f\u8a3a\u3002"}, {"id": "115_1_s2_1", "exam": "115\u5e74\u7b2c\u4e00\u6b21 \u79d1\u76ee\u4e8c\uff08\u751f\u6210\u5f0fAI\uff09", "examId": "115_1_s2", "no": 1, "q": "\u67d0\u96f6\u552e\u4f01\u696d\u5c0e\u5165\u751f\u6210\u5f0f AI \u5546\u54c1\u63a8\u85a6\u7cfb\u7d71\u3002\u6e2c\u8a66\u7d50\u679c\u986f\u793a\uff0c\u5728\u8cfc\u7269\u884c\u70ba\u3001\u504f\u597d\u8a2d\u5b9a\u8207\u50f9\u683c\u5340\u9593\u76f8\u540c\u7684\u60c5\u6cc1\u4e0b\uff0c\u4e0d\u540c\u5ba2\u6236\u65cf\u7fa4\u6536\u5230\u7684\u63a8\u85a6\u5546\u54c1\u985e\u578b\u4ecd\u51fa\u73fe\u660e\u986f\u5dee\u7570\uff0c \u4e14\u5dee\u7570\u65b9\u5411\u4e0d\u6613\u4ee5\u65e2\u6709\u884c\u92b7\u7b56\u7565\u89e3\u91cb\u3002\u82e5\u5728\u6a21\u578b\u67b6\u69cb\u8207\u63a8\u8ad6\u8a2d\u5b9a\u7686\u672a\u8abf\u6574\u60c5\u5f62 \u4e0b\uff0c\u5c08\u6848\u76ee\u6a19\u662f\u512a\u5148\u964d\u4f4e\u53ef\u80fd\u7684\u6a21\u578b\u504f\u5dee\u98a8\u96aa\uff0c\u4e0b\u5217\u4f55\u8005\u6700\u5408\u7406\uff1f", "opts": ["\u91cd\u65b0\u6aa2\u8996\u8a13\u7df4\u8cc7\u6599\u7684\u6a23\u672c\u5206\u5e03\u8207\u4ee3\u8868\u6027", "\u9650\u5236\u63a8\u85a6\u7d50\u679c\u50c5\u986f\u793a\u9ad8\u92b7\u91cf\u5546\u54c1", "\u964d\u4f4e\u6a21\u578b\u53c3\u6578\u898f\u6a21\u4ee5\u7c21\u5316\u6c7a\u7b56\u908f\u8f2f", "\u63d0\u9ad8\u63a8\u85a6\u7d50\u679c\u7684\u96a8\u6a5f\u6027\u4ee5\u589e\u52a0\u591a\u6a23\u6027"], "ans": "A", "inferred": false, "expl": "\u3010\u7b54\u6848A\u3011\u63a8\u85a6\u5dee\u7570\u7121\u6cd5\u89e3\u91cb\u4e14\u6a21\u578b\u672a\u8abf\u6574\u3002\n\u2713(A) \u4e0d\u540c\u65cf\u7fa4\u63a8\u85a6\u7d50\u679c\u6709\u5dee\u7570\u2192\u6700\u53ef\u80fd\u662f\u8a13\u7df4\u8cc7\u6599\u6a23\u672c\u5206\u5e03\u4e0d\u5747\u8861\uff0c\u9700\u91cd\u6aa2\u8cc7\u6599\u4ee3\u8868\u6027\u3002\n\u2717(B) \u9650\u5236\u9ad8\u92b7\u91cf\u662f\u529f\u80fd\u8abf\u6574\uff0c\u4e0d\u89e3\u504f\u5dee\u3002\n\u2717(C) \u964d\u6a21\u578b\u53c3\u6578\u4e0d\u89e3\u8cc7\u6599\u5c64\u504f\u5dee\u3002\n\u2717(D) \u63d0\u9ad8\u96a8\u6a5f\u6027\u53cd\u589e\u4e0d\u516c\u5e73\u98a8\u96aa\u3002"}, {"id": "115_1_s2_2", "exam": "115\u5e74\u7b2c\u4e00\u6b21 \u79d1\u76ee\u4e8c\uff08\u751f\u6210\u5f0fAI\uff09", "examId": "115_1_s2", "no": 2, "q": "\u5728\u9032\u884c\u5927\u578b\u8a9e\u8a00\u6a21\u578b (LLM) \u4f01\u696d\u5c08\u5c6c\u77e5\u8b58\u7684 Fine-tuning \u6642\uff0c\u82e5\u5167\u90e8 GPU \u904b\u7b97\u8cc7\u6e90\u8207\u8a18\u61b6\u9ad4\u56b4\u91cd\u53d7\u9650\uff0c\u4e0b\u5217\u54ea\u4e00\u7a2e\u53c3\u6578\u9ad8\u6548\u5fae\u8abf(PEFT, Parameter Efficient FineTuning)\u6280\u8853\u6700\u80fd\u5728\u7dad\u6301\u6a21\u578b\u6548\u80fd\u7684\u524d\u63d0\u4e0b\uff0c\u986f\u8457\u964d\u4f4e\u9700\u66f4\u65b0\u7684\u53c3\u6578\u6578\u91cf\uff1f", "opts": ["\u77e5\u8b58\u84b8\u993e(Knowledge Distillation)", "\u63d0\u793a\u8a5e\u5de5\u7a0b(Prompt Engineering)", "\u68af\u5ea6\u51cd\u7d50(Gradient Freezing)", "\u4f4e\u79e9\u9069\u914d(Low-Rank Adaptation)"], "ans": "D", "inferred": false, "expl": "\u3010\u7b54\u6848D\u3011PEFT \u5927\u5e45\u964d\u4f4e\u9700\u66f4\u65b0\u53c3\u6578\u3002\n\u2717(A) \u77e5\u8b58\u84b8\u993e\u662f\u5927\u6a21\u578b\u2192\u5c0f\u6a21\u578b\uff0c\u4e0d\u662f PEFT\u3002\n\u2717(B) Prompt Engineering \u4e0d\u8abf\u6574\u6a21\u578b\u53c3\u6578\u3002\n\u2717(C) \u68af\u5ea6\u51cd\u7d50\u53ea\u662f\u90e8\u5206\u51cd\u7d50\uff0c\u6548\u679c\u4e0d\u986f\u8457\u3002\n\u2713(D) LoRA\uff08Low-Rank Adaptation\uff09\u5728\u5c64\u4e2d\u63d2\u5165\u4f4e\u79e9\u77e9\u9663\uff0c\u50c5\u8a13\u7df4\u5c11\u91cf\u65b0\u589e\u53c3\u6578\uff0c\u662f\u6700\u4e3b\u6d41\u7684 PEFT\u3002"}, {"id": "115_1_s2_3", "exam": "115\u5e74\u7b2c\u4e00\u6b21 \u79d1\u76ee\u4e8c\uff08\u751f\u6210\u5f0fAI\uff09", "examId": "115_1_s2", "no": 3, "q": "\u67d0\u4f01\u696d\u898f\u5283\u900f\u904e Low-Code \u5e73\u53f0\u5efa\u7f6e\u53ef\u8996\u5316\u5100\u8868\u677f\uff0c\u4ee5\u652f\u63f4\u71df\u904b\u6578\u64da\u7684\u5373\u6642\u76e3\u63a7\u8207\u5206\u6790\u5224\u8b80\u3002\u82e5\u4f01\u696d\u7279\u5225\u95dc\u6ce8\u5100\u8868\u677f\u986f\u793a\u7d50\u679c\u7684\u7a69\u5b9a\u6027\u8207\u5206\u6790\u53ef\u4fe1\u5ea6\uff0c\u4e0b\u5217\u4f55\u8005\u6700\u61c9\u512a\u5148\u78ba\u8a8d\uff1f", "opts": ["\u662f\u5426\u5177\u5099\u7a69\u5b9a\u7684\u8cc7\u6599\u4e32\u63a5\u80fd\u529b\u8207\u5373\u6642\u66f4\u65b0\u6a5f\u5236", "\u662f\u5426\u63d0\u4f9b\u81ea\u52d5\u5316\u6c7a\u7b56\u5efa\u8b70\u8207\u9810\u6e2c\u5206\u6790\u6a21\u7d44", "\u662f\u5426\u652f\u63f4\u5f48\u6027\u4ecb\u9762\u8a2d\u8a08\u8207\u591a\u89d2\u8272\u6b0a\u9650\u7ba1\u7406", "\u662f\u5426\u6574\u5408\u6d41\u7a0b\u89f8\u767c\u8207\u8de8\u7cfb\u7d71\u901a\u77e5\u529f\u80fd"], "ans": "A", "inferred": false, "expl": "\u3010\u7b54\u6848A\u3011\u5100\u8868\u677f\u7a69\u5b9a\u6027\u8207\u53ef\u4fe1\u5ea6\u3002\n\u2713(A) \u7a69\u5b9a\u8cc7\u6599\u4e32\u63a5\u8207\u5373\u6642\u66f4\u65b0\u6a5f\u5236\u662f\u8996\u89ba\u5316\u5206\u6790\u53ef\u4fe1\u5ea6\u7684\u57fa\u790e\u3002\n\u2717(B) \u81ea\u52d5\u6c7a\u7b56\u5efa\u8b70\u662f\u9032\u968e\u529f\u80fd\uff0c\u975e\u7a69\u5b9a\u6027\u6839\u672c\u3002\n\u2717(C) \u4ecb\u9762\u6b0a\u9650\u662f\u9ad4\u9a57\uff0c\u975e\u53ef\u4fe1\u5ea6\u6838\u5fc3\u3002\n\u2717(D) \u89f8\u767c\u901a\u77e5\u662f\u6d41\u7a0b\u529f\u80fd\uff0c\u975e\u7a69\u5b9a\u6027\u3002"}, {"id": "115_1_s2_4", "exam": "115\u5e74\u7b2c\u4e00\u6b21 \u79d1\u76ee\u4e8c\uff08\u751f\u6210\u5f0fAI\uff09", "examId": "115_1_s2", "no": 4, "q": "\u67d0\u4f01\u696d\u5c0e\u5165\u751f\u6210\u5f0f AI \u5ba2\u670d\u7cfb\u7d71\u5f8c\u767c\u73fe\uff0c\u7cfb\u7d71\u6574\u9ad4\u904b\u4f5c\u7a69\u5b9a\uff0c\u4e14\u5728\u55ae\u4f4d\u6642\u9593\u5167\u53ef\u8655\u7406\u5927\u91cf\u5c0d\u8a71\u8acb\u6c42\u3002\u90e8\u5206\u4f7f\u7528\u8005\u4ecd\u53cd\u6620\u5728\u4e92\u52d5\u904e\u7a0b\u4e2d\u56de\u8986\u51fa\u73fe\u5361\u9813\u611f\uff0c\u7d93\u521d\u6b65\u6392\u9664\u7db2\u8def\u9023\u7dda\u8207\u524d\u7aef\u4ecb\u9762\u6548\u80fd\u554f\u984c\u5f8c\uff0c\u82e5\u5c08\u6848\u5718\u968a\u5e0c\u671b\u91dd\u5c0d\u6b64\u73fe\u8c61\u9032\u884c\u6548\u80fd\u6e2c\u8a66\uff0c\u4e0b \u5217\u4f55\u8005\u6700\u7b26\u5408\u6e2c\u8a66\u91cd\u9ede\uff1f", "opts": ["\u8a55\u4f30\u7cfb\u7d71\u9577\u6642\u9593\u904b\u4f5c\u7684\u7a69\u5b9a\u7a0b\u5ea6", "\u6e2c\u91cf\u7cfb\u7d71\u55ae\u4f4d\u6642\u9593\u7684\u7e3d\u8655\u7406\u91cf", "\u6bd4\u8f03\u4e0d\u540c\u56de\u8986\u5167\u5bb9\u7684\u8a9e\u8a00\u54c1\u8cea", "\u5206\u6790\u55ae\u6b21\u4e92\u52d5\u56de\u8986\u7684\u53cd\u61c9\u901f\u5ea6\u8868\u73fe"], "ans": "D", "inferred": false, "expl": "\u3010\u7b54\u6848D\u3011\u6574\u9ad4\u7a69\u5b9a\u4f46\u55ae\u6b21\u4e92\u52d5\u6709\u5361\u9813\u611f\u3002\n\u2717(A) \u9577\u6642\u9593\u904b\u4f5c\u7a69\u5b9a\u6027\u662f\u53e6\u4e00\u9762\u5411\u3002\n\u2717(B) \u55ae\u4f4d\u6642\u9593\u7e3d\u8655\u7406\u91cf\u662f\u541e\u5410\u91cf\u3002\n\u2717(C) \u8a9e\u8a00\u54c1\u8cea\u4e0d\u89e3\u5361\u9813\u554f\u984c\u3002\n\u2713(D) \u5361\u9813\u611f\u5c6c\u5ef6\u9072\u554f\u984c\uff0c\u61c9\u6e2c\u55ae\u6b21\u4e92\u52d5\u8f38\u5165\u5230\u56de\u61c9\u7684\u53cd\u61c9\u901f\u5ea6\u3002"}, {"id": "115_1_s2_5", "exam": "115\u5e74\u7b2c\u4e00\u6b21 \u79d1\u76ee\u4e8c\uff08\u751f\u6210\u5f0fAI\uff09", "examId": "115_1_s2", "no": 5, "q": "\u67d0\u4f01\u696d\u5c0e\u5165\u751f\u6210\u5f0f AI \u7cfb\u7d71\uff0c\u5e0c\u671b\u81ea\u52d5\u7522\u51fa\u5ba2\u670d\u56de\u8986\u8207\u5167\u90e8\u6587\u4ef6\u6458\u8981\u3002\u7cfb\u7d71\u9700\u80fd\u7406\u89e3\u4f7f\u7528\u8005\u8f38\u5165\u7684\u5b8c\u6574\u8a9e\u53e5\u5167\u5bb9\uff0c\u4e26\u5728\u56de\u8986\u4e2d\u7dad\u6301\u8a9e\u610f\u9023\u8cab\uff0c\u5373\u4f7f\u5c0d\u8a71\u5167\u5bb9\u8f03\u9577\u4ecd\u80fd\u4fdd\u6301\u4e0a\u4e0b\u6587\u4e00\u81f4\u6027\u3002\u57fa\u65bc\u4e0a\u8ff0\u9700\u6c42\uff0c\u4e0b\u5217\u4f55\u7a2e\u6a21\u578b\u67b6\u69cb\u6700\u70ba\u9069\u5408\uff1f", "opts": ["\u5377\u7a4d\u795e\u7d93\u7db2\u8def(Convolutional Neural Network, CNN)", "\u905e\u8ff4\u795e\u7d93\u7db2\u8def(Recurrent Neural Network, RNN)", "\u57fa\u65bc Transformer \u67b6\u69cb\u7684\u81ea\u8ff4\u6b78\u6a21\u578b(Autoregressive Model)", "\u751f\u6210\u5c0d\u6297\u7db2\u8def(Generative Adversarial Network, GAN)"], "ans": "C", "inferred": false, "expl": "\u3010\u7b54\u6848C\u3011\u9577\u4e0a\u4e0b\u6587+\u8a9e\u610f\u9023\u8cab\u7684\u751f\u6210\u3002\n\u2717(A) CNN \u8655\u7406\u5f71\u50cf\uff0c\u4e0d\u9069\u5408\u9577\u6587\u5b57\u3002\n\u2717(B) RNN \u6709\u68af\u5ea6\u6d88\u5931\uff0c\u96e3\u7dad\u6301\u9577\u4e0a\u4e0b\u6587\u4e00\u81f4\u6027\u3002\n\u2713(C) Transformer \u81ea\u8ff4\u6b78\u6a21\u578b\uff08GPT \u7cfb\u5217\uff09\u80fd\u8655\u7406\u9577\u4e0a\u4e0b\u6587\u4e14\u751f\u6210\u9023\u8cab\u6587\u5b57\uff0c\u6700\u9069\u5408\u3002\n\u2717(D) GAN \u4e3b\u8981\u7528\u65bc\u5716\u50cf\u751f\u6210\uff0c\u975e\u8a9e\u8a00\u3002"}, {"id": "115_1_s2_6", "exam": "115\u5e74\u7b2c\u4e00\u6b21 \u79d1\u76ee\u4e8c\uff08\u751f\u6210\u5f0fAI\uff09", "examId": "115_1_s2", "no": 6, "q": "OpenAI \u5df2\u70ba Sora \u751f\u6210\u7684\u5f71\u7247\u63d0\u4f9b\u591a\u7a2e\u51fa\u8655\u8b49\u660e\u6a5f\u5236\uff0c\u4ee5\u964d\u4f4e\u8aa4\u5c0e\u6027\u6216\u6b3a\u9a19\u6027\u5167\u5bb9\u5e36\u4f86\u7684\u98a8\u96aa\u3002\u4e0b\u5217\u4f55\u8005\u4e0d\u5c6c\u65bc\u76ee\u524d OpenAI \u5b98\u65b9\u70ba Sora \u5167\u5bb9\u63d0\u4f9b\u7684\u51fa\u8655\u8b49\u660e\u5de5 \u5177\uff1f", "opts": ["\u6240\u6709\u8cc7\u7522\u4e0a\u5167\u5d4c\u7684 C2PA(Content Credentials)\u5143\u6578\u64da", "\u9810\u8a2d\u53ef\u898b\u7684\u52d5\u614b\u6d6e\u6c34\u5370", "\u7528\u65bc\u8ffd\u8e64\u751f\u6210\u5167\u5bb9\u7684\u5167\u90e8\u53cd\u5411\u5f71\u50cf\u8207\u97f3\u8a0a\u641c\u5c0b\u5de5\u5177", "\u5e73\u53f0\u5c0d\u5916\u958b\u653e\u7684\u5be6\u6642\u4f86\u6e90\u9a57\u8b49\u4ecb\u9762"], "ans": "D", "inferred": false, "expl": "\u3010\u7b54\u6848D\u3011\u975e Sora \u5b98\u65b9\u63d0\u4f9b\u7684\u51fa\u8655\u5de5\u5177\u3002\n\u2717(A) C2PA \u5143\u6578\u64da\u662f\u5b98\u65b9\u63d0\u4f9b\u3002\n\u2717(B) \u9810\u8a2d\u53ef\u898b\u52d5\u614b\u6d6e\u6c34\u5370\u662f\u5b98\u65b9\u63d0\u4f9b\u3002\n\u2717(C) \u5167\u90e8\u53cd\u5411\u5f71\u50cf\u8207\u97f3\u8a0a\u641c\u5c0b\u662f\u5b98\u65b9\u63d0\u4f9b\u3002\n\u2713(D) \u300c\u5e73\u53f0\u5c0d\u5916\u958b\u653e\u5be6\u6642\u4f86\u6e90\u9a57\u8b49\u4ecb\u9762\u300d\u4e26\u975e OpenAI \u5b98\u65b9\u516c\u958b\u529f\u80fd\uff0c\u6b63\u89e3\u3002"}, {"id": "115_1_s2_7", "exam": "115\u5e74\u7b2c\u4e00\u6b21 \u79d1\u76ee\u4e8c\uff08\u751f\u6210\u5f0fAI\uff09", "examId": "115_1_s2", "no": 7, "q": "\u67d0\u4f01\u696d\u5c0e\u5165 No-Code/Low-Code \u5e73\u53f0\uff0c\u8b93\u5404\u90e8\u9580\u80fd\u81ea\u884c\u5efa\u7acb\u8cc7\u6599\u5206\u6790\u8207\u6d41\u7a0b\u61c9\u7528\u3002\u96a8\u8457\u4f7f\u7528\u7bc4\u570d\u64f4\u5927\uff0c\u7ba1\u7406\u5c64\u958b\u59cb\u95dc\u6ce8\u8cc7\u6599\u6b0a\u9650\u3001\u5b58\u53d6\u7d00\u9304\u8207\u5408\u898f\u8981\u6c42\u3002\u4f9d\u8cc7\u6599\u6cbb\u7406\u89c0\u9ede\uff0c\u4e0b\u5217\u4f55\u8005\u6700\u5408\u7406\u63cf\u8ff0\u6b64\u985e\u5e73\u53f0\u5c0d\u4f01\u696d\u6cbb\u7406\u6a5f\u5236\u7684\u5178\u578b\u5f71\u97ff\uff1f", "opts": ["\u5e73\u53f0\u5167\u5efa\u89d2\u8272\u6b0a\u9650\u8207\u8cc7\u6599\u5b58\u53d6\u63a7\u7ba1\u6a5f\u5236\uff0c\u6709\u52a9\u6cbb\u7406\u5236\u5ea6\u843d\u5be6", "\u5e73\u53f0\u5f37\u5316\u90e8\u9580\u81ea\u4e3b\u6027\uff0c\u901a\u5e38\u4f7f\u65e2\u6709\u6cbb\u7406\u6d41\u7a0b\u96e3\u4ee5\u5ef6\u7e8c", "\u5e73\u53f0\u4e3b\u8981\u652f\u63f4\u61c9\u7528\u5feb\u901f\u958b\u767c\uff0c\u8cc7\u6599\u6cbb\u7406\u4ecd\u9700\u5b8c\u5168\u4ef0\u8cf4\u5916\u90e8\u7cfb\u7d71", "\u5e73\u53f0\u900f\u904e\u81ea\u52d5\u5316\u8a2d\u5b9a\u6a5f\u5236\uff0c\u53ef\u986f\u8457\u964d\u4f4e\u6cbb\u7406\u8207\u5408\u898f\u7ba1\u7406\u9700\u6c42"], "ans": "A", "inferred": false, "expl": "\u3010\u7b54\u6848A\u3011No-Code \u5e73\u53f0\u5c0d\u6cbb\u7406\u7684\u5f71\u97ff\u3002\n\u2713(A) \u5e73\u53f0\u5167\u5efa\u89d2\u8272\u6b0a\u9650\u8207\u8cc7\u6599\u5b58\u53d6\u63a7\u7ba1\uff0c\u6709\u52a9\u6cbb\u7406\u5236\u5ea6\u843d\u5be6\u3002\n\u2717(B) \u5e73\u53f0\u4e0d\u6703\u4f7f\u6cbb\u7406\u6d41\u7a0b\u96e3\u4ee5\u5ef6\u7e8c\u3002\n\u2717(C) \u6cbb\u7406\u4e0d\u9700\u300c\u5b8c\u5168\u300d\u4ef0\u8cf4\u5916\u90e8\u7cfb\u7d71\u3002\n\u2717(D) \u5e73\u53f0\u4e0d\u6703\u986f\u8457\u300c\u964d\u4f4e\u300d\u6cbb\u7406\u9700\u6c42\uff0c\u53cd\u800c\u9700\u8981\u5efa\u7acb\u65b0\u6cbb\u7406\u898f\u7bc4\u3002"}, {"id": "115_1_s2_8", "exam": "115\u5e74\u7b2c\u4e00\u6b21 \u79d1\u76ee\u4e8c\uff08\u751f\u6210\u5f0fAI\uff09", "examId": "115_1_s2", "no": 8, "q": "\u67d0\u88fd\u9020\u4f01\u696d\u898f\u5283\u65bc\u8a2d\u5099\u7aef\u5efa\u7f6e\u908a\u7de3\u904b\u7b97(Edge Computing)\u67b6\u69cb\uff0c\u4e26\u4ee5 NoCode/Low-Code \u5e73\u53f0\u958b\u767c\u5373\u6642\u76e3\u63a7\u61c9\u7528\u3002\u6e2c\u8a66\u986f\u793a\uff0c\u7cfb\u7d71\u5728\u96f2\u7aef\u74b0\u5883\u57f7\u884c\u9806\u66a2\uff0c \u4f46\u90e8\u7f72\u81f3\u908a\u7de3\u88dd\u7f6e\u5f8c\u51fa\u73fe\u56de\u61c9\u5ef6\u9072\u8207\u6548\u80fd\u4e0b\u964d\u3002\u4f9d\u6b64\u60c5\u5883\u5224\u65b7\uff0c\u4e0b\u5217\u4f55\u8005\u6700\u5408\u7406 \u89e3\u91cb\u8a72\u73fe\u8c61\uff1f", "opts": ["\u908a\u7de3\u904b\u7b97\u67b6\u69cb\u53ef\u964d\u4f4e\u7cfb\u7d71\u5c0d\u6548\u80fd\u7684\u9700\u6c42", "No-Code/Low-Code \u5e73\u53f0\u50c5\u80fd\u5728\u96f2\u7aef\u74b0\u5883\u57f7\u884c", "\u96f2\u7aef\u90e8\u7f72\u901a\u5e38\u6bd4\u908a\u7de3\u90e8\u7f72\u66f4\u5bb9\u6613\u51fa\u73fe\u5ef6\u9072", "\u908a\u7de3\u88dd\u7f6e\u901a\u5e38\u53d7\u9650\u65bc\u904b\u7b97\u80fd\u529b\u8207\u53ef\u7528\u8cc7\u6e90"], "ans": "D", "inferred": false, "expl": "\u3010\u7b54\u6848D\u3011\u96f2\u7aef\u9806\u66a2\u4f46\u908a\u7de3\u88dd\u7f6e\u5ef6\u9072\u3002\n\u2717(A) \u908a\u7de3\u904b\u7b97\u4e0d\u6703\u964d\u4f4e\u6548\u80fd\u9700\u6c42\u3002\n\u2717(B) No-Code \u5e73\u53f0\u975e\u50c5\u96f2\u7aef\u53ef\u57f7\u884c\u3002\n\u2717(C) \u96f2\u7aef\u901a\u5e38\u6bd4\u908a\u7de3\u66f4\u5177\u904b\u7b97\u512a\u52e2\u3002\n\u2713(D) \u908a\u7de3\u88dd\u7f6e\uff08\u5d4c\u5165\u5f0f\u7cfb\u7d71\uff09CPU/GPU/RAM \u53d7\u9650\uff0c\u662f\u5ef6\u9072\u8207\u6548\u80fd\u4e0b\u964d\u7684\u76f4\u63a5\u539f\u56e0\u3002"}, {"id": "115_1_s2_9", "exam": "115\u5e74\u7b2c\u4e00\u6b21 \u79d1\u76ee\u4e8c\uff08\u751f\u6210\u5f0fAI\uff09", "examId": "115_1_s2", "no": 9, "q": "\u67d0\u4f01\u696d\u4f7f\u7528\u751f\u6210\u5f0f AI \u9032\u884c\u6587\u5b57\u5206\u985e\uff0c\u521d\u671f\u50c5\u6839\u64da\u65e2\u6709\u696d\u52d9\u8cc7\u6599\u8a2d\u8a08\u5c11\u91cf\u6a23\u672c\u63d0\u793a (Few-shot Prompting)\u3002\u7576\u6a21\u578b\u61c9\u7528\u81f3\u65b0\u5e02\u5834\u8cc7\u6599\u6642\uff0c\u5718\u968a\u767c\u73fe\u5206\u985e\u7d50\u679c\u660e\u986f\u4e0d\u7a69\u5b9a\uff0c\u4e14\u539f\u5148\u63d0\u4f9b\u7684\u7bc4\u4f8b\u4e26\u672a\u6db5\u84cb\u65b0\u5e02\u5834\u5e38\u898b\u7684\u8868\u9054\u65b9\u5f0f\u3002\u4f9d\u6b64\u60c5\u5883\u5224\u65b7\uff0c\u4e0b\u5217\u4f55\u8005\u6700\u53ef\u80fd\u70ba\u4e3b\u8981\u539f\u56e0\uff1f", "opts": ["\u6a21\u578b\u5bb9\u6613\u5c0d\u55ae\u4e00\u7bc4\u4f8b\u7522\u751f\u904e\u5ea6\u8a18\u61b6", "\u5c11\u91cf\u7bc4\u4f8b\u96e3\u4ee5\u6db5\u84cb\u65b0\u60c5\u5883\u7684\u8cc7\u6599\u5dee\u7570", "Prompt \u8a2d\u8a08\u7121\u6cd5\u5f15\u5c0e\u6a21\u578b\u64f7\u53d6\u5171\u901a\u7279\u5fb5", "\u6a21\u578b\u63a8\u7406\u80fd\u529b\u4e0d\u8db3\u4ee5\u5b8c\u6210\u5206\u985e\u4efb\u52d9"], "ans": "B", "inferred": false, "expl": "\u3010\u7b54\u6848B\u3011Few-shot \u61c9\u7528\u65b0\u5e02\u5834\u5206\u985e\u4e0d\u7a69\u3002\n\u2717(A) Few-shot \u6a23\u672c\u5c11\u96e3\u4ee5\u904e\u5ea6\u8a18\u61b6\u3002\n\u2713(B) 1-2 \u500b\u7bc4\u4f8b\u96e3\u4ee5\u6db5\u84cb\u65b0\u5e02\u5834\u7684\u591a\u6a23\u8868\u9054\uff0c\u662f\u5206\u985e\u4e0d\u7a69\u5b9a\u7684\u6838\u5fc3\u539f\u56e0\u3002\n\u2717(C) \u4e26\u975e Prompt \u8a2d\u8a08\u554f\u984c\uff0c\u800c\u662f\u7bc4\u4f8b\u4e0d\u8db3\u3002\n\u2717(D) \u4e26\u975e\u6a21\u578b\u63a8\u7406\u80fd\u529b\u554f\u984c\u3002"}, {"id": "115_1_s2_10", "exam": "115\u5e74\u7b2c\u4e00\u6b21 \u79d1\u76ee\u4e8c\uff08\u751f\u6210\u5f0fAI\uff09", "examId": "115_1_s2", "no": 10, "q": "\u67d0\u4f01\u696d\u5efa\u7f6e\u6aa2\u7d22\u589e\u5f37\u751f\u6210(Retrieval-augmented generation, RAG)\u7cfb\u7d71\u652f\u63f4\u5167\u90e8\u77e5\u8b58\u67e5\u8a62\u3002\u96a8\u8457\u4f7f\u7528\u91cf\u63d0\u5347\uff0c\u5718\u968a\u767c\u73fe\u6a21\u578b\u56de\u8986\u54c1\u8cea\u7a69\u5b9a\uff0c\u4f46\u63a8\u8ad6\u5ef6\u9072\u8207\u904b\u7b97\u6210\u672c\u9010\u6f38\u589e\u52a0\u3002\u5c08\u6848\u898f\u5283\u5728\u7dad\u6301\u56de\u8986\u54c1\u8cea\u524d\u63d0\u4e0b\u9032\u884c\u6548\u80fd\u512a\u5316\u3002\u5728\u6b64\u60c5\u5883\u4e0b\uff0c\u82e5\u63a1\u7528\u77e5\u8b58\u84b8\u993e(Knowledge Distillation)\uff0c\u4e0b\u5217\u6558\u8ff0\u4f55\u8005\u6700\u70ba\u5408\u7406\uff1f", "opts": ["\u5c07\u6aa2\u7d22\u8cc7\u6599\u8f49\u63db\u70ba\u7d50\u69cb\u5316\u898f\u5247\u4ee5\u53d6\u4ee3\u6a21\u578b", "\u50c5\u900f\u904e\u589e\u52a0\u6aa2\u7d22\u6587\u4ef6\u6578\u91cf\u6539\u5584\u6548\u80fd", "\u505c\u7528\u751f\u6210\u6a21\u578b\u4ee5\u907f\u514d\u5ef6\u9072\u554f\u984c", "\u4f7f\u5c0f\u578b\u6a21\u578b\u5b78\u7fd2\u5927\u578b\u6a21\u578b\u884c\u70ba\uff0c\u4ee5\u964d\u4f4e\u63a8\u8ad6\u6210\u672c"], "ans": "D", "inferred": false, "expl": "\u3010\u7b54\u6848D\u3011\u77e5\u8b58\u84b8\u993e\u61c9\u7528\u65bc RAG \u7cfb\u7d71\u3002\n\u2717(A) \u898f\u5247\u53d6\u4ee3\u751f\u6210\u4e0d\u662f\u77e5\u8b58\u84b8\u993e\u3002\n\u2717(B) \u589e\u52a0\u6aa2\u7d22\u6587\u4ef6\u4e0d\u964d\u63a8\u8ad6\u6210\u672c\u3002\n\u2717(C) \u505c\u7528\u751f\u6210\u6a21\u578b\u53cd\u5931\u4e3b\u8981\u529f\u80fd\u3002\n\u2713(D) \u77e5 \u5206\u5de5\u6b63\u78ba\u3002\n\u2717(C) \u50c5 No-Code \u7121\u6cd5\u505a\u9ad8\u968e\u6a21\u578b\u5efa\u7acb\u3002\n\u2717(D) \u50c5 AutoML \u4e0d\u64c5\u9577\u4ecb\u9762\u5ba2\u88fd\u3002"}, {"id": "115_1_s2_12", "exam": "115\u5e74\u7b2c\u4e00\u6b21 \u79d1\u76ee\u4e8c\uff08\u751f\u6210\u5f0fAI\uff09", "examId": "115_1_s2", "no": 12, "q": "\u4e0b\u5217\u4f55\u8005\u6700\u80fd\u6b63\u78ba\u8aaa\u660e Model Context Protocol(MCP)\u8207\u6aa2\u7d22\u589e\u5f37\u751f\u6210 (Retrieval-Augmented Generation, RAG)\u5728\u529f\u80fd\u5b9a\u4f4d\u4e0a\u7684\u4e3b\u8981\u5dee\u7570\uff1f", "opts": ["MCP \u4e3b\u8981\u7528\u65bc\u964d\u4f4e\u6a21\u578b\u8a13\u7df4\u6210\u672c\uff1bRAG \u4e3b\u8981\u7528\u65bc\u63d0\u5347\u63a8\u8ad6\u901f\u5ea6", "MCP \u8457\u91cd\u6a21\u578b\u8207\u5916\u90e8\u5de5\u5177\u6216\u7cfb\u7d71\u4e92\u52d5\uff1bRAG \u8457\u91cd\u88dc\u5145\u6a21\u578b\u77e5\u8b58\u4f86\u6e90", "RAG \u5fc5\u9808\u4f9d\u8cf4\u5411\u91cf\u8cc7\u6599\u5eab\uff1bMCP \u4e0d\u9700\u4efb\u4f55\u5916\u90e8\u6574\u5408", "RAG \u5c6c\u6a19\u6e96\u5316\u901a\u8a0a\u5354\u8b70\uff1bMCP \u5c6c\u8cc7\u6599\u6aa2\u7d22\u6280\u8853"], "ans": "B", "inferred": false, "expl": "\u3010\u7b54\u6848B\u3011MCP vs RAG \u5b9a\u4f4d\u5dee\u7570\u3002\n\u2717(A) MCP \u975e\u964d\u8a13\u7df4\u6210\u672c\uff1bRAG \u975e\u63d0\u5347\u63a8\u8ad6\u901f\u5ea6\u3002\n\u2713(B) MCP \u8457\u91cd\u6a21\u578b\u8207\u5916\u90e8\u5de5\u5177/\u7cfb\u7d71\u4e92\u52d5\uff1bRAG \u8457\u91cd\u88dc\u5145\u6a21\u578b\u77e5\u8b58\u4f86\u6e90\uff0c\u5b9a\u4f4d\u4e92\u88dc\u3002\n\u2717(C) RAG \u591a\u7528\u5411\u91cf\u8cc7\u6599\u5eab\u4f46\u975e\u300c\u5fc5\u9808\u300d\uff1bMCP \u4e5f\u9700\u5916\u90e8\u6574\u5408\u3002\n\u2717(D) \u63cf\u8ff0\u985b\u5012\u3002"}, {"id": "115_1_s2_13", "exam": "115\u5e74\u7b2c\u4e00\u6b21 \u79d1\u76ee\u4e8c\uff08\u751f\u6210\u5f0fAI\uff09", "examId": "115_1_s2", "no": 13, "q": "\u67d0\u4f01\u696d\u5efa\u7f6e\u6587\u4ef6\u578b\u77e5\u8b58\u67e5\u8a62\u7cfb\u7d71\uff0c\u5c07\u5927\u91cf\u9577\u7bc7\u5167\u90e8\u6587\u4ef6\u8f49\u63db\u70ba\u53ef\u4f9b\u751f\u6210\u5f0f AI \u4f7f\u7528\u7684\u77e5\u8b58\u4f86\u6e90\u3002\u5728\u6e2c\u8a66\u904e\u7a0b\u4e2d\uff0c\u5718\u968a\u767c\u73fe\u82e5\u76f4\u63a5\u4ee5\u6574\u4efd\u6587\u4ef6\u9032\u884c\u6aa2\u7d22\uff0c\u6a21\u578b\u56de\u8986\u5e38\u5305\u542b\u7121\u95dc\u5167\u5bb9\uff0c\u4e14\u5f15\u7528\u6bb5\u843d\u4e0d\u5920\u7cbe\u6e96\u3002\u5718\u968a\u8a55\u4f30\u5f8c\uff0c\u6c7a\u5b9a\u5c0e\u5165 Chunking \u6a5f\u5236\u7684\u4e3b\u8981\u76ee\u7684\u70ba\u4f55\uff1f", "opts": ["\u900f\u904e\u7e2e\u77ed\u8f38\u5165\u9577\u5ea6\uff0c\u52a0\u901f\u6a21\u578b\u63a8\u7406\u6d41\u7a0b", "\u63d0\u5347\u6aa2\u7d22\u7d50\u679c\u7684\u8a9e\u610f\u5c0d\u9f4a\u7a0b\u5ea6\uff0c\u4e26\u964d\u4f4e\u9577\u6587\u4ef6\u5e36\u4f86\u7684\u5e72\u64fe", "\u6e1b\u5c11\u6a21\u578b\u57f7\u884c\u6642\u7684\u8a18\u61b6\u9ad4\u4f7f\u7528\u91cf\uff0c\u4ee5\u63d0\u5347\u7cfb\u7d71\u7a69\u5b9a\u6027", "\u8b93\u6a21\u578b\u5728\u751f\u6210\u56de\u8986\u6642\u5177\u5099\u66f4\u9ad8\u7684\u5275\u610f\u767c\u63ee\u7a7a\u9593"], "ans": "B", "inferred": false, "expl": "\u3010\u7b54\u6848B\u3011Chunking \u4e3b\u8981\u76ee\u7684\u3002\n\u2717(A) Chunking \u975e\u70ba\u52a0\u901f\u63a8\u7406\u3002\n\u2713(B) \u5c07\u9577\u6587\u5207\u70ba\u8a9e\u610f\u9023\u8cab\u5c0f\u6bb5\uff0c\u63d0\u5347\u6aa2\u7d22\u7cbe\u6e96\u5ea6\u4e26\u964d\u4f4e\u9577\u6587\u4ef6\u96dc\u8a0a\u5e72\u64fe\uff0c\u662f\u4e3b\u8981\u76ee\u7684\u3002\n\u2717(C) \u975e\u70ba\u6e1b\u5c11\u8a18\u61b6\u9ad4\u3002\n\u2717(D) Chunking \u4e0d\u70ba\u589e\u52a0\u5275\u610f\u3002"}, {"id": "115_1_s2_14", "exam": "115\u5e74\u7b2c\u4e00\u6b21 \u79d1\u76ee\u4e8c\uff08\u751f\u6210\u5f0fAI\uff09", "examId": "115_1_s2", "no": 14, "q": "\u67d0\u4f01\u696d\u5c0e\u5165\u5927\u578b\u8a9e\u8a00\u6a21\u578b(LLM)\u5206\u6790\u5167\u90e8\u5831\u8868\uff0c\u4f7f\u7528\u8005\u7d93\u5e38\u63d0\u4f9b Excel \u532f\u51fa\u7684\u8868\u683c\u8cc7\u6599(\u5982\u92b7\u552e\u6578\u64da\u8207\u7d71\u8a08\u8868)\u3002\u6e2c\u8a66\u6642\u767c\u73fe\uff0c\u6a21\u578b\u5c0d\u539f\u59cb\u8868\u683c\u89e3\u6790\u6548\u679c\u4e0d\u7a69\u5b9a\u3002\u70ba\u63d0\u5347\u6a21\u578b\u7406\u89e3\u8207\u56de\u61c9\u54c1\u8cea\uff0c\u4e0b\u5217\u54ea\u4e00\u7a2e\u4e0a\u4e0b\u6587\u5de5\u7a0b(Context Engineering) \u4f5c\u6cd5\u8f03\u70ba\u9069\u7576\uff1f", "opts": ["\u5c07\u8868\u683c\u5167\u5bb9\u8f49\u63db\u70ba\u7d50\u69cb\u5316 JSON \u6216 Markdown table", "\u5728\u7dad\u6301\u539f\u59cb\u8868\u683c\u5448\u73fe\u65b9\u5f0f\u4e0b\uff0c\u88dc\u5145\u6b04\u4f4d\u8207\u6578\u64da\u8aaa\u660e", "\u5c07\u8868\u683c\u8cc7\u6599\u96a8\u6a5f\u5207\u5272\u5f8c\u5206\u6bb5\u8f38\u5165", "\u76f4\u63a5\u63d0\u4f9b\u539f\u59cb\u8868\u683c\u5167\u5bb9\u4ee5\u4fdd\u7559\u5b8c\u6574\u8cc7\u8a0a"], "ans": "A", "inferred": false, "expl": "\u3010\u7b54\u6848A\u3011Excel \u8868\u683c\u8f38\u5165 LLM \u8655\u7406\u3002\n\u2713(A) \u8f49\u70ba JSON \u6216 Markdown table \u4fdd\u7559\u6b04\u4f4d/\u5217\u95dc\u4fc2\uff0c\u6700\u5229\u65bc LLM \u7406\u89e3\u7d50\u69cb\u3002\n\u2717(B) \u7dad\u6301\u539f\u59cb\u5448\u73fe\u89e3\u6790\u6548\u679c\u5dee\u3002\n\u2717(C) \u96a8\u6a5f\u5207\u5272\u7834\u58de\u7d50\u69cb\u3002\n\u2717(D) \u76f4\u63a5\u7d66\u539f\u59cb\u8868\u683c\u4ecd\u89e3\u6790\u4e0d\u7a69\u3002"}, {"id": "115_1_s2_15", "exam": "115\u5e74\u7b2c\u4e00\u6b21 \u79d1\u76ee\u4e8c\uff08\u751f\u6210\u5f0fAI\uff09", "examId": "115_1_s2", "no": 15, "q": "\u5728\u751f\u6210\u5f0f AI \u61c9\u7528\u8a2d\u8a08\u4e2d\uff0c\u60c5\u5883\u611f\u77e5\u4ee3\u7406(Context-aware Agent)\u7684\u6838\u5fc3\u7279\u6027\u70ba\u4f55\uff1f", "opts": ["\u80fd\u4f9d\u4efb\u52d9\u9700\u6c42\u5373\u6642\u91cd\u65b0\u8a13\u7df4\u6a21\u578b\u53c3\u6578\u4ee5\u512a\u5316\u7d50\u679c", "\u50c5\u4f9d\u4f7f\u7528\u8005\u7576\u524d\u8f38\u5165\u6307\u4ee4\u57f7\u884c\u4efb\u52d9\uff0c\u4e0d\u4fdd\u7559\u6b77\u7a0b\u8cc7\u8a0a", "\u5177\u5099\u8de8\u6a21\u614b\u8655\u7406\u80fd\u529b\uff0c\u53ef\u540c\u6642\u7406\u89e3\u6587\u5b57\u8207\u5f71\u50cf\u5167\u5bb9", "\u80fd\u5229\u7528\u5c0d\u8a71\u6b77\u53f2\u3001\u4efb\u52d9\u72c0\u614b\u8abf\u6574\u884c\u70ba\u8207\u6c7a\u7b56"], "ans": "D", "inferred": false, "expl": "\u3010\u7b54\u6848D\u3011Context-aware Agent \u7684\u6838\u5fc3\u7279\u6027\u3002\n\u2717(A) Context-aware \u4e0d\u662f\u5373\u6642\u91cd\u8a13\u53c3\u6578\u3002\n\u2717(B) \u4e0d\u4fdd\u7559\u6b77\u7a0b\u4e0d\u662f Context-aware\u3002\n\u2717(C) \u8de8\u6a21\u614b\u662f\u53e6\u4e00\u6982\u5ff5\uff08Multimodal\uff09\u3002\n\u2713(D) \u80fd\u5229\u7528\u5c0d\u8a71\u6b77\u53f2\u8207\u4efb\u52d9\u72c0\u614b\u52d5\u614b\u8abf\u6574\u884c\u70ba\u6c7a\u7b56\uff0c\u6b63\u662f Context-aware Agent \u7684\u6838\u5fc3\u3002"}, {"id": "115_1_s2_16", "exam": "115\u5e74\u7b2c\u4e00\u6b21 \u79d1\u76ee\u4e8c\uff08\u751f\u6210\u5f0fAI\uff09", "examId": "115_1_s2", "no": 16, "q": "\u67d0\u4f01\u696d\u5efa\u7f6e Agentic AI \u7cfb\u7d71\u8655\u7406\u8de8\u90e8\u9580\u8907\u96dc\u4efb\u52d9\uff0c\u5718\u968a\u4ee5\u89e3\u6c7a\u65b9\u6848\u5716\u8b5c(Solution Graph)\u4f5c\u70ba\u898f\u5283\u6846\u67b6\u3002\u4e0b\u5217\u4f55\u8005\u70ba Solution Graph \u7684\u4e3b\u8981\u529f\u80fd\uff1f", "opts": ["\u53d6\u4ee3\u8a9e\u8a00\u6a21\u578b\u63a8\u7406\u6a5f\u5236\uff0c\u6539\u4ee5\u5716\u5f62\u641c\u5c0b\u5b8c\u6210\u6c7a\u7b56", "\u4f5c\u70ba\u4efb\u52d9\u77e5\u8b58\u5eab\uff0c\u7528\u65bc\u5132\u5b58 AI \u5df2\u5b8c\u6210\u6848\u4f8b\u4ee5\u4f9b\u6aa2\u7d22", "\u9650\u5236\u4ee3\u7406(Agent)\u50c5\u80fd\u4f9d\u56fa\u5b9a\u6d41\u7a0b\u57f7\u884c\uff0c\u4ee5\u964d\u4f4e\u884c\u70ba\u4e0d\u78ba\u5b9a\u6027", "\u5b9a\u7fa9\u4ee3\u7406(Agent)\u53ef\u53c3\u8003\u7684\u4efb\u52d9\u5206\u89e3\u8207\u6c7a\u7b56\u8def\u5f91\u7d50\u69cb"], "ans": "D", "inferred": false, "expl": "\u3010\u7b54\u6848D\u3011Solution Graph \u7684\u4e3b\u8981\u529f\u80fd\u3002\n\u2717(A) Solution Graph \u4e0d\u53d6\u4ee3\u8a9e\u8a00\u6a21\u578b\u63a8\u7406\u3002\n\u2717(B) \u975e\u7528\u65bc\u5132\u5b58\u6848\u4f8b\u3002\n\u2717(C) \u975e\u9650\u5236 Agent \u884c\u70ba\uff0c\u53cd\u800c\u63d0\u4f9b\u6846\u67b6\u5f48\u6027\u3002\n\u2713(D) \u5b9a\u7fa9 Agent \u53ef\u53c3\u8003\u7684\u4efb\u52d9\u5206\u89e3\u8207\u6c7a\u7b56\u8def\u5f91\u7d50\u69cb\uff0c\u4f5c\u70ba\u8907\u96dc\u4efb\u52d9\u7684\u57f7\u884c\u6846\u67b6\u3002"}, {"id": "115_1_s2_17", "exam": "115\u5e74\u7b2c\u4e00\u6b21 \u79d1\u76ee\u4e8c\uff08\u751f\u6210\u5f0fAI\uff09", "examId": "115_1_s2", "no": 17, "q": "\u67d0\u4f01\u696d\u63d0\u4f9b\u5927\u578b\u8a9e\u8a00\u6a21\u578b(LLM)API \u670d\u52d9\uff0c\u9700\u652f\u63f4\u9ad8\u4f75\u767c\u8acb\u6c42\u8207\u6d41\u91cf\u6ce2\u52d5\uff0c\u540c\u6642\u8981\u6c42\u670d\u52d9\u4e0d\u4e2d\u65b7\u4e26\u5177\u5099\u6545\u969c\u5bb9\u5fcd\u80fd\u529b\u3002\u82e5\u4ee5\u9ad8\u53ef\u7528\u6027\u8207\u53ef\u64f4\u5c55\u6027\u70ba\u4e3b\u8981\u8a2d\u8a08\u539f\u5247\uff0c\u4e0b\u5217\u54ea\u4e00\u7a2e\u90e8\u7f72\u65b9\u5f0f\u8f03\u70ba\u9069\u7576\uff1f", "opts": ["\u63a1\u7528\u55ae\u4e00\u9ad8\u6548\u80fd\u865b\u64ec\u6a5f(VM)\u96c6\u4e2d\u90e8\u7f72\uff0c\u4ee5\u63d0\u5347\u8cc7\u6e90\u4f7f\u7528\u6548\u7387", "\u5efa\u7acb\u591a\u500b\u6a21\u578b\u670d\u52d9\u5be6\u4f8b\u4e26\u900f\u904e\u8ca0\u8f09\u5206\u6563\u6a5f\u5236\u63d0\u4f9b\u670d\u52d9", "\u5c07\u63a8\u8ad6\u4efb\u52d9\u6539\u7531\u7528\u6236\u7aef\u8a2d\u5099\u5206\u64d4\uff0c\u4ee5\u964d\u4f4e\u4f3a\u670d\u5668\u8ca0\u8f09\u58d3\u529b", "\u4f7f\u7528 FTP \u5354\u8b70\u50b3\u8f38\u8acb\u6c42\u8207\u56de\u61c9\uff0c\u4ee5\u6e1b\u5c11\u670d\u52d9\u901a\u8a0a\u8ca0\u64d4"], "ans": "B", "inferred": false, "expl": "\u3010\u7b54\u6848B\u3011\u9ad8\u4f75\u767c + \u9ad8\u53ef\u7528\u90e8\u7f72\u3002\n\u2717(A) \u55ae\u4e00 VM \u7121\u9ad8\u53ef\u7528\u6027\u3002\n\u2713(B) \u591a\u670d\u52d9\u5be6\u4f8b + \u8ca0\u8f09\u5206\u6563\uff0c\u63d0\u4f9b\u6c34\u5e73\u64f4\u5c55\u8207\u6545\u969c\u5bb9\u5fcd\u3002\n\u2717(C) \u7528\u6236\u7aef\u5206\u64d4\u4e0d\u9069\u7528 LLM \u91cd\u904b\u7b97\u3002\n\u2717(D) FTP \u975e API \u901a\u8a0a\u5354\u8b70\u3002"}, {"id": "115_1_s2_18", "exam": "115\u5e74\u7b2c\u4e00\u6b21 \u79d1\u76ee\u4e8c\uff08\u751f\u6210\u5f0fAI\uff09", "examId": "115_1_s2", "no": 18, "q": "\u95dc\u65bc ChatGPT\u3001Anthropic Claude\u3001GitHub Copilot \u7b49 AI \u7a0b\u5f0f\u78bc\u8f14\u52a9\u5de5\u5177\u7684\u904b\u4f5c\u539f\u7406\uff0c\u4e0b\u5217\u6558\u8ff0\u4f55\u8005\u6b63\u78ba\uff1f", "opts": ["\u9019\u4e9b\u5de5\u5177\u57fa\u65bc\u5927\u578b\u8a9e\u8a00\u6a21\u578b\uff0c\u7d93\u7531\u5927\u91cf\u7a0b\u5f0f\u78bc\u8207\u6587\u672c\u8a13\u7df4\uff0c\u900f\u904e\u9810\u6e2c\u4e0b\u4e00\u500b\u7b26 \u865f\u4f86\u751f\u6210\u7a0b\u5f0f\u78bc\uff0c\u4f46\u4e0d\u4fdd\u8b49\u7522\u751f\u7a0b\u5f0f\u78bc\u7684\u6b63\u78ba\u6027", "GitHub Copilot \u6703\u5728\u63d0\u4f9b\u7a0b\u5f0f\u78bc\u5efa\u8b70\u524d\u57f7\u884c\u4e26\u9a57\u8b49\u8a72\u7a0b\u5f0f\u78bc\uff0c\u78ba\u4fdd\u5176\u57f7\u884c\u7d50\u679c \u6b63\u78ba\u7121\u8aa4", "Anthropic Claude \u7684\u7a0b\u5f0f\u78bc\u5efa\u8b70\u4e26\u975e\u5373\u6642\u751f\u6210\uff0c\u800c\u662f\u5f9e\u4e8b\u5148\u6574\u7406\u7684\u5df2\u77e5\u89e3\u7b54\u8cc7\u6599 \u5eab\u4e2d\u6aa2\u7d22\u800c\u5f97", "ChatGPT \u5167\u5efa\u5b8c\u6574\u7684\u7de8\u8b6f\u5668\uff0c\u53ef\u5728\u8f38\u51fa\u7a0b\u5f0f\u78bc\u524d\u81ea\u52d5\u7de8\u8b6f\u4e26\u66f4\u6b63\u6240\u6709\u8a9e\u6cd5\u8207\u908f \u8f2f\u932f\u8aa4"], "ans": "A", "inferred": false, "expl": "\u3010\u7b54\u6848A\u3011Copilot/ChatGPT \u904b\u4f5c\u539f\u7406\u3002\n\u2713(A) \u57fa\u65bc LLM\uff0c\u900f\u904e\u9810\u6e2c\u4e0b\u4e00\u500b token \u751f\u6210\u7a0b\u5f0f\u78bc\uff0c\u4f46\u4e0d\u4fdd\u8b49\u6b63\u78ba\u6027\uff0c\u6b63\u89e3\u3002\n\u2717(B) Copilot \u4e0d\u6703\u57f7\u884c\u9a57\u8b49\u7a0b\u5f0f\u78bc\u3002\n\u2717(C) Claude \u4e0d\u662f\u5f9e\u8cc7\u6599\u5eab\u6aa2\u7d22\u800c\u4f86\u3002\n\u2717(D) ChatGPT \u7121\u5167\u5efa\u7de8\u8b6f\u5668\u3002"}, {"id": "115_1_s2_19", "exam": "115\u5e74\u7b2c\u4e00\u6b21 \u79d1\u76ee\u4e8c\uff08\u751f\u6210\u5f0fAI\uff09", "examId": "115_1_s2", "no": 19, "q": "\u67d0\u65b0\u5275\u516c\u53f8\u63a1\u7528 MVP(Minimum Viable Product)\u7b56\u7565\uff0c\u5c0e\u5165 Vibe Coding \u4ee5\u52a0\u901f\u958b\u767c\uff0c\u96d6\u7136\u521d\u671f\u80fd\u5feb\u901f\u7522\u51fa\u53ef\u904b\u4f5c\u529f\u80fd\uff0c\u4f46\u6280\u8853\u4e3b\u7ba1\u63d0\u9192\uff0c\u5728\u6b63\u5f0f\u4e0a\u7dda\u524d\u4ecd\u53ef\u80fd \u5b58\u5728\u7a0b\u5f0f\u78bc\u54c1\u8cea\u8207\u5b89\u5168\u98a8\u96aa\u3002\u4e0b\u5217\u54ea\u4e00\u9805\u63aa\u65bd\u6700\u5408\u7406\uff0c\u4ee5\u964d\u4f4e\u54c1\u8cea\u8207\u5b89\u5168\u554f\u984c\uff1f", "opts": ["\u76f4\u63a5\u6cbf\u7528 AI \u751f\u6210\u7a0b\u5f0f\u78bc\u81f3\u6b63\u5f0f\u74b0\u5883\uff0c\u4ee5\u964d\u4f4e\u958b\u767c\u6210\u672c", "\u6301\u7e8c\u512a\u5316\u63d0\u793a\u8a5e\uff0c\u5373\u53ef\u907f\u514d\u5927\u90e8\u5206\u54c1\u8cea\u554f\u984c", "\u5c07\u751f\u6210\u7a0b\u5f0f\u78bc\u7d0d\u5165\u5be9\u67e5\u3001\u91cd\u69cb\u8207\u5b89\u5168\u6e2c\u8a66\u6d41\u7a0b", "\u9650\u5236\u958b\u767c\u8005\u4fee\u6539 AI \u751f\u6210\u4e4b\u7a0b\u5f0f\u78bc\u67b6\u69cb\uff0c\u4ee5\u7dad\u6301\u4e00\u81f4\u6027"], "ans": "C", "inferred": false, "expl": "\u3010\u7b54\u6848C\u3011Vibe Coding \u4e0a\u7dda\u524d\u63aa\u65bd\u3002\n\u2717(A) \u76f4\u63a5\u6cbf\u7528\u81f3\u6b63\u5f0f\u74b0\u5883\u98a8\u96aa\u9ad8\u3002\n\u2717(B) \u50c5\u512a\u5316 Prompt \u4e0d\u8db3\u4ee5\u4fdd\u8b49\u54c1\u8cea\u8207\u5b89\u5168\u3002\n\u2713(C) \u7d0d\u5165 Code Review\u3001\u91cd\u69cb\u8207\u5b89\u5168\u6e2c\u8a66\uff08SAST/DAST\uff09\u624d\u80fd\u78ba\u4fdd\u6b63\u5f0f\u4e0a\u7dda\u54c1\u8cea\u3002\n\u2717(D) \u9650\u5236\u4fee\u6539\u67b6\u69cb\u4e0d\u5408\u7406\u4e14\u964d\u4f4e\u5f48\u6027\u3002"}, {"id": "115_1_s2_20", "exam": "115\u5e74\u7b2c\u4e00\u6b21 \u79d1\u76ee\u4e8c\uff08\u751f\u6210\u5f0fAI\uff09", "examId": "115_1_s2", "no": 20, "q": "\u5728\u898f\u5283\u751f\u6210\u5f0f AI \u89e3\u6c7a\u65b9\u6848\u6642\uff0c\u4e0b\u5217\u4f55\u7a2e\u61c9\u7528\u5834\u666f\u6700\u 6\u4e0a\u4e0b\u6587\u8207\u751f\u6210", "Decoder-only \u67b6\u69cb\u4e3b\u8981\u4f9d\u8cf4\u5916\u90e8\u77e5\u8b58\u6aa2\u7d22\uff0cEncoder\u0026ndash;Decoder \u5247\u4e0d\u9700\u8981", "Encoder\u0026ndash;Decoder \u67b6\u69cb\u50c5\u9069\u7528\u65bc\u7ffb\u8b6f\u4efb\u52d9\uff0cDecoder-only \u67b6\u69cb\u8f03\u9069\u5408\u5c0d\u8a71\u4efb\u52d9"], "ans": "B", "inferred": false, "expl": "\u3010\u7b54\u6848B\u3011Encoder-Decoder vs Decoder-only\u3002\n\u2717(A) \u63cf\u8ff0\u904e\u65bc\u7c60\u7d71\u3002\n\u2713(B) Encoder-Decoder \u5340\u5206\u8f38\u5165\u7406\u89e3\u8207\u751f\u6210\u968e\u6bb5\uff1bDecoder-only \u7528\u55ae\u4e00\u6a21\u578b\u540c\u6642\u8655\u7406\u4e0a\u4e0b\u6587\u8207\u751f\u6210\uff0c\u6b63\u662f\u6838\u5fc3\u5dee\u7570\u3002\n\u2717(C) Decoder-only \u4e0d\u4f9d\u8cf4\u5916\u90e8\u6aa2\u7d22\u3002\n\u2717(D) \u4e0d\u9650\u65bc\u7ffb\u8b6f\u6216\u5c0d\u8a71\u3002"}, {"id": "115_1_s2_36", "exam": "115\u5e74\u7b2c\u4e00\u6b21 \u79d1\u76ee\u4e8c\uff08\u751f\u6210\u5f0fAI\uff09", "examId": "115_1_s2", "no": 36, "q": "\u67d0\u9023\u9396\u96f6\u552e\u4f01\u696d\u4f7f\u7528\u751f\u6210\u5f0f AI \u5354\u52a9\u898f\u5283\u9580\u5e02\u88dc\u8ca8\u7b56\u7565\u3002\u6c7a\u7b56\u6642\u9700\u540c\u6642\u8003\u91cf\u591a\u9805\u5f7c\u6b64\u76f8\u95dc\u7684\u56e0\u7d20\uff0c\u4f8b\u5982\uff1a\u5eab\u5b58\u6c34\u4f4d\u3001\u4fc3\u92b7\u6d3b\u52d5\u3001\u5340\u57df\u92b7\u552e\u5dee\u7570\u8207\u7269\u6d41\u9650\u5236\u3002\u5c08\u6848\u5718\u968a\u767c\u73fe\uff0cAI \u96d6\u80fd\u9010\u6b65\u8aaa\u660e\u63a8\u8ad6\u904e\u7a0b\uff0c\u4f46\u5c0d\u65bc\u591a\u689d\u4ef6\u4e4b\u9593\u7684\u76f8\u4e92\u5f71\u97ff\u638c\u63e1\u4e0d\u8db3\uff0c\u5c0e \u81f4\u5efa\u8b70\u7d50\u679c\u5076\u6709\u504f\u5dee\u3002\u82e5\u5e0c\u671b\u900f\u904e\u63d0\u793a\u5de5\u7a0b(Prompt Engineering)\u6539\u5584\u6b64\u554f\u984c\uff0c \u4e0b\u5217\u54ea\u4e00\u7a2e\u7b56\u7565\u6700\u70ba\u9069\u5408\uff1f", "opts": ["Chain of Thought\uff0c\u8981\u6c42\u6a21\u578b\u9010\u6b65\u5c55\u958b\u63a8\u8ad6", "Tree of Thoughts\uff0c\u589e\u52a0\u591a\u7a2e\u63a8\u8ad6\u8def\u5f91\u63a2\u7d22", "Graph Prompting\uff0c\u4ee5\u7d50\u69cb\u5316\u65b9\u5f0f\u5448\u73fe\u689d\u4ef6\u8207\u95dc\u806f", "Zero-shot Prompting\uff0c\u907f\u514d\u7bc4\u4f8b\u5f71\u97ff\u6a21\u578b\u5224\u65b7"], "ans": "C", "inferred": false, "expl": "\u3010\u7b54\u6848C\u3011\u591a\u689d\u4ef6\u76f8\u4e92\u5f71\u97ff\u63a8\u8ad6\u3002\n\u2717(A) CoT \u662f\u7dda\u6027\u63a8\u7406\uff0c\u96e3\u8655\u7406\u591a\u689d\u4ef6\u4ea4\u4e92\u3002\n\u2717(B) ToT \u662f\u6a39\u72c0\u5206\u652f\u63a2\u7d22\uff0c\u4ecd\u975e\u7d50\u69cb\u5316\u95dc\u806f\u3002\n\u2713(C) Graph Prompting \u4ee5\u7bc0\u9ede+\u908a\u5448\u73fe\u689d\u4ef6\u8207\u95dc\u806f\uff0c\u6700\u9069\u5408\u6355\u6349\u8907\u96dc\u591a\u689d\u4ef6\u76f8\u4e92\u5f71\u97ff\u3002\n\u2717(D) Zero-shot \u7121\u7bc4\u4f8b\uff0c\u7121\u52a9\u63a8\u7406\u54c1\u8cea\u3002"}, {"id": "115_1_s2_37", "exam": "115\u5e74\u7b2c\u4e00\u6b21 \u79d1\u76ee\u4e8c\uff08\u751f\u6210\u5f0fAI\uff09", "examId": "115_1_s2", "no": 37, "q": "\u67d0\u96fb\u5546\u5e73\u53f0\u5c0e\u5165\u751f\u6210\u5f0f AI \u5ba2\u670d\u52a9\u7406\uff0c\u7528\u65bc\u81ea\u52d5\u56de\u8986\u9867\u5ba2\u8a62\u554f\u3002\u71df\u904b\u9700\u6c42\u5305\u542b\uff1a\u9700\u5373\u6642\u53cd\u6620\u6bcf\u65e5\u66f4\u65b0\u7684\u4fc3\u92b7\u6d3b\u52d5\u8207\u5546\u54c1\u8cc7\u8a0a\uff0c\u540c\u6642\u7dad\u6301\u54c1\u724c\u4e00\u81f4\u7684\u56de\u8986\u8a9e\u6c23\uff0c\u4e14\u4f01\u696d\u5e0c\u671b\u907f\u514d\u56e0\u6a21\u578b\u91cd\u65b0\u8a13\u7df4\u6240\u9020\u6210\u7684\u6210\u672c\u589e\u52a0\u8207\u7cfb\u7d71\u4e0d\u7a69\u5b9a\u3002\u5728\u6b64\u60c5\u5883\u4e0b\uff0c\u4e0b\u5217 \u54ea\u4e00\u7a2e\u6280\u8853\u7b56\u7565\u6700\u5408\u7406\uff1f", "opts": ["\u50c5\u9032\u884c Fine-tuning\uff0c\u4f7f\u6a21\u578b\u540c\u6642\u5b78\u7fd2\u54c1\u724c\u8a9e\u6c23\u8207\u5373\u6642\u4fc3\u92b7\u5167\u5bb9", "\u50c5\u5c0e\u5165 RAG \u66f4\u65b0\u4fc3\u92b7\u8cc7\u8a0a\uff0c\u671f\u671b\u6a21\u578b\u76f4\u63a5\u5f9e\u6aa2\u7d22\u5167\u5bb9\u5b78\u7fd2\u54c1\u724c\u8a9e\u6c23", "\u900f\u904e Prompt Engineering \u63a7\u5236\u56de\u8986\u98a8\u683c\uff0c\u4e26\u4ee5 RAG \u5f15\u5165\u6700\u65b0\u5546\u54c1\u8207\u6d3b\u52d5\u8cc7\u8a0a", "\u6301\u7e8c\u9032\u884c\u589e\u91cf Fine-tuning\uff0c\u4ee5\u78ba\u4fdd\u6d3b\u52d5\u8cc7\u8a0a\u540c\u6b65\u66f4\u65b0"], "ans": "C", "inferred": false, "expl": "\u3010\u7b54\u6848C\u3011\u54c1\u724c\u8a9e\u6c23+\u5373\u6642\u4fc3\u92b7+\u907f\u514d\u91cd\u8a13\u3002\n\u2717(A) \u50c5 Fine-tune \u7121\u6cd5\u61c9\u5c0d\u6bcf\u65e5\u66f4\u65b0\u7684\u4fc3\u92b7\u8cc7\u8a0a\u3002\n\u2717(B) \u50c5 RAG \u4e0d\u8db3\u4ee5\u7dad\u6301\u54c1\u724c\u8a9e\u6c23\u3002\n\u2713(C) Prompt Engineering \u63a7\u5236\u98a8\u683c + RAG \u5f15\u5165\u6700\u65b0\u8cc7\u8a0a\uff0c\u662f\u6700\u4f4e\u6210\u672c+\u6700\u9748\u6d3b\u65b9\u6848\u3002\n\u2717(D) \u589e\u91cf Fine-tune \u6210\u672c\u9ad8\u4e14\u4e0d\u7a69\u5b9a\u3002"}, {"id": "115_1_s2_38", "exam": "115\u5e74\u7b2c\u4e00\u6b21 \u79d1\u76ee\u4e8c\uff08\u751f\u6210\u5f0fAI\uff09", "examId": "115_1_s2", "no": 38, "q": "\u67d0\u4f01\u696d\u898f\u5283\u5c0e\u5165\u751f\u6210\u5f0f AI \u52a9\u7406\uff0c\u5728\u6b63\u5f0f\u5168\u9762\u90e8\u7f72\u524d\u9032\u884c\u6982\u5ff5\u9a57\u8b49(PoC)\uff0c\u4e0b\u5217\u4f55\u8005\u6700\u4e0d\u9069\u5408\u4f5c\u70ba\u6b64\u968e\u6bb5\u7684\u4e3b\u8981\u5de5\u4f5c\uff1f", "opts": ["\u9a57\u8b49\u6a21\u578b\u5728\u5be6\u969b\u4f7f\u7528\u60c5\u5883\u4e0b\u7684\u56de\u8986\u54c1\u8cea\u8207\u7a69\u5b9a\u6027", "\u6e2c\u8a66 AI \u529f\u80fd\u8207\u696d\u52d9\u9700\u6c42\u7684\u5339\u914d\u7a0b\u5ea6", "\u5236\u5b9a\u8de8\u90e8\u9580\u4f7f\u7528\u898f\u7bc4\uff0c\u8207\u9577\u671f\u6cbb\u7406\u6846\u67b6", "\u8a55\u4f30\u7cfb\u7d71\u6574\u5408\u53ef\u884c\u6027\u8207\u6280\u8853\u9650\u5236"], "ans": "C", "inferred": false, "expl": "\u3010\u7b54\u6848C\u3011PoC \u968e\u6bb5\u300c\u4e0d\u9069\u5408\u300d\u7684\u5de5\u4f5c\u3002\n\u2717(A) \u9a57\u8b49\u5be6\u969b\u60c5\u5883\u56de\u8986\u54c1\u8cea\u662f PoC \u91cd\u9ede\u3002\n\u2717(B) \u6e2c\u8a66\u696d\u52d9\u5339\u914d\u662f PoC \u91cd\u9ede\u3002\n\u2713(C) \u5236\u5b9a\u8de8\u90e8\u9580\u6cbb\u7406\u6846\u67b6\u5c6c\u6b63\u5f0f\u90e8\u7f72\u5f8c\u7684\u9577\u671f\u7ba1\u7406\u5de5\u4f5c\uff0c\u4e0d\u9069\u5408 PoC \u968e\u6bb5\u3002\n\u2717(D) \u8a55\u4f30\u7cfb\u7d71\u6574\u5408\u53ef\u884c\u6027\u662f PoC \u91cd\u9ede\u3002"}, {"id": "115_1_s2_39", "exam": "115\u5e74\u7b2c\u4e00\u6b21 \u79d1\u76ee\u4e8c\uff08\u751f\u6210\u5f0fAI\uff09", "examId": "115_1_s2", "no": 39, "q": "\u67d0\u4f01\u696d\u898f\u5283\u5c0e\u5165\u751f\u6210\u5f0f AI \u5ba2\u670d\u7cfb\u7d71\uff0c\u9700\u8655\u7406\u9867\u5ba2\u67e5\u8a62\u4e26\u5f15\u7528\u6b77\u53f2\u4ea4\u6613\u8cc7\u6599\u3002\u6cd5\u9075\u90e8\u9580\u5728\u98a8\u96aa\u8a55\u4f30\u4e2d\u6307\u51fa\uff0c\u7cfb\u7d71\u82e5\u4e0d\u7576\u8655\u7406\u9867\u5ba2\u500b\u4eba\u8cc7\u6599\uff0c\u53ef\u80fd\u5f15\u767c\u5408\u898f\u8207\u6cd5\u5f8b\u8cac\u4efb\u3002\u82e5\u5c08\u6848\u521d\u671f\u5e0c\u671b\u5f9e\u8cc7\u6599\u5c64\u9762\u964d\u4f4e\u654f\u611f\u8cc7\u8a0a\u66b4\u9732\u98a8\u96aa\uff0c\u4e0b\u5217\u6558\u8ff0\u4f55\u8005\u6700\u70ba\u5408 \u7406\uff1f", "opts": ["\u5f37\u5316\u6a21\u578b\u8f38\u51fa\u5be9\u67e5\u8207\u906e\u7f69\u6a5f\u5236\uff0c\u4ee5\u904e\u6ffe\u53ef\u80fd\u51fa\u73fe\u7684\u654f\u611f\u8cc7\u8a0a", "\u8a2d\u5b9a AI \u56de\u8986\u7bc4\u570d\u8207\u89d2\u8272\u6b0a\u9650\uff0c\u9650\u5236\u5176\u5b58\u53d6\u7279\u5b9a\u985e\u578b\u8cc7\u6599", "\u5c07\u8cc7\u6599\u96c6\u4e2d\u65bc\u52a0\u5bc6\u5132\u5b58\u74b0\u5883\uff0c\u4e26\u52a0\u5f37\u7cfb\u7d71\u5b58\u53d6\u63a7\u7ba1", "\u50c5\u63d0\u4f9b\u5fc5\u8981\u8cc7\u6599\u6216\u6578\u64da\u6b04\u4f4d\u8207\u53bb\u8b58\u5225\u5316\u7b56\u7565\uff0c\u6e1b\u5c11\u6a21\u578b\u63a5\u89f8\u53ef\u8b58\u5225\u500b\u8cc7"], "ans": "D", "inferred": false, "expl": "\u3010\u7b54\u6848D\u3011\u5f9e\u8cc7\u6599\u5c64\u9762\u964d\u4f4e\u500b\u8cc7\u98a8\u96aa\u3002\n\u2717(A) \u5f37\u5316\u8f38\u51fa\u5be9\u67e5\u662f\u5f8c\u7aef\u63a7\u7ba1\uff0c\u975e\u8cc7\u6599\u6e90\u982d\u3002\n\u2717(B) \u8a2d\u89d2\u8272\u6b0a\u9650\u4e0d\u89e3\u8cc7\u6599\u672c\u8eab\u3002\n\u2717(C) \u52a0\u5bc6\u5132\u5b58+\u63a7\u7ba1\u4ecd\u63a5\u89f8\u500b\u8cc7\u3002\n\u2713(D) \u8cc7\u6599\u6700\u5c0f\u5316 + \u53bb\u8b58\u5225\u5316\u5f9e\u6e90\u982d\u964d\u98a8\u96aa\uff0c\u6700\u6839\u672c\u4e14\u76f4\u63a5\u3002"}, {"id": "115_1_s2_40", "exam": "115\u5e74\u7b2c\u4e00\u6b21 \u79d1\u76ee\u4e8c\uff08\u751f\u6210\u5f0fAI\uff09", "examId": "115_1_s2", "no": 40, "q": "\u67d0\u4f01\u696d\u5c0e\u5165\u5927\u578b\u8a9e\u8a00\u6a21\u578b(LLM)\u9032\u884c\u5ba2\u670d\u81ea\u52d5\u5316\uff0c\u4e26\u5df2\u900f\u904e Fine-Tuning \u5b78\u7fd2\u4f01\u696d\u6a19\u6e96\u554f\u7b54\u7bc4\u4f8b\uff0c\u4f46\u5728\u5be6\u52d9\u904b\u4f5c\u4e2d\u4ecd\u51fa\u73fe\u56de\u61c9\u7b56\u7565\u672a\u7b26\u5408\u670d\u52d9\u512a\u5148\u9806\u5e8f\u53ca\u8a9e\u6c23\u8207\u54c1\u724c\u98a8\u683c\u4e0d\u4e00\u81f4\u7684\u60c5\u6cc1\uff0c\u56e0\u6b64\u6280\u8853\u5718\u968a\u5efa\u8b70\u518d\u5c0e\u5165 Reinforcement Fine-tuning (RFT)\u6a5f\u5236\u9032\u884c\u512a\u5316\uff0c\u5176\u4e3b\u8981\u76ee\u7684\u70ba\u4f55\uff1f", "opts": ["\u64f4\u5c55\u6a21\u578b\u7684\u77e5\u8b58\u6db5\u84cb\u7bc4\u570d\u8207\u8cc7\u6599\u8a18\u61b6\u80fd\u529b", "\u900f\u904e reward \u8a0a\u865f\u8abf\u6574\u6a21\u578b\u56de\u61c9\u7b56\u7565\u8207\u884c\u70ba\u504f\u597d", "\u63d0\u5347\u6a21\u578b\u63a8\u8ad6\u901f\u5ea6\u8207\u964d\u4f4e\u56de\u61c9\u5ef6\u9072", "\u964d\u4f4e prompt \u8a2d\u8a08\u8907\u96dc\u5ea6\u4e26\u53d6\u4ee3\u8a13\u7df4\u6d41\u7a0b"], "ans": "B", "inferred": false, "expl": "\u3010\u7b54\u6848B\u3011RFT \u7684\u4e3b\u8981\u76ee\u7684\u3002\n\u2717(A) RFT \u4e0d\u64f4\u5c55\u77e5\u8b58\u6db5\u84cb\u3002\n\u2713(B) RFT \u900f\u904e reward \u8a0a\u865f\u8abf\u6574\u6a21\u578b\u56de\u61c9\u7b56\u7565\u8207\u884c\u70ba\u504f\u597d\uff0c\u7b26\u5408\u670d\u52d9\u512a\u5148\u9806\u5e8f\u8207\u54c1\u724c\u8a9e\u6c23\u3002\n\u2717(C) RFT \u4e0d\u76f4\u63a5\u63d0\u901f\u5ea6\u3002\n\u2717(D) RFT \u4e0d\u53d6\u4ee3\u8a13\u7df4\u6d41\u7a0b\u3002"}, {"id": "115_1_s2_41", "exam": "115\u5e74\u7b2c\u4e00\u6b21 \u79d1\u76ee\u4e8c\uff08\u751f\u6210\u5f0fAI\uff09", "examId": "115_1_s2", "no": 41, "q": "\u4f01\u696d\u5728\u8a55\u4f30 AI \u6c7a\u7b56\u6a21\u578b\u662f\u5426\u5b58\u5728\u8cc7\u6599\u5206\u5e03\u504f\u5dee\u6642\uff0c\u4e0b\u5217\u4f55\u8005\u6700\u5c6c\u65bc\u504f\u898b\u6aa2\u6e2c (Bias Detection)\u800c\u975e\u504f\u898b\u7de9\u89e3(Bias Mitigation)\u63aa\u65bd\uff1f", "opts": ["\u6bd4\u8f03\u4e0d\u540c\u8cc7\u6599\u5206\u5e03\u7684\u6a21\u578b\u9810\u6e2c\u7d50\u679c\u5206\u5e03\u8207\u932f\u8aa4\u7387", "\u91cd\u65b0\u52a0\u6b0a\u8a13\u7df4\u6a23\u672c\u4ee5\u5e73\u8861\u8cc7\u6599\u5206\u5e03\u4ee3\u8868\u6027", "\u5728\u63a8\u8ad6\u968e\u6bb5\u52a0\u5165\u8f38\u51fa\u904e\u6ffe\u898f\u5247", "\u8abf\u6574\u6a21\u578b\u6c7a\u7b56\u95be\u503c(Decision Threshold)\u4ee5\u964d\u4f4e\u9810\u6e2c\u5dee\u7570"], "ans": "A", "inferred": false, "expl": "\u3010\u7b54\u6848A\u3011\u504f\u898b\u6aa2\u6e2c vs \u504f\u898b\u7de9\u89e3\u3002\n\u2713(A) \u6bd4\u8f03\u4e0d\u540c\u7fa4\u9ad4\u9810\u6e2c\u5206\u5e03\u8207\u932f\u8aa4\u7387\u662f\u300c\u6aa2\u6e2c\u300d\uff08\u91cf\u5316\u504f\u898b\uff09\u3002\n\u2717(B) \u91cd\u65b0\u52a0\u6b0a\u6a23\u672c\u662f\u300c\u7de9\u89e3\u300d\u63aa\u65bd\u3002\n\u2717(C) \u8f38\u51fa\u904e\u6ffe\u898f\u5247\u662f\u300c\u7de9\u89e3\u300d\u63aa\u65bd\u3002\n\u2717(D) \u8abf\u6574\u6c7a\u7b56\u95be\u503c\u662f\u300c\u7de9\u89e3\u300d\u63aa\u65bd\u3002"}, {"id": "115_1_s2_42", "exam": "115\u5e74\u7b2c\u4e00\u6b21 \u79d1\u76ee\u4e8c\uff08\u751f\u6210\u5f0fAI\uff09", "examId": "115_1_s2", "no": 42, "q": "\u67d0\u4f01\u696d\u5e0c\u671b\u5229\u7528\u542b\u654f\u611f\u8cc7\u8a0a\u7684\u8cc7\u6599\u9032\u884c AI \u6a21\u578b\u8a13\u7df4\uff0c\u4f46\u653f\u7b56\u8981\u6c42\u539f\u59cb\u8cc7\u6599\u4e0d\u5f97\u5916\u6d29\uff0c\u4e14\u8cc7\u6599\u53ef\u96c6\u4e2d\u65bc\u5b89\u5168\u74b0\u5883\u4e2d\u8655\u7406\u3002\u540c\u6642\uff0c\u4f01\u696d\u5e0c\u671b\u5728\u8cc7\u6599\u4f7f\u7528\u904e\u7a0b\u4e2d\uff0c\u5373\u4f7f\u8cc7\u6599\u8655\u65bc\u52a0\u5bc6\u72c0\u614b\uff0c\u4ecd\u80fd\u5b8c\u6210\u6a21\u578b\u8a08\u7b97\u3002\u5728\u6b64\u9700\u6c42\u4e0b\uff0c\u4e0b\u5217\u54ea\u4e00\u7a2e\u6280\u8853\u6700\u70ba\u9069 \u5408\uff1f", "opts": ["\u806f\u90a6\u5b78\u7fd2(Federated Learning)", "\u540c\u614b\u52a0\u5bc6(Homomorphic Encryption)", "\u96f6\u77e5\u8b58\u8b49\u660e(Zero-knowledge Proof)", "\u8cc7\u6599\u533f\u540d\u5316(Data Anonymization)"], "ans": "B", "inferred": false, "expl": "\u3010\u7b54\u6848B\u3011\u52a0\u5bc6\u72c0\u614b\u4e0b\u4ecd\u80fd\u8a08\u7b97\u3002\n\u2717(A) \u806f\u90a6\u5b78\u7fd2\u8cc7\u6599\u5206\u6563\u5728\u5404\u7aef\uff0c\u4e0d\u96c6\u4e2d\u3002\n\u2713(B) \u540c\u614b\u52a0\u5bc6\u5141\u8a31\u5c0d\u52a0\u5bc6\u8cc7\u6599\u76f4\u63a5\u8a08\u7b97\uff0c\u7d50\u679c\u89e3\u5bc6\u5f8c\u7b49\u540c\u660e\u6587\u8a08\u7b97\uff0c\u6b63\u662f\u984c\u610f\u9700\u6c42\u3002\n\u2717(C) \u96f6\u77e5\u8b58\u8b49\u660e\u7528\u65bc\u9a57\u8b49\u8eab\u5206/\u9673\u8ff0\uff0c\u4e0d\u505a\u904b\u7b97\u3002\n\u2717(D) \u533f\u540d\u5316\u4e0d\u7b49\u65bc\u52a0\u5bc6\u72c0\u614b\u4e0b\u8a08\u7b97\u3002"}, {"id": "115_1_s2_43", "exam": "115\u5e74\u7b2c\u4e00\u6b21 \u79d1\u76ee\u4e8c\uff08\u751f\u6210\u5f0fAI\uff09", "examId": "115_1_s2", "no": 43, "q": "\u67d0\u91d1\u878d\u670d\u52d9\u516c\u53f8\u898f\u5283\u5c0e\u5165\u751f\u6210\u5f0f AI\uff0c\u5728\u8a55\u4f30\u6a21\u578b\u90e8\u7f72\u65b9\u5f0f\u6642\uff0c\u57fa\u65bc\u5167\u90e8\u63a7\u5236\u8207\u6cbb\u7406\u8981\u6c42\uff0c\u4f01\u696d\u8003\u616e\u5c07\u5927\u578b\u8a9e\u8a00\u6a21\u578b\u5efa\u7f6e\u65bc\u516c\u53f8\u53ef\u7ba1\u7406\u74b0\u5883\uff0c\u800c\u975e\u76f4\u63a5\u63a1\u7528\u5916\u90e8\u96f2\u7aef\u670d\u52d9\u3002\u4e0b\u5217\u4f55\u8005\u6700\u80fd\u5408\u7406\u8aaa\u660e\u6b64\u90e8\u7f72\u6c7a\u7b56\u7684\u6f5b\u5728\u512a\u52e2\uff1f", "opts": ["\u6709\u52a9\u63d0\u5347\u6a21\u578b\u56de\u8986\u7a69\u5b9a\u6027\u4e26\u964d\u4f4e\u96a8\u6a5f\u6027\u5f71\u97ff", "\u53ef\u964d\u4f4e\u654f\u611f\u8cc7\u6599\u9700\u50b3\u8f38\u81f3\u5916\u90e8\u670d\u52d9\u7684\u98a8\u96aa", "\u53ef\u76f4\u63a5\u6e1b\u5c11\u6a21\u578b\u8a13\u7df4\u8207\u7dad\u904b\u6240\u9700\u8cc7\u6e90\u6295\u5165", "\u53ef\u907f\u514d\u6a21\u578b\u8f38\u51fa\u504f\u5dee\u8207\u5e7b\u89ba(Hallucination)\u554f\u984c"], "ans": "B", "inferred": false, "expl": "\u3010\u7b54\u6848B\u3011\u79c1\u6709\u5316\u90e8\u7f72\u7684\u512a\u52e2\u3002\n\u2717(A) \u79c1\u6709\u5316\u4e0d\u76f4\u63a5\u5f71\u97ff\u7a69\u5b9a\u6027/\u96a8\u6a5f\u6027\u3002\n\u2713(B) \u654f\u611f\u8cc7\u6599\u4e0d\u50b3\u8f38\u81f3\u5916\u90e8\u670d\u52d9\uff0c\u964d\u4f4e\u5916\u6d29\u98a8\u96aa\uff0c\u662f\u6838\u5fc3\u512a\u52e2\u3002\n\u2717(C) \u79c1\u6709\u5316\u589e\u52a0\u7dad\u904b\u6295\u5165\uff0c\u975e\u6e1b\u5c11\u3002\n\u2717(D) \u79c1\u6709\u5316\u4e0d\u89e3\u6a21\u578b\u504f\u5dee/\u5e7b\u89ba\u554f\u984c\u3002"}, {"id": "115_1_s2_44", "exam": "115\u5e74\u7b2c\u4e00\u6b21 \u79d1\u76ee\u4e8c\uff08\u751f\u6210\u5f0fAI\uff09", "examId": "115_1_s2", "no": 44, "q": "\u67d0\u667a\u6167\u88fd\u9020\u5ee0\u5c0e\u5165\u8a9e\u97f3\u4e92\u52d5 AI \u52a9\u7406\uff0c\u4f5c\u696d\u4eba\u54e1\u53ef\u900f\u904e\u8a9e\u97f3\u67e5\u8a62\u8a2d\u5099\u72c0\u614b\u8207\u64cd\u4f5c\u6307\u5f15\u3002\u7cfb\u7d71\u6d41\u7a0b\u5305\u542b\u8a9e\u97f3\u8f49\u6587\u5b57\u3001\u8a9e\u8a00\u6a21\u578b\u751f\u6210\u56de\u8986\uff0c\u4ee5\u53ca\u5373\u6642\u67e5\u8a62\u5167\u90e8\u7cfb\u7d71\u8cc7\u6599\u3002\u6e2c\u8a66\u7d50\u679c\u986f\u793a\uff1a\u8a9e\u97f3\u8f49\u6587\u5b57\u5728\u5c08\u696d\u8a2d\u5099\u8853\u8a9e\u4e0a\u932f\u8aa4\u7387\u504f\u9ad8\uff1b\u8a9e\u8a00\u6a21\u578b\u56de\u8986\u5076 \u6709\u5167\u5bb9\u4e0d\u5920\u7cbe\u6e96\uff1b\u7cfb\u7d71\u6574\u9ad4\u56de\u61c9\u901f\u5ea6\u7565\u6162\u4f46\u4ecd\u5728\u53ef\u63a5\u53d7\u7bc4\u570d\u3002\u82e5\u5c08\u6848\u76ee\u6a19\u70ba\u512a\u5148 \u78ba\u4fdd\u6b63\u78ba\u57f7\u884c\u6307\u4ee4\uff0c\u4e0b\u5217\u6539\u9032\u63aa\u65bd\u7684\u57f7\u884c\u9806\u5e8f\u4f55\u8005\u6700\u5408\u7406\uff1f", "opts": ["\u512a\u5316\u8a9e\u8a00\u6a21\u578b \u0026rarr; \u5f37\u5316\u8a9e\u97f3\u6a21\u578b \u0026rarr; \u512a\u5316\u7cfb\u7d71\u6548\u80fd \u0026rarr; \u8abf\u6574\u751f\u6210\u53c3\u6578", "\u5f37\u5316\u8a9e\u97f3\u6a21\u578b \u0026rarr; \u512a\u5316\u8a9e\u8a00\u6a21\u578b\u8207\u77e5\u8b58\u88dc\u5145 \u0026rarr; \u8abf\u6574\u751f\u6210\u53c3\u6578 \u0026rarr; \u512a\u5316\u7cfb\u7d71\u6548 \u80fd", "\u512a\u5316\u7cfb\u7d71\u6548\u80fd \u0026rarr; \u5f37\u5316\u8a9e\u97f3\u6a21\u578b \u0026rarr; \u512a\u5316\u8a9e\u8a00\u6a21\u578b\u8207\u77e5\u8b58\u88dc\u5145 \u0026rarr; \u8abf\u6574\u751f\u6210\u53c3 \u6578", "\u5f37\u5316\u8a9e\u97f3\u6a21\u578b \u0026rarr; \u512a\u5316\u7cfb\u7d71\u6548\u80fd \u0026rarr; \u512a\u5316\u8a9e\u8a00\u6a21\u578b\u8207\u77e5\u8b58\u88dc\u5145 \u0026rarr; \u8abf\u6574\u751f\u6210\u53c3 \u6578"], "ans": "B", "inferred": false, "expl": "\u3010\u7b54\u6848B\u3011\u512a\u5148\u78ba\u4fdd\u6b63\u78ba\u6307\u4ee4\u57f7\u884c\u9806\u5e8f\u3002\n\u2717(A) \u5148\u512a\u5316 LLM \u4f46 ASR \u932f\u4e86\u8f38\u5165\u4ecd\u932f\u3002\n\u2713(B) \u5148\u5f37\u5316 ASR\uff08\u8f38\u5165\u6b63\u78ba\uff09\u2192\u512a\u5316 LLM+\u77e5\u8b58\u2192\u751f\u6210\u53c3\u6578\u2192\u6548\u80fd\uff0c\u6b63\u78ba\u9806\u5e8f\u3002\n\u2717(C) \u5148\u6548\u80fd\u4f46\u6548\u80fd\u53ef\u63a5\u53d7\uff0c\u975e\u512a\u5148\u3002\n\u2717(D) \u5148 ASR \u5f8c\u6548\u80fd\u4e0d\u5408\u908f\u8f2f\u3002"}, {"id": "115_1_s2_45", "exam": "115\u5e74\u7b2c\u4e00\u6b21 \u79d1\u76ee\u4e8c\uff08\u751f\u6210\u5f0fAI\uff09", "examId": "115_1_s2", "no": 45, "q": "\u67d0\u4f01\u696d\u5c0e\u5165\u751f\u6210\u5f0f AI \u52a9\u7406\uff0c\u5354\u52a9\u5167\u90e8\u4eba\u54e1\u64b0\u5beb\u5c08\u6848\u5efa\u8b70\u8207\u5206\u6790\u5831\u544a\u3002\u5718\u968a\u5e0c\u671b\u900f\u904e\u601d\u7dad\u93c8(Chain of Thought, CoT)\u63d0\u793a\u8a2d\u8a08\u63d0\u5347\u6a21\u578b\u8f38\u51fa\u7684\u908f\u8f2f\u6027\u8207\u63a8\u7406\u900f\u660e\u5ea6\uff0c\u4e0b\u5217\u4f55\u8005\u6700\u7b26\u5408\u8a72\u63d0\u793a\u7b56\u7565\uff1f", "opts": ["\u300c\u8acb\u76f4\u63a5\u7d66\u51fa\u6700\u7d42\u5efa\u8b70\uff0c\u4e0d\u9700\u986f\u793a\u5206\u6790\u904e\u7a0b\u3002\u300d", "\u300c\u4ee5\u4e0b\u63d0\u4f9b\u5169\u4efd\u5206\u6790\u5831\u544a\u7bc4\u4f8b\uff0c\u8acb\u4f9d\u76f8\u540c\u683c\u5f0f\u7522\u51fa\u65b0\u5831\u544a\u3002\u300d", "\u300c\u8acb\u5c07\u4efb\u52d9\u62c6\u70ba\u4e09\u500b\u6b65\u9a5f\uff1a\u8cc7\u6599\u6574\u7406 \u0026rarr; \u91cd\u9ede\u6458\u8981 \u0026rarr; \u5efa\u8b70\u7522\u51fa\u3002\u300d", "\u300c\u8acb\u9010\u6b65\u8aaa\u660e\u4f60\u7684\u5224\u65b7\u4f9d\u64da\u8207\u63a8\u7406\u904e\u7a0b\uff0c\u6700\u5f8c\u518d\u7d66\u51fa\u7d50\u8ad6\u3002\u300d"], "ans": "D", "inferred": false, "expl": "\u3010\u7b54\u6848D\u3011CoT \u63d0\u793a\u8a2d\u8a08\u3002\n\u2717(A) \u76f4\u63a5\u7d66\u7b54\u6848\u7121 CoT\u3002\n\u2717(B) \u63d0\u4f9b\u7bc4\u4f8b\u5c6c Few-shot\uff0c\u975e CoT\u3002\n\u2717(C) \u9810\u5148\u62c6\u6b65\u9a5f\u662f\u7a0b\u5f0f\u5206\u89e3\uff0c\u975e CoT \u5178\u578b\u3002\n\u2713(D) \u300c\u9010\u6b65\u8aaa\u660e\u5224\u65b7\u4f9d\u64da\u8207\u63a8\u7406\u904e\u7a0b\uff0c\u6700\u5f8c\u7d66\u7d50\u8ad6\u300d\u6b63\u662f CoT \u7684\u6559\u79d1\u66f8\u8a2d\u8a08\u3002"}, {"id": "115_1_s2_46", "exam": "115\u5e74\u7b2c\u4e00\u6b21 \u79d1\u76ee\u4e8c\uff08\u751f\u6210\u5f0fAI\uff09", "examId": "115_1_s2", "no": 46, "q": "\u67d0\u91d1\u878d\u76e3\u7406\u6a5f\u69cb\u898f\u5283\u5c0e\u5165\u751f\u6210\u5f0f AI \u4ee5\u5354\u52a9\u5167\u90e8\u4eba\u54e1\u5206\u6790\u7533\u5831\u6587\u4ef6\u8207\u76e3\u7406\u5831\u544a\uff0c\u7cfb\u7d71\u9700\u8655\u7406\u5927\u91cf\u6d89\u53ca\u4f01\u696d\u654f\u611f\u8cc7\u6599\u8207\u672a\u516c\u958b\u8cc7\u8a0a\u3002\u4e3b\u7ba1\u6a5f\u95dc\u660e\u78ba\u8981\u6c42\u300c\u8cc7\u6599\u5b89\u5168\u8207\u6cd5\u898f\u9075\u5faa\u5fc5\u9808\u512a\u5148\u65bc\u5c0e\u5165\u901f\u5ea6\u8207\u6210\u672c\u8003\u91cf\u300d\u3002\u5728\u6b64\u689d\u4ef6\u4e0b\uff0c\u4e0b\u5217\u54ea\u4e00\u7a2e\u7b56\u7565\u6700\u70ba\u9069\u7576\uff1f", "opts": ["\u63a1\u7528\u96f2\u7aef\u5927\u578b\u8a9e\u8a00\u6a21\u578b API\uff0c\u4e26\u900f\u904e\u8cc7\u6599\u906e\u7f69\u8207\u52a0\u5bc6\u6a5f\u5236\u964d\u4f4e\u5916\u6d29\u98a8\u96aa", "\u5c0e\u5165\u958b\u6e90\u6a21\u578b\u9032\u884c\u79c1\u6709\u5316\u90e8\u7f72\uff0c\u4ee5\u517c\u9867\u6210\u672c\u5f48\u6027\u8207\u6a21\u578b\u53ef\u63a7\u6027", "\u81ea\u884c\u8a13\u7df4\u4e26\u79c1\u6709\u5316\u90e8\u7f72\u6a21\u578b\uff0c\u540c\u6642\u5efa\u7acb\u5b58\u53d6\u63a7\u7ba1\u8207\u7a3d\u6838\u6a5f\u5236", "\u5148\u9a57\u8b49\u6a21\u578b\u6548\u76ca\uff0c\u518d\u9010\u6b65\u88dc\u5f37\u5408\u898f\u8207\u8cc7\u5b89\u67b6\u69cb"], "ans": "C", "inferred": false, "expl": "\u3010\u7b54\u6848C\u3011\u9ad8\u5ea6\u654f\u611f+\u8cc7\u5b89\u512a\u5148\u3002\n\u2717(A) \u96f2\u7aef API \u4ecd\u6709\u5916\u6d29\u53ef\u80fd\u3002\n\u2717(B) \u958b\u6e90\u6a21\u578b\u79c1\u6709\u5316\u597d\u4f46\u4ecd\u9700\u81ea\u5efa\u6cbb\u7406\u3002\n\u2713(C) \u81ea\u8a13\u4e26\u79c1\u6709\u5316\u90e8\u7f72 + \u5b58\u53d6\u63a7\u7ba1 + \u7a3d\u6838\uff0c\u5b8c\u5168\u638c\u63a7\u8cc7\u6599\u6d41\u5411\uff0c\u6700\u7b26\u5408\u76e3\u7406\u8981\u6c42\u3002\n\u2717(D) \u5148\u9a57\u8b49\u5f8c\u88dc\u5408\u898f\u9055\u53cd\u300c\u512a\u5148\u5408\u898f\u300d\u539f\u5247\u3002"}, {"id": "115_1_s2_47", "exam": "115\u5e74\u7b2c\u4e00\u6b21 \u79d1\u76ee\u4e8c\uff08\u751f\u6210\u5f0fAI\uff09", "examId": "115_1_s2", "no": 47, "q": "\u67d0\u88fd\u9020\u4f01\u696d\u898f\u5283\u5c0e\u5165\u751f\u6210\u5f0f AI \u5354\u52a9\u7522\u7dda\u7570\u5e38\u7d00\u9304\u5206\u6790\uff0c\u7cfb\u7d71\u5c07\u6839\u64da\u8a2d\u5099\u56de\u5831\u8207\u7dad\u4fee\u7d00\u9304\u81ea\u52d5\u7522\u51fa\u554f\u984c\u6458\u8981\u8207\u5efa\u8b70\u8655\u7f6e\u8aaa\u660e\u3002\u5728\u8a66\u884c\u6e2c\u8a66\u968e\u6bb5\uff0c\u70ba\u964d\u4f4e\u71df\u904b\u8207\u6c7a\u7b56\u98a8\u96aa\uff0c\u4e0b\u5217\u4f55\u8005\u6700\u61c9\u512a\u5148\u9a57\u8b49\uff1f", "opts": ["AI \u751f\u6210\u5efa\u8b70\u8207\u5be6\u969b\u5de5\u7a0b\u5224\u65b7\u7684\u4e00\u81f4\u6027\u8207\u6b63\u78ba\u6027", "\u7cfb\u7d71\u5728\u9ad8\u8cc7\u6599\u91cf\u8f38\u5165\u4e0b\u7684\u8655\u7406\u901f\u5ea6\u8207\u5ef6\u9072\u8868\u73fe", "\u6a21\u578b\u5c0d\u4e0d\u540c\u8a2d\u5099\u54c1\u724c\u8cc7\u6599\u683c\u5f0f\u7684\u8f49\u63db\u80fd\u529b", "\u7570\u5e38\u5206\u6790\u5831\u544a\u7684\u8996\u89ba\u5316\u5448\u73fe\u8207\u4ecb\u9762\u6613\u8b80\u6027"], "ans": "A", "inferred": false, "expl": "\u3010\u7b54\u6848A\u3011\u8a66\u884c\u968e\u6bb5\u512a\u5148\u9a57\u8b49\u3002\n\u2713(A) AI \u5efa\u8b70\u8207\u5be6\u969b\u5de5\u7a0b\u5224\u65b7\u7684\u4e00\u81f4\u6027\u8207\u6b63\u78ba\u6027\u6700\u95dc\u9375\uff0c\u932f\u8aa4\u5efa\u8b70\u53ef\u80fd\u640d\u58de\u8a2d\u5099\u6216\u9020\u6210\u4e8b\u6545\u3002\n\u2717(B) \u901f\u5ea6\u5ef6\u9072\u4e0d\u662f\u8a66\u884c\u968e\u6bb5\u512a\u5148\u9805\u3002\n\u2717(C) \u683c\u5f0f\u8f49\u63db\u80fd\u529b\u975e\u512a\u5148\u3002\n\u2717(D) \u8996\u89ba\u5316\u5448\u73fe\u975e\u512a\u5148\u3002"}, {"id": "115_1_s2_48", "exam": "115\u5e74\u7b2c\u4e00\u6b21 \u79d1\u76ee\u4e8c\uff08\u751f\u6210\u5f0fAI\uff09", "examId": "115_1_s2", "no": 48, "q": "\u67d0\u4f01\u696d\u5c07\u6a5f\u5668\u5b78\u7fd2\u6a21\u578b\u90e8\u7f72\u65bc\u7dda\u4e0a\u63a8\u85a6\u7cfb\u7d71\u3002\u6a21\u578b\u5728\u6e2c\u8a66\u968e\u6bb5\u8868\u73fe\u826f\u597d\uff0c\u4f46\u4e0a\u7dda\u6578\u6708\u5f8c\uff0c\u9ede\u64ca\u7387\u8207\u9810\u6e2c\u6e96\u78ba\u5ea6\u9010\u6f38\u4e0b\u964d\u3002\u7d93\u5206\u6790\u767c\u73fe\uff0c\u8fd1\u671f\u4f7f\u7528\u8005\u884c\u70ba\u6a21\u5f0f\u8207\u6a21\u578b\u8a13\u7df4\u671f\u9593\u7684\u8cc7\u6599\u7279\u5fb5\u51fa\u73fe\u986f\u8457\u8b8a\u5316\u3002\u6b64\u73fe\u8c61\u6700\u53ef\u80fd\u5c6c\u65bc\u4e0b\u5217\u4f55\u8005\uff1f", "opts": ["\u6a21\u578b\u904e\u5ea6\u64ec\u5408\u8a13\u7df4\u8cc7\u6599\uff0c\u7121\u6cd5\u6cdb\u5316\u81f3\u672a\u77e5\u6a23\u672c", "\u7279\u5fb5\u5de5\u7a0b\u8a2d\u8a08\u4e0d\u4f73\uff0c\u5c0e\u81f4\u8f38\u5165\u8cc7\u8a0a\u4e0d\u8db3", "\u8cc7\u6599\u7d71\u8a08\u7279\u5fb5\u96a8\u6642\u9593\u6539\u8b8a\uff0c\u5f71\u97ff\u6a21\u578b\u63a8\u8ad6\u6548\u679c", "\u7cfb\u7d71\u8cc7\u6599\u7d50\u69cb\u8abf\u6574\uff0c\u9020\u6210\u7279\u5fb5\u6b04\u4f4d\u932f\u7f6e"], "ans": "C", "inferred": false, "expl": "\u3010\u7b54\u6848C\u3011\u4e0a\u7dda\u5f8c\u9ede\u64ca\u7387\u4e0b\u964d+\u884c\u70ba\u6a21\u5f0f\u6539\u8b8a\u3002\n\u2717(A) \u904e\u64ec\u5408\u662f\u8a13\u7df4\u968e\u6bb5\u554f\u984c\u3002\n\u2717(B) \u7279\u5fb5\u5de5\u7a0b\u8a2d\u8a08\u4e0d\u4f73\u662f\u521d\u59cb\u554f\u984c\u3002\n\u2713(C) \u8cc7\u6599\u7d71\u8a08\u7279\u5fb5\u96a8\u6642\u9593\u6539\u8b8a\u6b63\u662f Data Drift / Concept Drift \u7684\u5178\u578b\u63cf\u8ff0\u3002\n\u2717(D) \u7d50\u69cb\u932f\u7f6e\u662f\u5de5\u7a0b\u932f\u8aa4\uff0c\u975e\u81ea\u7136\u6f02\u79fb\u3002"}, {"id": "115_1_s2_49", "exam": "115\u5e74\u7b2c\u4e00\u6b21 \u79d1\u76ee\u4e8c\uff08\u751f\u6210\u5f0fAI\uff09", "examId": "115_1_s2", "no": 49, "q": "\u67d0\u4f01\u696d\u4f7f\u7528 Low-Code \u5e73\u53f0\u5efa\u7f6e\u5167\u90e8\u71df\u904b\u7cfb\u7d71\uff0c\u7cfb\u7d71\u9700\u6574\u5408\u8ca1\u52d9\u3001\u5eab\u5b58\u8207\u7b2c\u4e09\u65b9\u7269\u6d41\u670d\u52d9\u3002\u5718\u968a\u5e0c\u671b\u78ba\u4fdd\u7cfb\u7d71\u5728\u8de8\u90e8\u9580\u6d41\u7a0b\u8207\u5916\u90e8\u670d\u52d9\u6574\u5408\u4e0b\uff0c\u5177\u9ad8\u53ef\u9760\u6027\u8207\u53ef\u6e2c\u8a66\u6027\u3002\u4e0b\u5217\u54ea\u4e00\u9805\u4f5c\u6cd5\u6700\u80fd\u9054\u6210\u76ee\u6a19\uff1f", "opts": ["\u53ea\u900f\u904e\u5e73\u53f0\u63d0\u4f9b\u7684\u6d41\u7a0b\u6a21\u64ec\u8207\u5373\u6642\u9810\u89bd\uff0c\u6aa2\u67e5\u5e38\u7528\u64cd\u4f5c\u8def\u5f91", "\u5efa\u7acb\u81ea\u52d5\u5316\u6e2c\u8a66\u6d41\u7a0b\uff0c\u7d50\u5408\u6a21\u64ec\u5916\u90e8\u670d\u52d9\u8207\u53ef\u91cd\u8907\u57f7\u884c\u7684\u6574\u5408\u6e2c\u8a66", "\u5c07\u6e2c\u8a66\u91cd\u9ede\u653e\u5728\u4f7f\u7528\u8005\u4ecb\u9762\u64cd\u4f5c\uff0c\u78ba\u8a8d\u64cd\u4f5c\u6d41\u7a0b\u662f\u5426\u9806\u66a2", "\u4e0a\u7dda\u5f8c\u518d\u900f\u904e\u4f7f\u7528\u8005\u56de\u994b\u8207\u5831\u8868\u76e3\u63a7\u7cfb\u7d71\u884c\u70ba\uff0c\u9032\u884c\u4fee\u6b63"], "ans": "B", "inferred": false, "expl": "\u3010\u7b54\u6848B\u3011\u8de8\u7cfb\u7d71\u6574\u5408\u7684\u53ef\u9760\u6027\u3002\n\u2717(A) \u5e73\u53f0\u9810\u89bd\u548c\u57fa\u672c\u55ae\u5143\u6e2c\u8a66\u4e0d\u8db3\u4ee5\u9a57\u8b49\u6574\u5408\u3002\n\u2713(B) \u81ea\u52d5\u5316\u6e2c\u8a66 + API/\u670d\u52d9\u865b\u64ec\u5316\u6a21\u64ec\u5916\u90e8\u670d\u52d9\uff0c\u53ef\u91cd\u8907\u57f7\u884c\u6574\u5408\u6e2c\u8a66\uff0c\u662f\u6700\u4f73\u5de5\u7a0b\u5be6\u8e10\u3002\n\u2717(C) \u4ecb\u9762\u6e2c\u8a66\u4e0d\u89e3\u5f8c\u7aef\u6574\u5408\u554f\u984c\u3002\n\u2717(D) \u4e0a\u7dda\u5f8c\u4fee\u6b63\u592a\u88ab\u52d5\u3002"}, {"id": "115_1_s2_50", "exam": "115\u5e74\u7b2c\u4e00\u6b21 \u79d1\u76ee\u4e8c\uff08\u751f\u6210\u5f0fAI\uff09", "examId": "115_1_s2", "no": 50, "q": "\u67d0\u62db\u8058\u516c\u53f8\u4f7f\u7528\u751f\u6210\u5f0f AI \u751f\u6210\u9762\u8a66\u554f\u984c\u8207\u5019\u9078\u4eba\u8a55\u4f30\u5efa\u8b70\u3002\u5718\u968a\u767c\u73fe\u6a21\u578b\u53ef\u80fd\u5c0d\u6027\u5225\u6216\u5e74\u9f61\u7522\u751f\u7684\u8cc7\u6599\u5206\u5e03\u504f\u5dee\u3002\u4e0b\u5217\u54ea\u4e00\u7a2e\u7b56\u7565\u6700\u80fd\u6709\u6548\u964d\u4f4e\u751f\u6210\u504f\u5dee\u8f38\u51fa\u7684\u98a8\u96aa\uff1f", "opts": ["\u8abf\u6574\u6a21\u578b\u67b6\u69cb\u8207\u53c3\u6578\uff0c\u4f7f\u751f\u6210\u66f4\u9748\u6d3b\u8207\u591a\u6a23\u5316", "\u5927\u5e45\u589e\u52a0\u8a13\u7df4\u8cc7\u6599\u91cf\uff0c\u4f46\u4e0d\u6e05\u7406\u6216\u5e73\u8861\u8cc7\u6599\u4e2d\u7684\u6027\u5225\u8207\u5e74\u9f61\u5206\u5e03", "\u5728\u751f\u6210\u5f8c\u5c0d\u6a21\u578b\u8f38\u51fa\u9032\u884c\u4eba\u5de5\u5be9\u67e5\uff0c\u4e26\u4f9d\u504f\u5dee\u60c5\u6cc1\u4fee\u6b63\u7d50\u679c", "\u50c5\u5141\u8a31\u9ad8\u968e\u4e3b\u7ba1\u64cd\u4f5c\u7cfb\u7d71\uff0c\u900f\u904e\u4eba\u54e1\u7be9\u9078\u63a7\u5236\u751f\u6210\u7d50\u679c"], "ans": "C", "inferred": false, "expl": "\u3010\u7b54\u6848C\u3011\u964d\u4f4e\u751f\u6210\u504f\u5dee\u3002\n\u2717(A) \u8abf\u6574\u67b6\u69cb\u589e\u591a\u6a23\u6027\u4e0d\u89e3\u504f\u5dee\u3002\n\u2717(B) \u4e0d\u6e05\u7406\u8cc7\u6599\u5373\u4f7f\u5927\u91cf\u4e5f\u7121\u6cd5\u964d\u504f\u3002\n\u2713(C) \u4eba\u5de5\u5be9\u67e5\uff08Human-in-the-loop\uff09\u4e26\u4f9d\u504f\u5dee\u4fee\u6b63\u7d50\u679c\uff0c\u6700\u76f4\u63a5\u6709\u6548\u3002\n\u2717(D) \u9650\u5b9a\u64cd\u4f5c\u8005\u4e0d\u89e3\u6a21\u578b\u8f38\u51fa\u504f\u5dee\u3002"}, {"id": "114_4_s1_1", "exam": "114\u5e74\u7b2c\u56db\u68af\u6b21 \u79d1\u76ee\u4e00\uff08AI\u57fa\u790e\uff09", "examId": "114_4_s1", "no": 1, "q": "\u5728\u4eba\u5de5\u667a\u6167\u7cfb\u7d71\u7684\u6c7a\u7b56\u6d41\u7a0b\u4e2d\uff0c\u4e0b\u5217\u54ea\u4e00\u7a2e\u60c5\u5883\u6700\u7b26\u5408\u300c\u4eba\u5728\u8ff4\u5708\u4e0a (Human-over-the-loop)\u300d\u6240\u5f37\u8abf\u7684\u76e3\u7763\u6a5f\u5236\uff1f", "opts": ["AI \u7cfb\u7d71\u53ea\u80fd\u63d0\u4f9b\u5efa\u8b70\uff0c\u4eba\u985e\u9700\u4e3b\u52d5\u4e0b\u9054\u547d\u4ee4\u624d\u80fd\u9032\u884c\u6c7a\u7b56", "\u4eba\u985e\u5c0d AI \u7684\u904b\u884c\u9032\u884c\u65e5\u5e38\u76e3\u7763\uff0c\u5fc5\u8981\u6642\u53ef\u7acb\u5373\u4ecb\u5165\u4fee\u6b63\u6216\u5e72\u9810", "\u4eba\u985e\u5e73\u6642\u4e0d\u53c3\u8207 AI \u7684\u904b\u4f5c\uff0c\u50c5\u5728\u767c\u751f\u7570\u5e38\u6216\u91cd\u5927\u932f\u8aa4\u6642\u624d\u63a5\u624b\u63a7\u5236", "AI \u7684\u6240\u6709\u5224\u65b7\u8207\u884c\u52d5\u5728\u57f7\u884c\u524d\uff0c\u7686\u9808\u7d93\u904e\u4eba\u985e\u9010\u4e00\u5be9\u6838\u8207\u6279\u51c6"], "ans": "B", "inferred": false, "expl": "\u3010\u7b54\u6848B\u3011Human-over-the-loop \u7684\u76e3\u7763\u6a5f\u5236\u3002\n\u2717(A) AI \u63d0\u4f9b\u5efa\u8b70\u3001\u4eba\u985e\u4e3b\u52d5\u4e0b\u4ee4\u662f Human-in-the-loop\u3002\n\u2713(B) \u4eba\u985e\u65e5\u5e38\u76e3\u7763\u3001\u5fc5\u8981\u6642\u4ecb\u5165\u4fee\u6b63\uff0c\u6b63\u662f HOTL \u7684\u6838\u5fc3\u3002\n\u2717(C) \u5e73\u6642\u4e0d\u53c3\u8207\u3001\u50c5\u7570\u5e38\u63a5\u624b\u8f03\u63a5\u8fd1 Human-out-of-the-loop\u3002\n\u2717(D) \u9010\u4e00\u5be9\u6838\u6279\u51c6\u662f\u56b4\u683c\u7684 Human-in-the-loop\u3002"}, {"id": "114_4_s1_2", "exam": "114\u5e74\u7b2c\u56db\u68af\u6b21 \u79d1\u76ee\u4e00\uff08AI\u57fa\u790e\uff09", "examId": "114_4_s1", "no": 2, "q": "\u4e0b\u5217\u54ea\u4e00\u7a2e\u7279\u5fb5\u5de5\u7a0b\u6280\u5de7\uff0c\u6700\u9069\u5408\u5c07\u300c\u661f\u671f\u5e7e\u300d\u548c\u300c24 \u5c0f\u6642\u5236\u6642\u9593\u300d \u9019\u5169\u500b\u6b04\u4f4d\u7d50\u5408\uff0c\u4ee5\u9810\u6e2c\u901a\u52e4\u6642\u9593\uff1f", "opts": ["One-hot \u7de8\u78bc(One-hot encoding)", "\u6b63\u898f\u5316(Normalization)", "\u7279\u5fb5\u4ea4\u53c9(Feature Cross)", "\u5bec\u6df1\u6a21\u578b(Wide and Deep)"], "ans": "C", "inferred": false, "expl": "\u3010\u7b54\u6848C\u3011\u300c\u661f\u671f\u5e7e\u00d7\u6642\u9593\u300d\u7d44\u5408\u9810\u6e2c\u901a\u52e4\u3002\n\u2717(A) One-hot \u7de8\u78bc\u7121\u4ea4\u4e92\u4f5c\u7528\u3002\n\u2717(B) \u6b63\u898f\u5316\u662f\u6578\u503c\u7e2e\u653e\uff0c\u975e\u7d44\u5408\u7279\u5fb5\u3002\n\u2713(C) \u7279\u5fb5\u4ea4\u53c9\u5c07\u5169\u6b04\u4f4d\u7d44\u5408\u70ba\u65b0\u7279\u5fb5\uff0c\u6355\u6349\u4ea4\u4e92\u6548\u61c9\uff08\u5982\u9031\u4e00\u65e9\u9ad8\u5cf0\uff09\uff0c\u6b63\u89e3\u3002\n\u2717(D) Wide \u0026 Deep \u662f\u6a21\u578b\u67b6\u69cb\uff0c\u4e0d\u662f\u7279\u5fb5\u5de5\u7a0b\u65b9\u6cd5\u3002"}, {"id": "114_4_s1_3", "exam": "114\u5e74\u7b2c\u56db\u68af\u6b21 \u79d1\u76ee\u4e00\uff08AI\u57fa\u790e\uff09", "examId": "114_4_s1", "no": 3, "q": "\u95dc\u65bc ETL(Extract-Transform-Load)\uff0c\u4e0b\u5217\u6558\u8ff0\u4f55\u8005\u70ba\u6b63\u78ba\uff1f", "opts": ["E \u8868\u793a\u5c07\u8cc7\u6599\u76f4\u63a5\u5132\u5b58\u81f3\u76ee\u6a19\u5132\u5b58\u5eab", "ETL \u7684\u8655\u7406\u9806\u5e8f\u53ef\u4ee5\u81ea\u7531\u8abf\u6574\u70ba TEL", "L \u8868\u793a\u5c07\u76ee\u6a19\u5132\u5b58\u5eab\u7d93\u904e\u53cd\u52a0\u5bc6\u8655\u7406\u8f09\u5165\u8cc7\u6599", "T \u5305\u62ec\u8cc7\u6599\u7684\u6e05\u7406\u8207\u6392\u5e8f"], "ans": "D", "inferred": false, "expl": "\u3010\u7b54\u6848D\u3011ETL \u6d41\u7a0b\u5b9a\u7fa9\u3002\n\u2717(A) E\uff08Extract\uff09\u662f\u64f7\u53d6\uff0c\u4e0d\u662f\u5132\u5b58\u3002\n\u2717(B) ETL \u9806\u5e8f\u56fa\u5b9a\uff0c\u4e0d\u80fd\u6539\u70ba TEL\u3002\n\u2717(C) L\uff08Load\uff09\u662f\u8f09\u5165\u76ee\u6a19\u5132\u5b58\u5eab\uff0c\u975e\u53cd\u52a0\u5bc6\u3002\n\u2713(D) T\uff08Transform\uff09\u5305\u62ec\u8cc7\u6599\u6e05\u7406\u8207\u6392\u5e8f\uff0c\u6b63\u89e3\u3002"}, {"id": "114_4_s1_4", "exam": "114\u5e74\u7b2c\u56db\u68af\u6b21 \u79d1\u76ee\u4e00\uff08AI\u57fa\u790e\uff09", "examId": "114_4_s1", "no": 4, "q": "\u95dc\u65bc\u8cc7\u6599\u6b63\u5247\u5316(Regularization)L1\u3001L2 \u65b9\u6cd5\uff0c\u4e0b\u5217\u6558\u8ff0\u4f55\u8005\u6b63\u78ba\uff1f", "opts": ["L1 \u6b0a\u91cd\u500b\u6578\u6108\u591a\uff0c\u6108\u53ef\u4ee5\u63d0\u5347\u6a21\u578b\u7684\u6b63\u78ba\u7387", "L2 \u7a31\u70ba Lasso \u6b63\u5247\u5316", "L1 \u904b\u7528\u6e1b\u5c11\u6b0a\u91cd\u7684\u7d55\u5c0d\u503c\u4f86\u63a7\u5236\u6a21\u578b\u7684\u8907\u96dc\u5ea6", "L2 \u8f03 L1 \u6b63\u5247\u5316\u65b9\u6cd5\u6703\u5c07\u7279\u5fb5\u6b0a\u91cd\u8da8\u8fd1\u65bc\u96f6"], "ans": "C", "inferred": false, "expl": "\u3010\u7b54\u6848C\u3011L1/L2 \u6b63\u5247\u5316\u3002\n\u2717(A) \u4e0d\u662f\u300c\u6b0a\u91cd\u500b\u6578\u300d\u6108\u591a\u6108\u597d\u3002\n\u2717(B) L2 \u7a31 Ridge\uff0cL1 \u624d\u53eb Lasso\uff08\u63cf\u8ff0\u985b\u5012\uff09\u3002\n\u2713(C) L1 \u900f\u904e\u6e1b\u5c11\u6b0a\u91cd\u7684\u7d55\u5c0d\u503c\u63a7\u5236\u8907\u96dc\u5ea6\uff0c\u6b63\u89e 4e2d\uff0cL1 \u6b63\u5247\u5316(Regularization)\u5c0e\u81f4\u53c3\u6578\u6536\u6582\u70ba\u96f6\u7684\u539f\u56e0\u70ba\u4f55\uff1f", "opts": ["L1 \u6b63\u5247\u5316\u5ffd\u7565\u76ee\u6a19\u8b8a\u6578", "L1 \u5c0d\u68af\u5ea6\u6709\u5e73\u6ed1\u4f5c\u7528", "L1 \u5c0d\u5927\u4fc2\u6578\u61f2\u7f70\u8f03\u5f37\uff0c\u4fc3\u4f7f\u7a00\u758f\u89e3", "L1 \u6703\u8f49\u63db\u640d\u5931\u51fd\u6578\u70ba\u975e\u51f8\u5f62"], "ans": "C", "inferred": false, "expl": "\u3010\u7b54\u6848C\u3011L1 \u6536\u6582\u70ba\u96f6\u539f\u56e0\u3002\n\u2717(A) L1 \u4e0d\u5ffd\u7565\u76ee\u6a19\u8b8a\u6578\u3002\n\u2717(B) L1 \u5728\u96f6\u9ede\u4e0d\u53ef\u5fae\uff0c\u975e\u5e73\u6ed1\u3002\n\u2713(C) L1 \u5c0d\u5927\u4fc2\u6578\u61f2\u7f70\u5f37\uff0c\u4fc3\u4f7f\u90e8\u5206\u4fc2\u6578\u7cbe\u78ba\u6b78\u96f6\uff0c\u7522\u751f\u7a00\u758f\u89e3\u3002\n\u2717(D) L1 \u640d\u5931\u4ecd\u662f\u51f8\u51fd\u6578\uff0c\u4e0d\u6703\u975e\u51f8\u3002"}, {"id": "114_4_s1_7", "exam": "114\u5e74\u7b2c\u56db\u68af\u6b21 \u79d1\u76ee\u4e00\uff08AI\u57fa\u790e\uff09", "examId": "114_4_s1", "no": 7, "q": "\u8c9d\u6c0f\u5206\u985e\u5668(Naive Bayes Classifier)\u5e38\u88ab\u61c9\u7528\u65bc\u6587\u5b57\u5206\u985e\u3001\u5783\u573e\u90f5\u4ef6\u904e\u6ffe\u7b49\u5834\u666f\u3002\u4f9d\u64da\u6a21\u578b\u7279\u6027\uff0c\u5b83\u6700\u9069\u5408\u6b78\u985e\u65bc\u4e0b\u5217\u54ea\u4e00\u985e\uff1f", "opts": ["\u900f\u904e\u76f4\u63a5\u5b78\u7fd2\u8f38\u5165\u7279\u5fb5\u8207\u76ee\u6a19\u6a19\u7c64\u4e4b\u9593\u7684\u908a\u754c\u6216\u95dc\u4fc2\u4f86\u9032\u884c\u5206\u985e\u7684\u6a21\u578b", "\u900f\u904e\u5efa\u69cb\u8cc7\u6599\u7684\u6574\u9ad4\u5206\u5e03\uff0c\u4e26\u5229\u7528\u689d\u4ef6\u95dc\u4fc2\u9032\u884c\u63a8\u65b7\u548c\u5206\u985e\u7684\u6a21\u578b", "\u5074\u91cd\u63a2\u7d22\u8cc7\u6599\u4e2d\u6a23\u672c\u9593\u7684\u76f8\u4f3c\u6027\uff0c\u5c07\u8cc7\u6599\u81ea\u52d5\u5206\u6210\u4e0d\u540c\u7fa4\u7d44\u7684\u6a21 \u578b", "\u900f\u904e\u8a66\u932f\u5b78\u7fd2\uff0c\u6839\u64da\u88 5f0f", "\u6bcf\u65e5\u516c\u5e03\u4eba\u5de5\u667a\u6167\u7cfb\u7d71\u904b\u4f5c\u72c0\u6cc1", "\u6307\u6d3e\u9ad8\u968e\u4e3b\u7ba1\u6216\u59d4\u54e1\u6703\u9032\u884c\u76e3\u7763\u7ba1\u7406"], "ans": "C", "inferred": false, "expl": "\u3010\u7b54\u6848C\u3011\u300a\u91d1\u878d\u6a5f\u69cb\u904b\u7528 AI \u898f\u7bc4\u300b\u300c\u975e\u300d\u8981\u6c42\u9805\u76ee\u3002\n\u2717(A) \u8fa6\u7406\u4eba\u624d\u57f9\u80b2\u662f\u8981\u6c42\u9805\u76ee\u3002\n\u2717(B) \u4e86\u89e3 AI \u904b\u4f5c\u6a21\u5f0f\u662f\u8981\u6c42\u9805\u76ee\u3002\n\u2713(C) \u300c\u6bcf\u65e5\u516c\u5e03 AI \u7cfb\u7d71\u904b\u4f5c\u72c0\u6cc1\u300d\u4e0d\u5728\u898f\u7bc4\u8981\u6c42\u4e2d\uff08\u904e\u65bc\u983b\u7e41\u3001\u4e0d\u5207\u5be6\u969b\uff09\uff0c\u6b63\u89e3\u3002\n\u2717(D) \u6307\u6d3e\u9ad8\u968e\u4e3b\u7ba1\u76e3\u7763\u662f\u8981\u6c42\u9805\u76ee\u3002"}, {"id": "114_4_s1_11", "exam": "114\u5e74\u7b2c\u56db\u68af\u6b21 \u79d1\u76ee\u4e00\uff08AI\u57fa\u790e\uff09", "examId": "114_4_s1", "no": 11, "q": "\u4e0b\u5217\u54ea\u4e00\u985e\u554f\u984c\u6700\u9069\u5408\u4f7f\u7528\u975e\u76e3\u7763\u5f0f\u5b78\u7fd2(Unsupervised Learning) \u4f86\u8655\u7406\uff1f", "opts": ["\u6839\u64da\u5df2\u6a19\u8a18\u7684\u91ab\u7642\u5f71\u50cf\u8a13\u7df4\u6a21\u578b\u8a3a\u65b7\u75be\u75c5", "\u6839\u64da\u4f7f\u7528\u8005\u884c\u70ba\u5c07\u7528\u6236\u5206\u7fa4\uff0c\u4ee5\u512a\u5316\u884c\u92b7\u7b56\u7565", "\u900f\u904e\u5df2\u77e5\u4ea4\u901a\u4e8b\u6545\u8a18\u9304\u9810\u6e2c\u672a\u4f86\u4e8b\u6545\u767c\u751f\u6a5f\u7387", "\u6839\u64da\u6b77\u53f2\u80a1\u50f9\u9810\u6e2c\u672a\u4f86\u80a1\u5e02\u7684\u8d70\u52e2"], "ans": "B", "inferred": false, "expl": "\u3010\u7b54\u6848B\u3011\u975e\u76e3\u7763\u5f0f\u5b78\u7fd2\u9069\u7528\u60c5\u5883\u3002\n\u2717(A) \u5df2\u6a19\u8a18\u91ab\u7642\u5f71\u50cf\u662f\u76e3\u7763\u5f0f\u5b78\u7fd2\u3002\n\u2713(B) \u6839\u64da\u7528\u6236\u884c\u70ba\u81ea\u52d5\u5206\u7fa4\uff08\u805a\u985e\uff09\u662f\u975e\u76e3\u7763\u5f0f\u7d93\u5 1ea\u99d5\u8eca\u6a21\u64ec\u74b0\u5883\u4e2d\uff0c\u6a21\u578b\u900f\u904e\u8a66\u99d5\u7372\u5f97\u300c\u662f\u5426\u5b89\u5168\u901a\u904e\u8def\u53e3\u300d\u7684 \u734e\u52f5\u6216\u61f2\u7f70\u8a0a\u865f\uff0c\u9010\u6b65\u8abf\u6574\u6c7a\u7b56\u7b56\u7565\u0026mdash;\u975e\u76e3\u7763\u5f0f\u5b78\u7fd2(Unsupervised Learning)", "\u5728\u9867\u5ba2\u8cfc\u8cb7\u7d00\u9304\u4e2d\uff0c\u5229\u7528\u5df2\u77e5\u7684\u300c\u9867\u5ba2\u662f\u5426\u6d41\u5931\u300d\u6a19\u7c64\uff0c\u8a13\u7df4\u6a21\u578b \u4ee5\u9810\u6e2c\u65b0\u9867\u5ba2\u672a\u4f86\u662f\u5426\u6703\u6d41\u5931 \u0026mdash; \u5f37\u5316\u5f0f\u5b78\u7fd2(Reinforcement Learning)", "\u5728\u80a1\u7968\u5e02\u5834\u8cc7\u6599\u4e2d\uff0c\u8f38\u5165\u6b77\u53f2\u80a1\u50f9\u5e8f\u5217\uff0c\u5617\u8a66\u5c07\u672a\u4f86\u53ef\u80fd\u8d70\u52e2\u5283\u5206 \u6210\u82e5\u5e72\u300c\u4e0a\u5347\u578b\u3001\u76e4\u6574\u578b\u3001\u4e0b\u964d\u578b\u300d\u7fa4\u7d44\uff0c\u7121\u9700\u4f7f\u7528\u4efb\u4f55\u6a19\u7c64 \u0026mdash; \u975e\u76e3 \u7763\u5f0f\u5b78\u7fd2(Unsupervised Learning)"], "ans": "D", "inferred": false, "expl": "\u3010\u7b54\u6848D\u3011\u5b78\u7fd2\u985e\u578b\u642d\u914d\u3002\n\u2717(A) \u7d50\u5408\u6a19+\u672a\u6a19\u61c9\u70ba\u534a\u76e3\u7763\u5f0f\uff0c\u975e\u76e3\u7763\u5f0f\u932f\u8aa4\u3002\n\u2717(B) \u8a66\u99d5\u734e\u52f5\u61c9\u70ba\u5f37\u5316\u5b78\u7fd2\uff0c\u975e\u975e\u76e3\u7763\u5f0f\u932f\u8aa4\u3002\n\u2717(C) \u5df2\u77e5\u6a19\u7c64\u9810\u6e2c\u61c9\u70ba\u76e3\u7763\u5f0f\uff0c\u5f37\u5316\u5f0f\u932f\u8aa4\u3002\n\u2713(D) \u80a1\u50f9\u7121\u6a19+\u5283\u5206\u8da8\u52e2\u578b\u614b\u6b63\u662f\u975e\u76e3\u7763\u5f0f\u805a\u985e\uff0c\u642d\u914d\u6b63\u78ba\u3002"}, {"id": "114_4_s1_14", "exam": "114\u5e74\u7b2c\u56db\u68af\u6b21 \u79d1\u76ee\u4e00\uff08AI\u57fa\u790e\uff09", "examId": "114_4_s1", "no": 14, "q": "\u67d0\u4f01\u696d\u5206\u6790\u5718\u968a\u6b63\u5728\u8655\u7406\u4e00\u7d44\u8fd1\u5169\u5e74\u7684\u71df\u904b\u8207\u92b7\u552e
