u5f71\u97ff\u8a18\u61b6\u9ad4\u4f7f\u7528\u3002"}, {"id": "114_4_s1_25", "exam": "114\u5e74\u7b2c\u56db\u68af\u6b21 \u79d1\u76ee\u4e00\uff08AI\u57fa\u790e\uff09", "examId": "114_4_s1", "no": 25, "q": "\u5728\u81ea\u7136\u8a9e\u8a00\u8655\u7406\u4efb\u52d9\u4e2d\uff0c\u70ba\u4e86\u6e1b\u5c11\u8a13\u7df4\u8a9e\u6599\u4e2d\u504f\u898b\u5c0d\u6a21\u578b\u7684\u5f71\u97ff\uff0c\u4e0b\u5217\u54ea\u7a2e\u8cc7\u6599\u8655\u7406\u7b56\u7565\u5c6c\u65bc\u5e38\u898b\u7684\u300c\u8cc7\u6599\u53bb\u504f(Data Debiasing)\u300d\u505a\u6cd5\uff1f", "opts": ["\u8b93\u6a21\u578b\u5728\u8a13\u7df4\u6642\u96a8\u6a5f\u66ff\u63db\u8f38\u51fa\uff0c\u4ee5\u62b5\u6d88\u8cc7\u6599\u4e2d\u5b58\u5728\u7684\u7cfb\u7d71\u6027\u504f\u5dee", "\u589e\u52a0\u6a21\u578b\u7684\u53c3\u6578\u91cf\uff0c\u4f9d\u8cf4\u66f4\u5927\u7684\u6a21\u578b\u81ea\u52d5\u6d88\u9664\u539f\u59cb\u8cc7\u6599\u4e2d\u7684\u504f\u898b", "\u8abf\u6574\u6216\u64f4\u5145\u8a13\u7df4\u8a9e\u6599\uff0c\u4f7f\u4e0d\u540c\u7fa4\u9ad4\u6216\u985e\u578b\u8cc7\u6599\u7684\u6bd4\u4f8b\u66f4\u52a0\u5e73\u8861\uff0c\u907f \u514d\u6a21\u578b\u904e\u5ea6\u504f\u5411\u51fa\u73fe\u983b\u7387\u9ad8\u7684\u985e\u5225", "\u5c0d\u8a13\u7df4\u8cc7\u6599\u65bd\u52a0\u984d\u5916\u6b63\u5247\u5316\u6216\u566a\u97f3\uff0c\u4f7f\u6a21\u578b\u5728\u5b78\u7fd2\u904e\u7a0b\u4e2d\u5c0d\u504f\u898b\u654f\u611f\u5ea6\u964d\u4f4e"], "ans": "C", "inferred": false, "expl": "\u3010\u7b54\u6848C\u3011\u8cc7\u6599\u53bb\u504f\u505a\u6cd5\u3002\n\u2717(A) \u96a8\u6a5f\u66ff\u63db\u8f38\u51fa\u7121\u7cfb\u7d71\u6027\u610f\u7fa9\u3002\n\u2717(B) \u589e\u6a21\u578b\u53c3\u6578\u4e0d\u6703\u81ea\u52d5\u6d88\u9664\u504f\u898b\u3002\n\u2713(C) \u8abf\u6574\u6216\u64f4\u5145\u8a13\u7df4\u8a9e\u6599\u4f7f\u7fa4\u9ad4\u6bd4\u4f8b\u5e73\u8861\uff0c\u662f\u5e38\u898b\u7684\u8cc7\u6599\u53bb\u504f\u505a\u6cd5\u3002\n\u2717(D) \u52a0\u6b63\u5247\u5316/\u566a\u97f3\u4e0d\u662f\u53bb\u504f\u3002"}, {"id": "114_4_s1_26", "exam": "114\u5e74\u7b2c\u56db\u68af\u6b21 \u79d1\u76ee\u4e00\uff08AI\u57fa\u790e\uff09", "examId": "114_4_s1", "no": 26, "q": "\u5728\u6df1\u5ea6\u5b78\u7fd2\u6a21\u578b\u7684\u5fae\u8abf(Fine-tuning)\u904e\u7a0b\u4e2d\uff0c\u53ef\u80fd\u51fa\u73fe\u6240\u8b02\u7684\u300c\u707d\u96e3\u6027\u907a\u5fd8(Catastrophic Forgetting)\u300d\u3002\u6b64\u73fe\u8c61\u6700\u53ef\u80fd\u9020\u6210\u54ea\u7a2e\u60c5\u6cc1\uff1f", "opts": ["\u7531\u65bc\u8a08\u7b97\u8cc7\u6e90\u6216\u8a13\u7df4\u6b65\u9a5f\u4e0d\u8db3\uff0c\u6a21\u578b\u5728\u5fae\u8abf\u904e\u7a0b\u4e2d\u7121\u6cd5\u5b8c\u6574\u6536\u6582\uff0c \u5c0e\u81f4\u5b78\u7fd2\u6548\u679c\u53d7\u9650", "\u5fae\u8abf\u5f8c\u6a21\u578b\u7684\u8868\u73fe\u8b8a\u5f97\u96a8\u6a5f\uff0c\u7121\u6cd5\u6709\u6548\u8a18\u61b6\u65b0\u5b78\u5230\u7684\u6a21\u5f0f\u8207\u77e5\u8b58", "\u5fae\u8abf\u5f8c\u6a21\u578b\u7684\u90e8\u5206\u6b0a\u91cd\u7522\u751f\u504f\u79fb\uff0c\u5c0e\u81f4\u6a21\u578b\u7121\u6cd5\u91dd\u5c0d\u8f03\u9577\u7684\u6587\u5b57\u9032 \u884c\u56de\u61c9", "\u6a21\u578b\u904e\u5ea6\u9069\u61c9\u5fae\u8abf\u7684\u8cc7\u6599\u5206\u4f48\uff0c\u9010\u6f38\u907a\u5fd8\u5148\u524d\u9810\u8a13\u7df4\u6240\u7372\u5f97\u7684\u5ee3\u6cdb \u77e5\u8b58\uff0c\u5728\u539f\u6709\u4efb\u52d9\u6216\u5ee3\u6cdb\u9818\u57df\u4e0a\u8868\u73fe\u8b8a\u5dee"], "ans": "D", "inferred": false, "expl": "\u3010\u7b54\u6848D\u3011\u707d\u96e3\u6027\u907a\u5fd8\u73fe\u8c61\u3002\n\u2717(A) \u4e0d\u662f\u8a08\u7b97\u8cc7\u6e90\u4e0d\u8db3\u3002\n\u2717(B) \u4e0d\u662f\u96a8\u6a5f\u8868\u73fe\u3002\n\u2717(C) \u4e0d\u662f\u9577\u6587\u5b57\u8655\u7406\u554f\u984c\u3002\n\u2713(D) \u5fae\u8abf\u6642\u904e\u5ea6\u9069\u61c9\u65b0\u8cc7\u6599\u5206\u4f48\uff0c\u907a\u5fd8\u9810\u8a13\u7df4\u7684\u5ee3\u6cdb\u77e5\u8b58\uff0c\u5728\u539f\u4efb\u52d9\u4e0a\u6548\u80fd\u4e0b\u964d\uff0c\u6b63\u662f\u707d\u96e3\u6027\u907a\u5fd8\u3002"}, {"id": "114_4_s1_27", "exam": "114\u5e74\u7b2c\u56db\u68af\u6b21 \u79d1\u76ee\u4e00\uff08AI\u57fa\u790e\uff09", "examId": "114_4_s1", "no": 27, "q": "\u5728\u5927\u578b Transformer \u6a21\u578b\u7684\u6548\u80fd\u512a\u5316\u904e\u7a0b\u4e2d\uff0c\u5e38\u898b\u7684\u65b9\u6cd5\u4e4b\u4e00\u662f\u300c\u526a\u679d(Pruning)\u300d\u3002\u4e0b\u5217\u54ea\u4e00\u9805\u6700\u7b26\u5408\u8a72\u65b9\u6cd5\u7684\u6838\u5fc3\u6982\u5ff5\uff1f", "opts": ["\u5c07\u6a21\u578b\u4e2d\u6240\u6709\u6b0a\u91cd\u6309\u6bd4\u4f8b\u7e2e\u5c0f\uff0c\u4f7f\u5176\u503c\u66f4\u63a5\u8fd1\u96f6\uff0c\u4ee5\u964d\u4f4e\u8a08\u7b97\u91cf", "\u79fb\u9664\u6a21\u578b\u4e2d\u5f71\u97ff\u8f03\u5c0f\u6216\u5197\u9918\u7684\u90e8\u5206\u6b0a\u91cd\u53c3\u6578\uff0c\u4ee5\u6e1b\u5c11\u6a21\u578b\u5927\u5c0f\u4e26\u63d0 \u5347\u63a8\u7406\u6548\u7387", "\u5728\u8a13\u7df4\u6642\u50c5\u66f4\u65b0\u90e8\u5206\u6b0a\u91cd\u800c\u5c07\u5176\u4ed6\u6b0a\u91cd\u51cd\u7d50\uff0c\u5f9e\u800c\u6e1b\u5c11\u9700\u8981\u8abf\u6574\u7684 \u53c3\u6578\u6578\u91cf", "\u6839\u64da\u6ce8\u610f\u529b\u5206\u6578\u52d5\u614b\u8df3\u904e\u8655\u7406\u90e8\u5206\u8f38\u5165 Token\uff0c\u4ee5\u6e1b\u5c11\u6bcf\u6b21\u524d\u5411\u50b3 \u64ad\u7684\u8a08\u7b97"], "ans": "B", "inferred": false, "expl": "\u3010\u7b54\u6848B\u3011\u526a\u679d\uff08Pruning\uff09\u6838\u5fc3\u6982\u5ff5\u3002\n\u2717(A) \u4e0d\u662f\u6309\u6bd4\u4f8b\u7e2e\u5c0f\u6240\u6709\u6b0a\u91cd\u3002\n\u2713(B) \u79fb\u9664\u5f71\u97ff\u8f03\u5c0f\u6216\u5197\u9918\u7684\u6b0a\u91cd\u53c3\u6578\uff0c\u4f7f\u6a21\u578b\u66f4\u5c0f\u3001\u63a8\u8ad6\u66f4\u5feb\uff0c\u6b63\u662f\u526a\u679d\u3002\n\u2717(C) \u51cd\u7d50\u90e8\u5206\u6b0a\u91cd\u662f Freezing\uff0c\u975e\u526a\u679d\u3002\n\u2717(D) \u52d5\u614b\u8df3\u904e Token \u662f\u53e6\u4e00\u6280\u8853\uff08\u5982 Adaptive Computation\uff09\u3002"}, {"id": "114_4_s1_28", "exam": "114\u5e74\u7b2c\u56db\u68af\u6b21 \u79d1\u76ee\u4e00\uff08AI\u57fa\u790e\uff09", "examId": "114_4_s1", "no": 28, "q": "\u5c0d\u975e\u5e38\u9577\u7684\u8f38\u5165\u5e8f\u5217\u9032\u884c\u63a8\u7406(Inference)\uff0cTransformer \u6a21\u578b\u63a8\u7406\u7684\u4e3b\u8981\u8a08\u7b97\u74f6\u9838\u901a\u5e38\u662f\u4ec0\u9ebc\uff1f", "opts": ["\u6a21\u578b\u8f38\u51fa\u5c64\u7522\u751f\u6587\u672c\u7684\u904e\u7a0b\uff0c\u56e0\u70ba\u6bcf\u751f\u6210\u4e00\u500b\u8a5e\u90fd\u5fc5\u9808\u91cd\u65b0\u8a13\u7df4\u6574\u500b\u6a21\u578b\u4e00\u6b21", "\u8a5e\u5d4c\u5165 (Embedding) \u67e5\u627e\u64cd\u4f5c\uff0c\u56e0\u70ba\u5176\u6642\u9593\u8907\u96dc\u5ea6\u96a8\u8a5e\u5f59\u8868\u5927\u5c0f \u6307\u6578\u7d1a\u589e\u9577", "Softmax \u51fd\u6578\u7684\u8a08\u7b97\uff0c\u56e0\u70ba\u5c0d\u6bcf\u500b Token \u90fd\u9700\u8981\u57f7\u884c\u7e41\u91cd\u7684\u904b\u7b97", "\u81ea\u6ce8\u610f\u529b\u5c64\u7684\u8a08\u7b97\u548c\u5176\u8a18\u61b6\u9ad4\u4f7f\u7528\uff0c\u56e0\u70ba\u6ce8\u610f\u529b\u77e9\u9663\u7684\u5927\u5c0f\u96a8\u5e8f\u5217 \u9577\u5ea6\u5448\u5e73\u65b9\u7d1a\u589e\u9577"], "ans": "D", "inferred": false, "expl": "\u3010\u7b54\u6848D\u3011\u9577\u5e8f\u5217 Transformer \u4e3b\u8981\u74f6\u9838\u3002\n\u2717(A) \u4e0d\u9700\u6bcf\u751f\u4e00\u8a5e\u91cd\u8a13\u6a21\u578b\u3002\n\u2717(B) Embedding \u67e5\u627e\u4e0d\u662f\u6307\u6578\u589e\u9577\u3002\n\u2717(C) Softmax \u975e\u4e3b\u8981\u74f6\u9838\u3002\n\u2713(D) \u81ea\u6ce8\u610f\u529b\u77e9\u9663\u5927\u5c0f\u70ba O(n\u00b2)\uff0c\u8a08\u7b97\u8207\u8a18\u61b6\u9ad4\u96a8\u5e8f\u5217\u9577\u5ea6\u5e73\u65b9\u589e\u9577\uff0c\u662f\u4e3b\u8981\u74f6\u9838\u3002"}, {"id": "114_4_s1_29", "exam": "114\u5e74\u7b2c\u56db\u68af\u6b21 \u79d1\u76ee\u4e00\uff08AI\u57fa\u790e\uff09", "examId": "114_4_s1", "no": 29, "q": "\u5728\u300c\u53ef\u89e3\u91cb\u4eba\u5de5\u667a\u6167(Explainable AI, XAI)\u300d\u9818\u57df\u4e2d\uff0cLIME(Local Interpretable Model-agnostic Explanations)\u65b9\u6cd5\u6700\u6838\u5fc3\u7684\u61c9\u7528\u76ee \u7684\u662f\u4ec0\u9ebc\uff1f", "opts": ["\u89e3\u91cb\u55ae\u4e00\u6a23\u672c(\u5c40\u90e8\u9810\u6e2c)\u7684\u9ed1\u7bb1\u6a21\u578b\u6c7a\u7b56\u904e\u7a0b", "\u5168\u9762\u63d0\u5347\u9ed1\u7bb1\u6a21\u578b\u6574\u9ad4\u7684\u9810\u6e2c\u6e96\u78ba\u5ea6", "\u5c07\u9ed1\u7bb1\u6a21\u578b\u8f49\u63db\u6210\u5b8c\u5168\u53ef\u89e3\u91cb\u7684\u6a21\u578b\u4f5c\u70ba\u66ff\u4ee3", "\u7528\u65bc\u751f\u6210\u5927\u91cf\u64ec\u771f\u6578\u64da\u4f86\u66ff\u4ee3\u8a13\u7df4\u96c6"], "ans": "A", "inferred": false, "expl": "\u3010\u7b54\u6848A\u3011LIME \u6838\u5fc3\u61c9\u7528\u76ee\u7684\u3002\n\u2713(A) \u89e3\u91cb\u55ae\u4e00\u6a23\u672c\uff08\u5c40\u90e8\uff09\u7684\u9ed1\u7bb1\u6a21\u578b\u6c7a\u7b56\uff0c\u662f LIME \u7684\u6838\u5fc3\u3002\n\u2717(B) LIME \u4e0d\u63d0\u5347\u9810\u6e2c\u6e96\u78ba\u5ea6\u3002\n\u2717(C) LIME \u4e0d\u53d6\u4ee3\u9ed1\u7bb1\u6a21\u578b\uff08\u53ea\u662f\u5c40\u90e8\u8fd1\u4f3c\uff09\u3002\n\u2717(D) LIME \u4e0d\u7528\u65bc\u751f\u6210\u64ec\u771f\u8cc7\u6599\u3002"}, {"id": "114_4_s1_30", "exam": "114\u5e74\u7b2c\u56db\u68af\u6b21 \u79d1\u76ee\u4e00\uff08AI\u57fa\u790e\uff09", "examId": "114_4_s1", "no": 30, "q": "\u5728\u91ab\u7642\u8a3a\u65b7\u6c7a\u7b56\u652f\u63f4\u7cfb\u7d71\u7b49\u9ad8\u98a8\u96aa\u9818\u57df\u4e2d\uff0c\u300c\u53ef\u89e3\u91cb\u4eba\u5de5\u667a\u6167 (Explainable AI, XAI)\u300d\u7684\u6838\u5fc3\u50f9\u503c\u6700\u4e3b\u8981\u5448\u73fe\u5728\u54ea\u500b\u9762\u5411\uff1f", "opts": ["\u900f\u904e\u63d0\u4f9b\u53ef\u7406\u89e3\u7684\u6c7a\u7b56\u4f9d\u64da\uff0c\u4fc3\u9032\u60a3\u8005\u8207\u91ab\u7642\u5c08\u696d\u4eba\u54e1\u5c0d\u7cfb\u7d71\u8a3a\u65b7 \u7d50\u679c\u7684\u4fe1\u4efb\u8207\u63a5\u53d7\u5ea6", "\u4ee5\u53ef\u89e3\u91cb\u6027\u65b9\u6cd5\u512a\u5316\u81e8\u5e8a\u8cc7\u6599\u8490\u96c6\u8207\u7ba1\u7406\u6d41\u7a0b\uff0c\u5f9e\u800c\u964d\u4f4e\u6574\u9ad4\u91ab\u7642\u4f5c\u696d\u6210\u672c", "\u5229\u7528\u89e3\u91cb\u6a5f\u5236\u589e\u5f37\u6a21\u578b\u9810\u6e2c\u7684\u7d71\u8a08\u986f\u8457\u6027\u8207\u6e96\u78ba\u5ea6\uff0c\u4f7f\u5176\u5728\u7814\u7a76\u53ca \u5be6\u52d9\u61c9\u7528\u4e2d\u66f4\u5177\u79d1\u5b78\u6027", "\u900f\u904e\u63d0\u4f9b\u900f\u660e\u5316\u7684\u904b\u4f5c\u904e\u7a0b\uff0c\u9032\u800c\u6e1b\u8f15\u81e8\u5e8a\u4eba\u54e1\u8ca0\u64d4\uff0c\u4e26\u63d0\u5347\u91ab\u7642 \u670d\u52d9\u7684\u6574\u9ad4\u6548\u7387"], "ans": "A", "inferred": false, "expl": "\u3010\u7b54\u6848A\u3011\u91ab\u7642 XAI \u6838\u5fc3\u50f9\u503c\u3002\n\u2713(A) \u63d0\u4f9b\u53ef\u7406\u89e3\u7684\u6c7a\u7b56\u4f9d\u64da\uff0c\u4fc3\u9032\u60a3\u8005\u8207\u91ab\u5e2b\u5c0d AI \u8a3a\u65b7\u7684\u4fe1\u4efb\u8207\u63a5\u53d7\u5ea6\uff0c\u6b63\u662f\u6838\u5fc3\u50f9\u503c\u3002\n\u2717(B) \u4e0d\u4e3b\u8981\u70ba\u964d\u4f4e\u6210\u672c\u3002\n\u2717(C) \u4e0d\u76f4\u63a5\u63d0\u5347\u7d71\u8a08\u986f\u8457\u6027\u3002\n\u2717(D) \u96d6\u4e5f\u80fd\u6e1b\u8f15\u8ca0\u64d4\u4f46\u975e\u6838\u5fc3\u50f9\u503c\u3002"}, {"id": "114_4_s1_31", "exam": "114\u5e74\u7b2c\u56db\u68af\u6b21 \u79d1\u76ee\u4e00\uff08AI\u57fa\u790e\uff09", "examId": "114_4_s1", "no": 31, "q": "\u5728\u91d1\u878d\u79d1\u6280\u516c\u53f8\u7684\u4fe1\u8cb8\u6c7a\u7b56\u7cfb\u7d71\u4e2d\uff0c\u5c0e\u5165\u53cd\u4e8b\u5be6\u89e3\u91cb(Counterfactual Explanation)\u6642\uff0c\u5be6\u969b\u90e8\u7f72\u5f80\u5f80\u4f34\u96a8\u6280\u8853\u8207\u76e3\u7ba1\u6311\u6230\u3002\u4e0b\u5217\u54ea\u4e00\u9805\u6700\u7b26\u5408\u8a72\u60c5\u5883\u4e0b\u7684\u6838\u5fc3\u6311\u6230\uff1f", "opts": ["\u9700\u8981\u5efa\u7acb\u5b8c\u6574\u7684\u5ba2\u6236\u884c\u70ba\u9810\u6e2c\u6a21\u578b\u4f86\u4f30\u7b97\u5efa\u8b70\u6539\u8b8a\u7684\u5be6\u65bd\u6210\u672c\uff0c\u4e26\u6574\u5408\u5230\u73fe\u6709\u7684\u98a8\u96aa\u7ba1\u7406\u7cfb\u7d71\u67b6\u69cb\u4e2d", "\u5fc5\u9808\u4f7f\u7528\u806f\u90a6\u5b78\u7fd2\u6280\u8853\u4fdd\u8b77\u5ba2\u6236\u96b1\u79c1\uff0c\u540c\u6642\u5728\u5206\u6563\u5f0f\u74b0\u5883\u4e2d\u8a08\u7b97\u8de8 \u6a5f\u69cb\u7684\u53cd\u4e8b\u5be6\u89e3\u91cb\u7d50\u679c", "\u9700\u8981\u5efa\u69cb\u6642\u9593\u5e8f\u5217\u56e0\u679c\u5716\u4f86\u8655\u7406\u5ba2\u6236\u4fe1\u7528\u72c0\u6cc1\u7684\u52d5\u614b\u8b8a\u5316\uff0c\u4e26\u9810\u6e2c\u672a\u4f86\u53ef\u80fd\u7684\u4fe1\u7528\u8a55\u5206\u8ecc\u8de1", "\u751f\u6210\u7684\u53cd\u4e8b\u5be6\u6a23\u672c\u5fc5\u9808\u6eff\u8db3\u7279\u5fb5\u9593\u7684\u56e0\u679c\u7d04\u675f\u548c\u696d\u52d9\u908f\u8f2f\u7d04\u675f\uff0c\u540c\u6642\u78ba\u4fdd\u5efa\u8b70\u7684\u6539\u8b8a\u5728\u73fe\u5be6\u4e2d\u5177\u6709\u53ef\u64cd\u4f5c\u6027\u4e14\u7b26\u5408\u516c\u5e73\u653e\u8cb8\u6cd5\u898f"], "ans": "D", "inferred": false, "expl": "\u3010\u7b54\u6848D\u3011\u4fe1\u8cb8\u53cd\u4e8b\u5be6\u89e3\u91cb\u6311\u6230\u3002\n\u2717(A) \u4e0d\u662f\u9810\u6e2c\u6539\u8b8a\u6210\u672c\u3002\n\u2717(B) \u4e0d\u5fc5\u806f\u90a6\u5b78\u7fd2\u3002\n\u2717(C) \u4e0d\u662f\u6642\u9593\u5e8f\u5217\u56e0\u679c\u5716\u3002\n\u2713(D) \u751f\u6210\u7684\u53cd\u4e8b\u5be6\u5fc5\u9808\u6eff\u8db3\u7279\u5fb5\u9593\u56e0\u679c\u8207\u696d\u52d9\u908f\u8f2f\u7d04\u675f\u3001\u53ef\u64cd\u4f5c\u6027\u4e14\u7b26\u5408\u516c\u5e73\u653e\u8cb8\u6cd5\u898f\uff0c\u662f\u6838\u5fc3\u6311\u6230\u3002"}, {"id": "114_4_s1_32", "exam": "114\u5e74\u7b2c\u56db\u68af\u6b21 \u79d1\u76ee\u4e00\uff08AI\u57fa\u790e\uff09", "examId": "114_4_s1", "no": 32, "q": "\u5728\u7d71\u8a08\u63a8\u8ad6\u4e2d\uff0c\u82e5\u6a23\u672c\u4f86\u81ea\u6bcd\u9ad4\u4f46\u5448\u73fe\u660e\u986f\u504f\u614b\u5206\u5e03\uff0c\u4e14\u6a23\u672c\u6578\u6709\u9650\uff0c\u4e0b\u5217\u54ea\u4e00\u9805\u7b56\u7565\u6700\u80fd\u6e1b\u5c11\u63a8\u4f30\u6bcd\u9ad4\u53c3\u6578\u7684\u504f\u8aa4\uff1f", "opts": ["\u76f4\u63a5\u4f7f\u7528\u6a23\u672c\u5e73\u5747\u6578\u8207\u8b8a\u7570\u6578\u4f30\u8a08\u6bcd\u9ad4\u53c3\u6578\uff0c\u4e0d\u505a\u4efb\u4f55\u8abf\u6574", "\u589e\u52a0\u6a23\u672c\u6578\u4e26\u8003\u616e\u4f7f\u7528\u5206\u4f4d\u6578\u6216\u4e2d\u4f4d\u6578\u4f5c\u70ba\u4e2d\u5fc3\u8da8\u52e2\u4f30\u8a08", "\u5c07\u6a23\u672c\u96a8\u6a5f\u91cd\u65b0\u6392\u5217\u5f8c\uff0c\u591a\u6b21\u8a08\u7b97\u5e73\u5747\u503c\u4ee5\u6d88\u9664\u504f\u614b\u5f71\u97ff", "\u5b8c\u5168\u4f9d\u8cf4\u6a23\u672c\u6a19\u6e96\u5dee\u4f86\u4f30\u8a08\u6bcd\u9ad4\u53c3\u6578\uff0c\u5ffd\u7565\u5206\u5e03\u5f62\u614b"], "ans": "B", "inferred": false, "expl": "\u3010\u7b54\u6848B\u3011\u504f\u614b+\u5c0f\u6a23\u672c\u6e1b\u5c11\u504f\u8aa4\u3002\n\u2717(A) \u76f4\u63a5\u7528\u5e73\u5747\u8207\u8b8a\u7570\u6703\u504f\u8aa4\u3002\n\u2713(B) \u589e\u52a0\u6a23\u672c\u6578\u4e26\u7528\u5206\u4f4d\u6578/\u4e2d\u4f4d\u6578\uff08\u5c0d\u504f\u614b\u66f4\u7a69\u5065\uff09\u80fd\u6709\u6548\u6e1b\u5c11\u504f\u8aa4\uff0c\u6b63\u89e3\u3002\n\u2717(C) \u96a8\u6a5f\u91cd\u6392\u4e0d\u6d88\u504f\u614b\u3002\n\u2717(D) \u53ea\u7528\u6a19\u6e96\u5dee\u4e0d\u5920\u3002"}, {"id": "114_4_s1_33", "exam": "114\u5e74\u7b2c\u56db\u68af\u6b21 \u79d1\u76ee\u4e00\uff08AI\u57fa\u790e\uff09", "examId": "114_4_s1", "no": 33, "q": "\u5728\u5de5\u696d\u7269\u806f\u7db2\u67b6\u69cb\u4e2d\uff0c\u9032\u884c\u8a2d\u5099\u9810\u6e2c\u6027\u7dad\u8b77(Predictive Maintenance) \u6642\uff0c\u82e5\u9762\u5c0d\u7570\u5e38\u4e8b\u4ef6\u767c\u751f\u983b\u7387\u6975\u4f4e\u3001\u6a23\u672c\u9ad8\u5ea6\u4e0d\u5e73\u8861\u7684\u6642\u9593\u5e8f\u5217\u8cc7\u6599\uff0c \u4e0b\u5217\u54ea\u4e00\u7a2e\u65b9\u6cd5\u6700\u80fd\u517c\u9867\u6a21\u578b\u7a69\u5b9a\u6027\u8207\u7570\u5e38\u5075\u6e2c\u6548\u80fd\uff1f", "opts": ["\u5c07\u6bcf\u7b46\u7570\u5e38\u4e8b\u4ef6\u8cc7\u6599\u8907\u88fd\u591a\u6b21\u4ee5\u63d0\u5347\u6a21\u578b\u5c0d\u7570\u5e38\u7684\u8fa8\u8b58\u654f\u611f\u5ea6\uff0c\u642d \u914d\u5168\u5e8f\u5217\u8a13\u7df4\u6a21\u578b(\u5982 LSTM)", "\u5c0d\u6642\u9593\u5e8f\u5217\u9032\u884c\u5dee\u5206\u8207\u6a19\u6e96\u5316\u5f8c\uff0c\u4f7f\u7528\u50b3\u7d71\u76e3\u7763\u5f0f\u5b78\u7fd2\u6a21\u578b(\u5982 SVM)\u9032\u884c\u5206\u985e\u8a13\u7df4", "\u4f7f\u7528\u7d93\u904e\u6642\u9593\u5e8f\u5217\u7279\u5316\u7684 SMOTE \u6280\u8853\u751f\u6210\u7570\u5e38\u6a23\u672c\uff0c\u4ee5\u5e73\u8861\u7570\u5e38\u8207 \u6b63\u5e38\u8cc7\u6599\u6bd4\u4f8b", "\u63a1\u7528\u57fa\u65bc\u91cd\u5efa\u8aa4\u5dee\u7684\u81ea\u7de8\u78bc\u5668\u6a21\u578b( Sequence-to-Sequence Autoencoder)\u9032\u884c\u7570\u5e38\u5075\u6e2c\uff0c\u4e26\u50c5\u4f7f\u7528\u6b63\u5e38\u8cc7\u6599\u9032\u884c\u8a13\u7df4"], "ans": "D", "inferred": false, "expl": "\u3010\u7b54\u6848D\u3011\u9ad8\u5ea6\u4e0d\u5e73\u8861+\u6642\u5e8f\u9810\u6e2c\u7dad\u8b77\u3002\n\u2717(A) \u8907\u88fd\u7570\u5e38\u8cc7\u6599\u6613\u904e\u64ec\u5408\u3002\n\u2717(B) SVM \u9700\u591a\u6a23\u7570\u5e38\u6a19\u7c64\u3002\n\u2717(C) SMOTE \u7528\u65bc\u6642\u5e8f\u7834\u58de\u5e8f\u5217\u7d50\u69cb\u3002\n\u2713(D) Seq2Seq Autoencoder \u50c5\u7528\u6b63\u5e38\u8cc7\u6599\u8a13\u7df4\uff0c\u900f\u904e\u91cd\u5efa\u8aa4\u5dee\u5075\u6e2c\u7570\u5e38\uff0c\u517c\u9867\u4e0d\u5e73\u8861\u8207\u6642\u5e8f\uff0c\u6b63\u89e3\u3002"}, {"id": "114_4_s1_34", "exam": "114\u5e74\u7b2c\u56db\u68af\u6b21 \u79d1\u76ee\u4e00\uff08AI\u57fa\u790e\uff09", "examId": "114_4_s1", "no": 34, "q": "\u5728\u96f6\u552e\u696d\u9032\u884c\u5ba2\u6236\u884c\u70ba\u5206\u6790\u6642\uff0c\u8cc7\u6599\u5009\u5132\u4e2d\u767c\u73fe\u591a\u500b\u6b04\u4f4d\u5132\u5b58\u76f8\u540c\u7684\u8cfc\u8cb7\u91d1\u984d\u8cc7\u8a0a(\u4f8b\u5982\uff1aamount_usd\u3001total_price\u3001transaction_value)\uff0c \u4f46\u5176\u55ae\u4f4d\u3001\u547d\u540d\u6163\u4f8b\u53ca\u683c\u5f0f\u4e0d\u4e00\u81f4\uff0c\u9032\u800c\u5c0e\u81f4\u7279\u5fb5\u5de5\u7a0b\u968e\u6bb5\u6df7\u6dc6\u6a21\u578b\u8f38 \u5165\u3002\u91dd\u5c0d\u6b64\u7a2e\u8de8\u6b04\u4f4d\u8a9e\u7fa9\u91cd\u758a\u8207\u7d50\u69cb\u5197\u9918\u554f\u984c\uff0c\u4e0b\u5217\u54ea\u4e00\u7a2e\u8cc7\u6599\u8655\u7406\u7b56 \u7565\u6700\u5408\u9069\u4e14\u5177\u5be6\u52d9\u53ef\u884c\u6027\uff1f", "opts": ["\u5229\u7528\u8cc7\u6599\u63a2\u52d8\u6280\u8853\u81ea\u52d5\u9078\u64c7\u8cc7\u6599\u96c6\u4e2d\u5c0d\u76ee\u6a19\u8b8a\u6578\u6700\u654f\u611f\u7684\u6b04\u4f4d\uff0c\u5176 \u4ed6\u6b04\u4f4d\u6368\u68c4\u5373\u53ef\uff0c\u907f\u514d\u904e\u5ea6\u6e05\u7406\u5e72\u64fe\u539f\u59cb\u7d50\u69cb", "\u4fdd\u7559\u6240\u6709\u76f8\u4f3c\u6b04\u4f4d\uff0c\u4ea4\u7531\u9ad8\u968e\u6a21\u578b(\u5982 Gradient Boosting \u6216 Deep Learning)\u81ea\u u51fa\u7a00\u6709\u985e\u5225\uff0c\u5c0e\u81f4\u96d6\u80fd\u6355\u6349\u5230\u5c11\u6578\u6a23\u672c\uff0c\u4f46\u7cbe \u78ba\u7387(Precision)\u986f\u8457\u4e0b\u964d", "\u6a21\u578b\u7531\u65bc\u985e\u5225\u5206\u5e03\u4e0d\u5747\uff0c\u96e3\u4ee5\u5efa\u7acb\u6709\u6548\u7684\u7dda\u6027\u5206\u96e2\u908a\u754c\uff0c\u9032\u800c\u7121\u6cd5 \u6536\u6582", "\u6a21\u578b\u904e\u5ea6\u805a\u7126\u65bc\u7a00\u6709\u985e\u5225\u6a23\u672c\uff0c\u5c0e\u81f4\u5c0d\u591a\u6578\u985e\u5225\u7684\u9810\u6e2c\u80fd\u529b\u4e0b\u964d\uff0c \u6574\u9ad4\u6548\u80fd\u53d7\u640d", "\u6a21\u578b\u5b78\u5230\u7684\u6c7a\u7b56\u908a\u754c\u4e3b\u8981\u7531\u591a\u6578\u985e\u5225\u4e3b\u5c0e\uff0c\u5ffd\u8996\u4e86\u7a00\u6709\u985e\u5225\uff0c\u9020\u6210 \u8a72\u985e\u5225\u7684\u53ec\u56de\u7387(Recall)\u5927\u5e45\u964d\u4f4e"], "ans": "D", "inferred": false, "expl": "\u3010\u7b54\u6848D\u3011\u985e\u5225\u4e0d\u5e73\u8861\u7684\u5f71\u97ff\u3002\n\u2717(A) \u6a21\u578b\u4e0d\u6703\u50be\u5411\u7a00\u6709\u985e\u5225\u3002\n\u2717(B) \u901a\u5e38\u4ecd\u80fd\u6536\u6582\u3002\n\u2717(C) \u901a\u5e38\u4e0d\u6703\u805a\u7126\u7a00\u6709\u985e\u5225\u3002\n\u2713(D) \u6c7a\u7b56\u908a\u754c\u7531\u591a\u6578\u985e\u4e3b\u5c0e\uff0c\u5ffd\u8996\u7a00\u6709\u985e\uff0c\u5c0e\u81f4\u7a00\u6709\u985e Recall \u5927\u5e45\u964d\u4f4e\uff0c\u6b63\u89e3\u3002"}, {"id": "114_4_s1_36", "exam": "114\u5e74\u7b2c\u56db\u68af\u6b21 \u79d1\u76ee\u4e00\uff08AI\u57fa\u790e\uff09", "examId": "114_4_s1", "no": 36, "q": "\u67d0\u96fb\u5546\u8cc7\u6599\u5718\u968a\u8981\u5354\u52a9\u884c\u92b7\u90e8\u9580\u898f\u5283\u518d\u884c\u92b7\u7b56\u7565\u3002\u76ee\u524d\u53d6\u5f97\u8cc7\u6599\u5305\u542b\u4f7f\u7528\u8005\u9ede\u64ca\u3001\u8cfc\u8cb7\u7d00\u9304\u3001\u6d41\u91cf\u4f86\u6e90\u8207\u8f49\u63db\u7387\u3002\u82e5\u8cc7\u6599\u5718\u968a\u5e0c\u671b\u5148\u9032\u884c\u63a2\u7d22\u6027\u8cc7\u6599\u5206\u6790(EDA)\uff0c\u4e0b\u5217\u54ea\u4e00\u9805\u6700\u7b26\u5408 EDA \u7684\u505a\u6cd5\uff1f", "opts": ["\u5efa\u7acb\u96a8\u6a5f\u68ee\u6797\u6a21\u578b\uff0c\u9810\u6e2c\u4f7f\u7528\u8005\u662f\u5426\u6703\u5b8c\u6210\u8cfc\u8cb7", "\u4f7f\u7528 K-means \u5c0d\u4f7f\u7528\u8005\u7fa4\u9032\u884c\u5206\u7fa4\u4e26\u7acb\u5373\u5236\u5b9a\u5c0d\u61c9\u4fc3\u92b7\u7b56\u7565", "\u7e6a\u88fd\u5404\u985e\u6d41\u91cf\u4f86\u6e90\u5c0d\u8f49\u63db\u7387\u7684\u95dc\u806f\u5716\uff0c\u5c0b\u627e\u6f5b\u5728\u95dc\u4fc2", "\u5c0d\u4e0d\u540c\u8cfc\u7269\u8def\u5f91\u8a2d\u5b9a\u7d71\u8a08\u5047\u8a2d\u4e26\u9032\u884c\u96d9\u6a23\u672c t \u6aa2\u5b9a"], "ans": "C", "inferred": false, "expl": "\u3010\u7b54\u6848C\u3011EDA \u63a2\u7d22\u6027\u8cc7\u6599\u5206\u6790\u505a\u6cd5\u3002\n\u2717(A) \u5efa\u7acb\u96a8\u6a5f\u68ee\u6797\u6a21\u578b\u8d85\u51fa EDA \u7bc4\u570d\u3002\n\u2717(B) \u5373\u6642\u5236\u5b9a\u7b56\u7565\u8d85\u51fa EDA\u3002\n\u2713(C) \u7e6a\u88fd\u6d41\u91cf\u4f86\u6e90\u8207\u8f49\u63db\u7387\u7684\u95dc\u806f\u5716\uff0c\u662f EDA \u7684\u8996\u89ba\u5316\u63a2\u7d22\u505a\u6cd5\uff0c\u6b63\u89e3\u3002\n\u2717(D) \u5047\u8a2d\u6aa2\u5b9a\u5c6c\u65bc\u78ba\u8a8d\u6027\u5206\u6790\u3002"}, {"id": "114_4_s1_37", "exam": "114\u5e74\u7b2c\u56db\u68af\u6b21 \u79d1\u76ee\u4e00\uff08AI\u57fa\u790e\uff09", "examId": "114_4_s1", "no": 37, "q": "\u67d0\u91d1\u878d\u79d1\u6280\u516c\u53f8\u5728\u5229\u7528\u6b77\u53f2\u4ea4\u6613\u8cc7\u6599\u5efa\u7acb\u98a8\u96aa\u63a7\u7ba1\u6a21\u578b\u6642\uff0c\u5617\u8a66\u63a8\u4f30\u6574\u9ad4\u8a50\u9a19\u4ea4\u6613\u6bd4\u4f8b\u3002\u8fd1\u671f\u767c\u73fe\uff0c\u6a23\u672c\u9593\u5b58\u5728\u660e\u986f\u7684\u6642\u9593\u5e8f\u5217\u76f8\u95dc\u6027\uff0c\u5c0e\u81f4\u6a21\u578b\u5728\u5be6\u969b\u5075\u6e2c\u65b0\u4ea4\u6613\u6642\u8aa4\u5224\u7387\u5347\u9ad8\u3002\u82e5\u5e0c\u671b\u540c\u6642\u6539\u5584\u8a50\u9a19\u6bd4\u4f8b\u63a8 \u4f30\u7684\u6e96\u78ba\u6027\u4e26\u63d0\u5347\u6a21\u578b\u7684\u7a69\u5065\u6027\uff0c\u4e0b\u5217\u54ea\u4e00\u7a2e\u505a\u6cd5\u6700\u70ba\u5408\u9069\uff1f", "opts": ["\u64f4\u5145\u6a23\u672c\u6578\u91cf\uff0c\u4ee5\u6db5\u84cb\u66f4\u591a\u6f5b\u5728\u7684\u8a50\u9a19\u578b\u614b\uff0c\u4f46\u7dad\u6301\u65e2\u6709\u7684\u96a8\u6a5f\u62bd \u6a23\u65b9\u5f0f\u4e0d\u8b8a", "\u63a1\u53d6\u6642\u9593\u5e8f\u5217\u654f\u611f\u7684\u62bd\u6a23\u7b56\u7565\uff0c\u4f8b\u5982\u4f9d\u64da\u4ea4\u6613\u6642\u9593\u5340\u9593\u9032\u884c\u5206\u5c64\uff0c \u4ee5\u4fdd\u5b58\u539f\u59cb\u7684\u6642\u9593\u7d50\u69cb\u7279\u6027", "\u5c07\u8cc7\u6599\u5b8c\u5168\u96a8\u6a5f\u6253\u6563\uff0c\u4ee5\u964d\u4f4e\u5e8f\u5217\u76f8\u95dc\u6027\u5c0d\u6a21\u578b\u8a13\u7df4\u9020\u6210\u7684\u5f71\u97ff", "\u5728\u6a21\u578b\u8a55\u4f30\u6642\uff0c\u91dd\u5c0d\u76f8\u9130\u6642\u9593\u5340\u6bb5\u9032\u884c\u8aa4\u5dee\u5408\u4f75\uff0c\u4ee5\u4fbf\u7528\u6574\u9ad4\u4f30\u8a08 \u65b9\u5f0f\u4fee\u6b63\u8a50\u9a19\u6bd4\u4f8b"], "ans": "B", "inferred": false, "expl": "\u3010\u7b54\u6848B\u3011\u6642\u5e8f\u76f8\u95dc\u6027+\u8a50\u9a19\u6bd4\u4f8b\u63a8\u4f30\u3002\n\u2717(A) \u7dad\u6301\u96a8\u6a5f\u62bd\u6a23\u4e0d\u89e3\u6642\u5e8f\u76f8\u95dc\u3002\n\u2713(B) \u63a1\u6642\u9593\u5e8f\u5217\u654f\u611f\u7684\u5206\u5c64\u62bd\u6a23\uff08\u4f9d\u6642\u6bb5\u5206\u5c64\uff09\uff0c\u4fdd\u5b58\u539f\u59cb\u6642\u9593\u7d50\u69cb\uff0c\u662f\u6700\u5408\u9069\u3002\n\u2717(C) \u5b8c\u5168\u96a8\u6a5f\u7834\u58de\u6642\u5e8f\u7d50\u69cb\u3002\n\u2717(D) \u8aa4\u5dee\u5408\u4f75\u4e0d\u89e3\u63a8\u4f30\u6e96\u78ba\u6027\u3002"}, {"id": "114_4_s1_38", "exam": "114\u5e74\u7b2c\u56db\u68af\u6b21 \u79d1\u76ee\u4e00\uff08AI\u57fa\u790e\uff09", "examId": "114_4_s1", "no": 38, "q": "\u67d0\u516c\u53f8\u5efa\u7f6e\u57fa\u65bc\u6aa2\u7d22\u589e\u5f37\u751f\u6210(RAG)\u7684\u77e5\u8b58\u67e5\u8a62\u7cfb\u7d71\uff0c\u9700\u540c\u6642\u517c\u9867\u67e5\u8a62\u6548\u80fd\u8207\u8cc7\u6599\u7684\u5373\u6642\u66f4\u65b0\u3002\u8fd1\u671f\u767c\u73fe\u56de\u61c9\u5167\u5bb9\u5076\u723e\u904e\u6642\uff0c\u4e14\u6bcf\u6b21\u66f4\u65b0\u6587 \u4ef6\u90fd\u9700\u5b8c\u6574\u91cd\u5efa\u7d22\u5f15\uff0c\u5c0e\u81f4\u7cfb\u7d71\u5728\u66f4\u65b0\u671f\u9593\u7121\u6cd5\u670d\u52d9\u3002\u82e5\u8981\u89e3\u6c7a\u6b64\u554f\u984c\u4e26\u63d0\u5347\u6574\u9ad4\u7a69\u5065\u6027\uff0c\u4e0b\u5217\u54ea\u9805\u505a\u6cd5\u6700\u9069\u5408\uff1f", "opts": ["\u8abf\u6574\u751f\u6210\u6a21\u578b\u7684\u56de\u61c9\u96a8\u6a5f\u6027\u53c3\u6578\uff0c\u4ee5\u964d\u4f4e\u7b54\u6848\u504f\u5dee\u4e26\u63d0\u5347\u4e00\u81f4\u6027", "\u63d0\u5347\u6aa2\u7d22\u8207\u7d22\u5f15\u7684\u904b\u7b97\u6548\u80fd\uff0c\u4ee5\u7e2e\u77ed\u67e5\u8a62\u8207\u66f4\u65b0\u6240\u9700\u6642\u9593", "\u63a1\u7528\u7d22\u5f15\u7684\u589e\u91cf\u6216\u5206\u6bb5\u66f4\u65b0\u65b9\u5f0f\uff0c\u4f7f\u65b0\u8cc7\u6599\u80fd\u5373\u6642\u7d0d\u5165\u800c\u4e0d\u9700\u5168\u90e8 \u91cd\u5efa", "\u5efa\u7acb\u5e38\u898b\u554f\u984c\u7684\u6a19\u6e96\u7b54\u6848\u96c6\uff0c\u900f\u904e\u5feb\u901f\u6aa2\u7d22\u56de\u61c9\u4ee5\u964d\u4f4e\u6a21\u578b\u8ca0\u64d4"], "ans": "C", "inferred": false, "expl": "\u3010\u7b54\u6848C\u3011RAG \u7d22\u5f15\u66f4\u65b0\u4e2d\u65b7\u3002\n\u2717(A) \u8abf\u96a8\u6a5f\u6027\u4e0d\u89e3\u7d22\u5f15\u554f\u984c\u3002\n\u2717(B) \u63d0\u5347\u904b\u7b97\u6548\u80fd\u4e0d\u89e3\u5168\u91cf\u91cd\u5efa\u554f\u984c\u3002\n\u2713(C) \u63a1\u7528\u7d22\u5f15\u7684\u589e\u91cf/\u5206\u6bb5\u66f4\u65b0\uff0c\u4f7f\u65b0\u8cc7\u6599\u5373\u6642\u7d0d\u5165\u800c\u4e0d\u9700\u5168\u91cf\u91cd\u5efa\uff0c\u6b63\u89e3\u3002\n\u2717(D) \u6a19\u6e96\u7b54\u6848\u96c6\u5931\u5f48\u6027\u3002"}, {"id": "114_4_s1_39", "exam": "114\u5e74\u7b2c\u56db\u68af\u6b21 \u79d1\u76ee\u4e00\uff08AI\u57fa\u790e\uff09", "examId": "114_4_s1", "no": 39, "q": "\u67d0\u91ab\u9662\u8a08\u756b\u958b\u767c\u4f4f\u9662\u65e5\u6578\u9810\u6e2c\u6a21\u578b\uff0c\u4ee5\u5354\u52a9\u75c5\u623f\u8abf\u5ea6\u3002\u591a\u6578\u75c5\u4eba\u7684\u4f4f\u9662\u65e5\u6578\u96c6\u4e2d\u5728 3\u0026ndash;7 \u5929\uff0c\u4f46\u4ecd\u6709\u5c11\u6578\u91cd\u75c7\u60a3\u8005\u56e0\u6cbb\u7642\u9700\u6c42\u800c\u4f4f\u9662\u65e5\u6578\u660e\u986f\u504f\u9577\u3002\u91ab\u9662\u5e0c\u671b\u63a1\u7528\u4e00\u7a2e\u5408\u9069\u7684\u8a55\u4f30\u65b9\u5f0f\uff0c\u65e2\u80fd\u517c\u9867\u5927\u90e8\u5206\u75c5\u4eba\u7684\u9810\u6e2c\u6e96\u78ba\u5ea6\uff0c\u4e5f\u80fd\u78ba\u4fdd\u5c0d\u91cd\u75c7\u500b\u6848\u7684\u9810\u6e2c\u7dad\u6301\u7a69\u5065\u3002\u4e0b\u5217\u54ea\u4e00\u7a2e\u65b9\u6cd5\u6700\u7b26\u5408\u6b64\u9700\u6c42\uff1f", "opts": ["\u5728\u6a21\u578b\u6aa2\u6838\u6642\uff0c\u540c\u6642\u5448\u73fe\u5e73\u5747\u7d55\u5c0d\u8aa4\u5dee(MAE)\u8207\u91cd\u75c7\u5b50\u7fa4\u7684\u8aa4\u5dee\u6307\u6a19", "\u50c5\u91dd\u5c0d\u4e00\u822c\u75c5\u4eba\u6a23\u672c\u9032\u884c\u4ea4\u53c9\u9a57\u8b49\uff0c\u4ee5\u907f\u514d\u91cd\u75c7\u500b\u6848\u62c9\u9ad8\u8aa4\u5dee", "\u5c07\u6240\u6709\u75c5\u4eba\u7684\u4f4f\u9662\u65e5\u6578\u9032\u884c\u6a19\u6e96\u5316\u8655\u7406\uff0c\u4ee5\u6e1b\u5c11\u6578\u503c\u7bc4\u570d\u5dee\u7570\u7684\u5f71\u97ff", "\u53ea\u63a1\u7528\u55ae\u4e00\u7684\u6574\u9ad4\u6c7a\u5b9a\u4fc2\u6578 (R\u0026sup2;) \u4f5c\u70ba\u6a21\u578b\u512a\u52a3\u7684\u5224\u65b7\u4f9d\u64da"], "ans": "A", "inferred": false, "expl": "\u3010\u7b54\u6848A\u3011\u517c\u9867\u6574\u9ad4+\u91cd\u75c7\u500b\u6848\u3002\n\u2713(A) \u540c\u6642\u5448\u73fe\u6574\u9ad4 MAE \u8207\u91cd\u75c7\u5b50\u7fa4\u8aa4\u5dee\u6307\u6a19\uff0c\u517c\u9867\u5927\u90e8\u5206\u75c5\u4eba\u8207\u91cd\u75c7\u9700\u6c42\uff0c\u6b63\u89e3\u3002\n\u2717(B) \u6392\u9664\u91cd\u75c7\u5931\u4ee3\u8868\u6027\u3002\n\u2717(C) \u6a19\u6e96\u5316\u4e0d\u662f\u8a55\u4f30\u6307\u6a19\u3002\n\u2717(D) \u55ae\u4e00 R\u00b2 \u5ffd\u7565\u5b50\u7fa4\u5dee\u7570\u3002"}, {"id": "114_4_s1_40", "exam": "114\u5e74\u7b2c\u56db\u68af\u6b21 \u79d1\u76ee\u4e00\uff08AI\u57fa\u790e\uff09", "examId": "114_4_s1", "no": 40, "q": "\u95dc\u65bc\u76e3\u7763\u5f0f\u5b78\u7fd2( Supervised Learning )\u8207\u975e\u76e3\u7763\u5f0f\u5b78\u7fd2 (Unsupervised Learning)\u7684\u76ee\u6a19\uff0c\u4e0b\u5217\u6558\u8ff0\u4f55\u8005\u932f\u8aa4\uff1f \u003cbr\u003e1.\u975e\u76e3\u7763\u5f0f\u5b78\u7fd2\u7684\u6838\u5fc3\u5728\u65bc\u767c\u6398\u8cc7\u6599\u5167\u5728\u7d50\u69cb\uff0c\u4f8b\u5982\u5206\u7fa4\u3001\u95dc\u806f\u898f\u5247\u8207\u964d\u7dad\uff0c\u800c\u4e0d\u4f9d\u8cf4\u5916\u90e8\u6a19\u7c64\u3002 \u003cbr\u003e2.\u76e3\u7763\u5f0f\u5b78\u7fd2\u7684\u5178\u578b\u61c9\u7528\u70ba\u5206\u985e\u8207\u8ff4\u6b78\uff0c\u901a\u5e38\u4e0d\u9069\u5408\u61c9\u7528\u65bc\u7570\u5e38\u5075\u6e2c\u4efb\u52d9\u3002 \u003cbr\u003e3.\u975e\u76e3\u7763\u5f0f\u5b78\u7fd2\u82e5\u642d\u914d\u5c11\u91cf\u6a19\u8a3b\u8cc7\u6599\uff0c\u5373\u6703\u5b8c\u5168\u8f49\u5316\u70ba\u76e3\u7763\u5f0f\u5b78\u7fd2\u3002 \u003cbr\u003e4.\u76e3\u7763\u5f0f\u5b78\u7fd2\u4ef0\u8cf4\u5df2\u6a19\u8a3b\u7684\u8cc7\u6599\u96c6\uff0c\u900f\u904e\u6700\u5c0f\u5316\u8f38\u51fa\u8207\u771f\u5be6\u6a19\u7c64\u4e4b\u9593 \u7684\u5dee\u8ddd\uff0c\u5b78\u7fd2\u8f38\u5165\u8207\u76ee\u6a19\u4e4b\u9593\u7684\u5c0d\u61c9\u51fd\u6578\u3002 \u003cbr\u003e5.\u6240\u6709\u76e3\u7763\u5f0f\u5b78\u7fd2\u4efb\u52d9\u90fd\u5fc5\u9808\u8981\u6709\u5927\u91cf\u5b8c\u6574\u6a19\u8a3b\u8cc7\u6599\uff0c\u5426\u5247\u7121\u6cd5\u9032\u884c\u4efb\u4f55\u6709\u6548\u7684\u6a21\u578b\u8a13\u7df4\u3002 \u003cbr\u003e6.\u975e\u76e3\u7763\u5f0f\u5b78\u7fd2\u4e0d\u9700\u8981\u76ee\u6a19\u8b8a\u6578\uff0c\u50c5\u900f\u904e\u8f38\u5165\u8cc7\u6599\u672c\u8eab\u7684\u7279\u5fb5\u5206\u5e03\u9032\u884c\u6a21\u5f0f\u5b78\u7fd2\u3002", "opts": ["3\u30015\u30016", "1\u30014\u30016", "2\u30014\u30016", "2\u30013\u30015"], "ans": "D", "inferred": false, "expl": "\u3010\u7b54\u6848D\u3011\u932f\u8aa4\u6558\u8ff0\u70ba 2\u30013\u30015\u3002\n\u9673\u8ff01\u30014\u30016 \u6b63\u78ba\uff1b\u9673\u8ff02\u932f\uff08\u76e3\u7763\u5f0f\u4e5f\u53ef\u7528\u65bc\u6709\u6a19\u7c64\u7570\u5e38\u5075\u6e2c\uff09\uff1b\u9673\u8ff03\u932f\uff08\u5c11\u91cf\u6a19\u7c64\u2260\u5b8c\u5168\u8f49\u76e3\u7763\uff0c\u662f\u534a\u76e3\u7763\uff "opts": ["\u6839\u64da\u6b77\u53f2\u4ea4\u6613\u7d00\u9304\u8207\u5df2\u6a19\u8a3b\u7684\u8a50\u6b3a\u6848\u4f8b\uff0c\u8a13\u7df4\u6a21\u578b\u4f86\u5075\u6e2c\u672a\u4f86\u7684\u8a50 \u6b3a\u4ea4\u6613", "\u4f7f\u7528\u91ab\u7642\u6578\u64da\u8207\u75c5\u60a3\u7684\u8a3a\u65b7\u6a19\u7c64\uff0c\u5efa\u7acb\u6a21\u578b\u4ee5\u9810\u6e2c\u75c5\u4eba\u662f\u5426\u7f79\u60a3\u7279 \u5b9a\u75be\u75c5", "\u6839\u64da\u9867\u5ba2\u7684\u6d88\u8cbb\u884c\u70ba\u8207\u7279\u5fb5\uff0c\u5c07\u9867\u5ba2\u81ea\u52d5\u5283\u5206\u70ba\u6578\u500b\u7fa4\u7d44\uff0c\u4ee5\u4fbf\u9032 \u884c\u5dee\u7570\u5316\u884c\u92b7", "\u900f\u904e\u5927\u91cf\u5df2\u6a19\u8a3b\u5f71\u50cf\uff0c\u8a13\u7df4\u6df1\u5ea6\u5b78\u7fd2\u6a21\u578b\u4f86\u8fa8\u8b58\u7167\u7247\u4e2d\u7684\u7269\u4ef6\u7a2e\u985e"], "ans": "C", "inferred": false, "expl": "\u3010\u7b54\u6848C\u3011\u53e2\u96c6\uff08Clustering\uff09\u5178\u578b\u61c9\u7528\u3002\n\u2717(A) \u5df2\u6a19\u8a3b\u8a50\u6b3a\u6848\u4f8b\u662f\u76e3\u7763\u5f0f\u3002\n\u2717(B) \u5df2\u8a3a\u65b7\u6a19\u7c64\u662f\u76e3\u7763\u5f0f\u3002\n\u2713(C) \u6839\u64da\u6d88\u8cbb\u884c\u70ba\u81ea\u52d5\u5206\u7fa4\u4ee5\u5dee\u7570\u5316\u884c\u92b7\uff0c\u6b63\u662f\u975e\u76e3\u7763\u5f0f\u53e2\u96c6\u5178\u578b\u61c9\u7528\u3002\n\u2717(D) \u5df2\u6a19\u8a3b\u5f71\u50cf\u662f\u76e3\u7763\u5f0f\u5206\u985e\u3002"}, {"id": "114_4_s1_45", "exam": "114\u5e74\u7b2c\u56db\u68af\u6b21 \u79d1\u76ee\u4e00\uff08AI\u57fa\u790e\uff09", "examId": "114_4_s1", "no": 45, "q": "\u67d0\u91ab\u9662\u7814\u7a76\u5718\u968a\u8490\u96c6\u4e86\u5927\u91cf\u75c5\u60a3\u7684\u300c\u6536\u7e2e\u58d3\u300d\u6578\u64da\uff0c\u7d93\u6aa2\u9a57\u5f8c\u986f\u793a\u6b64\u6578\u503c\u5927\u81f4\u5448\u73fe\u5e38\u614b\u5206\u5e03\u3002\u5728\u9032\u884c\u5f8c\u7e8c\u6a21\u578b\u5206\u6790\u524d\uff0c\u7814\u7a76\u4eba\u54e1\u5e0c\u671b\u59a5\u5584\u8655\u7406\u53ef\u80fd\u5b58\u5728\u7684\u6975\u7aef\u8840\u58d3\u6578\u503c\u3002\u4e0b\u5217\u54ea\u4e00\u7a2e\u505a\u6cd5\u6700\u70ba\u5408\u9069\uff1f", "opts": ["\u5c07\u6240\u6709\u6975\u7aef\u504f\u9ad8\u6216\u504f\u4f4e\u7684\u8840\u58d3\u6578\u64da\u76f4\u63a5\u522a\u9664\uff0c\u4ee5\u4fdd\u7559\u6700\u5177\u4ee3\u8868\u6027\u7684\u75c5\u60a3\u6a23\u672c", "\u4f7f\u7528\u5c0d\u6578\u8f49\u63db(Log Transformation)\uff0c\u5c07\u6578\u64da\u58d3\u7e2e\u81f3\u66f4\u63a5\u8fd1\u5e38\u614b\uff0c \u4ee5\u964d\u4f4e\u6975\u7aef\u503c\u7684\u5f71\u97ff", "\u900f\u904e Z \u5206\u6578(Z-score)\u6216\u6a19\u6e96\u5dee\u7bc4\u570d\u6aa2\u6e2c\u7570\u5e38\u503c\uff0c\u4e26\u4f9d\u7814\u7a76\u9700\u6c42\u6c7a \u5b9a\u662f\u5426\u8abf\u6574\u6216\u79fb\u9664", "\u5c07\u6aa2\u6e2c\u5230\u7684\u96e2\u7fa4\u503c\u4ee5 Label Encoding \u7de8\u78bc\uff0c\u8f49\u63db\u70ba\u5e8f\u865f\u6a19\u7c64\u4ee5\u907f \u514d\u5f71\u97ff\u539f\u59cb\u5206\u5e03"], "ans": "C", "inferred": false, "expl": "\u3010\u7b54\u6848C\u3011\u5e38\u614b\u5206\u5e03+\u6975\u7aef\u8840\u58d3\u8655\u7406\u3002\n\u2717(A) \u76f4\u63a5\u522a\u9664\u5931\u4ee3\u8868\u6027\u8cc7\u8a0a\u3002\n\u2717(B) Log \u9069\u5408\u504f\u614b\uff0c\u5e38\u614b\u4e0d\u9700\u3002\n\u2713(C) Z-score \u5ba2\u89c0\u8b58\u5225\u7570\u5e38+\u4f9d\u7814\u7a76/\u9818\u57df\u6c7a\u5b9a\u4fdd\u7559\u6216\u8abf\u6574\uff0c\u662f\u6700\u5408\u9069\u505a\u6cd5\u3002\n\u2717(D) Label Encoding \u662f\u985e\u5225\u7de8\u78bc\uff0c\u4e0d\u9069\u5408\u9023\u7e8c\u6578\u503c\u3002"}, {"id": "114_4_s1_46", "exam": "114\u5e74\u7b2c\u56db\u68af\u6b21 \u79d1\u76ee\u4e00\uff08AI\u57fa\u790e\uff09", "examId": "114_4_s1", "no": 46, "q": "\u67d0\u96fb\u5546\u516c\u53f8\u60f3\u9810\u6e2c\u7528\u6236\u662f\u5426\u6703\u8cfc\u8cb7\u7279\u5b9a\u5546\u54c1\uff0c\u8cc7\u6599\u4e2d\u5305\u542b\u591a\u7a2e\u7528\u6236\u5c6c\u6027\u8207\u884c\u70ba\u7279\u5fb5\u3002\u5206\u6790\u5e2b\u5e0c\u671b\u9078\u51fa\u5c0d\u8cfc\u8cb7\u7d50\u679c\u6700\u6709\u9810\u6e2c\u50f9\u503c\u7684\u7279\u5fb5\uff0c\u4ee5\u63d0 \u5347\u6a21\u578b\u6548\u80fd\u3002\u4e0b\u5217\u54ea\u4e00\u7a2e\u63cf\u8ff0\u6700\u7b26\u5408\u76e3\u7763\u5f0f\u7279\u5fb5\u9078\u64c7(Supervised Feature Selection)\u7684\u6982\u5ff5\uff1f", "opts": ["\u6839\u64da\u7279\u5fb5\u7684\u6574\u9ad4\u5206\u5e03\u3001\u8b8a\u7570\u5ea6\u6216\u8cc7\u8a0a\u91cf\u9032\u884c\u7be9\u9078\uff0c\u800c\u4e0d\u76f4\u63a5\u53c3\u8003\u76ee \u6a19\u8b8a\u6578", "\u8a55\u4f30\u6bcf\u500b\u7279\u5fb5\u8207\u76ee\u6a19\u8b8a\u6578\u4e4b\u9593\u7684\u76f8\u95dc\u6027\uff0c\u9078\u64c7\u5c0d\u9810\u6e2c\u7d50\u679c\u8ca2\u737b\u6700\u5927 \u7684\u7279\u5fb5", "\u4f7f\u7528\u6a21\u578b\u8a55\u4f30\u7279\u5fb5\u5c0d\u9810\u6e2c\u7d50\u679c\u7684\u91cd\u8981\u6027\uff0c\u4e26\u4fdd\u7559\u5c0d\u76ee\u6a19\u8b8a\u6578\u5f71\u97ff\u8f03 \u5927\u7684\u6b04\u4f4d", "\u5c07\u7279\u5fb5\u900f\u904e\u964d\u7dad\u65b9\u6cd5(\u5982 PCA)\u8f49\u63db\u70ba\u65b0\u7279\u5fb5\uff0c\u518d\u7528\u65bc\u6a21\u578b\u8a13\u7df4"], "ans": "B", "inferred": false, "expl": "\u3010\u7b54\u6848B\u3011\u76e3\u7763\u5f0f\u7279\u5fb5\u9078\u64c7\u6982\u5ff5\u3002\n\u2717(A) \u4e0d\u53c3\u8003\u76ee\u6a19\u5c6c\u975e\u76e3\u7763\u5f0f\u7279\u5fb5\u9078\u64c7\u3002\n\u2713(B) \u8a55\u4f30\u7279\u5fb5\u8207\u76ee\u6a19\u8b8a\u6578\u7684\u76f8\u95dc\u6027\uff0c\u9078\u5c0d\u9810\u6e2c\u8ca2\u737b\u6700\u5927\u7684\u7279\u5fb5\uff0c\u6b63\u662f\u76e3\u7763\u5f0f\u7279\u5fb5\u9078\u64c7\u6838\u5fc3\u3002\n\u2717(C) \u7528\u6a21\u578b\u8a55\u4f30\u91cd\u8981\u6027\u4e5f\u7b97\uff08Embedded \u6cd5\uff09\uff0c\u4f46\u672c\u984c\u4ee5 B \u70ba\u6700\u76f4\u63a5\u5b9a\u7fa9\u3002\n\u2717(D) PCA \u662f\u964d\u7dad\u8f49\u63db\uff0c\u975e\u7279\u5fb5\u9078\u64c7\u3002"}, {"id": "114_4_s1_47", "exam": "114\u5e74\u7b2c\u56db\u68af\u6b21 \u79d1\u76ee\u4e00\uff08AI\u57fa\u790e\uff09", "examId": "114_4_s1", "no": 47, "q": "\u5728\u8a13\u7df4\u795e\u7d93\u7db2\u8def\u6642\uff0c\u70ba\u4e86\u63d0\u5347\u6a21\u578b\u6536\u6582\u901f\u5ea6\u8207\u7a69\u5b9a\u6027\uff0c\u907f\u514d\u68af\u5ea6\u6d88\u5931\u6216\u68af\u5ea6\u7206\u70b8\uff0c\u4e0b\u5217\u54ea\u4e00\u7a2e\u505a\u6cd5\u6700\u5e38\u88ab\u4f7f\u7528\uff1f", "opts": ["\u5c0d\u8f38\u5165\u8cc7\u6599\u9032\u884c\u96a8\u6a5f\u65cb\u8f49\u6216\u6c34\u5e73\u7ffb\u8f49\uff0c\u4ee5\u589e\u52a0\u8cc7\u6599\u591a\u6a23\u6027", "\u9078\u7528 ReLU \u6216\u5176\u8b8a\u9ad4\u4f5c\u70ba\u96b1\u85cf\u5c64\u7684\u555f\u52d5\u51fd\u6578\uff0c\u4ee5\u6539\u5584\u68af\u5ea6\u50b3\u64ad", "\u6e1b\u5c11\u6a23\u672c\u91cf\u63d0\u5347\u8a13\u7df4\u901f\u5ea6", "\u5c0d\u76ee\u6a19\u8b8a\u6578\u6216\u7279\u5fb5\u9032\u884c\u6a19\u6e96\u5316"], "ans": "B", "inferred": false, "expl": "\u3010\u7b54\u6848B\u3011\u907f\u514d\u68af\u5ea6\u6d88\u5931/\u7206\u70b8\u3002\n\u2717(A) \u8cc7\u6599\u589e\u5f37\u662f\u8a13\u7df4\u6a23\u672c\u5c64\u9762\u3002\n\u2713(B) ReLU \u53ca\u5176\u8b8a\u9ad4\u5728\u6b63\u5340\u9593\u68af\u5ea6\u70ba\u5e38\u6578\uff0c\u4e0d\u98fd\u548c\uff0c\u6709\u6548\u6539\u5584\u68af\u5ea6\u50b3\u64ad\uff0c\u6b63\u89e3\u3002\n\u2717(C) \u6e1b\u6a23\u672c\u53cd\u800c\u50b7\u5b78\u7fd2\u3002\n\u2717(D) \u6a19\u6e96\u5316\u96d6\u4e5f\u6709\u5e6b\u52a9\u4f46\u4e0d\u662f\u76f4\u63a5\u91dd\u5c0d\u68af\u5ea6\u50b3\u64ad\u3002"}, {"id": "114_4_s1_48", "exam": "114\u5e74\u7b2c\u56db\u68af\u6b21 \u79d1\u76ee\u4e00\uff08AI\u57fa\u790e\uff09", "examId": "114_4_s1", "no": 48, "q": "\u82e5\u5e0c\u671b\u6aa2\u8996\u67d0\u4e00\u9023\u7e8c\u578b\u6578\u64da\u7684\u5206\u5e03\u60c5\u5f62(\u5982\u96c6\u4e2d\u7a0b\u5ea6\u3001\u504f\u614b\u6216\u662f\u5426\u5448\u73fe \u591a\u5cf0)\uff0c\u4e0b\u5217\u54ea\u4e00\u7a2e\u61c9\u7528\u60c5\u5883\u6700\u9069\u5408\u4f7f\u7528\u76f4\u65b9\u5716(Histogram) \u4f86\u9032\u884c\u5206\u6790\uff1f", "opts": ["\u63a2\u8a0e\u9867\u5ba2\u5e74\u9f61\u8cc7\u6599\u7684\u6574\u9ad4\u5206\u5e03\u7279\u5fb5\uff0c\u4e26\u6aa2\u8996\u662f\u5426\u5b58\u5728\u7570\u5e38\u96c6\u4e2d\u6216\u5206 \u6563\u73fe\u8c61", "\u6bd4\u8f03\u4e0d\u540c\u5546\u54c1\u5728\u5404\u6708\u4efd\u7684\u92b7\u552e\u984d\u8b8a\u5316\u8da8\u52e2\uff0c\u4ee5\u89c0\u5bdf\u5b63\u7bc0\u6027\u6ce2\u52d5", "\u8ffd\u8e64\u516c\u53f8\u8fd1\u4e00\u5e74\u71df\u6536\u7684\u6642\u9593\u5e8f\u5217\u8b8a\u5316\uff0c\u4ee5\u4e86\u89e3\u6574\u9ad4\u6210\u9577\u8da8\u52e2", "\u6aa2\u8996\u7522\u54c1\u50f9\u683c\u8207\u6708\u92b7\u552e\u91cf\u4e4b\u9593\u7684\u95dc\u806f\u6027\uff0c\u4ee5\u8a55\u4f30\u662f\u5426\u5177\u7dda\u6027\u76f8\u95dc"], "ans": "A", "inferred": false, "expl": "\u3010\u7b54\u6848A\u3011\u76f4\u65b9\u5716\u6700\u9069\u60c5\u5883\u3002\n\u2713(A) \u9867\u5ba2\u5e74\u9f61\u5206\u5e03\u7279\u5fb5\uff08\u96c6\u4e2d\u3001\u5206\u6563\u3001\u504f\u614b\u3001\u591a\u5cf0\uff09\u6b63\u662f\u76f4\u65b9\u5716\u7684\u5178\u578b\u61c9\u7528\uff0c\u6b63\u89e3\u3002\n\u2717(B) \u6708\u92b7\u552e\u8b8a\u5316\u9069\u5408\u6298\u7dda/\u9577\u689d\u3002\n\u2717(C) \u6642\u9593\u5e8f\u5217\u8b8a\u5316\u9069\u5408\u6298\u7dda\u3002\n\u2717(D) \u5169\u8b8a\u6578\u95dc\u806f\u9069\u5408\u6563\u4f48\u5716\u3002"}, {"id": "114_4_s1_49", "exam": "114\u5e74\u7b2c\u56db\u68af\u6b21 \u79d1\u76ee\u4e00\uff08AI\u57fa\u790e\uff09", "examId": "114_4_s1", "no": 49, "q": "\u4e0b\u5217\u4f55\u8005\u4e26\u975e\u6211\u570b\u6578\u4f4d\u767c\u5c55\u90e8 AI \u7522\u54c1\u8207\u8a55\u6e2c\u4e2d\u5fc3\u5728\u8a55\u4f30\u5927\u578b\u8a9e\u8a00\u6a21\u578b\u5b89\u5168\u6027\u6642\uff0c\u6240\u6307\u51fa\u7684\u5e38\u898b\u4f7f\u7528\u6307\u6a19\uff1f", "opts": ["\u8cc7\u6599\u8907\u96dc\u6027", "\u4e8b\u5be6\u6b63\u78ba\u6027", "\u504f\u898b\u8207\u6b67\u8996", "\u60e1\u610f\u8207\u6feb\u7528\u53ef\u80fd\u6027"], "ans": "A", "inferred": false, "expl": "\u3010\u7b54\u6848A\u3011\u975e LLM \u5b89\u5168\u6027\u6307\u6a19\u3002\n\u2713(A) \u300c\u8cc7\u6599\u8907\u96dc\u6027\u300d\u4e0d\u5728\u5b98\u65b9\u5b89\u5168\u6027\u8a55\u6e2c\u6307\u6a19\u4e2d\uff0c\u6b63\u89e3\u3002\n\u2717(B) \u4e8b\u5be6\u6b63\u78ba\u6027\u662f\u6307\u6a19\u3002\n\u2717(C) \u504f\u898b\u8207\u6b67\u8996\u662f\u6307\u6a19\u3002\n\u2717(D) \u60e1\u610f\u8207\u6feb\u7528\u53ef\u80fd\u6027\u662f\u6307\u6a19\u3002"}, {"id": "114_4_s1_50", "exam": "114\u5e74\u7b2c\u56db\u68af\u6b21 \u79d1\u76ee\u4e00\uff08AI\u57fa\u790e\uff09", "examId": "114_4_s1", "no": 50, "q": "\u67d0\u96f2\u7aef\u670d\u52d9\u516c\u53f8\u8a08\u756b\u5c07\u5927\u578b\u8a9e\u8a00\u6a21\u578b\u90e8\u7f72\u65bc\u7dda\u4e0a\u7cfb\u7d71\uff0c\u4e26\u4ee5\u6279\u6b21\u63a8\u8ad6 (Batch Inference)\u65b9\u5f0f\u8655\u7406\u6bcf\u65e5\u4e0a\u767e\u842c\u7b46\u7528\u6236\u8acb\u6c42\u3002\u5c08\u6848\u5718\u968a\u5728\u8a55 \u4f30\u53ef\u80fd\u9047\u5230\u7684\u6311\u6230\u6642\uff0c\u4e0b\u5217\u54ea\u4e00\u9805\u901a\u5e38\u4e0d\u6703\u88ab\u8996\u70ba\u6279\u6b21\u63a8\u8ad6\u968e\u6bb5\u7684\u4e3b\u8981\u96e3\u984c\uff1f", "opts": ["\u5982\u4f55\u78ba\u4fdd\u8a13\u7df4\u8a9e\u6599\u7684\u6db5\u84cb\u6027\u8207\u6a19\u8a3b\u54c1\u8cea\uff0c\u4ee5\u907f\u514d\u6a21\u578b\u504f\u5dee\u5f71\u97ff\u8f38\u51fa", "\u7576\u6279\u6b21\u898f\u6a21\u589e\u5927\u6642\uff0c\u5982\u4f55\u964d\u4f4e\u63a8\u8ad6\u5ef6\u9072\u4e26\u4fdd\u6301\u5373\u6642\u56de\u61c9\u80fd\u529b", "\u5728\u63a8\u8ad6\u904e\u7a0b\u4e2d\uff0c\u6709\u6548\u7ba1\u7406\u8207\u5206\u914d\u9f90\u5927\u7684\u8f38\u5165\u8cc7\u6599\u91cf\u4ee5\u907f\u514d\u8cc7\u6e90\u58c5\u585e", "\u5728\u53e2\u96c6\u74b0\u5883\u4e2d\u7cbe\u78ba\u5b89\u6392\u63a8\u8ad6\u4efb\u52d9\uff0c\u4ee5\u63d0\u5347 GPU/TPU \u7b49\u786c\u9ad4\u8cc7\u6e90\u7684\u5229\u7528\u7387"], "ans": "A", "inferred": false, "expl": "\u3010\u7b54\u6848A\u3011\u975e\u6279\u6b21\u63a8\u8ad6\u4e3b\u8981\u6311\u6230\u3002\n\u2713(A) \u300c\u78ba\u4fdd\u8a13\u7df4\u8a9e\u6599\u6db5\u84cb\u6027\u8207\u6a19\u8a3b\u54c1\u8cea\u300d\u5c6c\u8a13\u7df4\u968e\u6bb5\u554f\u984c\uff0c\u4e0d\u662f\u6279\u6b21\u63a8\u8ad6\u6311\u6230\uff0c\u6b63\u89e3\u3002\n\u2717(B) \u6279\u6b21\u898f\u6a21\u589e\u5927\u964d\u5ef6\u9072\u662f\u63a8\u8ad6\u6311\u6230\u3002\n\u2717(C) \u7ba1\u7406\u8f38\u5165\u8cc7\u6599\u91cf\u662f\u63a8\u8ad6\u6311\u6230\u3002\n\u2717(D) GPU/TPU \u8cc7\u6e90\u5b89\u6392\u662f\u63a8\u8ad6\u6311\u6230\u3002"}, {"id": "114_4_s2_1", "exam": "114\u5e74\u7b2c\u56db\u68af\u6b21 \u79d1\u76ee\u4e8c\uff08\u751f\u6210\u5f0fAI\uff09", "examId": "114_4_s2", "no": 1, "q": "\u5728 Low Code \u5e73\u53f0\u7684\u958b\u767c\u61c9\u7528\u8a2d\u8a08\u4e2d\uff0c\u95dc\u65bc\u300c\u6a21\u578b(Model)\u300d\uff0c\u4e0b\u5217\u6558\u8ff0 \u4f55\u8005\u6700\u7b26\u5408\u5be6\u969b\u60c5\u6cc1\uff1f", "opts": ["\u6a21\u578b\u50c5\u626e\u6f14\u8a2d\u8a08\u8996\u89ba\u5316\u7684\u8f14\u52a9\u5de5\u5177\uff0c\u5c0d\u61c9\u7528\u908f\u8f2f\u7684\u5f71\u97ff\u6709\u9650", "\u6a21\u578b\u662f\u7528\u4f86\u62bd\u8c61\u63cf\u8ff0\u8cc7\u6599\u7d50\u69cb\u3001\u696d\u52d9\u6d41\u7a0b\u8207\u4ecb\u9762\u908f\u8f2f\u7684\u6838\u5fc3\u5143\u7d20\uff0c \u5f71\u97ff\u61c9\u7528\u7684\u8a2d\u8a08\u8207\u7dad\u8b77", "\u6a21\u578b\u50c5\u4f9d\u5faa UML(Unified Modeling Language)\u7b49\u50b3\u7d71\u5efa\u6a21\u65b9\u5f0f\uff0c \u7f3a\u4e4f\u91dd\u5c0d Low Code \u74b0\u5883\u7684\u5ef6\u5c55\u6027", "\u6a21\u578b\u5728 Low Code \u5e73\u53f0\u4e2d\u5df2\u88ab\u81ea\u52d5\u7a0b\u5f0f\u78bc\u751f\u6210\u5168\u9762\u53d6\u4ee3\uff0c\u5be6\u969b\u50f9\u503c\u6709\u9650"], "ans": "B", "inferred": false, "expl": "\u3010\u7b54\u6848B\u3011Low-Code\u300c\u6a21\u578b\u300d\u7684\u89d2\u8272\u3002\n\u2717(A) \u6a21\u578b\u4e0d\u53ea\u662f\u8996\u89ba\u5316\u8f14\u52a9\u3002\n\u2713(B) \u6a21\u578b\u662f\u62bd\u8c61\u63cf\u8ff0\u8cc7\u6599\u7d50\u69cb\u3001\u696d\u52d9\u6d41\u7a0b\u8207\u4ecb\u9762\u908f\u8f2f\u7684\u6838\u5fc3\u5143\u7d20\uff0c\u5f71\u97ff\u8a2d\u8a08\u8207\u7dad\u8b77\uff0c\u6b63\u89e3\u3002\n\u2717(C) \u4e0d\u9650 UML \u7b49\u50b3\u7d71\u5efa\u6a21\u3002\n\u2717(D) \u4e26\u672a\u88ab\u81ea\u52d5\u7a0b\u5f0f\u78bc\u751f\u6210\u5168\u9762\u53d6\u4ee3\u3002"}, {"id": "114_4_s2_2", "exam": "114\u5e74\u7b2c\u56db\u68af\u6b21 \u79d1\u76ee\u4e8c\uff08\u751f\u6210\u5f0fAI\uff09", "examId": "114_4_s2", "no": 2, "q": "\u4f01\u696d\u5728\u5c0e\u5165\u751f\u6210\u5f0f AI \u5e73\u53f0\u6642\uff0c\u5f80\u5f80\u9700\u8981\u5229\u7528\u5206\u6563\u65bc\u4e0d\u540c\u90e8\u9580\u6216\u6a5f\u69cb\u4e2d\u7684\u5927\u91cf\u654f\u611f\u6587\u672c\u8cc7\u6599\u3002\u82e5\u5e0c\u671b\u5728\u78ba\u4fdd\u96b1\u79c1\u7684\u524d\u63d0\u4e0b\uff0c\u4ecd\u80fd\u8b93\u6a21\u578b\u6301\u7e8c\u512a \u5316\u4e26\u964d\u4f4e\u8cc7\u6599\u5916\u6d29\u98a8\u96aa\uff0c\u4e0b\u5217\u54ea\u4e00\u7a2e\u65b9\u6cd5\u6700\u9069\u5408\uff1f", "opts": ["\u540c\u614b\u52a0\u5bc6(Homomorphic Encryption)", "\u5b89\u5168\u591a\u65b9\u8a08\u7b97(Secure Multi-party Computation)", "\u96f6\u77e5\u8b58\u8b49\u660e(Zero-knowledge Proofs)", "\u806f\u90a6\u5b78\u7fd2(Federated Learning)"], "ans": "D", "inferred": false, "expl": "\u3010\u7b54\u6848D\u3011\u5206\u6563\u654f\u611f\u8cc7\u6599\u6301\u7e8c\u512a\u5316\u3002\n\u2717(A) \u540c\u614b\u52a0\u5bc6\u7528\u65bc\u8a08\u7b97\u4fdd\u8b77\u3002\n\u2717(B) \u5b89\u5168\u591a\u65b9\u8a08\u7b97\u7528\u65bc\u5354\u4f5c\u8a08\u7b97\u3002\n\u2717(C) \u96f6\u77e5\u8b58\u8b49\u660e\u7528\u65bc\u9a57\u8b49\u3002\n\u2713(D) \u806f\u90a6\u5b78\u7fd2\u672c\u5730\u8a13\u7df4\u3001\u50c5\u5171\u4eab\u6a21\u578b\u66f4\u65b0\uff0c\u662f\u517c\u9867\u6301\u7e8c\u512a\u5316\u8207\u907f\u514d\u5916\u6d29\u7684\u6700\u4f73\u65b9\u6848\u3002"}, {"id": "114_4_s2_3", "exam": "114\u5e74\u7b2c\u56db\u68af\u6b21 \u79d1\u76ee\u4e8c\uff08\u751f\u6210\u5f0fAI\uff09", "examId": "114_4_s2", "no": 3, "q": "\u67d0\u4f01\u696d\u5229\u7528 No Code/Low Code \u5e73\u53f0\u958b\u767c\u5167\u90e8\u71df\u904b\u7cfb\u7d71\u3002\u70ba\u78ba\u4fdd\u7cfb\u7d71\u5728\u8de8\u90e8\u9580\u6d41\u7a0b\u8207\u5916\u90e8\u670d\u52d9\u6574\u5408\u4e0b\u4ecd\u5177\u826f\u597d\u7684\u53ef\u6e2c\u8a66\u6027(Testability)\uff0c\u4e0b \u5217\u54ea\u4e00\u9805\u4f5c\u6cd5\u6700\u70ba\u5408\u9069\uff1f", "opts": ["\u4f9d\u8cf4 No Code/Low Code \u5e73\u53f0\u63d0\u4f9b\u7684\u5373\u6642\u9810\u89bd\u8207\u57fa\u672c\u55ae\u5143\u6e2c\u8a66\u529f\u80fd\uff0c \u5feb\u901f\u9a57\u8b49\u5e38\u898b\u6d41\u7a0b", "\u5c0e\u5165\u53ef\u91cd\u8907\u57f7\u884c\u7684\u81ea\u52d5\u5316\u6e2c\u8a66\u6d41\u7a0b\uff0c\u4e26\u900f\u904e API \u6216\u670d\u52d9\u865b\u64ec\u5316\u9032 \u884c\u6a21\u7d44\u5316\u9a57\u8b49", "\u5c07\u6e2c\u8a66\u805a\u7126\u65bc\u4f7f\u7528\u8005\u4ecb\u9762\u4e92\u52d5\u8207\u64cd\u4f5c\u6d41\u7a0b\u9a57\u8b49\uff0c\u6aa2\u67e5\u7cfb\u7d71\u8868\u9762\u529f \u80fd", "\u4f9d\u9760\u4f7f\u7528\u8005\u56de\u994b\u8207\u6b63\u5f0f\u4e0a\u7dda\u5f8c\u7684\u76e3\u63a7\u8cc7\u6599\uff0c\u4f5c\u70ba\u4fee\u6b63\u4f9d\u64da"], "ans": "B", "inferred": false, "expl": "\u3010\u7b54\u6848B\u3011\u8de8\u90e8\u9580+\u5916\u90e8\u670d\u52d9\u6574\u5408\u7684\u53ef\u6e2c\u8a66\u6027\u3002\n\u2717(A) \u5e73\u53f0\u9810\u89bd+\u57fa\u672c\u55ae\u5143\u6e2c\u8a66\u4e0d\u8db3\u3002\n\u2713(B) \u81ea\u52d5\u5316\u6e2c\u8a66 + API/\u670d\u52d9\u865b\u64ec\u5316\u9032\u884c\u6a21\u7d44\u5316\u9a57\u8b49\uff0c\u662f\u6700\u4f73\u5be6\u8e10\u3002\n\u2717(C) \u4ecb\u9762\u6e2c\u8a66\u4e0d\u89e3\u5f8c\u7aef\u6574\u5408\u3002\n\u2717(D) \u4e0a\u7dda\u5f8c\u76e3\u63a7\u592a\u88ab\u52d5\u3002"}, {"id": "114_4_s2_4", "exam": "114\u5e74\u7b2c\u56db\u68af\u6b21 \u79d1\u76ee\u4e8c\uff08\u751f\u6210\u5f0fAI\uff09", "examId": "114_4_s2", "no": 4, "q": "\u67d0\u793e\u4ea4\u5e73\u53f0\u5617\u8a66\u7d50\u5408\u81ea\u52d5\u63d0\u793a\u5de5\u7a0b(Automatic Prompt Engineer,APE)\u8207\u5716\u63d0\u793a(Graph Prompting)\uff0c\u8b93 AI \u5354\u52a9\u5206\u6790\u4f7f\u7528\u8005\u4e4b\u9593\u7684\u4e92\u52d5\u95dc\u4fc2\u3002\u5728\u9019\u500b\u904e\u7a0b\u4e2d\uff0c\u4e0b\u5217\u4f55\u8005\u70ba\u6700\u53ef\u80fd\u9047\u5230\u7684\u6311\u6230\uff1f", "opts": ["\u5716\u7d50\u69cb\u8f49\u63db\u70ba\u6587\u5b57\u63d0\u793a\u6642\uff0c\u53ef\u80fd\u5c0e\u81f4\u90e8\u5206\u95dc\u806f\u8cc7\u8a0a\u907a\u5931", "APE \u5728\u5716\u8cc7\u6599\u4e0a\u7121\u6cd5\u7522\u751f\u4efb\u4f55\u63d0\u793a\u5167\u5bb9", "\u5716\u8f49\u6587\u5b57\u5f8c\u80fd\u5b8c\u6574\u4fdd\u7559\u6240\u6709\u4e0a\u4e0b\u6587\uff0c\u5c0d\u63a8\u7406\u4e0d\u9020\u6210\u5f71\u97ff", "Graph Prompting \u50c5\u80fd\u8655\u7406\u7dda\u6027\u8def\u5f91\uff0c\u9650\u5236\u591a\u5206\u652f\u63a2\u7d22"], "ans": "A", "inferred": false, "expl": "\u3010\u7b54\u6848A\u3011APE + Graph Prompting \u6311\u6230\u3002\n\u2713(A) \u5716\u7d50\u69cb\u8f49\u6587\u5b57\u63d0\u793a\u6642\uff0c\u8907\u96dc\u95dc\u806f\uff08\u591a\u8df3\u8def\u5f91\u3001\u7a20\u5bc6\u9023\u63a5\uff09\u53ef\u80fd\u907a\u5931\uff0c\u6b63\u89e3\u3002\n\u2717(B) APE \u4ecd\u53ef\u5728\u5716\u8cc7\u6599\u4e0a\u7522\u751f\u63d0\u793a\u3002\n\u2717(C) \u5716\u8f49\u6587\u5b57\u4e0d\u6703\u5b8c\u6574\u4fdd\u7559\u6240\u6709\u4e0a\u4e0b\u6587\u3002\n\u2717(D) Graph Prompting \u4e0d\u50c5\u9650\u7dda\u6027\u8def\u5f91\u3002"}, {"id": "114_4_s2_5", "exam": "114\u5e74\u7b2c\u56db\u68af\u6b21 \u79d1\u76ee\u4e8c\uff08\u751f\u6210\u5f0fAI\uff09", "examId": "114_4_s2", "no": 5, "q": "\u5728\u8d85\u9577\u4e0a\u4e0b\u6587\u4efb\u52d9\u4e2d\u4f7f\u7528\u81ea\u52d5\u63d0\u793a\u5de5\u7a0b(Automatic Prompt Engineer,APE)\u6642\uff0c\u53ef\u80fd\u9762\u81e8\u7684\u6700\u5927\u9650\u5236\u662f\u4ec0\u9ebc\uff1f", "opts": ["\u8fed\u4ee3\u512a\u5316\u96e3\u4ee5\u56e0\u61c9\u4e0a\u4e0b\u6587\u7684\u4e0d\u65b7\u8b8a\u52d5\uff0c\u5c0e\u81f4\u8abf\u6574\u5931\u6548", "\u6a21\u578b\u7684\u8a18\u61b6\u5bb9\u91cf\u6709\u9650\uff0c\u7121\u6cd5\u5b8c\u6574\u4fdd\u7559\u6240\u6709\u9577\u7bc7\u8cc7\u8a0a", "\u63d0\u793a\u5167\u5bb9\u96e3\u4ee5\u6709\u6548\u5206\u89e3\uff0c\u7121\u6cd5\u652f\u63f4\u8907\u96dc\u4efb\u52d9\u62c6\u89e3", "\u56de\u994b\u6a5f\u5236\u901a\u5e38\u50c5\u91dd\u5c0d\u5c40\u90e8\u7247\u6bb5\uff0c\u96e3\u4ee5\u5168\u9762\u8a55\u4f30\u6700\u7d42\u8f38\u51fa\u54c1\u8cea"], "ans": "D", "inferred": false, "expl": "\u3010\u7b54\u6848D\u3011\u8d85\u9577\u4e0a\u4e0b\u6587 APE \u7684\u9650\u5236\u3002\n\u2717(A) \u8fed\u4ee3\u512a\u5316\u4e0d\u6703\u76f4\u63a5\u5931\u6548\u3002\n\u2717(B) \u8a18\u61b6\u5bb9\u91cf\u6709\u9650\u662f\u9650\u5236\u4f46\u975e\u300c\u6700\u5927\u300d\u3002\n\u2717(C) \u63d0\u793a\u5206\u89e3\u53ef\u4ee5\u505a\u3002\n\u2713(D) \u56de\u994b\u6a5f\u5236\u50c5\u91dd\u5c0d\u5c40\u90e8\u7247\u6bb5\uff0c\u96e3\u4ee5\u5168\u9762\u8a55\u4f30\u6700\u7d42\u8f38\u51fa\u54c1\u8cea\uff0c\u662f\u6700\u5927\u9650\u5236\u3002"}, {"id": "114_4_s2_6", "exam": "114\u5e74\u7b2c\u56db\u68af\u6b21 \u79d1\u76ee\u4e8c\uff08\u751f\u6210\u5f0fAI\uff09", "examId": "114_4_s2", "no": 6, "q": "\u67d0\u8a2d\u8a08\u5718\u968a\u8a08\u756b\u5728\u77ed\u6642\u9593\u5167\u5b8c\u6210\u4e00\u6b3e\u884c\u52d5\u61c9\u7528\u7a0b\u5f0f\uff0c\u5fc5\u9808\u540c\u6642\u9054\u5230\u9ad8 \u5ea6\u500b\u4eba\u5316\u9ad4\u9a57\u3001\u5feb\u901f\u751f\u6210\u4ecb\u9762\u8207\u884c\u92b7\u5167\u5bb9\u81ea\u52d5\u7522\u51fa\u7b49\u9700\u6c42\u3002\u82e5\u7d50\u5408 No Code/Low Code \u5e73\u53f0\u8207\u751f\u6210\u5f0f AI \u6280\u8853\uff0c\u4ee5\u4e0b\u54ea\u4e00\u7a2e\u6574\u5408\u7b56\u7565\u6700\u80fd\u7b26\u5408 \u76ee\u6a19\uff1f", "opts": ["\u4f7f\u7528\u751f\u6210\u5f0f AI \u81ea\u52d5\u7522\u751f API \u547c\u53eb\u8207\u5143\u4ef6\u914d\u7f6e\uff0c\u4e26\u7531\u958b\u767c\u8005\u624b\u52d5\u6574 \u5408\u81f3 No Code \u5e73\u53f0\u6d41\u7a0b", "\u900f\u904e\u751f\u6210\u5f0f AI \u5728 No Code \u5e73\u53f0\u4e2d\u81ea\u52d5\u5efa\u7acb\u4ecb\u9762\u6a21\u677f\uff0c\u4e26\u7d50\u5408\u4f7f\u7528 \u8005\u6578\u64da\u5373\u6642\u751f\u6210\u500b\u4eba\u5316\u529f\u80fd\u8207\u884c\u92b7\u63a8\u64ad\u5167\u5bb9", "\u5728 No Code \u5e73\u53f0\u4e2d\u5c0e\u5165\u751f\u6210\u5f0f AI\uff0c\u5feb\u901f\u5efa\u7acb\u8de8\u5c08\u6848\u53ef\u91cd\u7528\u7684\u901a\u7528\u6a21 \u7d44\uff0c\u5c08\u6ce8\u65bc\u63d0\u5347\u958b\u767c\u901f\u5ea6", "\u5728 No Code \u5e73\u53f0\u4e2d\u5b8c\u5168\u4f9d\u8cf4\u751f\u6210\u5f0f AI \u81ea\u52d5\u7522\u751f\u6240\u6709\u61c9\u7528\u529f\u80fd\u8207\u6d41 \u7a0b\uff0c\u4e0d\u7d93\u4eba\u5de5\u8a2d\u8a08\u6216\u9a57\u8b49"], "ans": "B", "inferred": false, "expl": "\u3010\u7b54\u6848B\u3011\u9ad8\u5ea6\u500b\u4eba\u5316+\u5feb\u901f\u4
