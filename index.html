\u6548\u679c\u3002\n\u2717(C) GAN+\u4eba\u5de5\u7be9\u9078\u592a\u6162\u3002\n\u2717(D) \u898f\u5247\u5f0f\u66ff\u63db\u6b7b\u677f\u3002"}, {"id": "114_4_s2_16", "exam": "114\u5e74\u7b2c\u56db\u68af\u6b21 \u79d1\u76ee\u4e8c\uff08\u751f\u6210\u5f0fAI\uff09", "examId": "114_4_s2", "no": 16, "q": "\u5728\u5efa\u7f6e\u591a\u4ee3\u7406\u5927\u578b\u8a9e\u8a00\u6a21\u578b(Multi-agent LLMs)\u7cfb\u7d71\u6642\uff0c\u5982\u679c\u6c92\u6709\u6e05 \u695a\u5b9a\u7fa9\u6bcf\u500b\u4ee3\u7406\u7684\u4efb\u52d9\u555f\u52d5\u689d\u4ef6\u548c\u89d2\u8272\u5206\u5de5\uff0c\u6700\u53ef\u80fd\u51fa\u73fe\u4ec0\u9ebc\u554f\u984c\uff1f", "opts": ["\u56de\u8986\u5167\u5bb9\u524d\u5f8c\u4e0d\u9023\u8cab\uff0c\u7cfb\u7d71\u908f\u8f2f\u65b7\u88c2", "\u4e0d\u540c\u4ee3\u7406\u7684\u7b54\u6848\u4e92\u76f8\u885d\u7a81\uff0c\u7121\u6cd5\u5224\u65b7\u6700\u7d42\u6c7a\u7b56", "\u7cfb\u7d71\u9677\u5165\u7121\u9650\u5c0d\u8a71\u5faa\u74b0\uff0c\u5c0e\u81f4\u8cc7\u6e90\u8017\u76e1", "\u591a\u500b\u4ee3\u7406\u91cd\u8907\u505a\u540c\u6a23\u7684\u4efb\u52d9\uff0c\u9020\u6210\u6548\u7387\u4f4e\u843d"], "ans": "D", "inferred": false, "expl": "\u3010\u7b54\u6848D\u3011\u591a\u4ee3\u7406\u7f3a\u555f\u52d5\u689d\u4ef6\u8207\u5206\u5de5\u3002\n\u2717(A) \u4e0d\u4e00\u5b9a\u4e0d\u9023\u8cab\u3002\n\u2717(B) \u7b54\u6848\u885d\u7a81\u975e\u4e3b\u8981\u3002\n\u2717(C) \u7121\u9650\u5faa\u74b0\u975e\u5178\u578b\u3002\n\u2713(D) \u591a\u4ee3\u7406\u53ef\u80fd\u63a5\u5230\u76f8\u540c\u89f8\u767c\u689d\u4ef6\u3001\u91cd\u8907\u57f7\u884c\u540c\u4efb\u52d9\uff0c\u9020\u6210\u6548\u7387\u4f4e\u843d\uff0c\u6b63\u89e3\u3002"}, {"id": "114_4_s2_17", "exam": "114\u5e74\u7b2c\u56db\u68af\u6b21 \u79d1\u76ee\u4e8c\uff08\u751f\u6210\u5f0fAI\uff09", "examId": "114_4_s2", "no": 17, "q": "\u67d0\u516c\u53f8\u90e8\u7f72\u7d50\u5408 Fine-tuning \u8207\u6aa2\u7d22\u589e\u5f37\u751f\u6210(RAG)\u7684\u8a9e\u8a00\u6a21\u578b\u7cfb\u7d71 \u4f5c\u70ba\u5167\u90e8\u6587\u4ef6\u52a9\u7406\u3002\u7cfb\u7d71\u9700\u540c\u6642\u78ba\u4fdd\u56de\u8986\u8a9e\u6c23\u4e00\u81f4\u3001\u80fd\u5373\u6642\u67e5\u8a62\u6bcf\u65e5\u65b0 \u589e\u6587\u4ef6\u3001\u7dad\u6301\u6548\u80fd\u7a69\u5b9a\uff0c\u4e26\u907f\u514d\u983b\u7e41\u91cd\u65b0\u8a13\u7df4\u3002\u5728\u9577\u671f\u7dad\u8b77\u8207\u6548\u80fd\u5e73\u8861 \u4e0b\uff0c\u4e0b\u5217\u54ea\u4e00\u7a2e\u7b56\u7565\u6700\u5408\u9069\uff1f", "opts": ["\u6bcf\u9031\u91cd\u65b0 Fine-tune \u6a21\u578b\uff0c\u5c07\u65b0\u6587\u4ef6\u6574\u5408\u9032\u6a21\u578b\u77e5\u8b58\uff0c\u9010\u6b65\u53d6\u4ee3 RAG \u6a21\u7d44", "\u5b8c\u5168\u4f9d\u9760\u57fa\u790e\u6a21\u578b\u8207 RAG\uff0c\u4e0d\u9032\u884c Fine-tune\uff0c\u50c5\u900f\u904e\u63d0\u793a\u8a2d\u8a08\u63a7 \u5236\u8a9e\u6c23", "\u6bcf\u65e5\u9032\u884c\u589e\u91cf Fine-tune\uff0c\u8b93\u6a21\u578b\u5373\u6642\u5b78\u7fd2\u65b0\u6587\u4ef6\u5167\u5bb9\uff0c\u907f\u514d\u4f9d\u8cf4 \u6aa2\u7d22", "\u4fdd\u7559\u8a9e\u6c23\u76f8\u95dc Fine-tuning\uff0c\u50c5\u900f\u904e\u6aa2\u7d22\u7cfb\u7d71\u66f4\u65b0\u6587\u4ef6\u5167\u5bb9\uff0c\u4e0d\u983b \u7e41\u6539\u52d5\u6a21\u578b"], "ans": "D", "inferred": false, "expl": "\u3010\u7b54\u6848D\u3011\u8a9e\u6c23\u4e00\u81f4+\u5373\u6642\u65b0\u6587\u4ef6+\u7a69\u5b9a+\u907f\u514d\u983b\u7e41\u91cd\u8a13\u3002\n\u2717(A) \u6bcf\u9031\u91cd\u8a13\u589e\u6210\u672c\u4e14\u4e0d\u9700\u8981\u3002\n\u2717(B) \u7d14\u57fa\u790e+RAG \u7121\u6cd5\u7a69\u5b9a\u8a9e\u6c23\u3002\n\u2717(C) \u6bcf\u65e5 Fine-tune \u4e0d\u7a69\u5b9a\u3002\n\u2713(D) \u4fdd\u7559\u8a9e\u6c23\u76f8\u95dc Fine-tuning + \u900f\u904e RAG \u66f4\u65b0\u6587\u4ef6\u5167\u5bb9\uff0c\u662f\u9577\u671f\u6700\u4f73\u5e73\u8861\u3002"}, {"id": "114_4_s2_18", "exam": "114\u5e74\u7b2c\u56db\u68af\u6b21 \u79d1\u76ee\u4e8c\uff08\u751f\u6210\u5f0fAI\uff09", "examId": "114_4_s2", "no": 18, "q": "\u67d0\u5ba2\u670d\u7cfb\u7d71\u5728\u56de\u8986\u300c\u8a02\u55ae\u53d6\u6d88\u653f\u7b56\u300d\u6642\uff0c\u5373\u4f7f\u751f\u6210\u6eab\u5ea6\u56fa\u5b9a\u70ba 0.6\uff0c\u56de \u8986\u54c1\u8cea\u4ecd\u5e38\u51fa\u73fe\u5dee\u7570\u3002\u8abf\u67e5\u986f\u793a\uff0c\u6aa2\u7d22\u5230\u7684\u653f\u7b56\u5167\u5bb9\u6709\u6642\u662f\u6700\u65b0\u7248\u672c\uff0c \u6709\u6642\u5247\u662f\u904e\u6642\u6587\u4ef6\uff0c\u6b64\u5916 Prompt \u7d04\u675f\u4e0d\u8db3\uff0c\u5fae\u8abf\u8a9e\u6599\u4e5f\u6709\u6a21\u7cca\u63cf\u8ff0\u3002 \u82e5\u8981\u512a\u5148\u6539\u5584\u54c1\u8cea\u6ce2\u52d5\uff0c\u61c9\u5148\u89e3\u6c7a\u4e0b\u5217\u54ea\u4e00\u9805\u554f\u984c\uff1f", "opts": ["\u8abf\u6574\u6eab\u5ea6\u53c3\u6578\uff0c\u964d\u4f4e\u751f\u6210\u96a8\u6a5f\u6027", "\u52a0\u5f37 Prompt \u8a2d\u8a08\uff0c\u9650\u5236\u6a21\u578b\u8868\u9054\u65b9\u5f0f", "\u512a\u5316\u5fae\u8abf\u8a9e\u6599\uff0c\u6e1b\u5c11\u542b\u7cca\u63cf\u8ff0", "\u63d0\u5347\u6aa2\u7d22\u7cfb\u7d71\u54c1\u8cea\uff0c\u78ba\u4fdd\u53d6\u5f97\u7684\u653f\u7b56\u5167\u5bb9\u6b63\u78ba\u4e14\u6700\u65b0"], "ans": "D", "inferred": false, "expl": "\u3010\u7b54\u6848D\u3011\u653f\u7b56\u56de\u8986\u54c1\u8cea\u6ce2\u52d5\u3002\n\u2717(A) \u6eab\u5ea6\u4e0d\u89e3\u5167\u5bb9\u904e\u6642\u3002\n\u2717(B) Prompt \u4e0d\u89e3\u77e5\u8b58\u4f86\u6e90\u4e0d\u6b63\u78ba\u3002\n\u2717(C) \u5fae\u8abf\u8a9e\u6599\u6a21\u7cca\u6b21\u8981\u3002\n\u2713(D) \u6aa2\u7d22\u5230\u7684\u653f\u7b56\u5167\u5bb9\u904e\u6642\u662f\u6839\u672c\u539f\u56e0\uff0c\u63d0\u5347\u6aa2\u7d22\u54c1\u8cea\u624d\u80fd\u89e3\u6c7a\u54c1\u8cea\u6ce2\u52d5\u3002"}, {"id": "114_4_s2_19", "exam": "114\u5e74\u7b2c\u56db\u68af\u6b21 \u79d1\u76ee\u4e8c\uff08\u751f\u6210\u5f0fAI\uff09", "examId": "114_4_s2", "no": 19, "q": "\u67d0\u91ab\u9662\u5c0e\u5165\u4e86\u4e00\u5957\u667a\u6167\u7cfb\u7d71\uff0c\u7531\u4e09\u500b\u6a21\u7d44\u69cb\u6210\uff1a\u8a9e\u97f3\u8fa8\u8b58(ASR) \u0026rarr; \u8a9e \u8a00\u6a21\u578b\u751f\u6210(LLM) \u0026rarr; \u67e5\u8a62\u91ab\u7642\u8cc7\u6599\u5eab API\u3002\u8fd1\u671f\u767c\u73fe\u90e8\u5206\u67e5\u8a62\u7d50\u679c \u932f\u8aa4\uff0c\u4f8b\u5982\u91ab\u5e2b\u8a62\u554f\u300c\u8853\u5f8c\u5fa9\u5065\u6d41\u7a0b\u300d\u6642\uff0c\u7cfb\u7d71\u537b\u8aa4\u5224\u70ba\u8981\u67e5\u8a62\u300c\u8853\u524d \u6ce8\u610f\u4e8b\u9805\u300d\uff0c\u56e0\u6b64\u67e5\u8a62\u5230\u932f\u8aa4\u7684\u6587\u4ef6\u3002\u7d93\u6aa2\u67e5\u5df2\u6392\u9664\u8a9e\u97f3\u8fa8\u8b58\u7684\u932f\u8aa4\uff0c \u4e0b\u5217\u4f55\u8005\u6700\u53ef\u80fd\u662f\u9020\u6210\u67e5\u8a62\u932f\u8aa4\u7684\u4f86\u6e90\uff1f", "opts": ["\u91ab\u7642\u8cc7\u6599\u5eab API \u5c0d\u61c9\u898f\u5247\u8a2d\u8a08\u4e0d\u6e05\uff0c\u9020\u6210\u610f\u5716\u6620\u5c04\u6a21\u7cca", "LLM \u7684 Prompt \u7f3a\u4e4f\u660e\u78ba\u6307\u793a\uff0c\u5c0e\u81f4\u8a9e\u610f\u5206\u985e\u5224\u65b7\u932f\u8aa4", "\u67e5\u8a62 API \u56de\u50b3\u901f\u5ea6\u904e\u6162\uff0c\u5f71\u97ff\u7cfb\u7d71\u8655\u7406\u6b63\u78ba\u6027", "LLM \u672a\u7d93\u91ab\u7642\u9818\u57df\u5fae\u8abf\uff0c\u96e3\u4ee5\u6b63\u78ba\u7406\u89e3\u5c08\u696d\u6027\u8a5e\u5f59"], "ans": "B", "inferred": false, "expl": "\u3010\u7b54\u6848B\u3011\u67e5\u8a62\u932f\u6587\u4ef6\uff08\u8853\u5f8c\u5fa9\u5065\u2192\u8853\u524d\u6ce8\u610f\uff09\u3002\n\u2717(A) API \u5c0d\u61c9\u898f\u5247\u8a2d\u8a08\u4e0d\u6e05\u96d6\u53ef\u80fd\u4f46\u8f03\u6b21\u8981\u3002\n\u2713(B) \u5df2\u6392\u9664 ASR\uff0c\u6700\u53ef\u80fd\u662f LLM \u7684 Prompt \u7f3a\u4e4f\u660e\u78ba\u5206\u985e\u6307\u793a\uff0c\u5c0e\u81f4\u610f\u5716\u5206\u985e\u932f\u8aa4\uff0c\u6b63\u89e3\u3002\n\u2717(C) \u901f\u5ea6\u4e0d\u5f71\u97ff\u6b63\u78ba\u6027\u3002\n\u2717(D) \u672a\u5fae\u8abf\u4e0d\u4e00\u5b9a\u662f\u6839\u56e0\u3002"}, {"id": "114_4_s2_20", "exam": "114\u5e74\u7b2c\u56db\u68af\u6b21 \u79d1\u76ee\u4e8c\uff08\u751f\u6210\u5f0fAI\uff09", "examId": "114_4_s2", "no": 20, "q": "\u67d0\u91ab\u9662\u6b63\u5728\u898f\u5283\u4e00\u500b AI \u5c08\u6848\uff0c\u76ee\u7684\u662f\u5354\u52a9\u91ab\u5e2b\u5f9e\u80f8\u8154 X \u5149\u5f71\u50cf\u4e2d\u5224\u65b7 \u662f\u5426\u5b58\u5728\u80ba\u708e\u5fb5\u5146\uff0c\u5718\u968a\u537b\u8aa4\u5c07\u751f\u6210\u5f0f AI \u6a21\u578b\u904b\u7528\u65bc\u5f71\u50cf\u8a3a\u65b7\u3002\u4e0b\u5217 \u54ea\u4e00\u9805\u6700\u53ef\u80fd\u6210\u70ba\u4e3b\u8981\u98a8\u96aa\uff1f", "opts": ["\u6a21\u578b\u5728\u751f\u6210\u5831\u544a\u6642\u8a9e\u53e5\u6d41\u66a2\uff0c\u4f46\u50c5\u5728\u6587\u5b57\u8868\u9054\u4e0a\u6709\u5dee\u7570\uff0c\u5c0d\u8a3a\u65b7\u7d50 \u679c\u6c92\u6709\u91cd\u5927\u5f71\u97ff", "\u6a21\u578b\u82e5\u8cc7\u6599\u4e0d\u8db3\uff0c\u50c5\u6703\u964d\u4f4e\u751f\u6210\u5831\u544a\u7684\u5b8c\u6574\u6027\uff0c\u800c\u975e\u5f71\u97ff\u5224\u65b7\u75c5\u7076 \u7684\u6b63\u78ba\u6027", "\u6a21\u578b\u504f\u5411\u751f\u6210\u5167\u5bb9\u800c\u975e\u5206\u985e\uff0c\u4f46\u6b64\u5dee\u7570\u50c5\u5f71\u97ff\u6548\u7387\uff0c\u4e0d\u6703\u9020\u6210\u8aa4\u8a3a \u98a8\u96aa", "\u6a21\u578b\u53ef\u80fd\u751f\u6210\u8207\u5be6\u969b\u5f71\u50cf\u4e0d\u7b26\u7684\u8a3a\u65b7\u7d50\u8ad6\uff0c\u5c0e\u81f4\u8aa4\u5224\u4e26\u5f15\u767c\u91ab\u7642\u8207 \u6cd5\u5f8b\u98a8\u96aa"], "ans": "D", "inferred": false, "expl": "\u3010\u7b54\u6848D\u3011\u751f\u6210\u5f0f AI \u8aa4\u7528\u65bc\u5f71\u50cf\u8a3a\u65b7\u3002\n\u2717(A) \u4e0d\u53ea\u8868\u9054\u5dee\u7570\u3002\n\u2717(B) \u4e0d\u53ea\u5831\u544a\u5b8c\u6574\u6027\u3002\n\u2717(C) \u4e0d\u53ea\u6548\u7387\u5f71\u97ff\u3002\n\u2713(D) \u751f\u6210\u5f0f AI \u53ef\u80fd\u751f\u6210\u8207\u5be6\u969b\u5f71\u50cf\u4e0d\u7b26\u7684\u63cf\u8ff0\uff08\u5e7b\u89ba\uff09\uff0c\u5c0e\u81f4\u8aa4\u8a3a\u8207\u6cd5\u5f8b\u8cac\u4efb\uff0c\u662f\u4e3b\u8981\u98a8\u96aa\u3002"}, {"id": "114_4_s2_21", "exam": "114\u5e74\u7b2c\u56db\u68af\u6b21 \u79d1\u76ee\u4e8c\uff08\u751f\u6210\u5f0fAI\uff09", "examId": "114_4_s2", "no": 21, "q": "\u67d0\u516c\u53f8\u958b\u767c\u7684\u667a\u6167\u8eca\u8f09\u8a9e\u97f3\u52a9\u7406\uff0c\u53ef\u900f\u904e\u8a9e\u97f3\u8fa8\u8b58(ASR)\u8fa8\u8b58\u99d5\u99db\u8a9e \u97f3\uff0c\u518d\u7531 LLM \u751f\u6210\u56de\u7b54\u4e26\u67e5\u8a62\u8eca\u8f09 API\u3002\u6e2c\u8a66\u4e2d\u767c\u73fe\uff1aASR \u5c0d\u6c7d\u8eca\u5c08\u696d\u8853\u8a9e\u8fa8\u8b58\u932f\u8aa4\u7387\u9ad8\uff1bLLM \u7684\u56de\u8986\u5e38\u4e0d\u7cbe\u78ba\uff1b\u7cfb\u7d71\u56de\u8986\u5ef6\u9072\u96d6\u5b58\u5728\u4f46\u4ecd\u53ef\u63a5\u53d7\u3002\u82e5\u76ee\u6a19\u662f\u300c\u512a\u5148\u63d0\u5347\u6e96\u78ba\u6027\u8207\u56de\u7b54\u54c1\u8cea\u300d\uff0c\u4e0b\u5217\u6539\u9032\u6b65\u9a5f\u7684\u6700\u5408\u7406\u57f7\u884c\u9806\u5e8f\u70ba\u4f55\uff1f \u003cbr\u003e1. \u64f4\u5145\u4e26\u6a19\u8a3b\u6c7d\u8eca\u9818\u57df\u8a9e\u97f3\u8cc7\u6599\uff0c\u5fae\u8abf ASR \u6a21\u578b \u003cbr\u003e2. \u5fae\u8abf LLM \u4e26\u52a0\u5165\u6aa2\u7d22\u589e\u5f37(RAG) \u003cbr\u003e3. \u512a\u5316\u7cfb\u7d71\u67b6\u69cb\uff0c\u5f15\u5165\u6279\u6b21\u63a8\u8ad6\u964d\u4f4e\u5ef6\u9072 \u003cbr\u003e4. \u52d5\u614b\u8abf\u6574\u751f\u6210\u6eab\u5ea6\uff0c\u5e73\u8861\u6e96\u78ba\u5ea6\u8207\u591a\u6a23\u6027", "opts": ["1 \u0026rarr; 2 \u0026rarr; 4 \u0026rarr; 3", "2 \u0026rarr; 1\u0026rarr; 3 \u0026rarr; 4", "1 \u0026rarr; 3 \u0026rarr; 2 \u0026rarr; 4", "3 \u0026rarr; 1 \u0026rarr; 2 \u0026rarr; 4"], "ans": "A", "inferred": false, "expl": "\u3010\u7b54\u6848A\u3011\u512a\u5148\u63d0\u5347\u6e96\u78ba\u6027\u8207\u56de\u7b54\u54c1\u8cea\u3002\n\u2713(A) 1\uff08\u5f37\u5316 ASR \u9818\u57df\uff09\u21922\uff08LLM+RAG\uff09\u21924\uff08\u751f\u6210\u6eab\u5ea6\uff09\u21923\uff08\u5ef6\u9072\u512a\u5316\uff09\uff0c\u5ef6\u9072\u53ef\u63a5\u53d7\u5148\u653e\u6700\u5f8c\u3002\n\u2717(B) \u5148 LLM \u4f46 ASR \u932f\u5247\u8f38\u5165\u4ecd\u932f\u3002\n\u2717(C) \u7cfb\u7d71\u67b6\u69cb\u5728\u524d\u9806\u5e8f\u932f\u3002\n\u2717(D) \u7cfb\u7d71\u6548\u80fd\u5728\u524d\u9806\u5e8f\u932f\u3002"}, {"id": "114_4_s2_22", "exam": "114\u5e74\u7b2c\u56db\u68af\u6b21 \u79d1\u76ee\u4e8c\uff08\u751f\u6210\u5f0fAI\uff09", "examId": "114_4_s2", "no": 22, "q": "\u4e00\u5bb6\u9867\u554f\u516c\u53f8\u4f7f\u7528\u751f\u6210\u5f0f AI \u5354\u52a9\u64b0\u5beb\u6578\u64da\u5206\u6790\u5831\u544a\u3002\u96d6\u7136\u6a21\u578b\u5728\u6e2c\u8a66 \u4e2d\u8868\u73fe\u512a\u7570\uff0c\u4f46\u5176\u751f\u6210\u7684\u5831\u544a\u591a\u534a\u50c5\u9075\u5faa\u56fa\u5b9a\u6bb5\u843d\u7d50\u69cb\uff0c\u66ff\u63db\u6578\u503c\u6216\u95dc \u9375\u8a5e\u5373\u53ef\u5b8c\u6210\uff0c\u537b\u672a\u80fd\u5c55\u73fe\u91dd\u5c0d\u4e0d\u540c\u5c08\u6848\u7684\u591a\u6a23\u5316\u63a8\u7406\u8207\u5206\u6790\u3002\u4e0b\u5217\u4f55 \u8005\u70ba\u9020\u6210\u9019\u7a2e\u73fe\u8c61\u7684\u6700\u5408\u7406\u89e3\u91cb\uff1f", "opts": ["\u6a21\u578b\u5728\u751f\u6210\u904e\u7a0b\u4e2d\u7f3a\u4e4f\u5c0d\u5b57\u9ad4\u8207\u6392\u7248\u7684\u512a\u5316\u80fd\u529b\uff0c\u56e0\u6b64\u7121\u6cd5\u5c55\u73fe\u5206\u6790\u908f\u8f2f", "\u6e2c\u8a66\u8cc7\u6599\u6db5\u84cb\u904e\u591a\u7d71\u8a08\u5716\u8868\uff0c\u5c0e\u81f4\u6a21\u578b\u7121\u6cd5\u5c08\u6ce8\u65bc\u6587\u5b57\u5167\u5bb9\u7684\u591a\u6a23\u5316\u8868\u9054", "\u6a21\u578b\u904e\u5ea6\u4f9d\u8cf4\u8a13\u7df4\u8a9e\u6599\u4e2d\u7684\u5e38\u898b\u5831\u544a\u7bc4\u5f0f\uff0c\u5c0e\u81f4\u751f\u6210\u7d50\u679c\u4ee5\u6a23\u677f\u5316\u7d50\u69cb\u53d6\u4ee3\u771f\u6b63\u7684\u63a8\u7406", "\u6a21\u578b\u56e0\u7121\u6cd5\u6b63\u78ba\u8fa8\u8b58\u5831\u544a\u4e2d\u7684\u9801\u78bc\u8207\u6a19\u984c\u5c64\u7d1a\uff0c\u624d\u51fa\u73fe\u6a23\u677f\u5316\u7684\u7d50\u679c"], "ans": "C", "inferred": false, "expl": "\u3010\u7b54\u6848C\u3011\u56fa\u5b9a\u6bb5\u843d\u7d50\u69cb\u3001\u6a23\u677f\u5316\u3002\n\u2717(A) \u4e0d\u662f\u5b57\u9ad4\u6392\u7248\u554f\u984c\u3002\n\u2717(B) \u4e0d\u662f\u7d71\u8a08\u5716\u8868\u904e\u591a\u3002\n\u2713(C) \u6a21\u578b\u904e\u5ea6\u4f9d\u8cf4\u8a13\u7df4\u8a9e\u6599\u4e2d\u7684\u5e38\u898b\u5831\u544a\u7bc4\u5f0f\uff0c\u7522\u751f\u6a23\u677f\u5316\u7d50\u679c\uff0c\u662f\u6700\u5408\u7406\u89e3\u91cb\u3002\n\u2717(D) \u4e0d\u662f\u9801\u78bc\u5c64\u7d1a\u932f\u8aa4\u3002"}, {"id": "114_4_s2_23", "exam": "114\u5e74\u7b2c\u56db\u68af\u6b21 \u79d1\u76ee\u4e8c\uff08\u751f\u6210\u5f0fAI\uff09", "examId": "114_4_s2", "no": 23, "q": "\u5728\u61c9\u7528\u96f6\u6a23\u672c\u63d0\u793a(Zero-Shot Prompting)\u6642\uff0c\u4e0b\u5217\u54ea\u4e00\u7a2e\u60c5\u5883\u6700\u53ef \u80fd\u56e0\u7f3a\u4e4f\u793a\u7bc4\u800c\u5931\u6557\uff0c\u51fa\u73fe\u8a9e\u610f\u932f\u8aa4\u6216\u7d50\u69cb\u932f\u8aa4\u7684\u8f38\u51fa\uff1f", "opts": ["\u8981\u6c42\u6a21\u578b\u5224\u65b7\u4e00\u6bb5\u5f71\u8a55\u6587\u5b57\u7684\u60c5\u611f\u50be\u5411", "\u8981\u6c42\u6a21\u578b\u5c07\u4e00\u6bb5\u65b0\u805e\u6458\u8981\u6fc3\u7e2e\u70ba\u4e00\u53e5\u8a71", "\u8981\u6c42\u6a21\u578b\u5c07\u4e00\u6bb5\u7e41\u9ad4\u4e2d\u6587\u7ffb\u8b6f\u6210\u82f1\u6587", "\u8981\u6c42\u6a21\u578b\u5f9e\u8868\u683c\u4e2d\u64f7\u53d6\u6240\u6709\u57ce\u5e02\u7684\u6700\u9ad8\u6c23\u6eab"], "ans": "D", "inferred": false, "expl": "\u3010\u7b54\u6848D\u3011Zero-shot \u5931\u6557\u60c5\u5883\u3002\n\u2717(A) \u60c5\u611f\u5224\u65b7 Zero-shot \u901a\u5e38\u53ef\u884c\u3002\n\u2717(B) \u4e00\u53e5\u8a71\u6458\u8981 Zero-shot \u53ef\u884c\u3002\n\u2717(C) \u7ffb\u8b6f Zero-shot \u53ef\u884c\u3002\n\u2713(D) \u5f9e\u8868\u683c\u64f7\u53d6\u6240\u6709\u57ce\u5e02\u6700\u9ad8\u6c23\u6eab\u9700\u7cbe\u78ba\u683c\u5f0f\uff0cZero-shot \u7121\u7bc4\u4f8b\u6700\u6613\u5931\u6557\uff0c\u6b63\u89e3\u3002"}, {"id": "114_4_s2_24", "exam": "114\u5e74\u7b2c\u56db\u68af\u6b21 \u79d1\u76ee\u4e8c\uff08\u751f\u6210\u5f0fAI\uff09", "examId": "114_4_s2", "no": 24, "q": "\u67d0\u4fdd\u96aa\u516c\u53f8\u8a08\u756b\u5c0e\u5165\u751f\u6210\u5f0f AI \u7684\u5167\u90e8\u5408\u7d04\u67e5\u8a62\u7cfb\u7d71\uff0c\u5354\u52a9\u696d\u52d9\u54e1\u8207\u6cd5 \u52d9\u90e8\u9580\u5feb\u901f\u89e3\u8b80\u4fdd\u55ae\u689d\u6b3e\u8207\u7406\u8ce0\u898f\u7bc4\u3002\u9ad8\u5c64\u7279\u5225\u5f37\u8abf\u5ba2\u6236\u8cc7\u6599\u96b1\u79c1\u8207 \u5408\u898f\u98a8\u96aa\u63a7\u7ba1\uff0c\u5373\u4f7f\u9700\u8981\u6295\u5165\u8f03\u591a\u8cc7\u6e90\uff0c\u4e5f\u5fc5\u9808\u78ba\u4fdd\u8cc7\u6599\u4e0d\u6703\u5916\u6d29\u3002\u5728 \u6b64\u60c5\u6cc1\u4e0b\uff0c\u4e0b\u5217\u54ea\u4e00\u7a2e\u7b56\u7565\u6700\u7b26\u5408\u516c\u53f8\u7684\u8cc7\u6599\u5b89\u5168\u8207\u5408\u898f\u512a\u5148\u8003\u91cf\uff1f", "opts": ["\u5c0e\u5165\u958b\u6e90\u6a21\u578b\u4e26\u7531 IT \u5718\u968a\u81ea\u5efa\uff0c\u5f8c\u7e8c\u518d\u9010\u6b65\u88dc\u5f37\u96b1\u79c1\u8207\u5408\u898f\u63a7\u7ba1", "\u5728\u9700\u6c42\u78ba\u8a8d\u968e\u6bb5\u5373\u7d0d\u5165\u6cd5\u9075\u8207\u7a3d\u6838\u55ae\u4f4d\uff0c\u8a2d\u5b9a\u6e96\u78ba\u7387 KPI\uff0c\u4e26\u900f\u904e MVP \u9a57\u8b49\u6210\u6548", "\u512a\u5148\u4f7f\u7528\u96f2\u7aef\u5927\u578b API \u6a21\u578b\u5feb\u901f\u90e8\u7f72\uff0c\u4e26\u6839\u64da\u4f7f\u7528\u6578\u64da\u6301\u7e8c\u8abf\u6574", "\u6295\u5165\u8cc7\u6e90\u81ea\u8a13\u4e26\u79c1\u6709\u5316\u90e8\u7f72 LLM\uff0c\u4e26\u540c\u6b65\u5efa\u7acb\u81ea\u52d5\u5316\u98a8\u63a7\u6a5f\u5236"], "ans": "D", "inferred": false, "expl": "\u3010\u7b54\u6848D\u3011\u5ba2\u6236\u8cc7\u6599\u96b1\u79c1+\u5408\u898f\u512a\u5148+\u8cc7\u6e90\u5145\u8db3\u3002\n\u2717(A) \u81ea\u5efa\u5f8c\u88dc\u98a8\u96aa\u9ad8\u3002\n\u2717(B) MVP \u9a57\u8b49\u975e\u6700\u9ad8\u5b89\u5168\u3002\n\u2717(C) \u96f2\u7aef API \u5feb\u901f\u90e8\u7f72\u6709\u5916\u6d29\u98a8\u96aa\u3002\n\u2713(D) \u81ea\u8a13\u4e26\u79c1\u6709\u5316\u90e8\u7f72 LLM + \u81ea\u52d5\u5316\u98a8\u63a7\uff0c\u5b8c\u5168\u63a7\u5236\u8cc7\u6599\u6d41\u5411\uff0c\u6700\u7b26\u5408\u984c\u610f\u3002"}, {"id": "114_4_s2_25", "exam": "114\u5e74\u7b2c\u56db\u68af\u6b21 \u79d1\u76ee\u4e8c\uff08\u751f\u6210\u5f0fAI\uff09", "examId": "114_4_s2", "no": 25, "q": "\u67d0\u65b0\u5275\u516c\u53f8\u958b\u767c\u4e00\u5957\u5716\u50cf\u63cf\u8ff0\u751f\u6210\u7cfb\u7d71\uff0c\u80fd\u6839\u64da\u8f38\u5165\u7684\u7167\u7247\u81ea\u52d5\u7522\u751f \u8aaa\u660e\u6587\u5b57\u3002\u70ba\u4e86\u8b93\u7522\u751f\u7684\u63cf\u8ff0\u6587\u5b57\u80fd\u8207\u5716\u7247\u8cc7\u8a0a\u7cbe\u6e96\u5c0d\u61c9\uff0c\u4e0b\u5217\u54ea\u4e00\u7a2e \u8a2d\u8a08\u601d\u8def\u6700\u95dc\u9375\uff1f", "opts": ["\u5f37\u5316\u8a9e\u8a00\u6a21\u578b\u7684\u53e5\u6cd5\u8207\u6d41\u66a2\u6027\uff0c\u78ba\u4fdd\u751f\u6210\u6587\u5b57\u66f4\u81ea\u7136\u6613\u8b80", "\u5728\u751f\u6210\u904e\u7a0b\u4e2d\u7d50\u5408\u5716\u7247\u7279\u5fb5\u8207\u8a9e\u8a00\u5efa\u6a21\uff0c\u8b93\u6a21\u578b\u540c\u6642\u5229\u7528\u5f71\u50cf\u5167\u5bb9 \u8207\u6587\u5b57\u8cc7\u8a0a", "\u8abf\u6574\u751f\u6210\u7b56\u7565(\u5982 Beam Search \u6216\u6eab\u5ea6\u53c3\u6578)\uff0c\u4ee5\u63d0\u5347\u8f38\u51fa\u6587\u5b57\u7684 \u5408\u7406\u6027", "\u5c08\u6ce8\u65bc\u6587\u5b57\u5e8f\u5217\u4e0a\u4e0b\u6587\u7684\u5efa\u6a21\uff0c\u53ea\u63d0\u5347\u6587\u5b57\u9593\u7684\u9023\u8cab\u6027"], "ans": "B", "inferred": false, "expl": "\u3010\u7b54\u6848B\u3011\u5716\u50cf\u63cf\u8ff0\u751f\u6210\uff08Image Captioning\uff09\u3002\n\u2717(A) \u53e5\u6cd5\u6d41\u66a2\u4e0d\u5920\u3002\n\u2713(B) \u7d50\u5408\u5716\u7247\u7279\u5fb5\uff08\u8996\u89ba\u7de8\u78bc\u5668\uff09\u8207\u8a9e\u8a00\u5efa\u6a21\uff0c\u4f7f\u751f\u6210\u6587\u5b57\u5229\u7528\u5169\u7a2e\u8cc7\u8a0a\u7cbe\u6e96\u5c0d\u61c9\uff0c\u6b63\u89e3\u3002\n\u2717(C) \u751f\u6210\u7b56\u7565\u4e0d\u89e3\u8996\u89ba\u5c0d\u61c9\u3002\n\u2717(D) \u50c5\u6587\u5b57\u4e0a\u4e0b\u6587\u4e0d\u89e3\u5716\u50cf\u5c0d\u61c9\u3002"}, {"id": "114_4_s2_26", "exam": "114\u5e74\u7b2c\u56db\u68af\u6b21 \u79d1\u76ee\u4e8c\uff08\u751f\u6210\u5f0fAI\uff09", "examId": "114_4_s2", "no": 26, "q": "\u67d0\u96fb\u5546\u5e73\u53f0\u5e0c\u671b\u751f\u6210\u7684\u5546\u54c1\u63cf\u8ff0\u5728\u98a8\u683c\u8207\u7528\u8a5e\u4e0a\u4fdd\u6301\u4e00\u81f4\u6027\uff0c\u4f46\u4e0d\u9700 \u8981\u65b0\u589e\u5c08\u696d\u77e5\u8b58\u3002\u4e0b\u5217\u54ea\u7a2e\u65b9\u6cd5\u6700\u9069\u5408\uff1f", "opts": ["\u64f4\u5145\u8a9e\u6599\u5eab\u4e26\u5fae\u8abf\u6a21\u578b\uff0c\u4f7f\u98a8\u683c\u7d71\u4e00", "\u589e\u52a0\u63d0\u793a\u8a5e\u8907\u96dc\u5ea6\uff0c\u5f15\u5c0e\u6a21\u578b\u98a8\u683c\u4e00\u81f4", "\u964d\u4f4e\u751f\u6210\u6eab\u5ea6\uff0c\u4ee5\u6e1b\u5c11\u96a8\u6a5f\u6027\u4e26\u63d0\u5347\u98a8\u683c\u4e00\u81f4\u6027", "\u4f7f\u7528\u5168\u9023\u63a5\u795e\u7d93\u7db2\u8def\u5c0d\u751f\u6210\u7d50\u679c\u5f8c\u671f\u7be9\u9078"], "ans": "C", "inferred": false, "expl": "\u3010\u7b54\u6848C\u3011\u5546\u54c1\u63cf\u8ff0\u98a8\u683c\u4e00\u81f4+\u4e0d\u9700\u65b0\u77e5\u8b58\u3002\n\u2717(A) \u5fae\u8abf\u9700\u8cc7\u6599\u4e14\u6210\u672c\u9ad8\u3002\n\u2717(B) \u589e Prompt \u8907\u96dc\u4e0d\u4e00\u5b9a\u89e3\u6c7a\u3002\n\u2713(C) \u964d\u4f4e\u6eab\u5ea6\u6e1b\u5c11\u96a8\u6a5f\u6027\uff0c\u63d0\u5347\u98a8\u683c\u4e00\u81f4\u6027\uff0c\u662f\u6700\u7c21\u55ae\u6709\u6548\u65b9\u6cd5\u3002\n\u2717(D) \u5f8c\u671f\u7be9\u9078\u6548\u7387\u5dee\u3002"}, {"id": "114_4_s2_27", "exam": "114\u5e74\u7b2c\u56db\u68af\u6b21 \u79d1\u76ee\u4e8c\uff08\u751f\u6210\u5f0fAI\uff09", "examId": "114_4_s2", "no": 27, "q": "\u67d0\u4f01\u696d\u5df2\u5efa\u7f6e AI \u8a9e\u97f3\u8a18\u9304\u7cfb\u7d71\uff0c\u4e26\u5e0c\u671b\u6574\u5408\u751f\u6210\u5f0f AI \u9032\u884c\u300c\u6703\u8b70\u5373 \u6642\u6458\u8981\u300d\u529f\u80fd\uff0c\u4e0b\u5217\u54ea\u4e00\u7a2e\u7b56\u7565\u6700\u80fd\u63d0\u5347\u6458\u8981\u7684\u8a9e\u610f\u54c1\u8cea\u8207\u4f7f\u7528\u50f9\u503c\uff1f", "opts": ["\u4f7f\u7528\u8a9e\u97f3\u8f49\u6587\u5b57\u6a21\u578b\u5373\u6642\u8f38\u51fa\u9010\u5b57\u7a3f\u4e26\u8f49\u5165 GPT \u6458\u8981", "\u5c07\u8a9e\u97f3\u9010\u6bb5\u5207\u5206\u4e26\u5efa\u7acb\u95dc\u9375\u5b57\u7d22\u5f15\uff0c\u4ee5\u5229\u6458\u8981\u6a21\u578b\u5f9e\u4e2d\u64f7\u53d6\u6838\u5fc3\u5167 \u5bb9\u751f\u6210\u6703\u8b70\u91cd\u9ede", "\u5c07\u8a9e\u97f3\u8f49\u6587\u5b57\u5f8c\u6a19\u8a3b\u767c\u8a00\u89d2\u8272\u8207\u4e3b\u984c\u908a\u754c\uff0c\u7d50\u5408\u8a9e\u610f\u5206\u7fa4\u9032\u884c\u52d5\u614b \u6458\u8981", "\u5c07\u6240\u6709\u8a9e\u97f3\u5167\u5bb9\u5132\u5b58\u70ba\u5b8c\u6574\u7d00\u9304\uff0c\u63d0\u4f9b\u4e8b\u5f8c\u4eba\u5de5\u6458\u8981\u6bd4\u5c0d\u7528"], "ans": "C", "inferred": false, "expl": "\u3010\u7b54\u6848C\u3011\u6703\u8b70\u5373\u6642\u6458\u8981\u54c1\u8cea\u3002\n\u2717(A) \u7d14\u9010\u5b57\u7a3f\u7121\u7d50\u69cb\u3002\n\u2717(B) \u95dc\u9375\u5b57\u7d22\u5f15\u7c92\u5ea6\u904e\u7c97\u3002\n\u2713(C) \u6a19\u8a3b\u89d2\u8272\uff08diarization\uff09+ \u4e3b\u984c\u908a\u754c + \u8a9e\u610f\u5206\u7fa4\u52d5\u614b\u6458\u8981\uff0c\u80fd\u6309\u4e3b\u984c\u8207\u767c\u8a00\u8005\u7d44\u7e54\u91cd\u9ede\uff0c\u54c1\u8cea\u6700\u9ad8\u3002\n\u2717(D) \u4e8b\u5f8c\u4eba\u5de5\u6bd4\u5c0d\u975e\u5373\u6642\u3002"}, {"id": "114_4_s2_28", "exam": "114\u5e74\u7b2c\u56db\u68af\u6b21 \u79d1\u76ee\u4e8c\uff08\u751f\u6210\u5f0fAI\uff09", "examId": "114_4_s2", "no": 28, "q": "\u67d0\u516c\u53f8\u6b63\u5728\u958b\u767c\u4e00\u500b\u667a\u6167\u5ba2\u670d\u7cfb\u7d71\uff0c\u8ca0\u8cac\u56de\u8986\u9867\u5ba2\u95dc\u65bc\u9000\u63db\u8ca8\u3001\u512a\u60e0\u6d3b \u52d5\u8207\u5546\u54c1\u5efa\u8b70\u7b49\u554f\u984c\u3002\u7814\u767c\u5718\u968a\u5617\u8a66\u4f7f\u7528\u4e0d\u540c\u7684\u63d0\u793a\u8a2d\u8a08\u65b9\u5f0f\u4f86\u63d0\u5347 \u6a21\u578b\u6548\u80fd\u3002\u4e0b\u5217\u54ea\u4e00\u500b\u63d0\u793a\u6700\u7b26\u5408\u300c\u5c11\u6a23\u672c\u63d0\u793a(Few-Shot Prompting)\u300d \u7684\u8a2d\u8a08\u539f\u5247\uff1f", "opts": ["\u300c\u8acb\u56de\u7b54\u9867\u5ba2\u8a62\u554f\uff1a\u5982\u4f55\u7533\u8acb\u9000\u8ca8\uff1f\u300d", "\u300c\u4ee5\u4e0b\u662f\u5169\u7d44\u5ba2\u670d\u5c0d\u8a71\u7bc4\u4f8b\uff0c\u8acb\u4f9d\u7167\u76f8\u540c\u98a8\u683c\u56de\u8986\u65b0\u7684\u9867\u5ba2\u554f\u984c\u300d", "\u300c\u8acb\u9010\u6b65\u5206\u6790\u9867\u5ba2\u6295\u8a34\u7684\u539f\u56e0\uff0c\u4e26\u4f9d\u7167\u63a8\u7406\u904e\u7a0b\u751f\u6210\u5408\u9069\u56de\u8986\u300d", "\u300c\u8acb\u4ee5\u6b63\u5f0f\u7684\u8a9e\u6c23\u56de\u8986\u9867\u5ba2\u7684\u63d0\u554f\u300d"], "ans": "B", "inferred": false, "expl": "\u3010\u7b54\u6848B\u3011Few-shot Prompting \u8a2d\u8a08\u3002\n\u2717(A) \u76f4\u63a5\u56de\u7b54\u7121\u7bc4\u4f8b\u5c6c Zero-shot\u3002\n\u2713(B) \u300c\u4ee5\u4e0b\u662f\u5169\u7d44\u5ba2\u670d\u5c0d\u8a71\u7bc4\u4f8b\uff0c\u4f9d\u76f8\u540c\u98a8\u683c\u56de\u8986\u300d\u6b63\u662f Few-shot \u6559\u79d1\u66f8\u8a2d\u8a08\u3002\n\u2717(C) \u9010\u6b65\u63a8\u7406\u662f CoT\u3002\n\u2717(D) \u8a9e\u6c23\u6307\u793a\u7121\u7bc4\u4f8b\u3002"}, {"id": "114_4_s2_29", "exam": "114\u5e74\u7b2c\u56db\u68af\u6b21 \u79d1\u76ee\u4e8c\uff08\u751f\u6210\u5f0fAI\uff09", "examId": "114_4_s2", "no": 29, "q": "\u67d0\u6295\u8cc7\u516c\u53f8\u5c0e\u5165\u751f\u6210\u5f0f AI\uff0c\u7528\u65bc\u5373\u6642\u5206\u6790\u80a1\u5e02\u6ce2\u52d5\u4e26\u63d0\u4f9b\u5e02\u5834\u80cc\u666f\u8cc7 \u8a0a\u3002\u82e5\u5e0c\u671b AI \u80fd\u517c\u9867\u300c\u5373\u6642\u6027\u300d\u8207\u300c\u53ef\u9760\u6027\u300d\u3002\u4e0b\u5217\u54ea\u4e00\u9805\u8a2d\u8a08\u6700\u80fd\u6709 \u6548\u63d0\u5347 AI \u5728\u5373\u6642\u80a1\u5e02\u5206\u6790\u4e0a\u7684\u8868\u73fe\uff1f", "opts": ["\u5c07 AI \u7cfb\u7d71\u9023\u7d50\u81f3\u516c\u53f8\u5167\u90e8\u6b77\u53f2\u4ea4\u6613\u8cc7\u6599\u5eab\uff0c\u4ee5\u4fbf\u5feb\u901f\u8abf\u7528\u65e2\u6709\u7684 \u6848\u4f8b\u53c3\u8003", "\u8abf\u6574\u6a21\u578b\u7684\u56de\u61c9\u908f\u8f2f\uff0c\u8b93 AI \u512a\u5148\u8f38\u51fa\u6700\u65b0\u5e02\u5834\u884c\u60c5\uff0c\u800c\u4e0d\u662f\u5b8c\u6574 \u7684\u80cc\u666f\u5206\u6790", "\u5efa\u7acb\u8207\u5916\u90e8\u5373\u6642\u884c\u60c5\u4f86\u6e90\u540c\u6b65\u7684\u67e5\u8a62\u6a21\u7d44\uff0c\u78ba\u4fdd AI \u80fd\u5373\u6642\u64f7\u53d6\u6700 \u65b0\u91d1\u878d\u6578\u64da", "\u589e\u52a0\u8a13\u7df4\u8cc7\u6599\u4e2d\u6a21\u64ec\u7684\u91d1\u878d\u5371\u6a5f\u8207\u5e02\u5834\u7570\u5e38\u6848\u4f8b\uff0c\u4ee5\u63d0\u5347 AI \u5728\u7279 \u6b8a\u60c5\u5883\u4e0b\u7684\u8868\u73fe\u80fd\u529b"], "ans": "C", "inferred": false, "expl": "\u3010\u7b54\u6848C\u3011\u5373\u6642\u6027+\u53ef\u9760\u6027\u517c\u9867\u3002\n\u2717(A) \u6b77\u53f2\u5eab\u4e0d\u662f\u5373\u6642\u8cc7\u8a0a\u3002\n\u2717(B) \u512a\u5148\u8f38\u51fa\u6700\u65b0\u4f46\u7121\u80cc\u666f\u5931\u53ef\u9760\u3002\n\u2713(C) \u5efa\u7acb\u8207\u5916\u90e8\u5373\u6642\u884c\u60c5\u540c\u6b65\u7684\u67e5\u8a62\u6a21\u7d44\uff0c\u517c\u9867\u5373\u6642\u6700\u65b0\u8207\u4f86\u6e90\u53ef\u9760\uff0c\u6b63\u89e3\u3002\n\u2717(D) \u589e\u8a13\u7df4\u8cc7\u6599\u975e\u5373\u6642\u3002"}, {"id": "114_4_s2_30", "exam": "114\u5e74\u7b2c\u56db\u68af\u6b21 \u79d1\u76ee\u4e8c\uff08\u751f\u6210\u5f0fAI\uff09", "examId": "114_4_s2", "no": 30, "q": "\u67d0\u5927\u578b\u7269\u6d41\u516c\u53f8\u8a08\u756b\u5c0e\u5165 AI \u7cfb\u7d71\uff0c\u4ee5\u6539\u5584\u5ba2\u670d\u8207\u914d\u9001\u4f5c\u696d\u7684\u6548\u7387\u3002\u5c08 \u6848\u5718\u968a\u898f\u5283\u4e86\u4ee5\u4e0b\u56db\u500b\u6b65\u9a5f\uff0c\u8acb\u554f\u6b63\u78ba\u7684\u57f7\u884c\u9806\u5e8f\u70ba\u4f55\uff1f \u003cbr\u003e1. \u5efa\u7acb\u7b26\u5408\u516c\u53f8\u670d\u52d9\u6d41\u7a0b\u7684 AI \u5c0d\u8a71\u908f\u8f2f\u8207\u61c9\u7b54\u7bc4\u672c\uff0c\u78ba\u4fdd\u9867\u5ba2\u9ad4\u9a57\u4e00\u81f4 \u003cbr\u003e2. \u660e\u78ba\u5b9a\u7fa9\u5c0e\u5165 AI \u7684\u76ee\u6a19\u4e26\u8a2d\u5b9a\u95dc\u9375\u7e3e\u6548\u6307\u6a19(KPI) \u003cbr\u003e3. \u8490\u96c6\u8207\u6e05\u7406\u904e\u5f80\u5ba2\u670d\u7d00\u9304\u8207\u914d\u9001\u76f8\u95dc\u8cc7\u6599\uff0c\u4f5c\u70ba\u6a21\u578b\u8a13\u7df4\u7d20\u6750 \u003cbr\u003e4. \u8a55\u4f30\u4e26\u9078\u64c7\u5408\u9069\u7684 AI \u6280\u8853\u4f9b\u61c9\u5546\u6216\u958b\u6e90\u65b9\u6848\uff0c\u78ba\u7acb\u6280\u8853\u65b9\u5411\u8207\u67b6\u69cb", "opts": ["2 \u0026rarr; 3 \u0026rarr; 4 \u0026rarr; 1", "3 \u0026rarr; 2 \u0026rarr; 1 \u0026rarr; 4", "2 \u0026rarr; 1 \u0026rarr; 3 \u0026rarr; 4", "1 \u0026rarr; 4 \u0026rarr; 3 \u0026rarr; 2"], "ans": "A", "inferred": false, "expl": "\u3010\u7b54\u6848A\u3011AI \u5c0e\u5165\u6b63\u78ba\u9806\u5e8f\u3002\n\u2713(A) 2\uff08\u5b9a\u7fa9\u76ee\u6a19+KPI\uff09\u21923\uff08\u8490\u96c6\u6e05\u7406\u8cc7\u6599\uff09\u21924\uff08\u9078\u64c7\u6280\u8853\u4f9b\u61c9\u5546\uff09\u21921\uff08\u5efa\u7acb\u5c0d\u8a71\u908f\u8f2f\uff09\u3002\n\u2717(B) \u9806\u5e8f\u932f\u3002\n\u2717(C) \u9806\u5e8f\u932f\u3002\n\u2717(D) \u5f9e\u5efa\u908f\u8f2f\u958b\u59cb\u9806\u5e8f\u932f\u3002"}, {"id": "114_4_s2_31", "exam": "114\u5e74\u7b2c\u56db\u68af\u6b21 \u79d1\u76ee\u4e8c\uff08\u751f\u6210\u5f0fAI\uff09", "examId": "114_4_s2", "no": 31, "q": "\u67d0\u8de8\u570b\u96fb\u5546\u4f01\u696d\u5c0e\u5165\u751f\u6210\u5f0f AI\uff0c\u5354\u52a9\u8655\u7406\u9867\u5ba2\u670d\u52d9\u8acb\u6c42\uff0c\u4e26\u6839\u64da\u9867\u5ba2 \u6b77\u53f2\u8a02\u55ae\u63d0\u4f9b\u500b\u4eba\u5316\u5efa\u8b70\u3002\u8cc7\u5b89\u8207\u6cd5\u9075\u90e8\u9580\u64d4\u5fc3 AI \u5728\u56de\u8986\u6642\u53ef\u80fd\u6d29\u6f0f \u9867\u5ba2\u500b\u8cc7\uff0c\u82e5\u8981\u5728\u5c0e\u5165\u521d\u671f\u512a\u5148\u907f\u514d\u89f8\u6cd5\u98a8\u96aa\uff0c\u4e0b\u5217\u54ea\u4e00\u9805\u63aa\u65bd\u6700\u7b26\u5408 \u8981\u6c42\uff1f", "opts": ["\u5728\u52a0\u5bc6\u74b0\u5883\u4e0b\u5c0e\u5165\u5b8c\u6574\u7684\u9867\u5ba2\u8a02\u55ae\u8207\u884c\u70ba\u8cc7\u6599\uff0c\u4e26\u900f\u904e\u56b4\u683c\u5b58\u53d6\u63a7 \u7ba1\u964d\u4f4e\u6d29\u6f0f\u98a8\u96aa", "\u5be6\u65bd\u8cc7\u6599\u6700\u5c0f\u5316\u8207\u53bb\u8b58\u5225\u5316\uff0c\u78ba\u4fdd AI \u5728\u8a13\u7df4\u8207\u751f\u6210\u904e\u7a0b\u4e2d\u4e0d\u76f4\u63a5 \u8655\u7406\u6216\u66b4\u9732\u654f\u611f\u500b\u8cc7", "\u5f37\u5316\u6a21\u578b\u7684\u56de\u8986\u5be9\u67e5\u6d41\u7a0b\uff0c\u900f\u904e\u81ea\u52d5\u904e\u6ffe\u8207\u4eba\u5de5\u62bd\u67e5\u7d50\u5408\uff0c\u964d\u4f4e\u500b \u8cc7\u5916\u6d29\u7684\u6a5f\u7387", "\u8a2d\u5b9a AI \u7684\u89d2\u8272\u8207\u56de\u8986\u7bc4\u570d\uff0c\u8b93\u5176\u5c08\u6ce8\u65bc\u5ba2\u670d\u76f8\u95dc\u5167\u5bb9\uff0c\u907f\u514d\u56de\u7b54 \u5176\u4ed6\u654f\u611f\u8b70\u984c"], "ans": "B", "inferred": false, "expl": "\u3010\u7b54\u6848B\u3011\u6e90\u982d\u964d\u4f4e\u500b\u8cc7\u89f8\u6cd5\u98a8\u96aa\u3002\n\u2717(A) \u52a0\u5bc6+\u63a7\u7ba1\u4ecd\u63a5\u89f8\u500b\u8cc7\u3002\n\u2713(B) \u8cc7\u6599\u6700\u5c0f\u5316 + \u53bb\u8b58\u5225\u5316\u5f9e\u6e90\u982d\u964d\u98a8\u96aa\uff0c\u6700\u6839\u672c\u76f4\u63a5\u3002\n\u2717(C) \u56de\u8986\u5be9\u67e5\u662f\u5f8c\u7aef\u3002\n\u2717(D) \u9650\u5b9a\u56de\u8986\u7bc4\u570d\u4e0d\u89e3\u8cc7\u6599\u672c\u8eab\u3002"}, {"id": "114_4_s2_32", "exam": "114\u5e74\u7b2c\u56db\u68af\u6b21 \u79d1\u76ee\u4e8c\uff08\u751f\u6210\u5f0fAI\uff09", "examId": "114_4_s2", "no": 32, "q": "\u67d0\u570b\u969b\u9280\u884c\u5c0e\u5165\u751f\u6210\u5f0f AI\uff0c\u7528\u65bc\u5f59\u6574\u4e0d\u540c\u570b\u5bb6\u91d1\u878d\u76e3\u7ba1\u6a5f\u69cb\u7684\u5408\u898f\u898f \u7bc4\uff0c\u5efa\u7acb\u8de8\u570b\u5408\u898f\u77e5\u8b58\u5eab\u3002\u7531\u65bc\u5404\u570b\u689d\u6587\u8868\u8ff0\u65b9\u5f0f\u4e0d\u540c\uff0c\u4e14\u76e3\u7ba1\u8981\u6c42\u5177 \u6709\u9ad8\u5ea6\u5c08\u696d\u6027\u8207\u96b1\u542b\u908f\u8f2f\uff0c\u82e5\u8981\u78ba\u4fdd\u77e5\u8b58\u5eab\u5728\u5f8c\u7e8c\u67e5\u8a62\u8207\u751f\u6210\u5831\u544a\u6642 \u80fd\u7dad\u6301\u6b63\u78ba\u6027\u8207\u4e00\u81f4\u6027\uff0c\u4e0b\u5217\u54ea\u4e00\u9805 AI \u80fd\u529b\u6700\u70ba\u95dc\u9375\uff1f", "opts": ["\u5177\u5099\u8de8\u8a9e\u8a00\u5c08\u696d\u8853\u8a9e\u5c0d\u9f4a\u8207\u689d\u6587\u8a9e\u610f\u62bd\u53d6\u80fd\u529b\uff0c\u80fd\u6b63\u78ba\u8fa8\u8b58\u4e0d\u540c\u570b \u5bb6\u898f\u7bc4\u9593\u7684\u5c0d\u61c9\u8207\u5dee\u7570", "\u80fd\u81ea\u52d5\u6700\u4f73\u5316\u6587\u4ef6\u6aa2\u7d22\u6548\u7387\uff0c\u7e2e\u77ed\u8de8\u570b\u6cd5\u898f\u67e5\u8a62\u7684\u5ef6\u9072\u6642\u9593\uff0c\u63d0\u5347 \u5408\u898f\u90e8\u9580\u4f7f\u7528\u9ad4\u9a57", "\u80fd\u5c07\u5408\u898f\u6587\u4ef6\u8f49\u63db\u70ba\u591a\u7a2e\u8f38\u51fa\u5f62\u5f0f(\u5982\u7c21\u5831\u3001\u6458\u8981\u6216\u6cd5\u898f\u6e05\u55ae)\uff0c\u4ee5 \u7b26\u5408\u4e0d\u540c\u6c7a\u7b56\u5c64\u7d1a\u9700\u6c42", "\u5177\u5099\u6839\u64da\u6b77\u53f2\u6848\u4f8b\u751f\u6210\u5408\u898f\u89e3\u91cb\u7684\u80fd\u529b\uff0c\u5354\u52a9\u65b0\u9032\u54e1\u5de5\u5feb\u901f\u7406\u89e3\u6cd5 \u898f\u5728\u5be6\u52d9\u4e0a\u7684\u61c9\u7528"], "ans": "A", "inferred": false, "expl": "\u3010\u7b54\u6848A\u3011\u8de8\u570b\u6cd5\u898f\u77e5\u8b58\u5eab\u95dc\u9375\u80fd\u529b\u3002\n\u2713(A) \u8de8\u8a9e\u8a00\u8853\u8a9e\u5c0d\u9f4a\u8207\u689d\u6587\u8a9e\u610f\u62bd\u53d6\uff0c\u78ba\u4fdd\u4e0d\u540c\u570b\u5bb6\u898f\u7bc4\u5c0d\u61c9\u6b63\u78ba\uff0c\u662f\u77e5\u8b58\u5eab\u6b63\u78ba\u6027\u7684\u6838\u5fc3\u3002\n\u2717(B) \u6aa2\u7d22\u6548\u7387\u4e0d\u89e3\u6b63\u78ba\u6027\u3002\n\u2717(C) \u591a\u7a2e\u8f38\u51fa\u5f62\u5f0f\u4e0d\u89e3\u4e00\u81f4\u6027\u3002\n\u2717(D) \u6848\u4f8b\u751f\u6210\u4e0d\u89e3\u77e5\u8b58\u5eab\u5efa\u7acb\u3002"}, {"id": "114_4_s2_33", "exam": "114\u5e74\u7b2c\u56db\u68af\u6b21 \u79d1\u76ee\u4e8c\uff08\u751f\u6210\u5f0fAI\uff09", "examId": "114_4_s2", "no": 33, "q": "\u5728\u4f01\u696d\u5c0e\u5165 MLOps(Machine Learning Operations)\u7684\u904e\u7a0b\u4e2d\uff0c\u9664\u4e86 \u6a21\u578b\u90e8\u7f72\u8207\u7dad\u904b\u6311\u6230\u5916\uff0c\u4ecd\u53ef\u80fd\u9762\u81e8\u5176\u4ed6\u63a8\u52d5\u4e0a\u7684\u56f0\u96e3\u3002\u4e0b\u5217\u4f55\u8005\u70ba No Code \u5e73\u53f0\u6700\u80fd\u6709\u6548\u89e3\u6c7a\u7684\u6311\u6230\uff1f", "opts": ["\u81ea\u52d5\u5316\u5927\u91cf\u8cc7\u6599\u7684\u6a19\u8a3b\u8207\u524d\u8655\u7406\uff0c\u4ee5\u964d\u4f4e\u6578\u64da\u6e96\u5099\u6210\u672c", "\u63d0\u5347\u904b\u7b97\u57fa\u790e\u8a2d\u65bd\u7684\u53ef\u64f4\u5c55\u6027\uff0c\u4ee5\u56e0\u61c9\u5927\u898f\u6a21\u670d\u52d9\u9700\u6c42", "\u900f\u904e\u53ef\u8996\u5316\u5efa\u6a21\u4ecb\u9762\uff0c\u964d\u4f4e\u6280\u8853\u9580\u6abb\u4e26\u4fc3\u9032\u8de8\u90e8\u9580\u5354\u4f5c", "\u63d0\u4f9b\u9032\u968e\u7279\u5fb5\u5de5\u7a0b\u80fd\u529b\uff0c\u512a\u5316\u9ad8\u7dad\u5ea6\u6578\u64da\u7684\u8655\u7406\u6548\u7387"], "ans": "C", "inferred": false, "expl": "\u3010\u7b54\u6848C\u3011No-Code \u5728 MLOps \u7684\u50f9\u503c\u3002\n\u2717(A) \u4e0d\u662f\u81ea\u52d5\u6a19\u8a3b\u3002\n\u2717(B) \u4e0d\u662f\u57fa\u790e\u8a2d\u65bd\u64f4\u5c55\u3002\n\u2713(C) \u53ef\u8996\u5316\u5efa\u6a21\u4ecb\u9762\u964d\u4f4e\u6280\u8853\u9580\u6abb\uff0c\u4fc3\u9032\u8de8\u90e8\u9580\u5354\u4f5c\uff0c\u662f No-Code \u5728 MLOps \u7684\u6838\u5fc3\u50f9\u503c\u3002\n\u2717(D) \u4e0d\u662f\u9032\u968e\u7279\u5fb5\u5de5\u7a0b\u3002"}, {"id": "114_4_s2_34", "exam": "114\u5e74\u7b2c\u56db\u68af\u6b21 \u79d1\u76ee\u4e8c\uff08\u751f\u6210\u5f0fAI\uff09", "examId": "114_4_s2", "no": 34, "q": "\u67d0\u91ab\u7642\u6a5f\u69cb\u8a08\u756b\u5c0e\u5165\u751f\u6210\u5f0f AI \u5354\u52a9\u64b0\u5beb\u75c5\u6b77\u6458\u8981\u3002\u5728\u6280\u8853\u6e2c\u8a66\u968e\u6bb5\uff0c \u70ba\u78ba\u4fdd\u7cfb\u7d71\u80fd\u5b89\u5168\u61c9\u7528\u65bc\u81e8\u5e8a\uff0c\u6700\u61c9\u512a\u5148\u95dc\u6ce8\u4e0b\u5217\u54ea\u4e00\u9805\u6307\u6a19\uff1f", "opts": ["\u8cc7\u6599\u5132\u5b58\u8207\u5b58\u53d6\u67b6\u69cb\u7684\u5b8c\u6574\u6027\uff0c\u78ba\u4fdd\u9577\u671f\u904b\u4f5c\u904e\u7a0b\u4e2d\u7684\u6578\u64da\u53ef\u8ffd\u6eaf \u6027", "\u751f\u6210\u5167\u5bb9\u7684\u91ab\u7642\u6e96\u78ba\u6027\u8207\u81e8\u5e8a\u4e00\u81f4\u6027\uff0c\u907f\u514d\u51fa\u73fe\u932f\u8aa4\u6216\u8aa4\u5c0e\u6027\u8cc7 \u8a0a", "\u6a21\u578b\u5728\u4e0d\u540c\u75c5\u4f8b\u8a9e\u5883\u4e0b\u7684\u6cdb\u5316\u80fd\u529b\uff0c\u78ba\u4fdd\u4e0d\u56e0\u500b\u5225\u6a23\u672c\u800c\u504f\u5dee", "\u7cfb\u7d71\u56de\u61c9\u6642\u9593\u7684\u7a69\u5b9a\u6027\uff0c\u4ee5\u652f\u63f4\u91ab\u7642\u5834\u57df\u4e2d\u53ef\u80fd\u7684\u5373\u6642\u9700\u6c42"], "ans": "B", "inferred": false, "expl": "\u3010\u7b54\u6848B\u3011\u91ab\u7642 AI \u75c5\u6b77\u6458\u8981\u6700\u95dc\u9375\u3002\n\u2717(A) \u5132\u5b58\u67b6\u69cb\u6b21\u8981\u3002\n\u2713(B) \u751f\u6210\u5167\u5bb9\u7684\u91ab\u7642\u6e96\u78ba\u6027\u8207\u81e8\u5e8a\u4e00\u81f4\u6027\u6700\u95dc\u9375\uff0c\u932f\u8aa4\u6458\u8981\u53ef\u80fd\u5371\u5bb3\u60a3\u8005\u5b89\u5168\u3002\n\u2717(C) \u6cdb\u5316\u80fd\u529b\u6b21\u8981\u3002\n\u2717(D) \u56de\u61c9\u6642\u9593\u6b21\u8981\u3002"}, {"id": "114_4_s2_35", "exam": "114\u5e74\u7b2c\u56db\u68af\u6b21 \u79d1\u76ee\u4e8c\uff08\u751f\u6210\u5f0fAI\uff09", "examId": "114_4_s2", "no": 35, "q": "\u5728\u5373\u6642\u5ba2\u670d\u7cfb\u7d71\u7684\u6548\u80fd\u6e2c\u8a66\u4e2d\uff0c\u82e5\u91dd\u5c0d\u5ef6\u9072\u6e2c\u8a66(Latency Testing) \u9032\u884c\u8a55\u4f30\uff0c\u4e0b\u5217\u54ea\u4e00\u9805\u6307\u6a19\u6700\u80fd\u53cd\u6620\u7cfb\u7d71\u662f\u5426\u7b26\u5408\u7528\u6236\u5373\u6642\u4e92\u52d5\u9700 \u6c42\uff1f", "opts": ["AI \u6a21\u578b\u5728\u540c\u4e00\u5206\u9418\u5167\u53ef\u5b8c\u6210\u7684\u56de\u8986\u8a0a\u606f\u6578\u91cf", "\u5ba2\u6236\u5f9e\u8f38\u5165\u554f\u984c\u5230\u6536\u5230\u7b2c\u4e00\u500b\u5b8c\u6574\u56de\u61c9\u6240\u9700\u7684\u6642\u9593", "\u5ba2\u670d\u7cfb\u7d71\u80fd\u9023\u7e8c\u63d0\u4f9b\u670d\u52d9\u7684\u904b\u884c\u6642\u9577", "AI \u7522\u751f\u56de\u7b54\u6642\u7528\u8a5e\u7684\u591a\u6a23\u6027\u8207\u8868\u9054\u5275\u610f\u7a0b\u5ea6"], "ans": "B", "inferred": false, "expl": "\u3010\u7b54\u6848B\u3011\u5ef6\u9072\u6e2c\u8a66\u6307\u6a19\u3002\n\u2717(A) \u4e00\u5206\u9418\u8a0a\u606f\u6578\u662f\u541e\u5410\u91cf\u3002\n\u2713(B) \u5f9e\u8f38\u5165\u5230\u7b2c\u4e00\u500b\u5b8c\u6574\u56de\u61c9\u6240\u9700\u6642\u9593\uff0c\u662f\u5ef6\u9072\u6e2c\u8a66\uff08\u7aef\u5230\u7aef\u5ef6\u9072\uff09\u7684\u6838\u5fc3\u6307\u6a19\u3002\n\u2717(C) \u9023\u7e8c\u904b\u884c\u6642\u9577\u662f\u53ef\u7528\u6027\u3002\n\u2717(D) \u7528\u8a5e\u591a\u6a23\u6027\u8207\u5ef6\u9072\u7121\u95dc\u3002"}, {"id": "114_4_s2_36", "exam": "114\u5e74\u7b2c\u56db\u68af\u6b21 \u79d1\u76ee\u4e8c\uff08\u751f\u6210\u5f0fAI\uff09", "examId": "114_4_s2", "no": 36, "q": "\u67d0\u822a\u7a7a\u516c\u53f8\u5c0e\u5165\u751f\u6210\u5f0f AI \u8072\u63a7\u5ba2\u670d\uff0c\u63d0\u4f9b\u822a\u73ed\u8207\u7968\u52d9\u67e5\u8a62\u3002\u6709\u4eba\u54e1\u900f \u904e\u60e1\u610f\u63d0\u793a\uff0c\u8a66\u5716\u8b93\u7cfb\u7d71\u6d29\u6f0f\u5167\u90e8\u5b89\u6aa2\u6d41\u7a0b\u3002\u5728\u6b64\u60c5\u5883\u4e2d\uff0c\u4e0b\u5217\u4f55\u8005\u70ba \u964d\u4f4e\u63d0\u793a\u653b\u64ca(Prompt Injection)\u98a8\u96aa\u7684\u6700\u4f73\u7b56\u7565\uff1f", "opts": ["\u5c0e\u5165\u8f38\u5165\u6aa2\u6e2c\u8207\u56de\u61c9\u5be9\u6838\u6d41\u7a0b\uff0c\u9632\u6b62\u654f\u611f\u6307\u4ee4\u88ab\u57f7\u884c", "\u9650\u5236 AI \u53ef\u56de\u61c9\u7684\u4e3b\u984c\u7bc4\u570d\uff0c\u4f7f\u7cfb\u7d71\u50c5\u56de\u7b54\u975e\u654f\u611f\u7684\u822a\u73ed\u8207\u7968\u52d9\u67e5 \u8a62\uff0c\u907f\u514d\u8655\u7406\u5167\u90e8\u6216\u654f\u611f\u6d41\u7a0b\u8cc7\u8a0a", "\u96a8\u6a5f\u8b8a\u5316\u56de\u8986\u5167\u5bb9\uff0c\u8b93\u653b\u64ca\u8005\u96e3\u4ee5\u9810\u6e2c\u56de\u61c9\u884c\u70ba\u4ee5\u589e\u52a0\u653b\u64ca\u96e3\u5ea6", "\u64f4\u5145\u8207\u66f4\u65b0\u822a\u73ed\u8207\u7968\u52d9\u8cc7\u6599\u4f86\u6e90\uff0c\u4ee5\u63d0\u5347\u6a21\u578b\u7684\u77e5\u8b58\u6b63\u78ba\u6027\u8207\u8986\u84cb \u7387"], "ans": "A", "inferred": false, "expl": "\u3010\u7b54\u6848A\u3011Prompt Injection \u9632\u79a6\u3002\n\u2713(A) \u5c0e\u5165\u8f38\u5165\u6aa2\u6e2c+\u56de\u61c9\u5be9\u6838\u6d41\u7a0b\uff0c\u9632\u6b62\u654f\u611f\u6307\u4ee4\u88ab\u57f7\u884c\uff0c\u662f\u7d9c\u5408\u9632\u8b77\u7b56\u7565\u3002\n\u2717(B) \u9650\u5236\u4e3b\u984c\u96d6\u4e5f\u6709\u7528\u4f46\u8f03\u88ab\u52d5\u3002\n\u2717(C) \u96a8\u6a5f\u8b8a\u5316\u53cd\u4e0d\u53ef\u63a7\u3002\n\u2717(D) \u64f4\u77e5\u8b58\u4e0d\u89e3\u653b\u64ca\u3002"}, {"id": "114_4_s2_37", "exam": "114\u5e74\u7b2c\u56db\u68af\u6b21 \u79d1\u76ee\u4e8c\uff08\u751f\u6210\u5f0fAI\uff09", "examId": "114_4_s2", "no": 37, "q": "\u5728\u6a5f\u5668\u5b78\u7fd2\u6a21\u578b\u7684\u5be6\u52d9\u61c9\u7528\u4e2d\uff0c\u5e38\u6703\u51fa\u73fe\u6578\u64da\u6f02\u79fb(Data Drift)\u7684\u60c5 \u6cc1\u3002\u6b64\u73fe\u8c61\u4e3b\u8981\u662f\u6307\u4e0b\u5217\u54ea\u4e00\u7a2e\u60c5\u6cc1\uff1f", "opts": ["\u8a13\u7df4\u6642\u4f7f\u7528\u7684\u8cc7\u6599\u5206\u4f48\uff0c\u8207\u90e8\u7f72\u5f8c\u5be6\u969b\u8f38\u5165\u8cc7\u6599\u7684\u7d71\u8a08\u7279\u5fb5\u96a8\u6642\u9593 \u9010\u6f38\u51fa\u73fe\u5dee\u7570\uff0c\u5c0e\u81f4\u6a21\u578b\u8868\u73fe\u8870\u9000", "\u5728\u8cc7\u6599\u524d\u8655\u7406\u904e\u7a0b\u4e2d\uff0c\u56e0\u7279\u5fb5\u522a\u6e1b\u6216\u7f3a\u5931\u88dc\u503c\u4e0d\u7576\uff0c\u9020\u6210\u6a23\u672c\u8cc7\u8a0a \u91cf\u4e0b\u964d", "\u6a21\u578b\u5c0d\u8a13\u7df4\u6578\u64da\u64ec\u5408\u904e\u5ea6\uff0c\u5728\u672a\u77e5\u6578\u64da\u4e0a\u6cdb\u5316\u80fd\u529b\u4e0d\u8db3", "\u5f8c\u7aef\u8cc7\u6599\u5eab\u56e0\u6b04\u4f4d\u5b9a\u7fa9\u6216\u7d50\u69cb\u8abf\u6574\uff0c\u5c0e\u81f4\u7279\u5fb5\u63d0\u53d6\u6d41\u7a0b\u8207\u539f\u59cb\u8a2d\u8a08 \u4e0d\u4e00\u81f4"], "ans": "A", "inferred": false, "expl": "\u3010\u7b54\u6848A\u3011Data Drift \u5b9a\u7fa9\u3002\n\u2713(A) \u8a13\u7df4\u8cc7\u6599\u8207\u90e8\u7f72\u5f8c\u5be6\u969b\u8f38\u5165\u7684\u7d71\u8a08\u7279\u5fb5\u96a8\u6642\u9593\u51fa\u73fe\u5dee\u7570\uff0c\u5c0e\u81f4\u6a21\u578b\u8870\u9000\uff0c\u6b63\u662f Data Drift\u3002\n\u2717(B) \u7279\u5fb5\u522a\u6e1b\u662f\u5de5\u7a0b\u554f\u984c\u3002\n\u2717(C) \u904e\u5ea6\u64ec\u5408\u662f\u8a13\u7df4\u554f\u984c\u3002\n\u2717(D) \u7d50\u69cb\u8abf\u6574\u662f\u5de5\u7a0b\u554f\u984c\u3002"}, {"id": "114_4_s2_38", "exam": "114\u5e74\u7b2c\u56db\u68af\u6b21 \u79d1\u76ee\u4e8c\uff08\u751f\u6210\u5f0fAI\uff09", "examId": "114_4_s2", "no": 38, "q": "\u67d0\u9280\u884c\u5c0e\u5165\u751f\u6210\u5f0f AI \u653e\u8cb8\u5be9\u6838\u7cfb\u7d71\uff0c\u7528\u65bc\u5206\u6790\u7533\u8cb8\u4eba\u689d\u4ef6\u4e26\u751f\u6210\u521d\u6b65 \u5be9\u6838\u610f\u898b\u3002\u6e2c\u8a66\u904e\u7a0b\u4e2d\u767c\u73fe\uff0c\u6a21\u578b\u5c0d\u4e0d\u540c\u65cf\u7fa4\u7684\u6838\u51c6\u7387\u5b58\u5728\u986f\u8457\u5dee\u7570\uff0c \u53ef\u80fd\u5f15\u767c\u6f14\u7b97\u6cd5\u504f\u898b\u554f\u984c\u3002\u70ba\u964d\u4f4e\u6b64\u98a8\u96aa\uff0c\u4e0b\u5217\u54ea\u4e00\u9805\u63aa\u65bd\u6700\u5408\u9069\uff1f", "opts": ["\u63d0\u5347\u6a21\u578b\u904b\u7b97\u901f\u5ea6\u8207\u6548\u80fd\uff0c\u4ee5\u78ba\u4fdd\u5728\u5927\u91cf\u7533\u8acb\u4e2d\u5feb\u901f\u56de\u61c9", "\u5168\u9762\u79fb\u9664\u8207\u7533\u8cb8\u4eba\u8eab\u4efd\u76f8\u95dc\u7684\u654f\u611f\u5c6c\u6027\uff0c\u907f\u514d\u6a21\u578b\u56e0\u8b8a\u6578\u5f71\u97ff\u800c\u7522 \u751f\u504f\u5dee", "\u5c0e\u5165\u8cc7\u6599\u8207\u7d50\u679c\u7684\u516c\u5e73\u6027\u6aa2\u6e2c\u6d41\u7a0b\uff0c\u4e26\u4f9d\u5408\u898f\u898f\u7bc4\u8abf\u6574\u6a21\u578b\u6216\u6c7a\u7b56 \u908f\u8f2f", "\u6e1b\u5c11\u8a13\u7df4\u6a23\u672c\u6578\u91cf\uff0c\u964d\u4f4e\u504f\u898b\u88ab\u653e\u5927\u7684\u53ef\u80fd\u6027"], "ans": "C", "inferred": false, "expl": "\u3010\u7b54\u6848C\u3011\u6f14\u7b97\u6cd5\u504f\u898b\u964d\u4f4e\u98a8\u96aa\u3002\n\u2717(A) \u901f\u5ea6\u8207\u504f\u898b\u7121\u95dc\u3002\n\u2717(B) \u5168\u9762\u79fb\u9664\u654f\u611f\u5c6c\u6027\u672a\u5fc5\u964d\u504f\u898b\u4e14\u53ef\u80fd\u640d\u9810\u6e2c\u3002\n\u2713(C) \u516c\u5e73\u6027\u6aa2\u6e2c\u6d41\u7a0b\uff08Equal Opportunity \u7b49\uff09+ \u4f9d\u898f\u7bc4\u8abf\u6574\u6a21\u578b/\u908f\u8f2f\uff0c\u662f\u89e3\u504f\u898b\u7684\u6b63\u78ba\u65b9\u6cd5\u3002\n\u2717(D) \u6e1b\u6a23\u672c\u4e0d\u89e3\u504f\u898b\u3002"}, {"id": "114_4_s2_39", "exam": "114\u5e74\u7b2c\u56db\u68af\u6b21 \u79d1\u76ee\u4e8c\uff08\u751f\u6210\u5f0fAI\uff09", "examId": "114_4_s2", "no": 39, "q": "\u5728\u63d0\u793a\u5de5\u7a0b(Prompt Engineering)\u7684\u61c9\u7528\u4e2d\uff0cChain-of-Thought(CoT) \u8207 Tree of Thoughts(ToT)\u5404\u9069\u7528\u65bc\u4e0d\u540c\u7684\u63a8\u7406\u60c5\u5883\uff0c\u8acb\u554f\u4ee5\u4e0b\u5169\u500b\u60c5\u5883\uff0c\u5206\u5225\u6700\u9069\u5408\u63a1\u7528\u54ea\u4e00\u7a2e\u65b9\u6cd5\uff1f \u003cbr\u003e\u60c5\u5883\u4e00\uff1a\u96fb\u5546\u516c\u53f8\u958b\u767c\u5ba2\u670d\u52a9\u7406\uff0c\u7528\u4f86\u5354\u52a9\u5ba2\u6236\u67e5\u8a62\u9000\u6b3e\u6d41\u7a0b\u8207\u76f8\u95dc\u898f\u7bc4 \u003cbr\u003e\u60c5\u5883\u4e8c\uff1a\u6d3b\u52d5\u7b56\u5283\u5718\u968a\u4f7f\u7528 AI \u5354\u52a9\u898f\u5283\u591a\u5834\u8de8\u90e8\u9580\u884c\u92b7\u6d3b\u52d5\uff0c\u9700\u8981\u540c\u6642\u8003\u91cf\u9810\u7b97\u3001\u5834\u5730\u3001\u6642\u7a0b\u8207\u4eba\u529b\u8cc7\u6e90\uff0c\u4e26\u6bd4\u8f03\u4e0d\u540c\u65b9\u6848\u7684\u53ef\u884c\u6027\u3002", "opts": ["\u60c5\u5883\u4e00\u63a1\u7528 CoT\uff0c\u60c5\u5883\u4e8c\u63a1\u7528 ToT", "\u60c5\u5883\u4e00\u63a1\u7528 ToT\uff0c\u60c5\u5883\u4e8c\u63a1\u7528 CoT", "\u60c5\u5883\u4e00\u8207\u60c5\u5883\u4e8c\u90fd\u9069\u5408 CoT", "\u60c5\u5883\u4e00\u8207\u60c5\u5883\u4e8c\u90fd\u9069\u5408 ToT"], "ans": "A", "inferred": false, "expl": "\u3010\u7b54\u6848A\u3011CoT vs ToT \u61c9\u7528\u3002\n\u2713(A) \u60c5\u5883\u4e00\uff08\u7dda\u6027\u9000\u6b3e\u6d41\u7a0b\uff09\u2192CoT\uff1b\u60c5\u5883\u4e8c\uff08\u591a\u5834\u6d3b\u52d5\u898f\u5283\u9700\u6bd4\u8f03\u65b9\u6848\uff09\u2192ToT\uff08\u6a39\u72c0\u5206\u652f\u63a8\u7406\uff09\uff0c\u5c0d\u61c9\u6b63\u78ba\u3002\n\u2717(B) \u985b\u5012\u3002\n\u2717(C) \u5169 CoT \u4e0d\u80fd\u8655\u7406\u591a\u8def\u5f91\u63a2\u7d22\u3002\n\u2717(D) \u5169 ToT \u5c0d\u7c21\u55ae\u7dda\u6027\u904e\u5ea6\u8907\u96dc\u3002"}, {"id": "114_4_s2_40", "exam": "114\u5e74\u7b2c\u56db\u68af\u6b21 \u79d1\u76ee\u4e8c\uff08\u751f\u6210\u5f0fAI\uff09", "examId": "114_4_s2", "no": 40, "q": "\u5728\u751f\u6210\u5f0f AI \u7684\u63d0\u793a\u5de5\u7a0b\u4e2d\uff0cGraph Prompting \u5728\u8655\u7406\u8907\u96dc\u95dc\u4fc2\u8cc7\u6599\u6642\uff0c \u70ba\u4f55\u901a\u5e38\u6bd4 Chain-of-Thought(CoT)\u66f4\u6709\u6548\uff1f", "opts": ["Graph Prompting \u5e7e\u4e4e\u4e0d\u9700\u8981\u63a8\u7406\uff0c\u53ea\u4f9d\u9760\u5716\u7d50\u69cb\u5373\u53ef\u5f97\u51fa\u7d50\u8ad6", "Graph Prompting \u50c5\u9700\u55ae\u6b21\u63d0\u793a\uff0c\u5373\u53ef\u907f\u514d\u591a\u8f2a\u63a8\u7406\u7684\u8aa4\u5dee\u7d2f\u7a4d", "Graph Prompting \u7684\u751f\u6210\u901f\u5ea6\u901a\u5e38\u66f4\u5feb\uff0c\u56e0\u6b64\u6548\u7387\u66f4\u9ad8", "Graph Prompting \u80fd\u6355\u6349\u975e\u7dda\u6027\u7d50\u69cb\u8207\u4e0a\u4e0b\u6587\u95dc\u806f\uff0c\u9069\u5408\u8655\u7406\u7db2\u7d61\u5316\u8cc7\u8a0a"], "ans": "D", "inferred": false, "expl": "\u3010\u7b54\u6848D\u3011Graph Prompting vs CoT\u3002\n\u2717(A) Graph Prompting \u4ecd\u9700\u63a8\u7406\u3002\n\u2717(B) \u4ecd\u53ef\u80fd\u591a\u8f2a\u3002\n\u2717(C) \u901f\u5ea6\u975e\u4e3b\u56e0\u3002\n\u2713(D) Graph Prompting \u80fd\u6355\u6349\u975e\u7dda\u6027\u7d50\u69cb\u8207\u7db2\u7d61\u5316\u8cc7\u8a0a\uff0c\u6bd4 CoT \u7684\u7dda\u6027\u93c8\u5f0f\u66f4\u9069\u5408\u8655\u7406\u8907\u96dc\u95dc\u4fc2\u3002"}, {"id": "114_4_s2_41", "exam": "114\u5e74\u7b2c\u56db\u68af\u6b21 \u79d1\u76ee\u4e8c\uff08\u751f\u6210\u5f0fAI\uff09", "examId": "114_4_s2", "no": 41, "q": "\u5728\u5c11\u6a23\u672c\u63d0\u793a(Few-shot Prompting)\u50c5\u80fd\u63d0\u4f9b 1\u0026ndash;2 \u500b\u7bc4\u4f8b\u7684\u60c5\u6cc1 \u4e0b\uff0c\u82e5\u9047\u5230\u9818\u57df\u504f\u79fb(Domain Shift)\uff0c\u4e0b\u5217\u4f55\u8005\u70ba\u6a21\u578b\u6700\u53ef\u80fd\u9762\u81e8\u7684\u6838\u5fc3\u6311\u6230\uff1f", "opts": ["\u7bc4\u4f8b\u6578\u91cf\u904e\u5c11\uff0c\u7121\u6cd5\u6db5\u84cb\u65b0\u9818\u57df\u7684\u591a\u6a23\u6027\uff0c\u5c0e\u81f4\u6a21\u578b\u6cdb\u5316\u4e0d\u8db3", "\u7bc4\u4f8b\u8868\u5fb5\u6709\u9650\uff0c\u6a21\u578b\u5bb9\u6613\u4f9d\u8cf4\u55ae\u4e00\u6a23\u672c\u7279\u6027\u800c\u964d\u4f4e\u9069\u61c9\u529b", "\u7bc4\u4f8b\u8986\u84cb\u4e0d\u8db3\uff0c\u4f7f\u6a21\u578b\u96e3\u4ee5\u62bd\u53d6\u8de8\u9818\u57df\u7684\u7a69\u5b9a\u6a21\u5f0f", "\u7bc4\u4f8b\u8cc7\u8a0a\u904e\u65bc\u7a00\u7f3a\uff0c\u6a21\u578b\u7f3a\u4e4f\u61c9\u5c0d\u4e0d\u540c\u8f38\u5165\u60c5\u5883\u7684\u80fd\u529b"], "ans": "A", "inferred": false, "expl": "\u3010\u7b54\u6848A\u3011Few-shot \u9818\u57df\u504f\u79fb\u6311\u6230\u3002\n\u2713(A) 1-2 \u500b\u7bc4\u4f8b\u6578\u91cf\u904e\u5c11\uff0c\u7121\u6cd5\u6db5\u84cb\u65b0\u9818\u57df\u591a\u6a23\u6027\uff0c\u6cdb\u5316\u4e0d\u8db3\uff0c\u662f\u6838\u5fc3\u6311\u6230\uff0c\u6b63\u89e3\u3002\n\u2717(B) \u96d6\u4e5f\u63cf\u8ff0\u985e\u4f3c\u4f46\u8f03\u4e0d\u76f4\u63a5\u3002\n\u2717(C) \u62bd\u53d6\u8de8\u9818\u57df\u7a69\u5b9a\u6a21\u5f0f\u4ecd\u53ef\u3002\n\u2717(D) \u63cf\u8ff0\u904e\u65bc\u7c60\u7d71\u3002"}, {"id": "114_4_s2_42", "exam": "114\u5e74\u7b2c\u56db\u68af\u6b21 \u79d1\u76ee\u4e8c\uff08\u751f\u6210\u5f0fAI\uff09", "examId": "114_4_s2", "no": 42, "q": "\u67d0\u91d1\u878d\u6a5f\u69cb\u5c0e\u5165\u6aa2\u7d22\u589e\u5f37\u751f\u6210(Retrieval-Augmented Generation, RAG)\u6a21\u578b\uff0c\u7528\u65bc\u5ba2\u670d\u6587\u4ef6\u67e5\u8a62\u8207\u81ea\u52d5\u56de\u8986\u3002\u7531\u65bc\u5927\u578b\u6a21\u578b\u904b\u7b97\u6210\u672c\u904e \u9ad8\uff0c\u82e5\u8003\u616e\u5f15\u5165\u77e5\u8b58\u84b8\u993e(Knowledge Distillation, KD)\u6280\u8853\uff0c\u4e0b\u5217 \u4f55\u8005\u70ba\u5e36\u4f86\u7684\u4e3b\u8981\u6548\u76ca\uff1f", "opts": ["\u8b93\u5c0f\u578b\u6a21\u578b\u5b78\u7fd2\u5927\u578b\u6a21\u578b\u7684\u77e5\u8b58\uff0c\u5728\u964d\u4f4e\u904b\u7b97\u6210\u672c\u7684\u540c\u6642\u7dad\u6301\u6aa2\u7d22 \u8207\u751f\u6210\u54c1\u8cea", "\u53ea\u80fd\u61c9\u7528\u65bc\u8a9e\u97f3\u6216\u5f71\u50cf\u8fa8\u8b58\uff0c\u7121\u6cd5\u63d0\u5347\u6587\u5b57\u6aa2\u7d22\u751f\u6210\u6548\u80fd", "\u56e0\u70ba RAG \u5df2\u6709\u6aa2\u7d22\u6a5f\u5236\uff0c\u56e0\u6b64\u7121\u9700\u984d\u5916\u84b8\u993e\u77e5\u8b58", "\u50c5\u80fd\u4f9d\u8cf4\u7279\u5b9a API \u4f9b\u61c9\u5546\u624d\u80fd\u4f7f\u7528\uff0c\u7121\u6cd5\u5728\u81ea\u5efa\u6a21\u578b\u4e2d\u5be6\u73fe"], "ans": "A", "inferred": false, "expl": "\u3010\u7b54\u6848A\u3011\u77e5\u8b58\u84b8\u993e\u5728 RAG \u7684\u6548\u76ca\u3002\n\u2713(A) \u8b93\u5c0f\u6a21\u578b\u5b78\u5927\u6a21\u578b\u77e5\u8b58\uff0c\u5728\u964d\u4f4e\u904b\u7b97\u6210\u672c\u540c\u6642\u7dad\u6301\u6aa2\u7d22\u8207\u751f\u6210\u54c1\u8cea\uff0c\u6b63\u89e3\u3002\n\u2717(B) \u4e0d\u9650\u8a9e\u97f3\u5f71\u50cf\uff0c\u6587\u5b57\u4e5f\u53ef\u3002\n\u2717(C) RAG \u8207 KD \u53ef\u540c\u6642\u4f7f\u7528\u3002\n\u2717(D) \u53ef\u5728\u81ea\u5efa\u6a21\u578b\u5be6\u73fe\u3002"}, {"id": "114_4_s2_43", "exam": "114\u5e74\u7b2c\u56db\u68af\u6b21 \u79d1\u76ee\u4e8c\uff08\u751f\u6210\u5f0fAI\uff09", "examId": "114_4_s2", "no": 43, "q": "\u5728\u8a55\u4f30\u5927\u578b\u8a9e\u8a00\u6a21\u578b\uff0c\u4f8b\u5982 7B\u300113B\u3001175B \u53c3\u6578\u898f\u6a21\u6642\uff0c\u6a21\u578b\u898f\u6a21\u5c0d\u57fa \u6e96\u6e2c\u8a66(Benchmark)\u7d50\u679c\u7684\u5f71\u97ff\uff0c\u4e0b\u5217\u54ea\u4e00\u7a2e\u8aaa\u6cd5\u6700\u70ba\u6070\u7576\uff1f", "opts": ["\u5c0f\u6a21\u578b\u5728\u6b63\u78ba\u8abf\u6574\u4e0b\u80fd\u8d85\u8d8a\u5927\u6a21\u578b\uff0c\u56e0\u6b64\u6a21\u578b\u5927\u5c0f\u4e26\u4e0d\u91cd\u8981", "\u5927\u6a21\u578b\u5728\u591a\u6578\u60c5\u5883\u4e0b\u8868\u73fe\u8f03\u597d\uff0c\u4f46\u5728\u7279\u5b9a\u4efb\u52d9\u4e0a\u7565\u905c\u65bc\u5c0f\u6a21\u578b", "\u6a21\u578b\u898f\u6a21\u8207\u57fa\u6e96\u6e2c\u8a66\u7d50\u679c\u5b8c\u5168\u7121\u95dc\uff0c\u5f71\u97ff\u4e3b\u8981\u4f86\u81ea\u6e2c\u8a66\u8a2d\u8a08", "\u6a21\u578b\u8d8a\u5927\uff0cBenchmark \u7d50\u679c\u53ef\u80fd\u63d0\u5347\uff0c\u4f46\u5e45\u5ea6\u53d6\u6c7a\u65bc\u8a13\u7df4\u6578\u64da\u54c1\u8cea \u8207\u8cc7\u6e90\u914d\u7f6e"], "ans": "D", "inferred": false, "expl": "\u3010\u7b54\u6848D\u3011\u6a21\u578b\u898f\u6a21\u8207 Benchmark\u3002\n\u2717(A) \u5c0f\u6a21\u578b\u4e0d\u4e00\u5b9a\u80fd\u8d85\u8d8a\u5927\u6a21\u578b\u3002\n\u2717(B) \u5927\u6a21\u578b\u4e0d\u6703\u300c\u7279\u5b9a\u4efb\u52d9\u7565\u905c\u300d\u592a\u591a\u3002\n\u2717(C) \u898f\u6a21\u8207\u7d50\u679c\u4e26\u975e\u5b8c\u5168\u7121\u95dc\u3002\n\u2713(D) \u5927\u6a21\u578b\u901a\u5e38\u8868\u73fe\u66f4\u4f73\uff08Scaling Laws\uff09\uff0c\u4f46\u63d0\u5347\u5e45\u5ea6\u53d6\u6c7a\u65bc\u8a13\u7df4\u8cc7\u6599\u54c1\u8cea\u8207\u8cc7\u6e90\u914d\u7f6e\uff0c\u6b63\u89e3\u3002"}, {"id": "114_4_s2_44", "exam": "114\u5e74\u7b2c\u56db\u68af\u6b21 \u79d1\u76ee\u4e8c\uff08\u751f\u6210\u5f0fAI\uff09", "examId": "114_4_s2", "no": 44, "q": "\u5728 AI \u61c9\u7528\u8a2d\u8a08\u4e2d\uff0cModel Context Protocol(MCP)\u8207\u6aa2\u7d22\u589e\u5f37\u751f\u6210 (RAG)\u90fd\u80fd\u64f4\u5c55\u6a21\u578b\u7684\u80fd\u529b\uff0c\u4f46\u5169\u8005\u7684\u6838\u5fc3\u5dee\u7570\u4e3b\u8981\u70ba\u4e0b\u5217\u4f55\u8005\uff1f", "opts": ["MCP \u64f4\u5c55\u6a21\u578b\u5de5\u5177\uff0c\u4f46\u4e3b\u8981\u7528\u65bc\u88dc\u8db3\u8a13\u7df4\u8cc7\u6599\u4e0d\u8db3", "MCP \u80fd\u6a19\u6e96\u5316\u9023\u63a5\u8cc7\u6e90\uff0c\u4f46\u4ecd\u9700\u4f9d\u8cf4\u5411\u91cf\u8cc7\u6599\u5eab", "RAG \u5e38\u7528\u65bc\u64f4\u5c55\u77e5\u8b58\u5eab\u5167\u5bb9\uff0c\u800c MCP \u66f4\u8457\u91cd\u65bc\u52d5\u614b\u5de5\u5177\u8207 API \u547c\u53eb \u7684\u6574\u5408", "RAG \u900f\u904e\u7d71\u4e00\u5354\u8b70\uff0c\u63d0\u5347\u56de\u7b54\u76f8\u95dc\u6027"], "ans": "C", "inferred": false, "expl": "\u3010\u7b54\u6848C\u3011MCP vs RAG \u6838\u5fc3\u5dee\u7570\u3002\n\u2717(A) MCP \u4e0d\u4e3b\u8981\u88dc\u8a13\u7df4\u8cc7\u6599\u3002\n\u2717(B) MCP \u4e0d\u4f9d\u8cf4\u5411\u91cf\u8cc7\u6599\u5eab\u3002\n\u2713(C) RAG \u64f4\u5c55\u77e5\u8b58\u5eab\u5167\u5bb9\uff1bMCP \u8457\u91cd\u52d5\u614b\u5de5\u5177\u8207 API \u547c\u53eb\u6574\u5408\uff0c\u5b9a\u4f4d\u4e0d\u540c\u3002\n\u2717(D) RAG \u975e\u7d71\u4e00\u5354\u8b70\u3002"}, {"id": "114_4_s2_45", "exam": "114\u5e74\u7b2c\u56db\u68af\u6b21 \u79d1\u76ee\u4e8c\uff08\u751f\u6210\u5f0fAI\uff09", "examId": "114_4_s2", "no": 45, "q": "\u4e0b\u5217\u54ea\u4e00\u500b\u8cc7\u6599\u96c6\u5c08\u9580\u8a2d\u8a08\u7528\u65bc\u6e2c\u8a66\u5927\u578b\u8a9e\u8a00\u6a21\u578b\u5728\u591a\u9818\u57df\u3001\u591a\u4efb\u52d9 \u8a9e\u8a00\u7406\u89e3\u4e2d\uff0c\u6db5\u84cb\u4eba\u6587\u3001\u79d1\u5b78\u8207\u793e\u6703\u79d1\u5b78\u7b49\u9818\u57df\uff0c\u800c\u975e\u5c08\u9580\u7528\u65bc\u6578\u5b78\u63a8 \u7406\u6216\u4e2d\u6587\u5c08\u696d\u77e5\u8b58\uff1f", "opts": ["MMLU", "GSM8K", "MATH", "C-Eval"], "ans": "A", "inferred": false, "expl": "\u3010\u7b54\u6848A\u3011\u591a\u9818\u57df\u59 14\u5e74\u7b2c\u56db\u68af\u6b21 \u79d1\u76ee\u4e8c\uff08\u751f\u6210\u5f0fAI\uff09", "examId": "114_4_s2", "no": 47, "q": "\u67d0\u9867\u554f\u516c\u53f8\u5c0e\u5165\u751f\u6210\u5f0f AI\uff0c\u5354\u52a9\u5718\u968a\u5feb\u901f\u6aa2\u7d22\u4e26\u6458\u8981\u9577\u7bc7\u7684\u6cd5\u898f\u6587\u4ef6\u3002 \u70ba\u4e86\u6539\u5584\u6aa2\u7d22\u7d50\u679c\u5e38\u51fa\u73fe\u4e0d\u76f8\u95dc\u6216\u904e\u65bc\u5206\u6563\u5167\u5bb9\u7684\u554f\u984c\uff0c\u4e0b\u5217\u4f55\u8005\u70ba \u5718\u968a\u6c7a\u5b9a\u5c0d\u6587\u4ef6\u9032\u884c\u6587\u672c\u5207\u5206(Chunking)\u7684\u4e3b\u8981\u76ee\u7684\uff1f", "opts": ["\u8b93\u6a21\u578b\u5728\u56de\u7b54\u6642\u80fd\u52a0\u5feb\u63a8\u7406\u901f\u5ea6", "\u63d0\u9ad8\u6aa2\u7d22\u76f8\u95dc\u6027\u8207\u964d\u4f4e\u9577\u4e0a\u4e0b\u6587\u566a\u97f3", "\u964d\u4f4e\u7cfb\u7d71\u8a18\u61b6\u9ad4\u548c\u786c\u9ad4\u8cc7\u6e90\u7684\u8ca0\u64d4", "\u4f7f\u6a21\u578b\u5728\u751f\u6210\u56de\u8986\u6642\u66f4\u5177\u5275\u9020\u6027\u8207\u591a\u6a23\u5316"], "ans": "B", "inferred": false, "expl": "\u3010\u7b54\u6848B\u3011Chunking \u4e3b\u8981\u76ee\u7684\u3002\n\u2717(A) \u4e0d\u662f\u52a0\u5feb\u63a8\u7406\u3002\n\u2713(B) \u63d0\u9ad8\u6aa2\u7d22\u76f8\u95dc\u6027 + \u964d\u4f4e\u9577\u4e0a\u4e0b\u6587\u566a\u97f3\u5e72\u64fe\uff0c\u662f Chunking \u7684\u4e3b\u8981\u76ee\u7684\u3002\n\u2717(C) \u4e0d\u662f\u7701\u8a18\u61b6\u9ad4\u3002\n\u2717(D) \u4e0d\u662f\u589e\u5275\u610f\u3002"}, {"id": "114_4_s2_48", "exam": "114\u5e74\u7b2c\u56db\u68af\u6b21 \u79d1\u76ee\u4e8c\uff08\u751f\u6210\u5f0fAI\uff09", "examId": "114_4_s2", "no": 48, "q": "\u67d0\u958b\u767c\u5718\u968a\u5728\u5efa\u7f6e\u4f01\u696d\u5167\u90e8\u77e5\u8b58\u6aa2\u7d22\u7cfb\u7d71\u6642\uff0c\u9078\u64c7\u63a1\u7528\u591a\u5411\u91cf\u6aa2\u7d22\u5668 (Multi-vector Retriever)\uff0c\u4e0b\u5217\u4f55\u8005\u70ba\u5354\u52a9\u63d0\u5347\u7cfb\u7d71\u67e5\u8a62\u7684\u5b8c\u6574\u6027 \u8207\u7cbe\u6e96\u5ea6\u7684\u4e3b\u8981\u65b9\u5f0f\uff1f", "opts": ["\u652f\u63f4\u540c\u6642\u8655\u7406\u591a\u7a2e\u8cc7\u8a0a\u8868\u793a\uff0c\u63d0\u5347\u8de8\u6587\u672c\u578b\u614b\u7684\u6aa2\u7d22\u6548\u679c", "\u900f\u904e\u591a\u5411\u91cf\u58d3\u7e2e\u8207\u5171\u4eab\u6b0a\u91cd\u65b9\u5f0f\uff0c\u964d\u4f4e\u6aa2\u7d22\u904e\u7a0b\u7684\u904b\u7b97\u8207\u5132\u5b58\u6210 \u672c", "\u4ee5\u5207\u5206\u4e26\u904e\u6ffe\u6587\u4ef6\u7247\u6bb5\uff0c\u6e1b\u5c11\u4e0a\u4e0b\u6587\u9577\u5ea6\u5e36\u4f86\u7684 Token \u8ca0\u64d4", "\u900f\u904e\u8abf\u6574\u751f\u6210\u968e\u6bb5\u7684\u6eab\u5ea6\u53c3\u6578\uff0c\u4f7f\u6a21\u578b\u5728\u56de\u8986\u6642\u66f4\u7a69\u5b9a\u4e00\u81f4"], "ans": "A", "inferred": false, "expl": "\u3010\u7b54\u6848A\u3011\u591a\u5411\u91cf\u6aa2\u7d22\u5668\u512a\u52e2\u3002\n\u2713(A) \u70ba\u540c\u4e00\u6587\u4ef6\u5efa\u7acb\u591a\u7a2e\u5411\u91cf\u8868\u793a\uff08\u6458\u8981\u3001\u6bb5\u843d\u3001\u95dc\u9375\u8a5e\u7b49\uff09\uff0c\u652f\u63f4\u8de8\u578b\u614b\u6aa2\u7d22\uff0c\u63d0\u5347\u5b8c\u6574\u6027\u8207\u7cbe\u6e96\u5ea6\u3002\n\u2717(B) \u4e0d\u662f\u58d3\u7e2e\u5171\u4eab\u6b0a\u91cd\u3002\n\u2717(C) \u4e0d\u662f\u5207\u5206\u904e\u6ffe\u3002\n\u2717(D) \u4e0d\u662f\u6eab\u5ea6\u53c3\u6578\u8abf\u6574\u3002"}, {"id": "114_4_s2_49", "exam": "114\u5e74\u7b2c\u56db\u68af\u6b21 \u79d1\u76ee\u4e8c\uff08\u751f\u6210\u5f0fAI\uff09", "examId": "114_4_s2", "no": 49, "q": "\u5728 Agentic AI \u7684\u67b6\u69cb\u4e2d\uff0c\u89e3\u6c7a\u65b9\u6848\u5716\u8b5c(Solution Graph)\u5e38\u88ab\u7528\u4f86 \u8f14\u52a9\u4ee3\u7406\u7684\u4efb\u52d9\u57f7\u884c\uff0c\u5176\u4e3b\u8981\u4f5c\u7528\u70ba\u4f55\uff1f", "opts": ["\u900f\u904e\u5716\u5f62\u7d50\u69cb\u5b8c\u5168\u53d6\u4ee3\u5927\u578b\u8a9e\u8a00\u6a21\u578b\u7684\u63a8\u7406\uff0c\u8b93\u4ee3\u7406\u53ea\u4f9d\u9760\u5716\u6f14\u7b97 \u6cd5\u5b8c\u6210\u4efb\u52d9", "\u50c5\u7528\u65bc\u4fdd\u5b58\u4ee3\u7406\u7684\u8f38\u51fa\u7d50\u679c\uff0c\u65b9\u4fbf\u5f8c\u7e8c\u6aa2\u8996\u8207\u5be9\u8a08\uff0c\u800c\u4e0d\u5f71\u97ff\u5be6\u969b \u63a8\u7406\u6d41\u7a0b", "\u5c07\u4ee3\u7406\u9650\u5236\u5728\u65e2\u5b9a\u6d41\u7a0b\u5167\uff0c\u907f\u514d\u5176\u7522\u751f\u504f\u96e2\u8a2d\u8a08\u8173\u672c\u7684\u884c\u70ba", "\u4f5c\u70ba\u4ee3\u7406\u5728\u57f7\u884c\u904e\u7a0b\u4e2d\u7684\u53c3\u8003\u6846\u67b6\uff0c\u7528\u65bc\u7d44\u7e54\u6c7a\u7b56\u6b65\u9a5f\u4e26\u652f\u63f4\u4efb\u52d9\u63a8\u7406"], "ans": "D", "inferred": false, "expl": "\u3010\u7b54\u6848D\u3011Solution Graph \u4f5c\u7528\u3002\n\u2717(A) \u4e0d\u53d6\u4ee3 LLM \u63a8\u7406\u3002\n\u2717(B) \u4e0d\u53ea\u4fdd\u5b58\u7d50\u679c\u3002\n\u2717(C) \u4e0d\u662f\u9650\u5236 Agent \u884c\u70ba\u3002\n\u2713(D) \u4f5c\u70ba Agent \u57f7\u884c\u904e\u7a0b\u4e2d\u7684\u53c3\u8003\u6846\u67b6\uff0c\u7d44\u7e54\u6c7a\u7b56\u6b65\u9a5f\u4e26\u652f\u63f4\u4efb\u52d9\u63a8\u7406\uff0c\u6b63\u89e3\u3002"}, {"id": "114_4_s2_50", "exam": "114\u5e74\u7b2c\u56db\u68af\u6b21 \u79d1\u76ee\u4e8c\uff08\u751f\u6210\u5f0fAI\uff09", "examId": "114_4_s2", "no": 50, "q": "\u5c0f\u660e\u60f3\u958b\u767c\u4e00\u500b\u90e8\u843d\u683c\u5beb\u4f5c\u5de5\u5177\uff0c\u8b93\u7528\u6236\u8f38\u5165\u6587\u7ae0\u958b\u982d\u5f8c\uff0c\u7cfb\u7d71\u81ea\u52d5\u5e6b \u5fd9\u5beb\u51fa\u5f8c\u7e8c\u5167\u5bb9\uff0c\u4f8b\u5982\u8f38\u5165\u300c\u4eca\u5929\u53bb\u4e86\u53f0\u5317\u6728\u67f5\u52d5\u7269\u5712...\u300d\uff0c\u7cfb\u7d71\u5c31\u80fd \u7e8c\u5beb\u3002\u82e5\u8981\u5be6\u73fe\u9019\u6a23\u7684\u529f\u80fd\uff0c\u6700\u9069\u5408\u9078\u64c7\u4e0b\u5217\u54ea\u4e00\u985e\u4efb\u52d9\uff1f", "opts": ["\u5e8f\u5217\u5230\u5e8f\u5217\u5efa\u6a21(Sequence-to-Sequence Modeling)\uff0c\u900f\u904e\u8f38\u5165\u5e8f\u5217\u7522\u751f\u65b0\u7684\u8f38\u51fa\u5e8f\u5217", "\u906e\u7f69\u8a9e\u8a00\u5efa\u6a21(Masked Language Modeling)\uff0c\u88dc\u9f4a\u6587\u5b57\u4e2d\u7f3a\u5931\u7684 \u8a5e\u8a9e\u6216\u7247\u6bb5", "\u751f\u6210\u5f0f\u8a9e\u8a00\u5efa\u6a21(Text Generation)\uff0c\u4f9d\u64da\u4e0a\u4e0b\u6587\u6301\u7e8c\u7522\u751f\u65b 5247\u5316\u9805\u4e5f\u662f\u65b9\u6cd5\u4e4b\u4e00\uff0c\u4f46\u5b98\u65b9\u7b54\u6848\u4ee5 A \u70ba\u4e3b\u3002"}, {"id": "114s_s1_4", "exam": "114\u5e74\u6a23\u984c \u79d1\u76ee\u4e00\uff08AI\u57fa\u790e\uff09", "examId": "114s_s1", "no": 4, "q": "\u4e0b\u5217\u54ea\u4e00\u9805\u6558\u8ff0\u7b26\u5408 AI \u6cbb\u7406\u7684\u6838\u5fc3\u539f\u5247\uff1f", "opts": ["AI \u7cfb\u7d71\u7684\u98a8\u96aa\u7b49\u7d1a\u61c9\u5728\u8a2d\u8a08\u968e\u6bb5\u9810\u5148\u8a55\u4f30\uff0c\u4e26\u65bc\u90e8\u7f72\u5f8c\u6301\u7e8c\u76e3\u63a7", "\u53ea\u8981 AI \u6a21\u578b\u8f38\u51fa\u7d50\u679c\u6e96\u78ba\uff0c\u662f\u5426\u516c\u5e73\u6216\u900f\u660e\u4e26\u975e\u6cbb\u7406\u91cd\u9ede", "AI \u6cbb\u7406\u61c9\u805a\u7126\u5728\u4f01\u696d\u5167\u90e8\u81ea\u884c\u8ca0\u8cac\uff0c\u4e0d\u9700\u5916\u90e8\u898f\u7bc4\u53c3\u8207", "\u5c0d\u65bc\u4f4e\u98a8\u96aa AI \u7cfb\u7d71\u7686\u53ef\u514d\u9664\u900f\u660e\u6027\u8207\u554f\u8cac\u6a5f\u5236\u4e4b\u8981\u6c42"], "ans": "A", "inferred": true, "expl": "\u3010\u7b54\u6848A\u3011AI \u6cbb\u7406\u6838\u5fc3\u539f\u5247\u3002\n\u2713(A) \u98a8\u96aa\u7b49\u7d1a\u5728\u8a2d\u8a08\u968e\u6bb5\u9810\u5148\u8a55\u4f30\u3001\u90e8\u7f72\u5f8c\u6301\u7e8c\u76e3\u63a7\uff0c\u662f AI \u6cbb\u7406\u7684\u6838\u5fc3\u539f\u5247\u3002\n\u2717(B) \u516c\u5e73\u900f\u660e\u4e5f\u662f\u6cbb\u7406\u91cd\u9ede\u3002\n\u2717(C) \u6cbb\u7406\u4e0d\u53ef\u53ea\u5167\u90e8\u8ca0\u8cac\u3002\n\u2717(D) \u4f4e\u98a8\u96aa\u4ecd\u9700\u900f\u660e\u6027\u8207\u554f\u8cac\u3002"}, {"id": "114s_s1_5", "exam": "114\u5e74\u6a23\u984c \u79d1\u76ee\u4e00\uff08AI\u57fa\u790e\uff09", "examId": "114s_s1", "no": 5, "q": "\u82e5\u8981\u8a2d\u8a08\u4e00\u500b\u80fd\u5920\u8fa8\u8b58\u4e26\u904e\u6ffe\u5783\u573e\u90f5\u4ef6\u7684\u7cfb\u7d71\uff0c\u61c9\u8a72\u9078\u64c7\u4e0b\u5217\u54ea\u4e00\u7a2e\u6a5f\u5668\u5b78\u7fd2\u6f14\u7b97\u6cd5\u4ee5\u5be6\u73fe\u6700\u4f73\u6548\u679c\uff1f", "opts": ["\u76e3\u7763\u5f0f\u5b78\u7fd2(Supervised Learning)", "\u975e\u76e3\u7763\u5f0f\u5b78\u7fd2(Unsupervised Learning)", "\u534a\u76e3\u7763\u5f0f\u5b78\u7fd2(Semi-supervised Learning)", "\u5f37\u5316\u5f0f\u5b78\u7fd2(Reinforcement Learning)"], "ans": "A", "inferred": true, "expl": "\u3010\u7b54\u6848A\u3011\u5783\u573e\u90f5\u4ef6\u904e\u6ffe\u3002\n\u2713(A) \u5df2\u6a19\u8a18\u300c\u5783\u573e/\u6b63\u5e38\u300d\u8cc7\u6599\u2192\u76e3\u7763\u5f0f\u5206\u985e\u6700\u9069\u5408\uff0c\u6b63\u89e3\u3002\n\u2717(B) \u975e\u76e3\u7763\u5f0f\u7121\u6a19\u7c64\uff0c\u4e0d\u9069\u5408\u660e\u78ba\u5206\u985e\u3002\n\u2717(C) \u534a\u76e3\u7763\u5f0f\u5728\u50c5\u5c11\u91cf\u6a19\u7c64\u6642\u4f7f\u7528\u3002\n\u2717(D) \u5f37\u5316\u5f0f\u9700\u4e92\u52d5\u56de\u994b\uff0c\u4e0d\u7b26\u975c\u614b\u90f5\u4ef6\u3002"}, {"id": "114s_s1_6", "exam": "114\u5e74\u6a23\u984c \u79d1\u76ee\u4e00\uff08AI\u57fa\u790e\uff09", "examId": "114s_s1", "no": 6, "q": "\u5047\u8a2d\u67d0\u570b\u6b63\u5728\u8003\u616e\u4f7f\u7528 AI \u6280\u8853\u4f86\u9032\u884c\u793e\u6703\u4fe1\u7528\u8a55\u5206\uff0c\u4e26\u6839\u64da\u5e74\u9f61\u3001\u7f3a\u9677\u3001\u7a2e\u65cf\u7b49\u7279\u5fb5\u4f86\u8a55\u5b9a\u500b\u4eba\u7684\u4fe1\u7528\uff1b\u540c\u6642\uff0c\u8a72\u570b\u8a08\u5283\u5728\u516c\u773e\u5834\u6240\u4f7f\u7528\u9060 \u7a0b\u751f\u7269\u8fa8\u8b58\u7cfb\u7d71\u9032\u884c\u57f7\u6cd5\uff0c\u76ee\u7684\u5728\u65bc\u63d0\u9ad8\u793e\u6703\u79e9\u5e8f\u548c\u5b89\u5168\u3002\u4e0a\u8ff0 AI \u61c9 \u7528\u53ef\u80fd\u6703\u5f15\u767c\u5c0d\u96b1\u79c1\u548c\u500b\u4eba\u6b0a\u5229\u7684\u91cd\u5927\u95dc\u6ce8\uff0c\u6839\u64da\u6b50\u76df\u300a\u4eba\u5de5\u667a\u6167\u6cd5\u300b (Artificial Intelligence Act, AIA)\u7684\u98a8\u96aa\u5206\u7d1a\uff0c\u9019\u985e\u61c9\u7528\u5c6c\u65bc\u54ea\u4e00\u98a8 \u96aa\u7b49\u7d1a\uff1f", "opts": ["\u4e0d\u53ef\u63a5\u53d7\u98a8\u96aa", "\u9ad8\u98a8\u96aa", "\u6709\u9650\u98a8\u96aa", "\u5c0f\u6216\u4f4e\u98a8\u96aa"], "ans": "A", "inferred": true, "expl": "\u3010\u7b54\u6848A\u3011\u793e\u6703\u4fe1\u7528\u8a55\u5206+\u9060\u7a0b\u751f\u7269\u8b58\u5225\u3002\n\u2713(A) \u6b64\u985e\u7528\u9014\u5c6c\u6b50\u76df AIA \u7684\u300c\u4e0d\u53ef\u63a5\u53d7\u98a8\u96aa\u300d\uff08\u793e\u6703\u4fe1\u7528\u8a55\u5206\u3001\u516c\u5171\u5834\u6240\u9060\u7aef\u751f\u7269\u8b58\u5225\u57f7\u6cd5\uff09\uff0c\u61c9\u88ab\u7981\u6b62\u3002\n\u2717(B) \u9ad8\u98a8\u96aa\u662f\u6b21\u4e00\u7d1a\u3002\n\u2717(C) \u6709\u9650\u98a8\u96aa\u518d\u6b21\u3002\n\u2717(D) \u4f4e\u98a8\u96aa\u6700\u4f4e\u3002"}, {"id": "114s_s1_7", "exam": "114\u5e74\u6a23\u984c \u79d1\u76ee\u4e00\uff08AI\u57fa\u790e\uff09", "examId": "114s_s1", "no": 7, "q": "\u67d0\u751f\u6210\u5f0f AI \u6a21\u578b\u63a5\u6536\u4e00\u6bb5\u8a9e\u97f3\u8f38\u5165\uff1a\u300c\u4e00\u96bb\u6234\u8457\u592a\u7a7a\u5e3d\u7684\u4f01\u9d5d\u6b63\u5728\u706b\u661f\u4e0a\u8df3\u821e\u300d\uff0c\u4e26\u6839\u64da\u8a72\u8a9e\u97f3\u5167\u5bb9\u7522\u751f\u4e00\u5f35\u5716\u50cf\u5448\u73fe\u76f8\u5c0d\u61c9\u7684\u5834\u666f\u3002\u6b64\u985e\u6a21\u578b\u6700\u7b26\u5408\u4e0b\u5217\u54ea\u4e00\u7a2e\u751f\u6210\u4efb\u52d9\u5206\u985e\uff1f", "opts": ["\u8a9e\u97f3\u751f\u6210\u5716\u7247", "\u5716\u50cf\u751f\u6210\u8a9e\u97f3", "\u8a9e\u97f3\u7ffb\u8b6f", "\u5716\u50cf\u6a19\u8a3b"], "ans": "A", "inferred": true, "expl": "\u3010\u7b54\u6848A\u3011\u8a9e\u97f3\u8f38\u5165\u2192\u5716\u50cf\u8f38\u51fa\u3002\n\u2713(A) \u8a9e\u97f3\u751f\u6210\u5716\u7247\uff08Speech-to-Image\uff09\u7684\u8de8\u6a21\u614b\u751f\u6210\uff0c\u6b63\u89e3\u3002\n\u2717(B) \u985b\u5012\uff08\u5716\u50cf\u2192\u8a9e\u97f3\uff09\u3002\n\u2717(C) \u8a9e\u97f3\u7ffb\u8b6f\u662f\u8a9e\u97f3\u2192\u53e6\u4e00\u8a9e\u8a00\u6587\u5b57\u3002\n\u2717(D) \u5716\u50cf\u6a19\u8a3b\u662f\u5716\u50cf\u2192\u6587\u5b57\u63cf\u8ff0\u3002"}, {"id": "114s_s1_8", "exam": "114\u5e74\u6a23\u984c \u79d1\u76ee\u4e00\uff08AI\u57fa\u790e\uff09", "examId": "114s_s1", "no": 8, "q": "\u4e0b\u5217\u4f55\u8005\u975e\u5927\u6578\u64da\u6642\u4ee3\u8cc7\u6599\u7684\u7279\u6027 3\u984c \u79d1\u76ee\u4e00\uff08AI\u57fa\u790e\uff09", "examId": "114s_s1", "no": 10, "q": "\u5728\u516c\u53f8\u8ca1\u52d9\u8cc7\u6599\u4e2d\uff0c\u767c\u73fe\u67d0\u7b46\u652f\u51fa\u91d1\u984d\u9054 1,000,000 \u5143\uff0c\u82e5\u5e0c\u671b\u5408\u7406\u5224 \u65b7\u8a72\u7b46\u8cc7\u6599\u662f\u5426\u70ba\u7570\u5e38\u503c\uff0c\u4e0b\u5217\u54ea\u4e00\u7a2e\u8655\u7406\u65b9\u5f0f\u6700\u70ba\u5408\u9069\uff1f", "opts": ["\u4ee5 Z-score \u65b9\u6cd5\u91cf\u5316\u7570\u5e38\u7a0b\u5ea6\uff0c\u5224\u65b7\u662f\u5426\u70ba\u6975\u7aef\u503c", "\u4ee5\u8cc7\u6599\u4e2d\u7684\u773e\u6578\u4f5c\u70ba\u53c3\u8003\u57fa\u6e96\uff0c\u5224\u65b7\u5176\u662f\u5426\u7570\u5e38", "\u5148\u900f\u904e\u4e3b\u6210\u5206\u5206\u6790(PCA)\u964d\u4f4e\u7dad\u5ea6\uff0c\u518d\u9032\u884c\u7570\u5e38\u503c\u5224\u5b9a", "\u76f4\u63a5\u5c07\u8a72\u7b46\u91d1\u984d\u66ff\u63db\u70ba\u8cc7\u6599\u4e2d\u4f4d\u6578\uff0c\u4ee5\u964d\u4f4e\u5176\u5c0d\u5206\u6790\u7d50\u679c\u7684\u5f71\u97ff"], "ans": "A", "inferred": true, "expl": "\u3010\u7b54\u6848A\u3011\u5224\u65b7 1,000,000 \u5143\u652f\u51fa\u662f\u5426\u7570\u5e38\u3002\n\u2713(A) Z-score \u91cf\u5316\u504f\u96e2\u5e73\u5747\u503c\u7684\u6a19\u6e96\u5dee\u500d\u6578\uff0c\u5ba2\u89c0\u5224\u65b7\u6975\u7aef\u503c\uff0c\u6b63\u89e3\u3002\n\u2717(B) \u773e\u6578\u5c0d\u9023\u7e8c\u91d1\u984d\u4e0d\u5408\u9069\u3002\n\u2717(C) PCA \u662f\u964d\u7dad\u975e\u7570\u5e38\u5075\u6e2c\u3002\n\u2717(D) \u76f4\u63a5\u66ff\u63db\u4e2d\u4f4d\u6578\u5931\u8cc7\u8a0a\u3002"}, {"id": "114s_s1_11", "exam": "114\u5e74\u6a23\u984c \u79d1\u76ee\u4e00\uff08AI\u57fa\u790e\uff09", "examId": "114s_s1", "no": 11, "q": "\u4e0b\u5217\u54ea\u4e00\u7a2e\u8cc7\u6599\u985e\u578b\u4e0d\u5c6c\u65bc\u975e\u7d50\u69cb\u5316\u8cc7\u6599\uff1f", "opts": ["X \u5149\u91ab\u5b78\u5f71\u50cf", "\u76e3\u63a7\u9304\u5f71\u756b\u9762", "\u5ba2\u670d\u96fb\u8a71\u9304\u97f3", "\u7d44\u7e54\u5167\u90e8\u7684\u95dc\u4fc2\u578b\u8cc7\u6599\u5eab\u8a18\u9304"], "ans": "D", "infe  ["\u6c7a\u7b56\u6a39(Decision Tree)", "\u7dda\u6027\u5efb\u6b78(Linear Regression)", "\u57fa\u65bc\u5bc6\u5ea6\u4e4b\u542b\u566a\u7a7a\u9593\u805a\u985e\u6cd5(Density-Based Spatial Clustering of Application with Noise, DBSCAN)", "K-means \u805a\u985e(K-means Clustering)"], "ans": "A", "inferred": true, "expl": "\u3010\u7b54\u6848A\u3011\u9810\u6e2c\u5fc3\u8840\u7ba1\u75be\u75c5\uff08\u75c5\u60a3/\u6b63\u5e38\uff09\u3002\n\u2713(A) \u6c7a\u7b56\u6a39\u9069\u5408\u591a\u5c6c\u6027\u5206\u985e\uff08\u5e74\u9f61\u3001\u8840\u58d3\u3001\u8840\u578b\uff09+ \u6709\u6a19\u7c64\uff0c\u6b63\u89e3\u3002\n\u2717(B) \u7dda\u6027\u8ff4\u6b78\u9810\u6e2c\u9023\u7e8c\u503c\u3002\n\u2717(C) DBSCAN \u662f\u975e\u76e3\u7763\u5bc6\u5ea6\u805a\u985e\u3002\n\u2717(D) K-means \u662f\u975e\u76e3\u7763\u805a\u985e\u3002"}, {"id": "114s_s1_18", "exam": "114\u5e74\u6a23\u984c \u79d1\u76ee\u4e00\uff08AI\u57fa\u790e\uff09", "examId": "114s_s1", "no": 18, "q": "\u516c\u53f8\u5728\u6574\u5408\u8cc7\u6599\u6642\uff0c\u767c\u73fe\u540c\u4e00\u5ba2\u6236\u7684\u59d3\u540d\u5728\u4e0d\u540c\u7cfb\u7d71\u4e2d\u62fc\u5beb\u4e0d\u4e00\u81f4(\u4f8b \u5982\u300c\u9673\u5927\u6587\u300d\u8207\u300c\u9673\u5927\u6587\u5148\u751f\u300d)\uff0c\u5c0e\u81f4\u8cc7\u6599\u7121\u6cd5\u6b63\u78ba\u5c0d\u61c9\u3002\u8acb\u554f\u6b64\u985e\u8cc7 \u6599\u54c1\u8cea\u554f\u984c\u61c9\u8a72\u5728 ETL \u54ea\u4e00\u500b\u6d41\u7a0b\u6b65\u9a5f\u4e2d\u9032\u884c\u8655\u7406\uff1f", "opts": ["\u8cc7\u6599\u8f49\u63db(Data Transformation)", "\u8cc7\u6599\u64f7\u53d6(Data Extraction)", "\u8cc7\u6599\u8f09\u5165(Data Loading)", "\u578b\u614b\u8f49\u63db(Type Conversion)"], "ans": "A", "inferred": true, "expl": "\u3010\u7b54\u6848A\u3011\u59d3\u540d\u683c\u5f0f\u4e0d\u4e00\u81f4\u3002\n\u2713(A) \u8cc7\u6599\u8f49\u63db\uff08Transformation\uff09\u8655\u7406\u683c\u5f0f\u7d71\u4e00\u8207\u6a19\u6e96\u5316\uff0c\u59d3\u540d\u683c\u5f0f\u554f\u984c\u5c6c\u6b64\u968e\u6bb5\uff0c\u6b63\u89e3\u3002\n\u2717(B) \u64f7\u53d6\u662f\u62bd\u53d6\u539f\u59cb\u8cc7\u6599\u3002\n\u2717(C) \u8f09\u5165\u662f\u5b58\u5165\u76ee\u6a19\u3002\n\u2717(D) \u578b\u614b\u8f49\u63db\u662f\u5b50\u6982\u5ff5\u3002"}, {"id": "114s_s1_19", "exam": "114\u5e74\u6a23\u984c \u79d1\u76ee\u4e00\uff08AI\u57fa\u790e\uff09", "examId": "114s_s1", "no": 19, "q": "\u9280\u884c\u60f3\u5efa\u7acb\u804a\u5929\u6a5f\u5668\u4eba\uff0c\u53ef\u900f\u904e\u4e0b\u5217\u54ea\u4e00\u7a2e\u9818\u57df\u6280\u8853\u4f86\u9054\u6210\uff1f", "opts": ["\u8cc7\u6599\u5eab\u7ba1\u7406\u6280\u8853", "\u6a5f\u5668\u5b78\u7fd2\u8207\u81ea\u7136\u8a9e\u8a00\u8655\u7406", "\u7db2\u9801\u958b\u767c\u6280\u8853", "\u7db2\u8def\u5b89\u5168\u6280\u8853"], "ans": "B", "inferred": true, "expl": "\u3010\u7b54\u6848B\u3011\u9280\u884c\u804a\u5929\u6a5f\u5668\u4eba\u3002\n\u2717(A) \u8cc7\u6599\u5eab\u7ba1\u7406\u662f\u5132\u5b58\u6280\u8853\u3002\n\u2713(B) \u6a5f\u5668\u5b78\u7fd2 + NLP \u662f\u804a\u5929\u6a5f\u5668\u4eba\u7684\u6838\u5fc3\u6280\u8853\u7d44\u5408\uff0c\u6b63\u89e3\u3002\n\u2717(C) \u7db2\u9801\u958b\u767c\u662f\u524d\u7aef\u3002\n\u2717(D) \u7db2\u8def\u5b89\u5168\u662f\u9632\u8b77\u3002"}, {"id": "114s_s1_20", "exam": "114\u5e74\u6a23\u984c \u79d1\u76ee\u4e00\uff08AI\u57fa\u790e\uff09", "examId": "114s_s1", "no": 20, "q": "\u7dda\u6027\u8ff4\u6b78\u6a21\u578b\u6700\u9069\u5408\u89e3\u6c7a\u54ea\u7a2e\u985e\u578b\u7684\u554f\u984c\uff1f", "opts": ["\u5716\u50cf\u5206\u985e", "\u92b7\u552e\u984d\u9810\u6e2c", "\u805a\u985e\u5206\u6790", "\u904a\u6232\u7b56\u7565\u5b78\u7fd2"], "ans": "B", "inferred": true, "expl": "\u3010\u7b54\u6848B\u3011\u7dda\u6027\u8ff4\u6b78\u9069\u7528\u554f\u984c\u3002\n\u2717(A) \u5716\u50cf\u5206\u985e\u7528 CNN \u7b49\u3002\n\u2713(B) \u92b7\u552e\u984d\u9810\u6e2c\u662f\u9023\u7e8c\u503c\u8f38\u51fa\uff0c\u6700\u9069\u5408\u7dda\u6027\u8ff4\u6b78\uff0c\u6b63\u89e3\u3002\n\u2717(C) \u805a\u985e\u5206\u6790\u662f\u975e\u76e3\u7763\u5f0f\u3002\n\u2717(D) \u904a\u6232\u7b56\u7565\u5b78\u7fd2\u662f\u5f37\u5316\u5b78\u7fd2\u3002"}, {"id": "114s_s1_21", "exam": "114\u5e74\u6a23\u984c \u79d1\u76ee\u4e00\uff08AI\u57fa\u790e\uff09", "examId": "114s_s1", "no": 21, "q": "\u67d0\u91d1\u878d\u6a5f\u69cb\u5df2\u90e8\u7f72\u7684 AI \u6a21\u578b\u906d\u5ba2\u6236\u62b1\u6028\u6709\u4e0d\u516c\u5e73\u60c5\u5f62\uff0c\u7d93\u6578\u64da\u5206\u6790\u767c\u73fe\u4e0d\u540c\u65cf\u7fa4\u4e4b\u9593\u7684\u6a21\u578b\u9810\u6e2c\u7d50\u679c\u5b58\u5728\u986f\u8457\u5dee\u7570\u3002\u6839\u64da\u91d1\u878d\u76e3\u7763\u7ba1\u7406\u59d4\u54e1\u6703\u767c\u5e03\u4e4b\u300a\u91d1\u878d\u696d\u904b\u7528\u4eba\u5de5\u667a\u6167(AI)\u6307\u5f15\u300b\uff0c\u6b64\u60c5\u5f62\u4e0b\u6700\u9069\u7576\u7684\u8655\u7f6e\u65b9\u5f0f\u70ba\u4f55\uff1f", "opts": ["\u91cd\u65b0\u8a13\u7df4\u65b0\u7684\u6a21\u578b\uff0c\u4e26\u91cd\u65b0\u90e8\u7f72\u4ee5\u4fee\u6b63\u7d50\u679c", "\u555f\u52d5\u4eba\u5de5\u8986\u6838\u8207\u8abf\u6574\u6a5f\u5236\uff0c\u4e26\u6301\u7e8c\u76e3\u63a7\u65cf\u7fa4\u9593\u9810\u6e2c\u6548\u679c", "\u8a18\u9304\u6a21\u578b\u9810\u6e2c\u7d50\u679c\u4e26\u63d0\u4ea4\u5099\u67e5\uff0c\u5f85\u672a\u4f86\u6cd5\u898f\u4fee\u6b63\u5f8c\u518d\u884c\u8655\u7406", "\u82e5\u6a21\u578b\u504f\u8aa4\u5c6c\u65bc\u9ad8\u98a8\u96aa\u7528\u9014\uff0c\u53ef\u7531\u98a8\u63a7\u6216\u5408\u898f\u55ae\u4f4d\u5148\u884c\u5be9\u8996\u5176\u516c\u5e73\u6027\u5f71\u97ff\uff0c\u518d\u6c7a\u5b9a\u662f\u5426\u555f\u52d5\u8abf\u6574\u6a5f\u5236"], "ans": "B", "inferred": true, "expl": "\u3010\u7b54\u6848B\u3011\u65cf\u7fa4\u9810\u6e2c\u5dee\u7570\u3002\n\u2717(A) \u91cd\u65b0\u8a13\u7df4\u592a\u5f37\u786c\u672a\u5fc5\u5fc5\u8981\u3002\n\u2713(B) \u555f\u52d5\u4eba\u5de5\u8986\u6838\u8207\u8abf\u6574\u6a5f\u5236 + \u6301\u7e8c\u76e3\u63a7\u65cf\u7fa4\u9810\u6e2c\u6548\u679c\uff0c\u7b26\u5408\u91d1\u7ba1\u6703\u6307\u5f15\u3002\n\u2717(C) \u8a18\u9304\u5099\u67e5\u592a\u88ab\u52d5\u3002\n\u2717(D) \u9ad8\u98a8\u96aa\u624d\u5be9\u8996\u8f03\u88ab\u52d5\u3002"}, {"id": "114s_s1_22", "exam": "114\u5e74\u6a23\u984c \u79d1\u76ee\u4e00\uff08AI\u57fa\u790e\uff09", "examId": "114s_s1", "no": 22, "q": "\u8acb\u554f\u4e0b\u5217\u4f55\u8005\u4e0d\u662f\u5e38\u898b\u7684\u7279\u5fb5\u9078\u53d6\u6280\u8853\u6216\u65b9\u6cd5\uff1f", "opts": ["\u76ae\u723e\u68ee\u7a4d\u5dee\u76f8\u95dc\u5206\u6790(Pearson Correlation)", "\u4e3b\u6210\u5206\u5206\u6790(Principal Components Analysis, PCA)", "\u8ff4\u6b78\u5206\u6790(Regression Analysis)", "\u96a8\u6a5f\u68ee\u6797(Random Forest)"], "ans": "C", "inferred": true, "expl": "\u3010\u7b54\u6848C\u3011\u975e\u7279\u5fb5\u9078\u53d6\u6280\u8853\u3002\n\u2717(A) Pearson \u76f8\u95dc\u662f Filter \u6cd5\u7279\u5fb5\u9078\u53d6\u3002\n\u2717(B) PCA \u662f\u964d\u7dad\uff08\u4e5f\u662f\u5ee3\u7fa9\u7279\u5fb5\u9078\u53d6\uff09\u3002\n\u2713(C) \u8ff4\u6b78\u5206\u6790\u672c\u8eab\u662f\u9810\u6e2c\u5efa\u6a21\u5de5\u5177\uff0c\u4e0d\u662f\u7279\u5fb5\u9078\u53d6\u65b9\u6cd5\uff0c\u6b63\u89e3\u3002\n\u2717(D) Random Forest \u7279\u5fb5\u91cd\u8981\u6027\u662f Embedded \u6cd5\u3002"}, {"id": "114s_s1_23", "exam": "114\u5e74\u6a23\u984c \u79d1\u76ee\u4e00\uff08AI\u57fa\u790e\uff09", "examId": "114s_s1", "no": 23, "q": "\u4ea4\u53c9\u9a57\u8b49\u7684\u4e3b\u8981\u76ee\u7684\u662f\u4ec0\u9ebc\uff1f", "opts": ["\u63d0\u9ad8\u6a21\u578b\u7684\u8a13\u7df4\u901f\u5ea6", "\u9a57\u8b49\u6578\u64da\u662f\u5426\u7dda\u6027\u53ef\u5206", "\u6e1b\u5c11\u6a21\u578b\u7684\u904e\u64ec\u5408\u98a8\u96aa", "\u6e2c\u8a66\u6a21\u578b\u7684\u5bb9\u932f\u80fd\u529b"], "ans": "C", "inferred": true, "expl": "\u3010\u7b54\u6848C\u3011\u4ea4\u53c9\u9a57\u8b49\u4e3b\u8981\u76ee\u7684\u3002\n\u2717(A) \u4e0d\u662f\u52a0\u901f\u8a13\u7df4\u3002\n\u2717(B) \u4e0d\u662f\u6aa2\u9a57\u7dda\u6027\u53ef\u5206\u3002\n\u2713(C) \u900f\u904e\u591a\u6b21\u5206\u5272\u8a55\u4f30\u63d0\u4f9b\u53ef\u9760\u6cdb\u5316\u4f30\u8a08\uff0c\u6e1b\u5c11\u904e\u64ec\u5408\u98a8\u96aa\uff0c\u6b63\u89e3\u3002\n\u2717(D) \u4e0d\u662f\u6e2c\u8a66\u5bb9\u932f\u80fd\u529b\u3002"}, {"id": "114s_s1_24", "exam": "114\u5e74\u6a23\u984c \u79d1\u76ee\u4e00\uff08AI\u57fa\u790e\uff09", "examId": "114s_s1", "no": 24, "q": "\u4e00\u5bb6\u667a\u6167\u5de5\u5ee0\u4f7f\u7528\u6a5f\u5668\u5b78\u7fd2\u5206\u985e\u6a21\u578b\u9810\u6e2c\u95dc\u9375\u8a2d\u5099\u662f\u5426\u6703\u7570\u5e38\u505c\u6a5f\u3002\u5b8c\u6210\u6a21\u578b\u8a13\u7df4\u5f8c\uff0c\u5718\u968a\u5e0c\u671b\u5168\u9762\u8a55\u4f30\u6a21\u578b\u5728\u4e0d\u540c\u9762\u5411\u7684\u8868\u73fe\u3002\u8acb\u554f\u4e0b\u5217\u54ea\u9805\u6307\u6a19\u6700\u9069\u5408\u7528\u4f86\u8861\u91cf\u6a21\u578b\u5728\u5075\u6e2c\u7570\u5e38\u505c\u6a5f\u6642\u7684\u300c\u6f0f\u5831\u7387\u300d(\u5373\u672a\u80fd\u6b63\u78ba\u5075\u6e2c\u51fa\u7570\u5e38\u4e8b\u4ef6\u7684\u6bd4\u4f8b)\uff1f", "opts": ["\u6e96\u78ba\u7387(Accuracy)\uff0c\u5373\u6a21\u578b\u6574\u9ad4\u9810\u6e2c\u6b63\u78ba\u7684\u6bd4\u4f8b", "\u53ec\u56de\u7387(Recall)\uff0c\u5373\u6a21\u578b\u80fd\u6b63\u78ba\u627e\u51fa\u7570\u5e38\u505c\u6a5f\u7684\u6bd4\u4f8b", "F1 \u5206\u6578(F1 Score)\uff0c\u6e96\u78ba\u7387\u8207\u53ec\u56de\u7387\u7684\u8abf\u548c\u5e73\u5747\u6578", "\u5047\u967d\u6027\u7387(False Positive Rate)\uff0c\u5373\u5c07\u6b63\u5e38\u4e8b\u4ef6\u8aa4\u5224\u70ba\u7570\u5e38\u7684\u6bd4\u4f8b"], "ans": "B", "inferred": true, "expl": "\u3010\u7b54\u6848B\u3011\u8861\u91cf\u6f0f\u5831\u7387\u3002\n\u2717(A) Accuracy \u662f\u6574\u9ad4\u6b63\u78ba\u7387\u3002\n\u2713(B) Recall = TP/(TP+FN) \u8861\u91cf\u627e\u51fa\u7570\u5e38\u7684\u6bd4\u4f8b\uff0c1-Recall=\u6f0f\u5831\u7387\uff0c\u6b63\u89e3\u3002\n\u2717(C) F1 \u662f\u7d9c\u5408\u6307\u6a19\u3002\n\u2717(D) FPR \u662f\u8aa4\u5831\u7387\uff08\u5c07\u6b63\u5e38\u8aa4\u5224\u70ba\u7570\u5e38\uff09\u3002"}, {"id": "114s_s1_25", "exam": "114\u5e74\u6a23\u984c \u79d1\u76ee\u4e00\uff08AI\u57fa\u790e\uff09", "examId": "114s_s1", "no": 25, "q": "\u795e\u7d93\u7db2\u8def\u8207\u50b3\u7d71\u6a5f\u5668\u5b78\u7fd2\u6a21\u578b\u7684\u4e3b\u8981\u5340\u5225\u662f\u4ec0\u9ebc\uff1f", "opts": ["\u795e\u7d93\u7db2\u u8a00\u751f\u6210\u6280\u8853\u53ef\u4ee5\u751f\u6210\u81ea\u7136\u6d41\u66a2\u7684\u6587\u672c\uff0c\u7528\u65bc\u804a\u5929\u6a5f\u5668\u4eba\u548c\u81ea\u52d5\u6587\u6848\u751f\u6210", "\u8a9e\u610f\u5206\u6790\u6280\u8853\u7406\u89e3\u6587\u672c\u7684\u8a9e\u610f\uff0c\u4e26\u4e3b\u8981\u7528\u65bc\u8a9e\u97f3\u8b58\u5225\u548c\u6a5f\u5668\u7ffb\u8b6f", "\u6a5f\u5668\u7ffb\u8b6f\u6280\u8853\u81ea\u52d5\u7ffb\u8b6f\u6587\u672c\uff0c\u4fc3\u9032\u591a\u8a9e\u8a00\u652f\u63f4\u548c\u5168\u7403\u6e9d\u901a"], "ans": "C", "inferred": true, "expl": "\u3010\u7b54\u6848C\u3011NLP \u6838\u5fc3\u6280\u8853\u300c\u4e0d\u6b63\u78ba\u300d\u3002\n\u2717(A) \u8a9e\u97f3\u8b58\u5225\u6280\u8853\u63cf\u8ff0\u6b63\u78ba\u3002\n\u2717(B) \u81ea\u7136\u8a9e\u8a00\u751f\u6210\u63cf\u8ff0\u6b63\u78ba\u3002\n\u2713(C) \u8a9e\u610f\u5206\u6790\u4e3b\u8981\u7528\u65bc\u60c5\u611f\u5206\u6790\u3001\u610f\u5716\u8b58\u5225\u3001\u8a9e\u610f\u641c\u5c0b\uff0c\u300c\u4e3b\u8981\u7528\u65bc\u8a9e\u97f3\u8b58\u5225\u8207\u6a5f\u5668\u7ffb\u8b6f\u300d\u63cf\u8ff0\u932f\u8aa4\uff0c\u6b63\u89e3\u3002\n\u2717(D) \u6a5f\u5668\u7ffb\u8b6f\u63cf\u8ff0\u6b63\u78ba\u3002"}, {"id": "114s_s1_31", "exam": "114\u5e74\u6a23\u984c \u79d1\u76ee\u4e00\uff08AI\u57fa\u790e\uff09", "examId": "114s_s1", "no": 31, "q": "\u95dc\u65bc\u300c\u8ca0\u8cac\u4efb\u7684 AI\u300d\uff0c\u4e0b\u5217\u6558\u8ff0\u4f55\u8005\u8f03\u70ba\u6b63\u78ba\uff1f", "opts": ["AI \u7cfb\u7d71\u7684\u958b\u767c\u8005\u5c0d AI \u7cfb\u7d71\u7684\u884c\u70ba\u8ca0\u8cac", "AI \u7cfb\u7d71\u7684\u4f7f\u7528\u8005\u5c0d AI \u7cfb\u7d71\u7684\u7d50\u679c\u8ca0\u8cac", "AI \u7cfb\u7d71\u672c\u8eab\u5c0d\u5176\u884c\u70ba\u8ca0\u8cac", "\u653f\u5e9c\u5c0d AI \u7cfb\u7d71\u7684\u767c\u5c55\u8ca0\u8cac"], "ans": "A", "inferred": true, "expl": "\u3010\u7b54\u6848A\u3011\u8ca0\u8cac\u4efb\u7684 AI\u3002\n\u2713(A) AI \u7cfb\u7d71\u958b\u767c\u8005\u5c0d\u7cfb\u7d71\u884c\u70ba\u8ca0\u9996\u8981\u8cac\u4efb\uff0c\u662f\u8ca0\u8cac\u4efb AI \u7684\u68
