<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>iPAS AI應用規劃師 初級 歷屆考題互動測驗</title>
<style>
:root{--pri:#4f46e5;--pri2:#7c3aed;--ok:#22c55e;--err:#ef4444;--warn:#f59e0b;--bg:#f8fafc;--card:#fff;--txt:#1e293b;--sub:#64748b;--bdr:#e2e8f0;}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:-apple-system,"Noto Sans TC",sans-serif;background:var(--bg);color:var(--txt);min-height:100vh;}
.hdr{background:linear-gradient(135deg,var(--pri),var(--pri2));color:#fff;padding:18px 24px;text-align:center;}
.hdr h1{font-size:1.4rem;font-weight:700;}
.hdr p{font-size:.82rem;opacity:.85;margin-top:3px;}
.scr{display:none;max-width:860px;margin:0 auto;padding:20px 16px;}
.scr.on{display:block;}
/* mode */
.mgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(230px,1fr));gap:10px;margin-top:16px;}
.mcard{background:var(--card);border:2px solid var(--bdr);border-radius:12px;padding:16px;cursor:pointer;transition:all .18s;display:flex;flex-direction:column;gap:5px;}
.mcard:hover{border-color:var(--pri);box-shadow:0 4px 14px rgba(79,70,229,.15);transform:translateY(-2px);}
.mcard.sel{border-color:var(--pri);background:#eef2ff;}
.badge{font-size:.68rem;background:var(--pri);color:#fff;border-radius:20px;padding:2px 8px;display:inline-block;width:fit-content;}
.badge.inf{background:var(--warn);}
.mcard h3{font-size:.9rem;font-weight:600;}
.mcard p{font-size:.78rem;color:var(--sub);}
.sbtn{display:block;width:100%;max-width:300px;margin:20px auto 0;background:var(--pri);color:#fff;border:none;border-radius:10px;padding:13px;font-size:.95rem;font-weight:600;cursor:pointer;}
.sbtn:hover{background:#4338ca;}
.sbtn:disabled{background:#94a3b8;cursor:not-allowed;}
/* quiz */
.qtop{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;flex-wrap:wrap;gap:8px;}
.qinfo{font-size:.82rem;color:var(--sub);}
.tmr{font-size:.95rem;font-weight:700;color:var(--pri);background:#eef2ff;padding:5px 13px;border-radius:20px;}
.tmr.warn{color:var(--err);background:#fef2f2;}
.pbar{height:5px;background:var(--bdr);border-radius:3px;margin-bottom:18px;}
.pfill{height:100%;background:var(--pri);border-radius:3px;transition:width .3s;}
.qcard{background:var(--card);border-radius:14px;padding:22px;box-shadow:0 2px 8px rgba(0,0,0,.06);}
.qmeta{font-size:.73rem;color:var(--sub);margin-bottom:6px;}
.infnote{font-size:.73rem;color:#92400e;background:#fffbeb;border:1px solid #fde68a;border-radius:6px;padding:5px 10px;margin-bottom:10px;}
.qtxt{font-size:.97rem;line-height:1.8;margin-bottom:18px;font-weight:500;}
.opts{display:flex;flex-direction:column;gap:9px;}
.obtn{display:flex;align-items:flex-start;gap:11px;background:var(--bg);border:2px solid var(--bdr);border-radius:10px;padding:11px 15px;cursor:pointer;text-align:left;font-size:.9rem;line-height:1.6;width:100%;transition:all .15s;}
.obtn:hover:not(:disabled){border-color:#818cf8;background:#f0f4ff;}
.ol{font-weight:700;color:var(--pri);min-width:20px;flex-shrink:0;}
.obtn.ok{border-color:var(--ok);background:#f0fdf4;}
.obtn.ok .ol{color:var(--ok);}
.obtn.no{border-color:var(--err);background:#fef2f2;}
.obtn.no .ol{color:var(--err);}
.obtn:disabled{cursor:default;}
/* feedback + explanation */
.fb{margin-top:14px;padding:12px 15px;border-radius:8px;font-size:.88rem;line-height:1.55;}
.fb.ok{background:#f0fdf4;border:1px solid #bbf7d0;color:#166534;}
.fb.no{background:#fef2f2;border:1px solid #fecaca;color:#991b1b;}
.expl{margin-top:12px;background:#f0f9ff;border:1px solid #bae6fd;border-radius:8px;padding:12px 15px;font-size:.88rem;line-height:1.75;color:#0c4a6e;white-space:pre-wrap;}
.expl strong{display:block;margin-bottom:4px;color:#0369a1;}
/* nav */
.qnav{display:flex;justify-content:space-between;align-items:center;margin-top:18px;}
.nbtn{background:var(--pri);color:#fff;border:none;border-radius:8px;padding:10px 20px;font-size:.88rem;cursor:pointer;transition:background .18s;}
.nbtn:hover{background:#4338ca;}
.nbtn.sec{background:#fff;color:var(--pri);border:2px solid var(--pri);}
.nbtn.sec:hover{background:#eef2ff;}
.nbtn:disabled{background:var(--bdr);color:var(--sub);cursor:not-allowed;border:none;}
/* result */
.rcard{background:var(--card);border-radius:16px;padding:28px;text-align:center;box-shadow:0 4px 16px rgba(0,0,0,.08);}
.sring{width:130px;height:130px;border-radius:50%;border:10px solid var(--bdr);margin:0 auto 16px;display:flex;align-items:center;justify-content:center;flex-direction:column;}
.sring.pass{border-color:var(--ok);}
.sring.fail{border-color:var(--err);}
.spct{font-size:1.9rem;font-weight:800;}
.slbl{font-size:.72rem;color:var(--sub);}
.rstats{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin:16px 0;}
.sbox{background:var(--bg);border-radius:10px;padding:12px;}
.snum{font-size:1.4rem;font-weight:700;}
.sdsc{font-size:.72rem;color:var(--sub);margin-top:2px;}
.rbtns{display:flex;gap:10px;justify-content:center;flex-wrap:wrap;margin-top:20px;}
.rbtn{padding:11px 22px;border-radius:10px;font-size:.92rem;font-weight:600;cursor:pointer;border:none;transition:all .18s;}
.rbtn.pri{background:var(--pri);color:#fff;}
.rbtn.pri:hover{background:#4338ca;}
.rbtn.sec{background:#fff;color:var(--pri);border:2px solid var(--pri);}
.rbtn.sec:hover{background:#eef2ff;}
/* review */
.rv{margin-top:24px;text-align:left;}
.wi{background:#fef2f2;border:1px solid #fecaca;border-radius:10px;padding:13px;margin-bottom:10px;}
.wq{font-size:.88rem;line-height:1.7;margin-bottom:7px;}
.wa{font-size:.83rem;margin-bottom:3px;}
.ca{color:var(--ok);font-weight:600;}
.ya{color:var(--err);font-weight:600;}
.we{margin-top:7px;background:#f0f9ff;border:1px solid #bae6fd;border-radius:6px;padding:8px 11px;font-size:.82rem;line-height:1.7;color:#0c4a6e;white-space:pre-wrap;}
.stitle{font-size:1.05rem;font-weight:700;margin:20px 0 10px;display:flex;align-items:center;gap:7px;}
.stitle::before{content:"";display:block;width:4px;height:16px;background:var(--pri);border-radius:2px;}
</style>
</head>
<body>
<div class="hdr"><h1>&#127891; iPAS AI應用規劃師 初級</h1><p>歷屆考題互動測驗｜270題完整題庫＋解題說明</p><a href="cram.html" style="display:inline-block;margin-top:10px;background:rgba(255,255,255,.18);color:#fff;padding:6px 16px;border-radius:20px;font-size:.78rem;text-decoration:none;font-weight:600;border:1px solid rgba(255,255,255,.35);">&#128211; 考前衝刺 Notebook &rarr;</a></div>

<div class="scr on" id="scr-mode">
  <div class="stitle">選擇考試模式</div>
  <div class="mgrid" id="mgrid"></div>
  <button class="sbtn" id="sbtn" onclick="startQuiz()" disabled>開始測驗</button>
</div>

<div class="scr" id="scr-quiz">
  <div class="qtop">
    <div class="qinfo"><span id="qmname"></span>｜第<span id="qcur">1</span>/<span id="qtot">50</span>題</div>
    <div class="tmr" id="tmr">90:00</div>
  </div>
  <div class="pbar"><div class="pfill" id="pfill" style="width:0%"></div></div>
  <div class="qcard">
    <div class="qmeta" id="qmeta"></div>
    <div class="infnote" id="infnote" style="display:none">&#9888; 此題答案為AI推測，請注意</div>
    <div class="qtxt" id="qtxt"></div>
    <div class="opts" id="qopts"></div>
    <div class="fb" id="qfb" style="display:none"></div>
    <div class="expl" id="qexpl" style="display:none"><strong>&#128218; 解題說明</strong><span id="qexpl-txt"></span></div>
  </div>
  <div class="qnav">
    <button class="nbtn sec" onclick="prevQ()" id="bprev">&#8592; 上一題</button>
    <span id="qdone" style="font-size:.82rem;color:var(--sub)"></span>
    <button class="nbtn" onclick="nextQ()" id="bnext">下一題 &#8594;</button>
  </div>
</div>

<div class="scr" id="scr-result">
  <div class="rcard">
    <div class="sring" id="sring"><div class="spct" id="spct">0%</div><div class="slbl">得分率</div></div>
    <div id="plbl" style="font-size:1.05rem;font-weight:700;margin-bottom:6px;"></div>
    <p id="sdet" style="color:var(--sub);font-size:.88rem;"></p>
    <div class="rstats">
      <div class="sbox"><div class="snum" id="sc" style="color:var(--ok)">0</div><div class="sdsc">答對</div></div>
      <div class="sbox"><div class="snum" id="sw" style="color:var(--err)">0</div><div class="sdsc">答錯</div></div>
      <div class="sbox"><div class="snum" id="ss" style="color:var(--warn)">0</div><div class="sdsc">未作答</div></div>
    </div>
    <div class="rbtns">
      <button class="rbtn pri" onclick="showReview()">&#128221; 複習錯題</button>
      <button class="rbtn sec" onclick="backMenu()">&#8617; 返回選題</button>
    </div>
  </div>
  <div id="rv" class="rv" style="display:none"></div>
</div>

<script>
const Q=[{"id": "115_1_s1_1", "exam": "115\u5e74\u7b2c\u4e00\u6b21 \u79d1\u76ee\u4e00\uff08AI\u57fa\u790e\uff09", "examId": "115_1_s1", "no": 1, "q": "\u4e0b\u5217\u4f55\u8005\u4e0d\u5c6c\u65bc\u8cc7\u6599\u6574\u5408(Data Integration)\u7684\u4e3b\u8981\u76ee\u7684\uff1f", "opts": ["\u7d71\u4e00\u4e0d\u540c\u4f86\u6e90\u8cc7\u6599\u7684\u683c\u5f0f\u8207\u6b04\u4f4d\u5b9a\u7fa9\uff0c\u4ee5\u78ba\u4fdd\u5206\u6790\u4e00\u81f4\u6027", "\u8b58\u5225\u4e26\u8655\u7406\u91cd\u8907\u8cc7\u6599\uff0c\u907f\u514d\u5f71\u97ff\u6a21\u578b\u8a13\u7df4\u7d50\u679c", "\u6574\u4f75\u591a\u4f86\u6e90\u8cc7\u6599\uff0c\u4ee5\u63d0\u5347\u8cc7\u6599\u5b8c\u6574\u6027\u8207\u61c9\u7528\u50f9\u503c", "\u4f9d\u8cc7\u6599\u4fdd\u5b58\u653f\u7b56\u5ef6\u9577\u539f\u59cb\u8cc7\u6599\u7559\u5b58\u671f\u9650\uff0c\u4ee5\u5229\u672a\u4f86\u53ef\u80fd\u7684\u5206\u6790\u9700\u6c42"], "ans": "D", "inferred": false, "expl": "\u3010\u7b54\u6848D\u3011\u984c\u76ee\u554f\u300c\u4e0d\u5c6c\u65bc\u300d\u8cc7\u6599\u6574\u5408\u76ee\u7684\u3002\n\u2717(A) \u7d71\u4e00\u683c\u5f0f\u8207\u6b04\u4f4d\u5b9a\u7fa9\u662f\u6574\u5408\u7684\u6838\u5fc3\u4efb\u52d9\u3002\n\u2717(B) \u8b58\u5225\u8655\u7406\u91cd\u8907\u8cc7\u6599\u662f\u6574\u5408\u7684\u6a19\u6e96\u6b65\u9a5f\u3002\n\u2717(C) \u6574\u4f75\u591a\u6e90\u4ee5\u63d0\u5347\u5b8c\u6574\u6027\u6b63\u662f\u6574\u5408\u76ee\u7684\u3002\n\u2713(D) \u5ef6\u9577\u7559\u5b58\u671f\u5c6c\u300c\u8cc7\u6599\u4fdd\u7559\u653f\u7b56\u300d\u7bc4\u7587\uff0c\u8207\u6574\u5408\u76ee\u7684\u7121\u95dc\uff0c\u6545\u70ba\u6b63\u89e3\u3002"}, {"id": "115_1_s1_2", "exam": "115\u5e74\u7b2c\u4e00\u6b21 \u79d1\u76ee\u4e00\uff08AI\u57fa\u790e\uff09", "examId": "115_1_s1", "no": 2, "q": "\u67d0\u667a\u6167\u57ce\u5e02\u5c08\u6848\u5c0e\u5165 AI \u6280\u8853\uff0c\u4ee5\u512a\u5316\u5783\u573e\u6536\u96c6\u8def\u7dda\u8abf\u5ea6\u4e26\u5373\u6642\u76e3\u6e2c\u7a7a\u6c23\u54c1\u8cea\u8b8a\u5316\u3002\u7cfb\u7d71\u9700\u6301\u7e8c\u8490\u96c6\u74b0\u5883\u6578\u64da(\u5982 PM2.5\u3001\u6c23\u9ad4\u6fc3\u5ea6)\u8207\u8a2d\u5099\u72c0\u614b(\u5982\u5783\u573e\u6876\u6eff\u6ea2\u5ea6)\u3002\u4e0b\u5217\u4f55\u7a2e\u6280\u8853\u6700\u76f4\u63a5\u652f\u63f4\u4e0a\u8ff0\u9700\u6c42\uff1f", "opts": ["\u5c08\u5bb6\u7cfb\u7d71(Expert System)", "\u6c7a\u7b56\u652f\u63f4\u7cfb\u7d71(Decision Support System)", "\u555f\u767c\u5f0f\u6c7a\u7b56\u5f15\u64ce(Heuristic Decision Engine)", "\u611f\u77e5\u5668\u7db2\u8def(Sensor Network)"], "ans": "D", "inferred": false, "expl": "\u3010\u7b54\u6848D\u3011\u667a\u6167\u57ce\u5e02\u9700\u5373\u6642\u8490\u96c6\u74b0\u5883\u6578\u64da\u8207\u8a2d\u5099\u72c0\u614b\u3002\n\u2717(A) \u5c08\u5bb6\u7cfb\u7d71\u662f\u898f\u5247\u5f0f\u63a8\u8ad6\uff0c\u4e0d\u8ca0\u8cac\u8cc7\u6599\u8490\u96c6\u3002\n\u2717(B) \u6c7a\u7b56\u652f\u63f4\u7cfb\u7d71\u5c6c\u6c7a\u7b56\u61c9\u7528\uff0c\u975e\u611f\u6e2c\u5c64\u3002\n\u2717(C) \u555f\u767c\u5f0f\u6c7a\u7b56\u5f15\u64ce\u662f\u63a8\u8ad6\u5de5\u5177\uff0c\u975e\u611f\u6e2c\u3002\n\u2713(D) Sensor Network \u76f4\u63a5\u8ca0\u8cac IoT \u611f\u6e2c\u8490\u96c6\uff0c\u662f\u667a\u6167\u57ce\u5e02\u76e3\u6e2c\u7684\u6838\u5fc3\u57fa\u790e\u3002"}, {"id": "115_1_s1_3", "exam": "115\u5e74\u7b2c\u4e00\u6b21 \u79d1\u76ee\u4e00\uff08AI\u57fa\u790e\uff09", "examId": "115_1_s1", "no": 3, "q": "\u4e0b\u5217\u4f55\u8005\u4e0d\u7b26\u5408\u975e\u76e3\u7763\u5f0f\u5b78\u7fd2(Unsupervised Learning)\u7684\u5178\u578b\u7279\u5fb5\uff1f", "opts": ["\u6a21\u578b\u53ef\u4f9d\u64da\u8cc7\u6599\u4e2d\u7684\u7279\u5fb5\u76f8\u4f3c\u6027\u9032\u884c\u81ea\u52d5\u5206\u7fa4", "\u8a13\u7df4\u904e\u7a0b\u4e2d\u4e0d\u9700\u4ef0\u8cf4\u4e8b\u5148\u5b9a\u7fa9\u7684\u6a19\u7c64\u8cc7\u6599", "\u5e38\u7528\u65bc\u63a2\u7d22\u8cc7\u6599\u7684\u6f5b\u5728\u7d50\u69cb\u6216\u96b1\u542b\u6a21\u5f0f", "\u6a21\u578b\u4e3b\u8981\u5b78\u7fd2\u8f38\u5165\u7279\u5fb5\u8207\u65e2\u5b9a\u76ee\u6a19\u6a19\u8a18\u4e4b\u9593\u7684\u5c0d\u61c9\u95dc\u4fc2"], "ans": "D", "inferred": false, "expl": "\u3010\u7b54\u6848D\u3011\u554f\u300c\u4e0d\u7b26\u5408\u300d\u975e\u76e3\u7763\u5f0f\u5b78\u7fd2\u7279\u5fb5\u3002\n\u2717(A) \u4f9d\u7279\u5fb5\u76f8\u4f3c\u6027\u81ea\u52d5\u5206\u7fa4\u662f\u975e\u76e3\u7763\u7279\u5fb5\u3002\n\u2717(B) \u4e0d\u9700\u4e8b\u5148\u6a19\u7c64\u662f\u975e\u76e3\u7763\u7279\u5fb5\u3002\n\u2717(C) \u63a2\u7d22\u6f5b\u5728\u7d50\u69cb\u662f\u975e\u76e3\u7763\u7279\u5fb5\u3002\n\u2713(D) \u5b78\u7fd2\u8f38\u5165\u8207\u300c\u65e2\u5b9a\u76ee\u6a19\u6a19\u8a18\u300d\u5c0d\u61c9\u95dc\u4fc2\u662f\u76e3\u7763\u5f0f\u5b78\u7fd2\u7279\u5fb5\uff0c\u8207\u975e\u76e3\u7763\u76f8\u53cd\u3002"}, {"id": "115_1_s1_4", "exam": "115\u5e74\u7b2c\u4e00\u6b21 \u79d1\u76ee\u4e00\uff08AI\u57fa\u790e\uff09", "examId": "115_1_s1", "no": 4, "q": "\u67d0\u4fdd\u96aa\u516c\u53f8\u5efa\u7acb AI \u7406\u8ce0\u91d1\u984d\u9810\u6e2c\u6a21\u578b\u3002\u6b77\u53f2\u7406\u8ce0\u8cc7\u6599\u7d93\u6aa2\u5b9a\u5f8c\u5448\u8fd1\u4f3c\u5e38\u614b\u5206\u4f48\uff0c\u4f46\u4ecd\u5b58\u5728\u5c11\u6578\u6975\u7aef\u9ad8\u984d\u6848\u4ef6\u3002\u8cc7\u6599\u79d1\u5b78\u5718\u968a\u5728\u4e0d\u7834\u58de\u6574\u9ad4\u5206\u4f48\u7279\u6027\u7684\u524d\u63d0\u4e0b\uff0c\u898f\u5283\u9032\u884c\u96e2\u7fa4\u503c\u8655\u7406\u3002\u4e0b\u5217\u4f55\u8005\u6700\u4e0d\u9069\u7576\uff1f", "opts": ["\u4f9d\u7d71\u8a08\u6e96\u5247(\u5982 Z-score \u6216 IQR)\u8a55\u4f30\u5f8c\uff0c\u518d\u6c7a\u5b9a\u662f\u5426\u8abf\u6574\u6216\u8655\u7406\u6975\u7aef\u503c", "\u63a1\u7528\u622a\u5c3e(Trimming)\u8655\u7406\u6975\u7aef\u503c\uff0c\u4ee5\u63d0\u5347\u6a21\u578b\u7a69\u5b9a\u6027", "\u4f7f\u7528 One-hot \u7de8\u78bc(One-hot Encoding)\u5c07\u96e2\u7fa4\u503c\u8f49\u63db\u70ba\u985e\u5225\u7279\u5fb5\u4ee5\u6539\u5584\u6578\u503c\u7a69 \u5b9a\u6027", "\u7d50\u5408\u9818\u57df\u77e5\u8b58\u8a55\u4f30\u5176\u5408\u7406\u6027\uff0c\u518d\u6c7a\u5b9a\u4fdd\u7559\u6216\u4fee\u6b63"], "ans": "C", "inferred": false, "expl": "\u3010\u7b54\u6848C\u3011\u554f\u300c\u6700\u4e0d\u9069\u7576\u300d\u7684\u96e2\u7fa4\u503c\u8655\u7406\u3002\n\u2717(A) Z-score / IQR \u662f\u7d71\u8a08\u4e0a\u8655\u7406\u96e2\u7fa4\u503c\u7684\u6a19\u6e96\u3002\n\u2717(B) \u622a\u5c3e\uff08Trimming\uff09\u662f\u5408\u7406\u7684\u96e2\u7fa4\u503c\u8655\u7406\u3002\n\u2713(C) One-hot \u7de8\u78bc\u7528\u65bc\u300c\u985e\u5225\u7279\u5fb5\u300d\u8f49\u63db\uff0c\u5957\u7528\u5230\u9023\u7e8c\u6578\u503c\u96e2\u7fa4\u503c\u6beb\u7121\u610f\u7fa9\uff0c\u6700\u4e0d\u9069\u7576\u3002\n\u2717(D) \u7d50\u5408\u9818\u57df\u77e5\u8b58\u8a55\u4f30\u5408\u7406\u6027\u662f\u5408\u9069\u505a\u6cd5\u3002"}, {"id": "115_1_s1_5", "exam": "115\u5e74\u7b2c\u4e00\u6b21 \u79d1\u76ee\u4e00\uff08AI\u57fa\u790e\uff09", "examId": "115_1_s1", "no": 5, "q": "\u67d0\u9280\u884c\u5efa\u7acb AI \u8a50\u6b3a\u4ea4\u6613\u5075\u6e2c\u6a21\u578b\u3002\u6b77\u53f2\u4ea4\u6613\u8cc7\u6599\u4e2d\uff0c\u8a50\u6b3a\u6a23\u672c\u6bd4\u4f8b\u6975\u4f4e\uff0c\u5c0e\u81f4\u6a21\u578b\u8a13\u7df4\u6642\u504f\u5411\u9810\u6e2c\u70ba\u300c\u6b63\u5e38\u4ea4\u6613\u300d\u3002\u8cc7\u6599\u79d1\u5b78\u5718\u968a\u8a55\u4f30\u63a1\u7528 SMOTE(Synthetic Minority Over-sampling Technique)\u6539\u5584\u8a13\u7df4\u8cc7\u6599\u5206\u4f48\u3002\u4e0b\u5217\u4f55\u8005\u6700\u7b26\u5408 SMOTE \u6280\u8853\u7684\u4e3b\u8981\u529f\u80fd\uff1f", "opts": ["\u900f\u904e\u96a8\u6a5f\u522a\u9664\u90e8\u5206\u6b63\u5e38\u4ea4\u6613\u8cc7\u6599\uff0c\u4ee5\u964d\u4f4e\u985e\u5225\u5931\u8861\u7a0b\u5ea6", "\u4f9d\u64da\u5c11\u6578\u985e\u5225\u6a23\u672c\u7684\u7279\u5fb5\u7a7a\u9593\uff0c\u5408\u6210\u7522\u751f\u65b0\u7684\u5c11\u6578\u985e\u5225\u6a23\u672c", "\u8abf\u6574\u6a21\u578b\u7684\u640d\u5931\u51fd\u6578(Loss Function)\u6b0a\u91cd\uff0c\u4f7f\u8aa4\u5224\u5c11\u6578\u985e\u5225\u6642\u7684\u61f2\u7f70\u63d0\u9ad8", "\u4ee5\u4ea4\u53c9\u9a57\u8b49(Cross-validation)\u65b9\u5f0f\u91cd\u65b0\u5206\u5272\u8cc7\u6599\u96c6\uff0c\u4f7f\u5404\u6298\u8cc7\u6599\u985e\u5225\u6bd4\u4f8b\u4e00\u81f4"], "ans": "B", "inferred": false, "expl": "\u3010\u7b54\u6848B\u3011SMOTE \u7684\u4e3b\u8981\u529f\u80fd\u3002\n\u2717(A) \u96a8\u6a5f\u522a\u9664\u591a\u6578\u985e\u662f Undersampling\uff0c\u4e0d\u662f SMOTE\u3002\n\u2713(B) SMOTE \u5728\u5c11\u6578\u985e\u7279\u5fb5\u7a7a\u9593\u4ee5\u63d2\u503c\u5408\u6210\u65b0\u6a23\u672c\uff0c\u6b63\u662f\u5176\u6838\u5fc3\u6a5f\u5236\u3002\n\u2717(C) \u8abf\u6574\u640d\u5931\u6b0a\u91cd\u662f Cost-sensitive Learning\u3002\n\u2717(D) \u4ea4\u53c9\u9a57\u8b49\u662f\u8a55\u4f30\u65b9\u6cd5\uff0c\u8207\u985e\u5225\u4e0d\u5e73\u8861\u7121\u95dc\u3002"}, {"id": "115_1_s1_6", "exam": "115\u5e74\u7b2c\u4e00\u6b21 \u79d1\u76ee\u4e00\uff08AI\u57fa\u790e\uff09", "examId": "115_1_s1", "no": 6, "q": "\u8cc7\u6599\u79d1\u5b78\u5718\u968a\u5728\u6a21\u578b\u8a13\u7df4\u524d\uff0c\u9700\u5c0d\u6578\u503c\u7279\u5fb5\u9032\u884c\u6b63\u898f\u5316(Normalization)\u6216\u6a19\u6e96\u5316(Standardization)\u3002\u70ba\u78ba\u4fdd\u6a21\u578b\u8a55\u4f30\u7d50\u679c\u5177\u771f\u5be6\u6027\u4e26\u907f\u514d\u8cc7\u6599\u6d29\u6f0f(Data Leakage)\uff0c\u4e0b\u5217\u4f55\u8005\u70ba\u6700\u9069\u7576\u7684\u4f5c\u6cd5\uff1f", "opts": ["\u65bc\u8cc7\u6599\u5206\u5272\u524d\uff0c\u5148\u5c0d\u5b8c\u6574\u8cc7\u6599\u96c6\u8a08\u7b97\u7d71\u8a08\u91cf\u4e26\u9032\u884c\u6a19\u6e96\u5316\u8655\u7406", "\u5148\u5206\u5272\u8a13\u7df4\u8cc7\u6599(Training Data)\u548c\u6e2c\u8a66\u8cc7\u6599(Test Data)\uff0c\u4e26\u5404\u81ea\u7368\u7acb\u8a08\u7b97 \u7d71\u8a08\u91cf\u5f8c\u9032\u884c\u6a19\u6e96\u5316", "\u5148\u5206\u5272\u8a13\u7df4\u8cc7\u6599(Training Data)\u548c\u6e2c\u8a66\u8cc7\u6599(Test Data)\uff0c\u50c5\u4ee5\u8a13\u7df4\u8cc7\u6599\u8a08\u7b97 \u7d71\u8a08\u91cf\uff0c\u518d\u5957\u7528\u81f3\u6e2c\u8a66\u8cc7\u6599", "\u50c5\u5c0d\u8a13\u7df4\u8cc7\u6599(Training Data)\u9032\u884c\u6a19\u6e96\u5316\u8655\u7406\uff0c\u6e2c\u8a66\u8cc7\u6599(Test Data)\u4fdd\u6301\u539f \u59cb\u6578\u503c"], "ans": "C", "inferred": false, "expl": "\u3010\u7b54\u6848C\u3011\u907f\u514d\u8cc7\u6599\u6d29\u6f0f\u7684\u6a19\u6e96\u531 D) Wide \u0026 Deep \u662f\u6a21\u578b\u67b6\u69cb\uff0c\u975e\u7de8\u78bc\u65b9\u6cd5\u3002"}, {"id": "115_1_s1_8", "exam": "115\u5e74\u7b2c\u4e00\u6b21 \u79d1\u76ee\u4e00\uff08AI\u57fa\u790e\uff09", "examId": "115_1_s1", "no": 8, "q": "\u67d0\u96f6\u552e\u4f01\u696d\u5728\u5efa\u7f6e\u6a5f\u5668\u5b78\u7fd2\u6a21\u578b\u9810\u6e2c\u9867\u5ba2\u8cfc\u8cb7\u6a5f\u7387\u6642\uff0c \u8cc7\u6599\u540c\u6642\u5305\u542b\u5927\u91cf\u7a00\u758f\u985e\u5225\u7279\u5fb5\u8207\u6578\u503c\u578b\u7279\u5fb5\u3002 \u5718\u968a\u5e0c\u671b\u6a21\u578b\u65e2\u80fd\u5b78\u7fd2\u904e\u53bb\u5df2\u51fa\u73fe\u7684\u7279\u5fb5\u7d44\u5408\u898f\u5f8b\uff0c\u4e5f\u80fd\u5c0d\u672a\u51fa\u73fe\u7684\u7279\u5fb5\u7d44\u5408\u505a\u51fa\u5408\u7406\u9810\u6e2c\u3002 \u4e0b\u5217\u54ea\u4e00\u7a2e\u6a21\u578b\u67b6\u69cb\u6700\u9069\u5408\u6b64\u985e\u9700\u6c42\uff1f", "opts": ["\u7dda\u6027\u8ff4\u6b78(Linear Regression)", "\u6c7a\u7b56\u6a39(Decision Tree)", "\u652f\u63f4\u5411\u91cf\u6a5f(Support Vector Machine, SVM)", "\u5bec\u6df1\u6a21\u578b(Wide and Deep)"], "ans": "D", "inferred": false, "expl": "\u3010\u7b54\u6848D\u3011\u540c\u6642\u8a18\u61b6\u5df2\u77e5\u7d44\u5408\u4e26\u6cdb\u5316\u672a\u77e5\u7d44\u5408\u3002\n\u2717(A) \u7dda\u6027\u8ff4\u6b78\u8868\u9054\u529b\u6709\u9650\uff0c\u96e3\u6355\u6349\u8907\u96dc\u4ea4\u4e92\u3002\n\u2717(B) \u6c7a\u7b56\u6a39\u4e0d\u64c5\u9577\u7a00\u758f\u985e\u5225\u7279\u5fb5\u3002\n\u2717(C) SVM \u4e0d\u9069\u5408\u5927\u91cf\u7a00\u758f\u985e\u5225 + \u6578\u503c\u6df7\u5408\u3002\n\u2713(D) Wide \u0026 Deep \u7684 Wide \u90e8\u5206\u8a18\u61b6\u3001Deep \u90e8\u5206\u6cdb\u5316\uff0c\u6b63\u662f\u6b64\u9700\u6c42\u7684\u6700\u4f73\u67b6\u69cb\u3002"}, {"id": "115_1_s1_9", "exam": "115\u5e74\u7b2c\u4e00\u6b21 \u79d1\u76ee\u4e00\uff08AI\u57fa\u790e\uff09", "examId": "115_1_s1", "no": 9, "q": "\u67d0\u5f71\u97f3\u4e32\u6d41\u5e73\u53f0\u5efa\u7acb\u795e\u7d93\u7db2\u8def\u6a21\u578b\uff0c\u7528\u65bc\u9810\u6e2c\u4f7f\u7528\u8005\u6700\u53ef\u80fd\u611f\u8208\u8da3\u7684\u5f71\u7247\u985e\u578b\u3002 \u6a21\u578b\u8f38\u51fa\u5c64\u9700\u5c07\u7d50\u679c\u8f49\u63db\u70ba\u5404\u985e\u5225\u7684\u6a5f\u7387\u5206\u4f48\uff0c\u4ee5\u4fbf\u7cfb\u7d71\u4f9d\u6a5f\u7387\u9ad8\u4f4e\u63a8\u85a6\u5167\u5bb9\u3002 \u4e0b\u5217\u54ea\u4e00\u7a2e\u51fd\u6578\u6700\u9069\u5408\u7528\u65bc\u6a21\u578b\u8f38\u51fa\u5c64\uff1f", "opts": ["Softmax \u51fd\u6578(Softmax Function)", "Sigmoid \u51fd\u6578(Sigmoid Function)", "\u7dda\u6027\u51fd\u6578(Linear Function)", "ReLU \u51fd\u6578(Rectified Linear Unit Function)"], "ans": "A", "inferred": false, "expl": "\u3010\u7b54\u6848A\u3011\u8f38\u51fa\u5c64\u9700\u591a\u985e\u5225\u6a5f\u7387\u5206\u4f48\u3002\n\u2713(A) Softmax \u5c07\u591a\u8f38\u51fa\u8f49\u70ba\u548c\u70ba 1 \u7684\u6a5f\u7387\u5206\u4f48\uff0c\u9069\u5408\u591a\u985e\u5225\u5206\u985e\u3002\n\u2717(B) Sigmoid \u9069\u7528\u65bc\u4e8c\u5143\u5206\u985e\u3002\n\u2717(C) \u7dda\u6027\u51fd\u6578\u7121\u6a5f\u7387\u7279\u6027\u3002\n\u2717(D) ReLU \u662f\u96b1\u85cf\u5c64\u6d3b\u5316\u51fd\u6578\uff0c\u4e0d\u7522\u751f\u6a5f\u7387\u3002"}, {"id": "115_1_s1_10", "exam": "115\u5e74\u7b2c\u4e00\u6b21 \u79d1\u76ee\u4e00\uff08AI\u57fa\u790e\uff09", "examId": "115_1_s1", "no": 10, "q": "\u67d0\u8a2d\u8a08\u516c\u53f8\u5c0e\u5165\u751f\u6210\u5f0f AI(Generative AI)\u5de5\u5177\uff0c\u7528\u65bc\u81ea\u52d5\u7522\u751f\u7522\u54c1\u6982\u5ff5\u5716\u8207\u98a8\u683c\u8349\u5716\u3002\u70ba\u4e86\u8b93\u7cfb\u7d71\u80fd\u4f9d\u64da\u65e2\u6709\u5716\u50cf\u8cc7\u6599\u7522\u751f\u5177\u6709\u8b8a\u5316\u4e14\u98a8\u683c\u4e00\u81f4\u7684\u65b0\u5716\u50cf\uff0c\u6a21\u578b\u5fc5\u9808\u5177\u5099\u5b78\u7fd2\u8cc7\u6599\u7279\u6027\u4e26\u751f\u6210\u65b0\u6a23\u672c\u7684\u80fd\u529b\u3002\u4e0b\u5217\u54ea\u4e00\u7a2e\u6a21\u578b\u6280\u8853\u6216\u65b9\u6cd5\u6700\u7b26 \u5408\u4e0a\u8ff0\u9700\u6c42\uff1f", "opts": ["\u96b1\u8b8a\u91cf\u81ea\u7de8\u78bc\u5668(Variational Autoencoder, VAE)", "\u96a8\u6a5f\u68ee\u6797(Random Forest)", "K-\u8fd1\u9130\u6f14\u7b97\u6cd5(K-Nearest Neighbors, KNN)", "\u8c9d\u6c0f\u7db2\u8def(Bayesian Network)"], "ans": "A", "inferred": false, "expl": "\u3010\u7b54\u6848A\u3011\u5b78\u8cc7\u6599\u7279\u6027\u4e26\u7522\u751f\u5177\u8b8a\u5316\u7684\u65b0\u6a23\u672c\u3002\n\u2713(A) VAE \u5b78\u6f5b\u5728\u5206\u4f48\uff08\u5747\u503c/\u65b9\u5dee\uff09\u5f8c\u63a1\u6a23\u89e3\u78bc\uff0c\u80fd\u751f\u6210\u98a8\u683c\u4e00\u81f4\u4f46\u5177\u591a\u6a23\u6027\u7684\u65b0\u5716\u3002\n\u2717(B) Random Forest \u662f\u5206\u985e/\u8ff4\u6b78\uff0c\u975e\u751f\u6210\u6a21\u578b\u3002\n\u2717(C) KNN \u53ea\u505a\u9130\u8fd1\u5339\u914d\uff0c\u4e0d\u751f\u6210\u3002\n\u2717(D) Bayesian Network \u662f\u6a5f\u7387\u5716\u6a21\u578b\uff0c\u975e\u5f71\u50cf\u751f\u6210\u3002"}, {"id": "115_1_s1_11", "exam": "115\u5e74\u7b2c\u4e00\u6b21 \u79d1\u76ee\u4e00\uff08AI\u57fa\u790e\uff09", "examId": "115_1_s1", "no": 11, "q": "\u67d0\u4f01\u696d\u5c0e\u5165\u751f\u6210\u5f0f AI(Generative AI)\u7cfb\u7d71\u81ea\u52d5\u7522\u51fa\u6703\u8b70\u6458\u8981\uff0c\u4e26\u898f\u5283\u984d\u5916\u5efa\u7f6e \u4e00\u5957 AI \u7cfb\u7d71\uff0c\u7528\u65bc\u8a55\u4f30\u6458\u8981\u5167\u5bb9\u7684\u6b63\u78ba\u6027\u8207\u5b8c\u6574\u6027\u3002\u4e0b\u5217\u4f55\u8005\u70ba\u6b64 AI \u7cfb\u7d71\u7684\u6838\u5fc3\u76ee\u6a19\uff1f", "opts": ["\u81ea\u52d5\u65b0\u589e\u5c08\u696d\u540d\u8a5e\u8207\u6280\u8853\u6307\u6a19", "\u5224\u65b7\u6458\u8981\u662f\u5426\u907a\u6f0f\u95dc\u9375\u8cc7\u8a0a\u6216\u51fa\u73fe\u8a9e\u610f\u932f\u8aa4", "\u8abf\u6574\u8a9e\u97f3\u8f49\u6587\u5b57\u7d50\u679c", "\u81ea\u52d5\u6a19\u8a3b\u6458\u8981\u7684\u95dc\u9375\u5b57\u8207\u4e3b\u984c\u6a19\u7c64"], "ans": "B", "inferred": false, "expl": "\u3010\u7b54\u6848B\u3011\u8a55\u4f30\u6458\u8981\u54c1\u8cea\u7684\u6838\u5fc3\u76ee\u6a19\u3002\n\u2717(A) \u65b0\u589e\u5c08\u696d\u540d\u8a5e\u662f\u5167\u5bb9\u4fee\u98fe\u800c\u975e\u8a55\u4f30\u3002\n\u2713(B) \u5224\u65b7\u907a\u6f0f\u95dc  false, "expl": "\u3010\u7b54\u6848A\u3011\u76f4\u65b9\u5716\u6700\u9069\u7528\u60c5\u5883\u3002\n\u2713(A) \u9867\u5ba2\u5e74\u9f61\u5206\u5340\u9593\u6aa2\u8996\u96c6\u4e2d\u60c5\u5f62\u6b63\u662f\u76f4\u65b9\u5716\uff08\u983b\u6b21\u5206\u4f48\uff09\u7684\u5178\u578b\u7528\u9014\u3002\n\u2717(B) \u552e\u50f9\u8207\u92b7\u91cf\u95dc\u806f\u61c9\u7528\u6563\u4f48\u5716\u3002\n\u2717(C) \u5404\u7522\u54c1\u985e\u5225\u5e74\u5ea6\u92b7\u552e\u7528\u9577\u689d\u5716\u3002\n\u2717(D) \u5730\u7406\u5206\u5e03\u7528\u5730\u5716\u3002"}, {"id": "115_1_s1_18", "exam": "115\u5e74\u7b2c\u4e00\u6b21 \u79d1\u76ee\u4e00\uff08AI\u57fa\u790e\uff09", "examId": "115_1_s1", "no": 18, "q": "\u67d0\u96fb\u5546\u5e73\u53f0\u5de5\u7a0b\u5e2b\u9700\u5728\u5df2\u6392\u5e8f\u7684\u50f9\u683c\u6e05\u55ae\u4e2d\uff0c\u5feb\u901f\u5b9a\u4f4d\u6307\u5b9a\u50f9\u683c\u662f\u5426\u5b58\u5728\uff0c\u7d66\u5b9a\u6392\u5e8f\u5f8c\u9663\u5217\uff1aarr = [3, 8, 14, 19, 21, 27, 33, 45, 52]\u3002\u82e5\u641c\u5c0b\u76ee\u6a19\u503c\u70ba 27\uff0c\u4e14\u63a1\u7528\u6a19\u6e96\u4e8c\u5206\u641c\u5c0b(Binary Search)\u6d41\u7a0b(\u6bcf\u6b21\u6bd4\u8f03\u5f8c\u6392\u9664\u4e2d\u4f4d\u6578)\uff0c\u8acb\u554f\u6700\u591a\u9700\u8981\u6bd4\u8f03 \u5e7e\u6b21\u5373\u53ef\u627e\u5230\u76ee\u6a19\uff1f", "opts": ["2 \u6b21", "3 \u6b21", "4 \u6b21", "5 \u6b21"], "ans": "B", "inferred": false, "expl": "\u3010\u7b54\u6848B\u3011\u4e8c\u5206\u641c\u5c0b\u627e 27\uff089 \u5143\u7d20\u9663\u5217\uff09\u3002\n\u7b2c1\u6b21\uff1amid=index4=21\uff0c21\u003c27 \u53d6\u53f3\u534a\uff1b\u7b2c2\u6b21\uff1amid=index6=33\uff0c33\u003e27 \u53d6\u5de6\u534a\uff1b\u7b2c3\u6b21\uff1amid=index5=27 \u627e\u5230\u3002\n\u2717(A) 2 \u6b21\u4e0d\u5920\u3002\n\u2713(B) 3 \u6b21\u6b63\u78ba\u3002\n\u2717(C) 4 \u6b21\u904e\u591a\u3002\n\u2717(D) 5 \u6b21\u66f4\u591a\u3002"}, {"id": "115_1_s1_19", "exam": "115\u5e74\u7b2c\u4e00\u6b21 \u79d1\u76ee\u4e00\uff08AI\u57fa\u790e\uff09", "examId": "115_1_s1", "no": 19, "q": "\u67d0\u7269\u6d41\u5 d0\u5347\u6a21\u578b\u5c0d\u65b0\u8cc7\u6599\u7684\u9069\u61c9\u80fd\u529b\uff0c\u4e26\u589e\u52a0\u8a13\u7df4\u8cc7\u6599\u7684\u591a\u6a23\u6027\uff0c\u4e0b\u5217\u4f55\u8005\u6700\u9069\u5408\uff1f", "opts": ["\u589e\u52a0\u6a21\u578b\u7684\u6df1\u5ea6\u8207\u53c3\u6578\u91cf\uff0c\u4f7f\u6a21\u578b\u5b78\u7fd2\u66f4\u591a\u7d30\u7bc0", "\u5c0d\u8a13\u7df4\u5f71\u50cf\u9032\u884c\u65cb\u8f49\u3001\u7ffb\u8f49\u7b49\u96a8\u6a5f\u8b8a\u5316", "\u63d0\u9ad8\u8a13\u7df4\u901f\u5ea6\uff0c\u4f7f\u6a21\u578b\u66f4\u5feb\u5b8c\u6210\u5b78\u7fd2", "\u50c5\u4fdd\u7559\u6a21\u578b\u8868\u73fe\u8f03\u597d\u7684\u8a13\u7df4\u8cc7\u6599"], "ans": "B", "inferred": false, "expl": "\u3010\u7b54\u6848B\u3011\u8a13\u7df4 98% \u6e2c\u8a66 72% \u662f\u904e\u64ec\u5408\uff0c\u9700\u589e\u591a\u6a23\u6027\u3002\n\u2717(A) \u589e\u52a0\u53c3\u6578\u8207\u6df1\u5ea6\u53cd\u800c\u52a0\u5287\u904e\u64ec\u5408\u3002\n\u2713(B) \u65cb\u8f49\u7ffb\u8f49\u7b49\u8cc7\u6599\u589e\u5f37\u589e\u52a0\u8a13\u7df4\u591a\u6a23\u6027\uff0c\u63d0\u5347\u6cdb\u5316\u80fd\u529b\u3002\n\u2717(C) \u63d0\u9ad8\u8a13\u7df4\u901f\u5ea6\u8207\u591a\u6a23\u6027\u7121\u95dc\u3002\n\u2717(D) \u50c5\u4fdd\u7559\u8868\u73fe\u597d\u7684\u8cc7\u6599\u53cd\u800c\u6e1b\u5c11\u591a\u6a23\u6027\u3002"}, {"id": "115_1_s1_21", "exam": "115\u5e74\u7b2c\u4e00\u6b21 \u79d1\u76ee\u4e00\uff08AI\u57fa\u790e\uff09", "examId": "115_1_s1", "no": 21, "q": "\u67d0\u6642\u5c1a\u54c1\u724c\u5c0e\u5165\u751f\u6210\u5f0f AI(Generative AI)\u6280\u8853\uff0c\u5efa\u7acb\u670d\u88dd\u8a2d\u8a08\u8f14\u52a9\u7cfb\u7d71\u3002\u7cfb\u7d71\u9700\u6839\u64da\u8a2d\u8a08\u5e2b\u8f38\u5165\u7684\u98a8\u683c\u689d\u4ef6\uff0c\u81ea\u52d5\u7522\u751f\u5177\u6709\u9ad8\u5ea6\u8996\u89ba\u54c1\u8cea\u3001\u7d30\u7bc0\u7a69\u5b9a\u4e14\u98a8\u683c\u8b8a\u5316\u81ea\u7136\u7684\u670d\u88dd\u8349\u5716\u3002\u5718\u968a\u7279\u5225\u91cd\u8996\u751f\u6210\u7d50\u679c\u7684\u7a69\u5b9a\u6027\u8207\u591a\u6a23\u6027\u63a7\u5236\u80fd\u529b\u3002\u5728\u6b64\u9700 \u6c42\u4e0b\uff0c\u4e0b\u5217\u54ea\u4e00\u7a2e\u6a21\u578b\u6280\u8853\u6216\u65b9\u6cd5\u8f03\u70ba\u9069\u5408\uff1f", "opts": ["\u652f\u63f4\u5411\u91cf\u6a5f(Support Vector Machine, SVM)", "\u751f\u6210\u5c0d\u6297\u7db2\u8def(Generative Adversarial Network, GAN)", "\u6c7a\u7b56\u6a39(Decision Tree)", "\u64f4\u6563\u6a21\u578b(Diffusion Model)"], "ans": "D", "inferred": false, "expl": "\u3010\u7b54\u6848D\u3011\u670d\u88dd\u8a2d\u8a08\u9700\u7a69\u5b9a\u6027\u8207\u591a\u6a23\u6027\u63a7\u5236\u3002\n\u2717(A) SVM \u4e0d\u80fd\u751f\u6210\u5716\u50cf\u3002\n\u2717(B) GAN \u53ef\u751f\u6210\u4f46\u8a13\u7df4\u4e0d\u7a69\u3001\u63a7\u5236\u8f03\u5dee\u3002\n\u2717(C) \u6c7a\u7b56\u6a39\u4e0d\u80fd\u751f\u6210\u3002\n\u2713(D) Diffusion Model \u7d30\u7bc0\u7a69\u5b9a\u3001\u54c1\u8cea\u9ad8\uff0c\u4e14\u53ef\u900f\u904e\u5f15\u5c0e\u6a5f\u5236\u63a7\u5236\u591a\u6a23\u6027\uff0c\u662f\u6700\u4f73\u9078\u64c7\u3002"}, {"id": "115_1_s1_22", "exam": "115\u5e74\u7b2c\u4e00\u6b21 \u79d1\u76ee\u4e00\uff08AI\u57fa\u790e\uff09", "examId": "115_1_s1", "no": 22, "q": "\u67d0\u88fd\u9020\u696d\u5de5\u5ee0\u898f\u5283\u5c0e\u5165 AI \u76e3\u63a7\u7cfb\u7d71\uff0c\u6301\u7e8c\u5206\u6790\u8a2d\u5099\u611f\u6e2c\u6578\u64da(\u5982\u6eab\u5ea6\u3001\u9707\u52d5\u8207\u58d3\u529b)\u3002\u7cfb\u7d71\u9700\u80fd\u5728\u7f3a\u4e4f\u5b8c\u6574\u7570\u5e38\u6a19\u8a3b\u8cc7\u6599\u7684\u60c5\u6cc1\u4e0b\uff0c\u8fa8\u8b58\u8207\u4e00\u822c\u904b\u4f5c\u578b\u614b\u986f\u8457\u4e0d\u540c\u7684\u72c0\u614b\uff0c\u4e26\u767c\u51fa\u9810\u8b66\u3002\u5728\u6b64\u9700\u6c42\u4e0b\uff0c\u4e0b\u5217\u4f55\u7a2e\u6280\u8853\u8f03\u70ba\u9069\u5408\uff1f", "opts": ["\u4f7f\u7528\u652f\u63f4\u5411\u91cf\u6a5f(Support Vector Machine, SVM)\u5efa\u7acb\u7570\u5e38\u5206\u985e\u6a21\u578b", "\u4ee5\u6c7a\u7b56\u6a39(Decision Tree)\u5b78\u7fd2\u7570\u5e38\u985e\u578b\u7684\u5224\u65b7\u898f\u5247", "\u63a1\u7528\u8b8a\u5206\u81ea\u7de8\u78bc\u5668(Variational Autoencoder, VAE)\u5b78\u7fd2\u6b63\u5e38\u8cc7\u6599\u5206\u4f48", "\u4f7f\u7528\u751f\u6210\u5c0d\u6297\u7db2\u8def(Generative Adversarial Network, GAN)\u76f4\u63a5\u9810\u6e2c\u7570\u5e38\u6a19\u7c64"], "ans": "C", "inferred": false, "expl": "\u3010\u7b54\u6848C\u3011\u7f3a\u7570\u5e38\u6a19\u8a3b\u4e0b\u5075\u6e2c\u7570\u5e38\u578b\u614b\u3002\n\u2717(A) SVM \u9700\u6709\u6a19\u8a3b\u624d\u80fd\u5206\u985e\u3002\n\u2717(B) \u6c7a\u7b56\u6a39\u9700\u6a19\u8a3b\u624d\u80fd\u5b78\u898f\u5247\u3002\n\u2713(C) VAE \u5b78\u7fd2\u6b63\u5e38\u8cc7\u6599\u5206\u4f48\uff0c\u7570\u5e38\u8cc7\u6599\u91cd\u5efa\u8aa4\u5dee\u5927\uff0c\u7121\u9700\u7570\u5e38\u6a19\u7c64\u5373\u53ef\u5075\u6e2c\u3002\n\u2717(D) GAN \u76f4\u63a5\u9810\u6e2c\u7570\u5e38\u6a19\u7c64\u975e\u5178\u578b\u7528\u6cd5\u3002"}, {"id": "115_1_s1_23", "exam": "115\u5e74\u7b2c\u4e00\u6b21 \u79d1\u76ee\u4e00\uff08AI\u57fa\u790e\uff09", "examId": "115_1_s1", "no": 23, "q": "\u5728 AI \u63a8\u8ad6\u670d\u52d9\u67b6\u69cb\u8a2d\u8a08\u4e2d\uff0c\u300c\u6279\u6b21\u63a8\u8ad6(Batch Inference)\u300d\u8207\u300c\u5373\u6642\u63a8\u8ad6(Realtime Inference)\u300d\u5e38\u4f9d\u4efb\u52d9\u7279\u6027\u9078\u64c7\u4e0d\u540c\u6a5f\u5236\u3002\u4e0b\u5217\u95dc\u65bc\u5169\u8005\u7279\u6027\u7684\u6558\u8ff0\u4f55\u8005\u6700\u6b63\u78ba\uff1f", "opts": ["\u6279\u6b21\u63a8\u8ad6\u901a\u5e38\u4ee5\u540c\u6b65\u8acb\u6c42\u65b9\u5f0f\u56de\u50b3\u7d50\u679c\uff0c\u4ee5\u78ba\u4fdd\u8cc7\u6599\u4e00\u81f4\u6027\uff1b\u5373\u6642\u63a8\u8ad6\u5247\u591a\u63a1\u975e\u540c\u6b65\u6a5f\u5236\u4ee5\u63d0\u5347\u7cfb\u7d71\u541e\u5410\u91cf(Throughput)", "\u6279\u6b21\u63a8\u8ad6\u591a\u7528\u65bc\u5ef6\u9072\u5bb9\u5fcd\u5ea6\u8f03\u9ad8\u7684\u5927\u898f\u6a21\u8cc7\u6599\u8655\u7406\uff0c\u901a\u5e38\u4ee5\u541e\u5410\u91cf (Throughput)\u6700\u4f73\u5316\u70ba\u512a\u5148\uff1b\u5373\u6642\u63a8\u8ad6\u5247\u8457\u91cd\u65bc\u8acb\u6c42\u56de\u61c9\u6642\u9593\u7684\u7a69\u5b9a\u6027\u8207\u4f4e\u5ef6\u9072\u7279\u6027", "\u6279\u6b21\u63a8\u8ad6\u56e0\u8a08\u7b97\u8cc7\u6e90\u9700\u6c42\u9ad8\uff0c\u50c5\u9069\u7528\u65bc\u5f71\u50cf\u985e\u6a21\u578b\uff1b\u5373\u6642\u63a8\u8ad6\u5247\u4e3b\u8981\u61c9\u7528\u65bc\u7d50\u69cb\u5316\u8cc7\u6599\u6a21\u578b", "\u5373\u6642\u63a8\u8ad6\u70ba\u78ba\u4fdd\u56de\u61c9\u901f\u5ea6\uff0c\u901a\u5e38\u9650\u5236\u70ba\u55ae\u7b46\u8cc7\u6599\u8f38\u5165\uff1b\u6279\u6b21\u63a8\u8ad6\u5247\u53ef\u652f\u63f4\u540c\u6b65\u591a\u7b46\u8cc7\u6599\u5373\u6642\u56de\u50b3"], "ans": "B", "inferred": false, "expl": "\u3010\u7b54\u6848B\u3011\u6279\u6b21\u63a8\u8ad6 vs \u5373\u6642\u63a8\u8ad6\u3002\n\u2717(A) \u63cf\u8ff0\u985b\u5012\uff1a\u6279\u6b21\u591a\u975e\u540c\u6b65\u3001\u5373\u6642\u591a\u540c\u6b65\u3002\n\u2713(B) \u6279\u6b21\u4ee5\u541e\u5410\u91cf\u70ba\u512a\u5148\u3001\u5bb9\u5fcd\u5ef6\u9072\uff1b\u5373\u6642\u4ee5\u56de\u61c9\u6642\u9593\u7a69\u5b9a\u6027\u70ba\u8a2d\u8a08\u6838\u5fc3\u3002\n\u2717(C) \u6279\u6b21\u4e0d\u9650\u5f71\u50cf\u985e\u6a21\u578b\u3002\n\u2717(D) \u5373\u6642\u4e0d\u9650\u65bc\u55ae\u7b46\uff0c\u4e5f\u53ef\u6279\u591a\u7b46\u3002"}, {"id": "115_1_s1_24", "exam": "115\u5e74\u7b2c\u4e00\u6b21 \u79d1\u76ee\u4e00\uff08AI\u57fa\u790e\uff09", "examId": "115_1_s1", "no": 24, "q": "\u67d0\u4f01\u696d\u5c0e\u5165\u5927\u578b\u8a9e\u8a00\u6a21\u578b\u4f5c\u70ba\u5ba2\u670d\u52a9\u7406\u3002\u6a21\u578b\u5df2\u5177\u5099\u7a69\u5b9a\u8a9e\u8a00\u80fd\u529b\uff0c\u4f46\u5728\u56de\u8986\u504f\u597d\u4e00\u81f4\u6027\u8207\u7d44\u7e54\u898f\u7bc4\u9075\u5faa\u65b9\u9762\u4ecd\u9700\u512a\u5316\uff0c\u5718\u968a\u56e0\u6b64\u898f\u5283\u5c0e\u5165\u4eba\u985e\u53cd\u994b\u5f37\u5316\u5b78\u7fd2 (RLHF)\u6d41\u7a0b\uff0c\u4e0b\u5217\u4f55\u8005\u6700\u4e0d\u5c6c\u65bc RLHF \u968e\u6bb5\u7684\u5178\u578b\u6280\u8853\u6d3b\u52d5\uff1f", "opts": ["\u900f\u904e\u4eba\u5de5\u8a55\u4f30\u65b9\u5f0f\u5efa\u7acb\u504f\u597d\u8cc7\u6599\uff0c\u4f7f\u6a21\u578b\u7684\u4e0d\u540c\u5019\u9078\u8f38\u51fa\u53ef\u53cd\u6620\u4eba\u985e\u4e3b\u89c0\u54c1\u8cea\u5dee\u7570", "\u8a13\u7df4\u4e00\u500b\u80fd\u4f9d\u64da\u4eba\u985e\u504f\u597d\u5224\u65b7\u8f38\u51fa\u54c1\u8cea\u7684\u6a21\u578b\uff0c\u4f5c\u70ba\u6a21\u578b\u512a\u5316\u904e\u7a0b\u4e2d\u7684\u56de\u994b\u4f9d\u64da", "\u4f9d\u64da\u54c1\u8cea\u8a55\u4f30\u7d50\u679c\uff0c\u8abf\u6574\u6a21\u578b\u751f\u6210\u7b56\u7565\uff0c\u4f7f\u5176\u8f38\u51fa\u66f4\u7b26\u5408\u504f\u597d\u5c0e\u5411\u7684\u884c\u70ba\u8868\u73fe", "\u4ee5\u672a\u6a19\u8a3b\u8a9e\u6599\u70ba\u4e3b\u9032\u884c\u9577\u9031\u671f\u8868\u793a\u5b78\u7fd2\u8a13\u7df4\uff0c\u4ee5\u63d0\u5347\u6a21\u578b\u57fa\u790e\u8a9e\u8a00\u5efa\u6a21\u80fd\u529b"], "ans": "D", "inferred": false, "expl": "\u3010\u7b54\u6848D\u3011\u554f\u300c\u6700\u4e0d\u5c6c\u65bc\u300dRLHF \u968e\u6bb5\u6d3b\u52d5\u3002\n\u2717(A) \u5efa\u7acb\u4eba\u985e\u504f\u597d\u8cc7\u6599\u662f RLHF \u7b2c\u4e00\u6b65\u3002\n\u2717(B) \u8a13\u7df4 Reward Model \u662f RLHF \u7b2c\u4e8c\u6b65\u3002\n\u2717(C) \u4f9d\u54c1\u8cea\u8a55\u4f30\u8abf\u6574\u751f\u6210\u7b56\u7565\u662f RLHF \u7b2c\u4e09\u6b65\u3002\n\u2713(D) \u672a\u6a19\u8a3b\u8a9e\u6599\u7684\u9577\u9031\u671f\u8868\u793a\u5b78\u7fd2\u5c6c\u300c\u9810\u8a13\u7df4\u300d\u968e\u6bb5\uff0c\u4e0d\u5728 RLHF \u7bc4\u7587\u3002"}, {"id": "115_1_s1_25", "exam": "115\u5e74\u7b2c\u4e00\u6b21 \u79d1\u76ee\u4e00\uff08AI\u57fa\u790e\uff09", "examId": "115_1_s1", "no": 25, "q": "\u5728\u5927\u578b\u8a9e\u8a00\u6a21\u578b(LLM)\u7684\u63a8\u8ad6\u670d\u52d9\u4e2d\uff0c\u5e38\u900f\u904e\u8acb\u6c42\u6279\u6b21\u8655\u7406(Batching)\u4f86\u63d0\u5347\u7cfb\u7d71\u6548\u80fd\u3002\u95dc\u65bc\u6279\u6b21\u8655\u7406(Batching)\u6a5f\u5236\u7684\u5f71\u97ff\uff0c\u4e0b\u5217\u6558\u8ff0\u4f55\u8005\u6700\u6b63\u78ba\uff1f", "opts": ["Batching \u53ef\u63d0\u5347\u52a0\u901f\u5668\u8cc7\u6e90\u4f7f\u7528\u6548\u7387\u4e26\u589e\u52a0\u6574\u9ad4\u541e\u5410\u91cf(Throughput)\uff0c\u4f46\u5728\u90e8 \u5206\u60c5\u5883\u4e0b\u53ef\u80fd\u5c0d\u55ae\u7b46\u8acb\u6c42\u5ef6\u9072\u9020\u6210\u5f71\u97ff", "Batching \u4e3b\u8981\u7528\u65bc\u52a0\u5feb\u55ae\u7b46\u8acb\u6c42\u56de\u61c9\u6642\u9593", "Batching \u7684\u6548\u76ca\u4e3b\u8981\u4f86\u81ea\u964d\u4f4e\u8a18\u61b6\u9ad4\u4f7f\u7528\u91cf\uff0c\u5c0d\u65bc\u541e\u5410\u91cf(Throughput)\u8207\u5ef6 \u9072\u8868\u73fe\u5f71\u97ff\u6709\u9650", "Batching \u5728\u4f4e\u4f75\u767c(Concurrency)\u8acb\u6c42\u4e0b\uff0c\u4ecd\u80fd\u660e\u986f\u63d0\u5347\u7cfb\u7d71\u6548\u80fd"], "ans": "A", "inferred": false, "expl": "\u3010\u7b54\u6848A\u3011Batching \u5c0d LLM \u63a8\u8ad6\u7684\u5f71\u97ff\u3002\n\u2713(A) Batching \u63d0\u5347\u52a0\u901f\u5668\u4f7f\u7528\u7387\u8207\u6574\u9ad4\u541e\u5410\u91cf\uff0c\u4f46\u9700\u7b49\u5f85\u6e4a\u6279\uff0c\u90e8\u5206\u60c5\u5883\u4e0b\u55ae\u7b46\u5ef6\u9072\u53ef\u80fd\u4e0a\u5347\u3002\n\u2717(B) \u4e0d\u6703\u52a0\u5feb\u55ae\u7b46\uff0c\u53cd\u800c\u53ef\u80fd\u8b8a\u6162\u3002\n\u2717(C) \u4e3b\u8981\u6548\u76ca\u662f\u541e\u5410\u91cf\uff0c\u4e0d\u662f\u964d\u4f4e\u8a18\u61b6\u9ad4\u3002\n\u2717(D) \u4f4e\u4f75\u767c\u4e0b\u6e4a\u4e0d\u6eff\u6279\uff0c\u6548\u76ca\u6709\u9650\u3002"}, {"id": "115_1_s1_26", "exam": "115\u5e74\u7b2c\u4e00\u6b21 \u79d1\u76ee\u4e00\uff08AI\u57fa\u790e\uff09", "examId": "115_1_s1", "no": 26, "q": "\u5728\u53ef\u89e3\u91cb AI(Explainable AI, XAI) \u7684\u5206\u985e\u67b6\u69cb\u4e2d\uff0cLIME(Local Interpretable Model-agnostic Explanations)\u5c6c\u65bc\u54ea\u4e00\u985e\u89e3\u91cb\u6280\u8853\uff1f", "opts": ["\u5167\u5efa\u53ef\u89e3\u91cb\u6a21\u578b(Intrinsic Interpretability)\uff1a\u6a21\u578b\u672c\u8eab\u5177\u6709\u900f\u660e\u7684\u6c7a\u7b56\u7d50\u69cb", "\u5c0d\u8a71\u5f0f\u89e3\u91cb\u7cfb\u7d71(Conversational AI Explainer)\uff1a\u900f\u904e\u4e92\u52d5\u5c0d\u8a71\u63d0\u4f9b\u6a21\u578b\u89e3\u91cb", "\u5f8c\u8655\u7406\u6a21\u578b\u89e3\u91cb(post-hoc)\uff1a\u5c0d\u5df2\u8a13\u7df4\u6a21\u578b\u63d0\u4f9b\u5916\u90e8\u89e3\u91cb", "\u4ee3\u7406\u6a21\u578b\u6280\u8853(Surrogate Model)\uff1a\u8a13\u7df4\u53e6\u4e00\u500b\u7c21\u55ae\u6a21\u578b\u4f86\u5b8c\u5168\u53d6\u4ee3\u539f\u9ed1\u76d2\u6a21\u578b \u9032\u884c\u63a8\u8ad6"], "ans": "C", "inferred": false, "expl": "\u3010\u7b54\u6848C\u3011LIME \u5728 XAI \u5206\u985e\u4e2d\u7684\u6b78\u5c6c\u3002\n\u2717(A) \u5167\u5efa\u53ef\u89e3\u91cb\u6307\u6a21\u578b\u672c\u8eab\uff08\u5982\u6c7a\u7b56\u6a39\uff09\u5177\u900f\u660e\u7d50\u69cb\uff0c\u975e LIME\u3002\n\u2717(B) \u5c0d\u8a71\u5f0f\u89e3\u91cb\u975e\u6a19\u6e96\u5b78\u8853\u5206\u985e\u3002\n\u2713(C) LIME \u662f Post-hoc\uff08\u4e8b\u5f8c\uff09\u89e3\u91cb\uff0c\u5c0d\u5df2\u8a13\u7df4\u7684\u9ed1\u7bb1\u6a21\u578b\u63d0\u4f9b\u5916\u90e8\u89e3\u91cb\u3002\n\u2717(D) Surrogate Model \u662f\u7528\u7c21\u55ae\u6a21\u578b\u300c\u5b8c\u5168\u53d6\u4ee3\u300d\u539f\u6a21\u578b\uff0cLIME \u50c5\u662f\u5c40\u90e8\u8fd1\u4f3c\uff0c\u4e0d\u5b8c\u5168\u53d6\u4ee3\u3002"}, {"id": "115_1_s1_27", "exam": "115\u5e74\u7b2c\u4e00\u6b21 \u79d1\u76ee\u4e00\uff08AI\u57fa\u790e\uff09", "examId": "115_1_s1", "no": 27, "q": "SHAP(SHapley Additive exPlanations)\u503c\u5e38\u7528\u65bc\u5206\u6790\u6a5f\u5668\u5b78\u7fd2\u6a21\u578b\u7684\u8f38\u51fa\u884c\u70ba\u3002\u4e0b\u5217\u4f55\u8005\u6700\u7b26\u5408 SHAP \u503c\u6240\u63d0\u4f9b\u7684\u8cc7\u8a0a\uff1f", "opts": ["\u6a21\u578b\u5728\u8a13\u7df4\u904e\u7a0b\u4e2d\uff0c\u5404\u7279\u5fb5\u5c0d\u640d\u5931\u51fd\u6578\u6536\u6582\u901f\u5ea6\u7684\u5f71\u97ff\u7a0b\u5ea6", "\u4f9d\u64da\u7279\u5fb5\u5c0d\u6a21\u578b\u6574\u9ad4\u6e96\u78ba\u7387\u7684\u5f71\u97ff\uff0c\u81ea\u52d5\u7be9\u9664\u4f4e\u91cd\u8981\u6027\u8b8a\u6578", "\u5728\u55ae\u4e00\u9810\u6e2c\u7d50\u679c\u4e2d\uff0c\u5404\u8f38\u5165\u7279\u5fb5\u5c0d\u6700\u7d42\u8f38\u51fa\u6240\u7522\u751f\u7684\u8ca2\u737b\u5206\u914d", "\u900f\u904e\u8abf\u6574\u7279\u5fb5\u6b0a\u91cd\uff0c\u4f7f\u6a21\u578b\u5728\u63a8\u8ad6\u968e\u6bb5\u964d\u4f4e\u8a08\u7b97\u8907\u96dc\u5ea6"], "ans": "C", "inferred": false, "expl": "\u3010\u7b54\u6848C\u3011SHAP \u503c\u7684\u8cc7\u8a0a\u5167\u6db5\u3002\n\u2717(A) SHAP \u8207\u640d\u5931\u51fd\u6578\u6536\u6582\u901f\u5ea6\u7121\u95dc\u3002\n\u2717(B) SHAP \u63d0\u4f9b\u8ca2\u737b\u5206\u914d\uff0c\u4e0d\u81ea\u52d5\u57f7\u884c\u7279\u5fb5\u7be9\u9078\u3002\n\u2713(C) SHAP \u57fa\u65bc Shapley \u503c\uff0c\u8a08\u7b97\u55ae\u4e00\u9810\u6e2c\u4e2d\u5404\u7279\u5fb5\u5c0d\u8f38\u51fa\u7684\u908a\u969b\u8ca2\u737b\u5206\u914d\uff0c\u53ef\u6b63\u53ef\u8ca0\u3002\n\u2717(D) SHAP \u4e0d\u7528\u65bc\u964d\u4f4e\u63a8\u8ad6\u8a08\u7b97\u8907\u96dc\u5ea6\u3002"}, {"id": "115_1_s1_28", "exam": "115\u5e74\u7b2c\u4e00\u6b21 \u79d1\u76ee\u4e00\uff08AI\u57fa\u790e\uff09", "examId": "115_1_s1", "no": 28, "q": "\u5728\u91d1\u878d\u696d\u5c0e\u5165 AI \u6a21\u578b\u8207\u53ef\u89e3\u91cb\u6027\u6280\u8853\u6642\uff0c\u53cd\u4e8b\u5be6\u89e3\u91cb(Counterfactual Explanation)\u6700\u7b26\u5408\u4e0b\u5217\u54ea\u4e00\u7a2e\u61c9\u7528\uff1f", "opts": ["\u5206\u6790\u6574\u9ad4\u5ba2\u6236\u7fa4\u7684\u4fe1\u7528\u98a8\u96aa\u5206\u5e03\uff0c\u4ee5\u9810\u6e2c\u672a\u4f86\u9055\u7d04\u7387\u8da8\u52e2", "\u56de\u6eaf\u6b77\u53f2\u5446\u5e33\u6848\u4f8b\uff0c\u8fa8\u8b58\u9020\u6210\u9055\u7d04\u7684\u4e3b\u8981\u5f71\u97ff\u56e0\u7d20", "\u5206\u6790\u5728\u6a21\u578b\u4e0d\u8b8a\u7684\u524d\u63d0\u4e0b\uff0c\u5ba2\u6236\u7533\u8acb\u8cc7\u6599\u8b8a\u52d5\u5c0d\u6388\u4fe1\u6c7a\u7b56\u7d50\u679c\u7684\u5f71\u97ff", "\u4f9d\u64da\u5ba2\u6236\u8f2a\u5ed3\u8207\u884c\u70ba\u8cc7\u6599\uff0c\u63a8\u85a6\u6700\u9069\u5408\u7684\u91d1\u878d\u5546\u54c1\u4ee5\u63d0\u5347\u4ea4\u53c9\u92b7\u552e"], "ans": "C", "inferred": false, "expl": "\u3010\u7b54\u6848C\u3011\u53cd\u4e8b\u5be6\u89e3\u91cb\u7684\u5178\u578b\u61c9\u7528\u3002\n\u2717(A) \u6574\u9ad4\u5206\u5e03\u8da8\u52e2\u5c6c Global \u5206\u6790\u3002\n\u2717(B) \u56de\u6eaf\u6b77\u53f2\u5f71\u97ff\u56e0\u7d20\u662f\u7279\u5fb5\u91cd\u8981\u6027\u5206\u6790\u3002\n\u2713(C) \u300c\u82e5\u5ba2\u6236\u7533\u8acb\u8cc7\u6599\u8b8a\u52d5\uff0c\u6388\u4fe1\u6c7a\u7b56\u662f\u5426\u6539\u8b8a\u300d\u6b63\u662f\u53cd\u4e8b\u5be6\u89e3\u91cb\u7684\u5178\u578b\u7528\u6cd5\u3002\n\u2717(D) \u63a8\u85a6\u5546\u54c1\u5c6c\u63a8\u85a6\u7cfb\u7d71\uff0c\u8207\u53cd\u4e8b\u5be6\u7121\u95dc\u3002"}, {"id": "115_1_s1_29", "exam": "115\u5e74\u7b2c\u4e00\u6b21 \u79d1\u76ee\u4e00\uff08AI\u57fa\u790e\uff09", "examId": "115_1_s1", "no": 29, "q": "\u5728\u6df1\u5ea6\u5b78\u7fd2\u6a21\u578b\u7684\u5206\u6790\u8207\u9a57\u8b49\u904e\u7a0b\u4e2d\uff0c\u7814\u7a76\u4eba\u54e1\u6709\u6642\u6703\u5229\u7528\u300c\u986f\u8457\u6027\u5716(Saliency Map)\u300d\u4f86\u8f14\u52a9\u7406\u89e3\u6a21\u578b\u884c\u70ba\u3002\u4e0b\u5217\u4f55\u8005\u6700\u7b26\u5408\u6b64\u6280\u8853\u7684\u4e3b\u8981\u7528\u9014\uff1f", "opts": ["\u91cf\u5316\u5404\u8f38\u5165\u7279\u5fb5\u5c0d\u6a21\u578b\u6574\u9ad4\u9810\u6e2c\u6e96\u78ba\u5ea6\u7684\u5e73\u5747\u5f71\u97ff\u7a0b\u5ea6", "\u6a19\u793a\u8f38\u5165\u8cc7\u6599\u4e2d\u5c0d\u55ae\u4e00\u9810\u6e2c\u7d50\u679c\u5f71\u97ff\u8f03\u5927\u7684\u5340\u57df\u6216\u90e8\u5206", "\u8a55\u4f30\u5728\u4e0d\u540c\u6a21\u578b\u53c3\u6578\u8a2d\u5b9a\u4e0b\uff0c\u9810\u6e2c\u7d50\u679c\u7684\u7a69\u5b9a\u6027\u8b8a\u5316", "\u6bd4\u8f03\u4e0d\u540c\u6a21\u578b\u67b6\u69cb\u5728\u6e2c\u8a66\u8cc7\u6599\u4e0a\u7684\u6cdb\u5316\u80fd\u529b\u5dee\u7570"], "ans": "B", "inferred": false, "expl": "\u3010\u7b54\u6848B\u3011Saliency Map \u7684\u4e3b\u8981\u7528\u9014\u3002\n\u2717(A) \u5e73\u5747\u5f71\u97ff\u5ea6\u5c6c Global Feature Importance\u3002\n\u2713(B) \u900f\u904e\u68af\u5ea6\u6a19\u793a\u55ae\u4e00\u8f38\u5165\u4e2d\u5c0d\u8a72\u9810\u6e2c\u5f71\u97ff\u8f03\u5927\u7684\u5340\u57df\uff08\u5982 CNN \u5f71\u50cf\u95dc\u9375\u50cf\u7d20\uff09\u3002\n\u2717(C) \u4e0d\u8861\u91cf\u6a21\u578b\u53c3\u6578\u7684\u7a69\u5b9a\u6027\u3002\n\u2717(D) \u4e0d\u6bd4\u8f03\u4e0d\u540c\u67b6\u69cb\u7684\u6cdb\u5316\u80fd\u529b\u3002"}, {"id": "115_1_s1_30", "exam": "115\u5e74\u7b2c\u4e00\u6b21 \u79d1\u76ee\u4e00\uff08AI\u57fa\u790e\uff09", "examId": "115_1_s1", "no": 30, "q": "\u67d0\u5546\u696d\u9280\u884c\u60f3\u5efa\u7acb\u6d17\u9322\u884c\u70ba\u6aa2\u6e2c\u7cfb\u7d71\uff0c\u64c1\u6709\u904e\u53bb 5 \u5e74\u7684\u4ea4\u6613\u8a18\u9304\uff0c\u5176\u4e2d\u5305\u542b\u5df2\u78ba \u8a8d\u7684\u6d17\u9322\u6848\u4f8b(\u6a19\u8a18\u70ba\u300c\u7570\u5e38\u300d)\u548c\u6b63\u5e38\u4ea4\u6613(\u6a19\u8a18\u70ba\u300c\u6b63\u5e38\u300d)\u3002\u9280\u884c\u5e0c\u671b\u7cfb\u7d71\u80fd \u81ea\u52d5\u8b58\u5225\u65b0\u4ea4\u6613\u662f\u5426\u70ba\u6d17\u9322\u884c\u70ba\uff0c\u8acb\u554f\u4f7f\u7528\u4e0b\u5217\u54ea\u4e00\u7a2e\u6a5f\u5668\u5b78\u7fd2\u65b9\u6cd5\u6700\u70ba\u9069\u5408\uff1f", "opts": ["\u76e3\u7763\u5f0f\u5b78\u7fd2\u7684\u5206\u985e\u554f\u984c", "\u975e\u76e3\u7763\u5f0f\u5b78\u7fd2\u7684\u5206\u7fa4\u554f\u984c", "\u5f37\u5316\u5f0f\u5b78\u7fd2", "\u975e\u76e3\u7763\u5f0f\u5b78\u7fd2\u7684\u95dc\u806f\u898f\u5247\u6316\u6398"], "ans": "A", "inferred": false, "expl": "\u3010\u7b54\u6848A\u3011\u6709\u6a19\u8a3b\u7684\u6d17\u9322\u5075\u6e2c\u3002\n\u2713(A) \u5df2\u6709\u300c\u7570\u5e38/\u6b63\u5e38\u300d\u6a19\u7c64\u7684\u6b77\u53f2\u8cc7\u6599\uff0c\u76f4\u63a5\u8a13\u7df4\u76e3\u7763\u5f0f\u5206\u985e\u6700\u4f73\u3002\n\u2717(B) \u5df2\u6709\u6a19\u7c64\uff0c\u63a1\u7528\u975e\u76e3\u7763\u5206\u7fa4\u6d6a\u8cbb\u6a19\u7c64\u8cc7\u8a0a\u3002\n\u2717(C) \u5f37\u5316\u5b78\u7fd2\u9700\u8207\u74b0\u5883\u4e92\u52d5\u56de\u994b\uff0c\u4e0d\u7b26\u96e2\u7dda\u6b77\u53f2\u8cc7\u6599\u60c5\u5883\u3002\n\u2717(D) \u95dc\u806f\u898f\u5247\u63a2\u7d22\u8cb7\u55ae\u7d44\u5408\uff0c\u4e0d\u9069\u5408\u5206\u985e\u3002"}, {"id": "115_1_s1_31", "exam": "115\u5e74\u7b2c\u4e00\u6b21 \u79d1\u76ee\u4e00\uff08AI\u57fa\u790e\uff09", "examId": "115_1_s1", "no": 31, "q": "\u67d0\u8fb2\u5834\u6536\u96c6\u4e86\u5927\u91cf\u4f5c\u7269\u8449\u7247\u5f71\u50cf\uff0c\u4f46\u53ea\u6709 30%\u7684\u5f71\u50cf\u6709\u75c5\u5bb3\u985e\u5225\u6a19\u8a3b\uff0c\u5176\u9918 70% \u7684\u5f71\u50cf\u6c92\u6709\u4efb\u4f55\u6a19\u7c64\u3002\u8fb2\u5834\u5e0c\u671b\u5145\u5206\u5229\u7528\u6240\u6709\u8cc7\u6599\u4f86\u8a13\u7df4\u75c5\u5bb3\u8b58\u5225\u6a21\u578b\u3002\u9019\u7a2e\u60c5 \u6cc1\u6700\u9069\u5408\u4f7f\u7528\u54ea\u4e00\u7a2e\u5b78\u7fd2\u65b9\u6cd5\uff1f", "opts": ["\u534a\u76e3\u7763\u5f0f\u5b78\u7fd2(Semi-supervised Learning)", "\u76e3\u7763\u5f0f\u5b78\u7fd2(Supervised Learning)", "\u975e\u76e3\u7763\u5f0f\u5b78\u7fd2(Unsupervised Learning)", "\u5f37\u5316\u5f0f\u5b78\u7fd2(Reinforcement Learning)"], "ans": "A", "inferred": false, "expl": "\u3010\u7b54\u6848A\u301130% \u6709\u6a19 + 70% \u7121\u6a19\u3002\n\u2713(A) \u534a\u76e3\u7763\u5f0f\u5b78\u7fd2\u540c\u6642\u5229\u7528\u6a19\u8a3b\u8207\u672a\u6a19\u8a3b\u8cc7\u6599\uff0c\u6700\u5927\u5316\u8cc7\u6599\u50f9\u503c\u3002\n\u2717(B) \u76e3\u7763\u5f0f\u53ea\u7528 30% \u6a19\u8a3b\uff0c\u6d6a\u8cbb 70% \u672a\u6a19\u8a3b\u3002\n\u2717(C) \u975e\u76e3\u7763\u5f0f\u6d6a\u8cbb\u5df2\u6709\u7684\u6a19\u8a3b\u3002\n\u2717(D) \u5f37\u5316\u5b78\u7fd2\u4e0d\u7b26\u975c\u614b\u5f71\u50cf\u5206\u985e\u60c5\u5883\u3002"}, {"id": "115_1_s1_32", "exam": "115\u5e74\u7b2c\u4e00\u6b21 \u79d1\u76ee\u4e00\uff08AI\u57fa\u790e\uff09", "examId": "115_1_s1", "no": 32, "q": "\u67d0\u74b0\u4fdd\u5c40\u60f3\u5efa\u7acb AI \u7cfb\u7d71\u76e3\u6e2c\u7a7a\u6c23\u54c1\u8cea\uff0c\u900f\u904e\u5206\u6790\u76e3\u6e2c\u7ad9\u651d\u5f71\u6a5f\u62cd\u651d\u7684\u5f71\u50cf\u4f86\u8b58\u5225\u7159\u9727\u3002\u7cfb\u7d71\u9700\u8981\u5728\u5f71\u50cf\u4e2d\u627e\u51fa\u7159\u9727\u5340\u57df\u4e26\u6a19\u793a\u5176\u4f4d\u7f6e\u548c\u7bc4\u570d\u3002\u9019\u500b\u61c9\u7528\u4e3b\u8981\u5c6c\u65bc\u96fb\u8166\u8996\u89ba\u7684\u54ea\u500b\u6280\u8853\u9818\u57df\uff1f", "opts": ["\u5f71\u50cf\u5206\u985e\uff0c\u5224\u65b7\u5f71\u50cf\u4e2d\u662f\u5426\u6709\u7159\u9727", "\u7269\u4ef6\u5075\u6e2c\uff0c\u627e\u51fa\u7159\u9727\u4f4d\u7f6e\u4e26\u7528\u65b9\u6846\u6a19\u793a", "\u5f71\u50cf\u5206\u5272\uff0c\u7cbe\u78ba\u6a19\u793a\u51fa\u7159\u9727\u7684\u50cf\u7d20\u5340\u57df", "\u4eba\u81c9\u8fa8\u8b58\uff0c\u8b58\u5225\u7159\u9727\u4f86\u6e90"], "ans": "C", "inferred": false, "expl": "\u3010\u7b54\u6848C\u3011\u627e\u51fa\u7159\u9727\u4f4d\u7f6e\u4e26\u6a19\u793a\u50cf\u7d20\u5340\u57df\u3002\n\u2717(A) \u5f71\u50cf\u5206\u985e\u53ea\u5224\u6709\u7121\uff0c\u4e0d\u6a19\u4f4d\u7f6e\u3002\n\u2717(B) \u7269\u4ef6\u5075\u6e2c\u756b\u65b9\u6846\uff0c\u7121\u6cd5\u7cbe\u78ba\u6a19\u7bc4\u570d\u3002\n\u2713(C) \u5f71\u50cf\u5206\u5272\uff08Segmentation\uff09\u505a\u50cf\u7d20\u7d1a\u6a19\u793a\uff0c\u80fd\u7cbe\u78ba\u6a19\u51fa\u7159\u9727\u7bc4\u570d\u3002\n\u2717(D) \u4eba\u81c9\u8fa8\u8b58\u4e0d\u9069\u7528\u65bc\u7159\u9727\u3002"}, {"id": "115_1_s1_33", "exam": "115\u5e74\u7b2c\u4e00\u6b21 \u79d1\u76ee\u4e00\uff08AI\u57fa\u790e\uff09", "examId": "115_1_s1", "no": 33, "q": "\u67d0\u516c\u8eca\u7cfb\u7d71\u60f3\u9810\u6e2c\u5404\u7ad9\u9ede\u7684\u5230\u7ad9\u6642\u9593\uff0c\u9700\u8981\u8003\u616e\u6b77\u53f2\u73ed\u6b21\u8cc7\u6599\u3001\u5373\u6642\u8def\u6cc1\u3001\u5929\u6c23\u7b49\u56e0\u7d20\u3002\u7531\u65bc\u8def\u6cc1\u8b8a\u5316\u8907\u96dc\uff0c\u50b3\u7d71\u5faa\u74b0\u795e\u7d93\u7db2\u8def(Recurrent Neural Network, RNN)\u5728\u5efa\u6a21\u6642\u53ef\u80fd\u96e3\u4ee5\u4fdd\u7559\u8f03\u65e9\u671f\u7684\u91cd\u8981\u8cc7\u8a0a\u3002\u4e0b\u5217\u54ea\u7a2e\u67b6\u69cb\u6700\u80fd\u89e3\u6c7a\u9019\u500b\u554f \u984c\uff1f", "opts": ["\u5377\u7a4d\u795e\u7d93\u7db2\u8def(Convolutional Neural Network, CNN)\uff0c\u5229\u7528\u5377\u7a4d\u5c64\u6355\u6349\u5c40\u90e8\u7279\u5fb5", "\u81ea\u7de8\u78bc\u5668(Autoencoder, AE)\uff0c\u5148\u9032\u884c\u8cc7\u6599\u58d3\u7e2e\u518d\u91cd\u5efa", "\u5168\u9023\u63a5\u795e\u7d93\u7db2\u8def(Fully Connected Neural Network, FCNN)\uff0c\u589e\u52a0\u96b1\u85cf\u5c64\u6578\u91cf", "\u9577\u77ed\u671f\u8a18\u61b6\u7db2\u8def(Long Short-Term Memory, LSTM)\uff0c\u6539\u5584 RNN \u7684\u9577\u671f\u8a18\u61b6\u554f \u984c"], "ans": "D", "inferred": false, "expl": "\u3010\u7b54\u6848D\u3011RNN \u96e3\u4fdd\u7559\u65e9\u671f\u8cc7\u8a0a\uff08\u68af\u5ea6\u6d88\u5931\uff09\u3002\n\u2717(A) CNN \u8655\u7406\u7a7a\u9593\u5c40\u90e8\u7279\u5fb5\uff0c\u7121\u6642\u5e8f\u8a18\u61b6\u6a5f\u5236\u3002\n\u2717(B) AE \u7528\u65bc\u58d3\u7e2e\u91cd\u5efa\uff0c\u975e\u6642\u5e8f\u9810\u6e2c\u3002\n\u2717(C) FCNN \u7121\u5e8f\u5217\u5efa\u6a21\u80fd\u529b\u3002\n\u2713(D) LSTM \u900f\u904e\u907a\u5fd8/\u8f38\u5165/\u8f38\u51fa\u4e09\u9598\u9580\uff0c\u6b63\u662f\u7528\u4f86\u89e3\u6c7a RNN \u9577\u671f\u4f9d\u8cf4\u554f\u984c\u7684\u67b6\u69cb\u3002"}, {"id": "115_1_s1_34", "exam": "115\u5e74\u7b2c\u4e00\u6b21 \u79d1\u76ee\u4e00\uff08AI\u57fa\u790e\uff09", "examId": "115_1_s1", "no": 34, "q": "\u67d0\u4fdd\u96aa\u516c\u53f8\u6bcf\u6708\u8655\u7406\u7d04 50 \u842c\u7b46\u7406\u8ce0\u7533\u8acb\uff0c\u5e0c\u671b\u5efa\u7acb AI \u7cfb\u7d71\u81ea\u52d5\u8b58\u5225\u53ef\u7591\u7684\u8a50\u6b3a\u6848\u4ef6\u3002\u7531\u65bc\u516c\u53f8\u5167\u90e8\u7f3a\u4e4f AI \u5c08\u696d\u4eba\u54e1\uff0c\u4e14\u9700\u8981\u5feb\u901f\u4e0a\u7dda\u9a57\u8b49\u6548\u679c\uff0cIT \u8cc7\u8a0a\u4e3b\u7ba1\u6b63\u5728\u8a55\u4f30\u4e0d\u540c\u7684 AI \u5e73\u53f0\u89e3\u6c7a\u65b9\u6848\u3002\u5728\u53bb\u8b58\u5225\u5316\u500b\u4eba\u96b1\u79c1\u8cc7\u6599\u5f8c\uff0c\u4e0b\u5217\u54ea\u4e00\u7a2e\u5e73\u53f0\u985e\u578b\u6700\u9069\u5408\u8a72\u516c\u53f8\u7684\u9700\u6c42\uff1f", "opts": ["\u5f9e\u96f6\u958b\u59cb\u5efa\u7acb\u6df1\u5ea6\u5b78\u7fd2\u6846\u67b6\u4e26\u81ea\u884c\u8a13\u7df4\u6a21\u578b", "\u63a1\u7528\u958b\u6e90\u6a5f\u5668\u5b78\u7fd2\u6846\u67b6\u9032\u884c\u5ba2\u88fd\u5316\u6a21\u578b\u958b\u767c", "\u4f7f\u7528\u96f2\u7aef AutoML \u5e73\u53f0\u9032\u884c\u81ea\u52d5\u5316\u6a21\u578b\u8a13\u7df4", "\u8cfc\u8cb7\u73fe\u6210\u7684\u8a50\u6b3a\u5075\u6e2c\u8edf\u9ad4\u5957\u4ef6\u76f4\u63a5\u90e8\u7f72"], "ans": "C", "inferred": false, "expl": "\u3010\u7b54\u6848C\u3011\u7f3a AI \u4eba\u624d\u4e14\u9700\u5feb\u901f\u4e0a\u7dd \u6b21 \u79d1\u76ee\u4e00\uff08AI\u57fa\u790e\uff09", "examId": "115_1_s1", "no": 40, "q": "\u67d0\u88fd\u9020\u696d\u516c\u53f8\u5efa\u7f6e\u6a5f\u5668\u5b78\u7fd2\u6a21\u578b\uff0c\u7528\u65bc\u9810\u6e2c\u7522\u54c1\u662f\u5426\u70ba\u7455\u75b5\u54c1\u3002\u5be6\u969b\u751f\u7522\u8cc7\u6599\u4e2d\uff0c\u7455\u75b5\u54c1\u6bd4\u4f8b\u6975\u4f4e\uff0c\u5927\u591a\u6578\u6a23\u672c\u7686\u70ba\u6b63\u5e38\u54c1\u3002\u6a21\u578b\u6e2c\u8a66\u6642\u767c\u73fe\uff0c\u5373\u4f7f\u6a21\u578b\u591a\u6578\u9810\u6e2c\u70ba\u6b63\u5e38\u54c1\uff0c\u4ecd\u53ef\u7372\u5f97\u5f88\u9ad8\u7684\u6574\u9ad4\u6e96\u78ba\u7387\u3002\u5728\u6b64\u60c5\u5883\u4e0b\uff0c\u82e5\u5e0c\u671b\u66f4\u6709\u6548\u8861\u91cf\u6a21\u578b\u5c0d\u7455\u75b5\u54c1\u7684\u8fa8\u8b58\u80fd\u529b\uff0c\u4e0b\u5217\u4f55\u8005\u8f03\u9069\u5408\u4f5c\u70ba\u4e3b\u8981\u8a55\u4f30\u6307\u6a19\uff1f", "opts": ["F1-score", "\u5747\u65b9\u8aa4\u5dee(Root Mean Squared Error, RMSE)", "\u6e96\u78ba\u7387(Accuracy)", "\u5224\u5b9a\u4fc2\u6578(R\u0026sup2;, Coefficient of Determination)"], "ans": "A", "inferred": false, "expl": "\u3010\u7b54\u6848A\u3011\u985e\u5225\u56b4\u91cd\u4e0d\u5e73\u8861\u7684\u8a55\u4f30\u6307\u6a19\u3002\n\u2713(A) F1-score \u662f Precision \u8207 Recall \u7684\u8abf\u548c\u5e73\u5747\uff0c\u80fd\u6709\u6548\u8861\u91cf\u5c0d\u5c11\u6578\u985e\uff08\u7455\u75b5\u54c1\uff09\u7684\u8fa8\u8b58\u80fd\u529b\u3002\n\u2717(B) RMSE \u662f\u8ff4\u6b78\u6307\u6a19\u3002\n\u2717(C) Accuracy \u5728\u985e\u5225\u4e0d\u5e73\u8861\u6642\u865b\u9ad8\u3002\n\u2717(D) R\u00b2 \u662f\u8ff4\u6b78\u6307\u6a19\u3002"}, {"id": "115_1_s1_41", "exam": "115\u5e74\u7b2c\u4e00\u6b21 \u79d1\u76ee\u4e00\uff08AI\u57fa\u790e\uff09", "examId": "115_1_s1", "no": 41, "q": "\u5728\u5927\u578b\u8a9e\u8a00\u6a21\u578b(LLM)\u7684\u6548\u80fd\u512a\u5316\u4e2d\uff0cFlash Attention \u5e38\u88ab\u7528\u4f86\u6539\u5584 Transformer \u6ce8\u610f\u529b\u6a5f\u5236\u7684\u904b\u7b97\u6548\u7387\u3002\u95dc\u65bc Flash Attention \u7684\u4e3b\u8981\u6548\u76ca\uff0c\u4e0b\u5217\u6558\u8ff0\u4f55\u8005\u6700\u6b63\u78ba\uff1f", "opts": ["\u900f\u904e\u5ffd\u7565\u5f71\u97ff\u8f03\u5c0f\u7684\u6ce8\u610f\u529b\u6b0a\u91cd\uff0c\u6e1b\u5c11\u6a21\u578b\u9700\u8981\u8a08\u7b97\u7684\u95dc\u806f\u6578\u91cf\uff0c\u4ee5\u964d\u4f4e\u904b\u7b97\u6210\u672c", "\u900f\u904e\u8abf\u6574\u6ce8\u610f\u529b\u8a08\u7b97\u8207\u8cc7\u6599\u8655\u7406\u65b9\u5f0f\uff0c\u6e1b\u5c11\u4e2d\u9593\u7d50\u679c\u7684\u5132\u5b58\u9700\u6c42\uff0c\u9032\u800c\u6539\u5584\u901f\u5ea6\u8207\u8cc7\u6e90\u4f7f\u7528\u6548\u7387", "\u900f\u904e\u589e\u52a0\u6ce8\u610f\u529b\u8a08\u7b97\u7684\u4e26\u884c\u7a0b\u5ea6\uff0c\u4f7f\u6a21\u578b\u53ef\u540c\u6642\u8655\u7406\u66f4\u591a\u6ce8\u610f\u529b\u982d\u90e8", "\u900f\u904e\u5c07\u6ce8\u610f\u529b\u7d50\u679c\u66ab\u5b58\u65bc\u9ad8\u901f\u5feb\u53d6\u8a18\u61b6\u9ad4\uff0c\u4ee5\u907f\u514d\u91cd\u8907\u8a08\u7b97\u9020\u6210\u5ef6\u9072"], "ans": "B", "inferred": false, "expl": "\u3010\u7b54\u6848B\u3011Flash Attention \u7684\u4e3b\u8981\u6548\u76ca\u3002\n\u2717(A) \u5ffd\u7565\u5c0f\u6b0a\u91cd\u662f Sparse Attention \u7684\u505a\u6cd5\u3002\n\u2713(B) \u91cd\u65b0\u8a2d\u8a08\u8a08\u7b97\u8207\u8cc7\u6599\u8655\u7406\uff08\u5206\u584a+\u6e1b HBM \u8b80\u5beb\uff09\uff0c\u6e1b\u5c11\u4e2d\u9593\u7d50\u679c\u5132\u5b58\uff0c\u6539\u5584\u901f\u5ea6\u8207\u8cc7\u6e90\u4f7f\u7528\u3002\n\u2717(C) \u589e\u52a0\u4e26\u884c\u982d\u90e8\u4e0d\u662f Flash Attention \u7684\u6838\u5fc3\u3002\n\u2717(D) \u4e3b\u8981\u662f I/O \u91cd\u6392\uff0c\u4e0d\u53ea\u662f\u5feb\u53d6\u3002"}, {"id": "115_1_s1_42", "exam": "115\u5e74\u7b2c\u4e00\u6b21 \u79d1\u76ee\u4e00\uff08AI\u57fa\u790e\uff09", "examId": "115_1_s1", "no": 42, "q": "\u67d0\u4f01\u696d\u5efa\u7f6e\u57fa\u65bc\u6aa2\u7d22\u589e\u5f37\u751f\u6210(RAG)\u7684\u6cd5\u9075\u77e5\u8b58\u8f14\u52a9\u7cfb\u7d71\uff0c\u7528\u65bc\u6574\u5408\u6cd5\u898f\u689d \u6587\u3001\u5167\u63a7\u5236\u5ea6\u8207\u6b77\u53f2\u51fd\u91cb\u6587\u4ef6\u3002\u7cfb\u7d71\u904b\u884c\u5f8c\u767c\u73fe\uff0c\u6bcf\u7576\u6cd5\u898f\u66f4\u65b0\u6216\u65b0\u589e\u89e3\u91cb\u6587\u4ef6\u6642\uff0c\u9700\u91cd\u65b0\u5efa\u7acb\u5b8c\u6574\u7d22\u5f15\uff0c\u5c0e\u81f4\u66f4\u65b0\u671f\u9593\u7cfb\u7d71\u66ab\u505c\u670d\u52d9\uff0c\u4e14\u90e8\u5206\u56de\u61c9\u5076\u6709\u5f15\u7528\u820a \u7248\u5167\u5bb9\u7684\u60c5\u5f62\u3002\u82e5\u5e0c\u671b\u5728\u517c\u9867\u67e5\u8a62\u6548\u7387\u7684\u540c\u6642\u63d0\u5347\u77e5\u8b58\u66f4\u65b0\u5f48\u6027\u8207\u7cfb\u7d71\u7a69\u5b9a\u6027\uff0c \u4e0b\u5217\u4f55\u8005\u6700\u9069\u5408\uff1f", "opts": ["\u63d0\u5347\u6a21\u578b\u63a8\u8ad6\u8cc7\u6e90\u914d\u7f6e\uff0c\u4ee5\u7dad\u6301\u9ad8\u6d41\u91cf\u67e5\u8a62\u6642\u7684\u56de\u61c9\u6548\u80fd", "\u8abf\u6574\u8a9e\u8a00\u6a21\u578b\u7684\u8f38\u51fa\u9650\u5236\u6a5f\u5236\uff0c\u4ee5\u964d\u4f4e\u751f\u6210\u5167\u5bb9\u8207\u6cd5\u898f\u4e0d\u4e00\u81f4\u7684\u98a8\u96aa", "\u5efa\u7acb\u56fa\u5b9a\u6cd5\u898f\u554f\u7b54\u5c0d\u7167\u8868\uff0c\u4ee5\u898f\u5247\u5316\u65b9\u5f0f\u512a\u5148\u56de\u61c9\u5e38\u898b\u554f\u984c", "\u5c0e\u5165\u53ef\u652f\u63f4\u589e\u91cf\u66f4\u65b0\u7684\u7d22\u5f15\u7ba1\u7406\u65b9\u5f0f\uff0c\u4f7f\u7570\u52d5\u6587\u4ef6\u53ef\u5373\u6642\u53cd\u6620\u65bc\u6aa2\u7d22\u7d50\u679c"], "ans": "D", "inferred": false, "expl": "\u3010\u7b54\u6848D\u3011RAG \u6cd5\u9075\u77e5\u8b58\u66f4\u65b0\u5f48\u6027\u3002\n\u2717(A) \u63d0\u5347\u63a8\u8ad6\u8cc7\u6e90\u4e0d\u89e3\u6c7a\u7d22\u5f15\u66f4\u65b0\u4e2d\u65b7\u554f\u984c\u3002\n\u2717(B) \u8abf\u8f38\u51fa\u9650\u5236\u4e0d\u89e3\u7d22\u5f15\u554f\u984c\u3002\n\u2717(C) \u56fa\u5b9a\u554f\u7b54\u5c0d\u7167\u8868\u5931\u53bb RAG \u5f48\u6027\u3002\n\u2713(D) \u652f\u63f4\u589e\u91cf\u66f4\u65b0\u7684\u7d22\u5f15\u7ba1\u7406\uff0c\u4f7f\u7570\u52d5\u6587\u4ef6\u5373\u6642\u53cd\u6620\u65bc\u6aa2\u7d22\u7d50\u679c\uff0c\u6b63\u89e3\u3002"}, {"id": "115_1_s1_43", "exam": "115\u5e74\u7b2c\u4e00\u6b21 \u79d1\u76ee\u4e00\uff08AI\u57fa\u790e\uff09", "examId": "115_1_s1", "no": 43, "q": "\u95dc\u65bc\u6a5f\u5668\u5b78\u7fd2\u4e0d\u540c\u7684\u5b78\u7fd2\u6a21\u5f0f\uff0c\u4e0b\u5217\u6558\u8ff0\u4f55\u8005\u932f\u8aa4\uff1f\u003cbr\u003e1. \u76e3\u7763\u5f0f\u5b78\u7fd2(Supervised Learning)\u900f\u904e\u5df2\u6a19\u8a3b\u8cc7\u6599\u5b78\u7fd2\u8f38\u5165\u8207\u76ee\u6a19\u4e4b\u9593\u7684\u5c0d\u61c9\u95dc\u4fc2\uff0c\u5e38\u898b\u4efb\u52d9\u5305\u542b\u5206\u985e\u8207\u6578\u503c\u9810\u6e2c\u3002 \u003cbr\u003e2. \u975e\u76e3\u7763\u5f0f\u5b78\u7fd2(Unsupervised Learning)\u96d6\u4e0d\u9700\u6a19\u8a3b\u8cc7\u6599\uff0c\u4f46\u901a\u5e38\u9700\u9810\u5148\u5b9a\u7fa9\u6bcf \u7b46\u8cc7\u6599\u7684\u6b63\u78ba\u8f38\u51fa\u985e\u5225\u4ee5\u5229\u6a21\u578b\u6536\u6582\u3002 \u003cbr\u003e3. \u534a\u76e3\u7763\u5f0f\u5b78\u7fd2(Semi-supervised Learning)\u5728\u8a13\u7df4\u904e\u7a0b\u4e2d\u50c5\u5229\u7528\u672a\u6a19\u8a3b\u8cc7\u6599\u9032\u884c\u7279\u5fb5\u5b78\u7fd2\uff0c\u4e26\u4e0d\u6d89\u53ca\u6a19\u8a3b\u8cc7\u6599\u3002 \u003cbr\u003e4. \u81ea\u76e3\u7763\u5f0f\u5b78\u7fd2(Self-supervised Learning)\u7684\u8a13\u7df4\u65b9\u5f0f\u8207\u76e3\u7763\u5f0f\u5b78\u7fd2\u76f8\u540c\uff0c\u7686\u9700\u4eba\u5de5\u9010\u7b46\u63d0\u4f9b\u6a19\u8a3b\u8cc7\u6599\u3002 \u003cbr\u003e5. \u5f37\u5316\u5f0f\u5b78\u7fd2(Reinforcement Learning)\u900f\u904e\u8207\u74b0\u5883\u4e92\u52d5\u4e26\u4f9d\u64da\u56de\u994b\u8a0a\u865f\u8abf\u6574\u7b56\u7565\uff0c\u4ee5\u512a\u5316\u6c7a\u7b56\u884c\u70ba\u3002 \u003cbr\u003e6. \u81ea\u76e3\u7763\u5f0f\u5b78\u7fd2(Self-supervised Learning)\u901a\u5e38\u5229\u7528\u8cc7\u6599\u672c\u8eab\u7522\u751f\u8a13\u7df4\u76ee\u6a19\uff0c\u4ee5\u964d\u4f4e\u5c0d\u4eba\u5de5\u6a19\u8a3b\u8cc7\u6599\u7684\u4f9d\u8cf4\u3002", "opts": ["2\u30013\u30016", "2\u30014\u30015", "1\u30013\u30016", "2\u30013\u30014"], "ans": "D", "inferred": false, "expl": "\u3010\u7b54\u6848D\u3011\u932f\u8aa4\u6558\u8ff0\u70ba 2\u30013\u30014\u3002\n\u9673\u8ff01\u6b63\u
