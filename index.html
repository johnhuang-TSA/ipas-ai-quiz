ive AI)\u4e2d\u7684\u89d2\u8272\uff0c\u4f55\u8005\u4e26\u975e\u4ee5\u300c\u7522\u751f\u65b0\u8cc7\u6599\u300d\u70ba\u4e3b\u8981\u8a2d\u8a08\u76ee\u7684\uff1f", "opts": ["\u652f\u63f4\u5411\u91cf\u6a5f(Support Vector Machine)", "\u8b8a\u5206\u81ea\u7de8\u78bc\u5668(Variational Autoencoder)", "\u81ea\u8ff4\u6b78\u6a21\u578b(Autoregressive Model)", "\u64f4\u6563\u6a21\u578b(Diffusion Model)"], "ans": "A", "inferred": true, "expl": "\u3010\u7b54\u6848A\u3011\u975e\u4ee5\u751f\u6210\u70ba\u4e3b\u7684\u6a21\u578b\u3002\n\u2713(A) SVM \u662f\u9451\u5225\u5f0f\u5206\u985e\uff0c\u627e\u6700\u5927\u9593\u9694\u8d85\u5e73\u9762\uff0c\u4e0d\u662f\u751f\u6210\u65b0\u8cc7\u6599\uff0c\u6b63\u89e3\u3002\n\u2717(B) VAE \u662f\u751f\u6210\u5f0f\u3002\n\u2717(C) \u81ea\u8ff4\u6b78\u6a21\u578b\u662f\u751f\u6210\u5f0f\u3002\n\u2717(D) \u64f4\u6563\u6a21\u578b\u662f\u751f\u6210\u5f0f\u3002"}, {"id": "114s_s1_34", "exam": "114\u5e74\u6a23\u984c \u79d1\u76ee\u4e00\uff08AI\u57fa\u790e\uff09", "examId": "114s_s1", "no": 34, "q": "\u67d0\u4efd\u8cc7\u6599\u4e2d\u51fa\u73fe\u591a\u500b\u6b04\u4f4d(\u5982 score1\u3001score2\u3001score3)\u5132\u5b58\u76f8\u540c\u7684\u6210\u7e3e\u8cc7\u8a0a\uff0c\u9020\u6210\u8cc7\u6599\u7d50\u69cb\u91cd\u8907\u8207\u4f7f\u7528\u6df7\u6dc6\uff0c\u6b64\u7a2e\u60c5\u5f62\u5c6c\u65bc\u4e0b\u5217\u54ea\u4e00\u7a2e\u8cc7\u6599\u54c1\u8cea\u554f\u984c\uff1f", "opts": ["\u91cd\u8907\u8cc7\u6599(Duplicate Data)", "\u5197\u9918\u8cc7\u6599(Redundant Data)", "\u683c\u5f0f\u932f\u8aa4\u8cc7\u6599(Malformed Data)", "\u7f3a\u5931\u8cc7\u6599(Missing Data)"], "ans": "B", "inferred": true, "expl": "\u3010\u7b54\u6848B\u3011score1\u3001score2\u3001score3 \u5132\u5b58\u76f8\u540c\u8cc7\u8a0a\u3002\n\u2717(A) \u91cd\u8907\u8cc7\u6599\u6307\u540c\u4e00\u7b46\u8cc7\u6599\u51fa\u73fe\u591a\u6b21\u3002\n\u2713(B) \u5197\u9918\u8cc7\u6599\u6307\u540c\u4e00\u8cc7\u8a0a\u4ee5\u591a\u500b\u6b04\u4f4d\u91cd\u8907\u5132\u5b58\uff0c\u6b63\u7b26\u5408\u984c\u610f\u3002\n\u2717(C) \u683c\u5f0 6210\u5f0fAI\uff09", "examId": "114s_s2", "no": 8, "q": "\u4e0b\u5217\u54ea\u4e00\u7a2e\u6280\u8853\u65b9\u6848\u9069\u7528\u65bc\u6539\u5584\u5ba2\u6236\u9ad4\u9a57\uff1f", "opts": ["\u667a\u6167\u6392\u7a0b\u7cfb\u7d71", "\u6d88\u8cbb\u884c\u70ba\u6d1e\u5bdf\u6a21\u578b", "\u9810\u6e2c\u6027\u7dad\u8b77\u5de5\u5177", "\u81ea\u7136\u8a9e\u8a00\u8655\u7406(NLP)\u548c\u751f\u6210\u5f0f\u56de\u61c9\u6a21\u7d44"], "ans": "D", "inferred": true, "expl": "\u3010\u7b54\u6848D\u3011\u6539\u5584\u5ba2\u670d\u9ad4\u9a57\u3002\n\u2717(A) \u667a\u6167\u6392\u7a0b\u6539\u5584\u5167\u90e8\u904b\u4f5c\u3002\n\u2717(B) \u884c\u70ba\u6d1e\u5bdf\u662f\u5206\u6790\u5de5\u5177\u3002\n\u2717(C) \u9810\u6e2c\u6027\u7dad\u8b77\u7528\u65bc\u8a2d\u5099\u3002\n\u2713(D) NLP + \u751f\u6210\u5f0f\u56de\u61c9\u6a21\u7d44\u80fd\u7406\u89e3\u5ba2\u6236\u6587\u5b57\u4e26\u751f\u6210\u81ea\u7136\u56de\u61c9\uff0c\u6700\u6539\u5584\u5ba2\u670d\u4e92\u52d5\uff0c\u6b63\u89e3\u3002"}, {"id": "114s_s2_9", "exam": "114\u5e74\u6a23\u984c \u79d1\u76ee\u4e8c\uff08\u751f\u6210\u5f0fAI\uff09", "examId": "114s_s2", "no": 9, "q": "\u67d0\u516c\u53f8\u64ec\u5c07\u5ba2\u6236\u500b\u4eba\u8cc7\u6599\u50b3\u8f38\u81f3\u570b\u5916\u9032\u884c\u96f2\u7aef\u5132\u5b58\uff0c\u4f9d\u64da\u300a\u500b\u4eba\u8cc7\u6599\u4fdd\u8b77\u6cd5\u300b\u898f\u5b9a\uff0c\u4e0b\u5217\u54ea\u4e00\u7a2e\u60c5\u6cc1\u4e0b\uff0c\u4e2d\u592e\u76ee\u7684\u4e8b\u696d\u4e3b\u7ba1\u6a5f\u95dc\u6709\u6b0a\u5c0d\u8a72 \u570b\u969b\u8cc7\u6599\u50b3\u8f38\u884c\u70ba\u9032\u884c\u9650\u5236\uff1f", "opts": ["\u516c\u53f8\u898f\u6a21\u672a\u9054\u4e3b\u7ba1\u6a5f\u95dc\u8981\u6c42\u6a19\u6e96\uff0c\u7ba1\u7406\u80fd\u529b\u5b58\u7591", "\u516c\u53f8\u66fe\u767c\u751f\u500b\u4eba\u8cc7\u6599\u5916\u6d29\u4e8b\u4ef6\u7d00\u9304\uff0c\u9020\u6210\u7528\u6236\u4fe1\u4efb\u6d41\u5931", "\u50b3\u8f38\u8cc7\u6599\u5305\u542b\u7576\u4e8b\u4eba\u5df2\u516c\u958b\u8cc7\u8a0a\uff0c\u4f46\u4ecd\u6d89\u53ca\u96b1\u79c1\u98a8\u96aa", "\u63a5\u6536\u570b\u5bb6\ 10\u5f0f AI \u5de5\u5177\u5728\u4f7f\u7528\u9ad4\u9a57\u65b9\u9762\u7684\u512a\u5316\u65b9\u5411\uff1f", "opts": ["\u63d0\u4f9b\u66f4\u76f4\u89c0\u7684\u64cd\u4f5c\u8a2d\u8a08", "\u652f\u63f4\u81ea\u7136\u8a9e\u8a00\u6307\u4ee4", "\u63d0\u4f9b\u667a\u6167\u5316\u7684\u53c3\u6578\u8abf\u6574\u5efa\u8b70", "\u9650\u5236\u4f7f\u7528\u8005\u81ea\u8a02\u751f\u6210\u5167\u5bb9"], "ans": "D", "inferred": true, "expl": "\u3010\u7b54\u6848D\u3011\u975e\u512a\u5316\u4f7f\u7528\u9ad4\u9a57\u65b9\u5411\u3002\n\u2717(A) \u63d0\u4f9b\u66f4\u76f4\u89c0\u64cd\u4f5c\u662f\u512a\u5316\u3002\n\u2717(B) \u652f\u63f4\u81ea\u7136\u8a9e\u8a00\u6307\u4ee4\u662f\u512a\u5316\u3002\n\u2717(C) \u667a\u6167\u5316\u53c3\u6578\u5efa\u8b70\u662f\u512a\u5316\u3002\n\u2713(D) \u300c\u9650\u5236\u4f7f\u7528\u8005\u81ea\u8a02\u751f\u6210\u5167\u5bb9\u300d\u662f\u9650\u5236\u975e\u512a\u5316\uff0c\u6b63\u89e3\u3002"}, {"id": "114s_s2_17", "exam": "114\u5e74\u6a23\u984c \u79d1\u76ee\u4e8c\uff08\u751f\u6210\u5f0fAI\uff09", "examId": "114s_s2", "no": 17, "q": "\u5b78\u6821\u6559\u5e2b\u5982\u4f55\u5f15\u5c0e\u5b78\u751f\u6b63\u78ba\u4f7f\u7528\u751f\u6210\u5f0f AI \u5de5\u5177\uff1f", "opts": ["\u4e0d\u61c9\u4f7f\u7528 AI \u5de5\u5177\u65bc\u6559\u5b78\u5834\u57df", "\u7121\u9650\u5236\u5730\u4f7f\u7528 AI \u5de5\u5177", "\u8a02\u7acb\u6e05\u6670\u7684\u4f7f\u7528\u898f\u7bc4\u4e26\u9032\u884c\u8aaa\u660e", "\u50c5\u9f13\u52f5\u5b78\u751f\u5229\u7528 AI \u5b8c\u6210\u8ab2\u5802\u4f5c\u696d"], "ans": "C", "inferred": true, "expl": "\u3010\u7b54\u6848C\u3011\u6559\u5e2b\u5f15\u5c0e\u4f7f\u7528 AI\u3002\n\u2717(A) \u5b8c\u5168\u4e0d\u8a72\u4f7f\u7528\u592a\u6975\u7aef\u3002\n\u2717(B) \u7121\u9650\u5236\u4f7f\u7528\u4e0d\u8ca0\u8cac\u3002\n\u2713(C) \u8a02\u7acb\u6e05\u6670\u4f7f\u7528\u898f\u7bc4\u4e26\u9032\u884c\u8aaa\u660e\uff0c\u662f\u6559\u5e2b\u5f15\u5c0e\u5b78\u751f\u6b63\u78ba\u4f7f\u7528 AI \u7684\u6838\u5fc3\u505a\u6cd5\uff0c\u6b63\u89e3\u3002\n\u2717(D) \u50c5\u9f13\u52f5\u5b8c\u6210\u4f5c\u696d\u7247\u9762\u3002"}, {"id": "114s_s2_18", "exam": "114\u5e74\u6a23\u984c \u79d1\u76ee\u4e8c\uff08\u751f\u6210\u5f0fAI\uff09", "examId": "114s_s2", "no": 18, "q": "\u82e5\u4f01\u696d\u4f7f\u7528\u7b2c\u4e09\u65b9 AI API(\u5982 OpenAI\u3001Claude\u3001Gemini \u7b49)\uff0c\u5354\u52a9\u8655\u7406\u5167\u90e8\u8cc7\u6599\uff0c\u70ba\u907f\u514d\u654f\u611f\u8cc7\u8a0a\u906d\u6a21\u578b\u8a18\u61b6\u6216\u9032\u4e00\u6b65\u5206\u6790\uff0c\u61c9\u512a\u5148\u63a1 \u53d6\u4e0b\u5217\u54ea\u4e00\u7a2e\u4f5c\u6cd5\uff1f", "opts": ["\u555f\u7528 Zero-Retention \u6a21\u5f0f\u6216\u63a1\u7528\u5177\u4f01\u696d\u8cc7\u5b89\u4fdd\u969c\u7684 API \u670d\u52d9", "\u4f7f\u7528\u865b\u64ec\u6a5f\u5efa\u7acb\u9694\u96e2\u74b0\u5883\uff0c\u4ee5\u6a21\u64ec\u533f\u540d\u8cc7\u6599\u64cd\u4f5c\u6d41\u7a0b", "\u5c07\u539f\u59cb\u6578\u64da\u9032\u884c\u8996\u89ba\u5316\u8f49\u63db\uff0c\u4ee5\u907f\u514d\u76f4\u63a5\u66b4\u9732\u6587\u672c\u5167\u5bb9", "\u5c07\u8f38\u5165\u8cc7\u6599\u8f49\u63db\u70ba\u5411\u91cf\u5d4c\u5165\u5f8c\uff0c\u518d\u50b3\u8f38\u81f3\u8a9e\u8a00\u6a21\u578b\u9032\u884c\u8655\u7406"], "ans": "A", "inferred": true, "expl": "\u3010\u7b54\u6848A\u3011\u907f\u514d\u7b2c\u4e09\u65b9 API \u8a18\u61b6\u654f\u611f\u8cc7\u8a0a\u3002\n\u2713(A) \u555f\u7528 Zero-Retention \u6a21\u5f0f\u6216\u63a1\u5177\u4f01\u696d\u8cc7\u5b89\u4fdd\u969c\u7684 API \u670d\u52d9\uff08\u5982 Azure OpenAI\uff09\uff0c\u662f\u6700\u76f4\u63a5\u65b9\u6cd5\uff0c\u6b63\u89e3\u3002\n\u2717(B) VM \u9694\u96e2\u4f46 API \u4ecd\u53ef\u80fd\u8a18\u61b6\u3002\n\u2717(C) \u8996\u89ba\u5316\u8f49\u63db\u4e0d\u89e3\u3002\n\u2717(D) \u5411\u91cf\u5d4c\u5165\u4ecd\u53ef\u88ab\u5206\u6790\u3002"}, {"id": "114s_s2_19", "exam": "114\u5e74\u6a23\u984c \u79d1\u76ee\u4e8c\uff08\u751f\u6210\u5f0fAI\uff09", "examId": "114s_s2", "no": 19, "q": "\u4f01\u696d\u82e5\u8981\u6709\u6548\u652f\u63f4\u751f\u6210\u5f0f AI \u7684\u904b\u884c\uff0c\u5167\u90e8 IT \u74b0\u5883\u6700\u9700\u8981\u5177\u5099\u4e0b\u5217\u4f55\u7a2e\u689d\u4ef6\uff1f", "opts": ["\u63d0\u4f9b\u66f4\u591a\u7684\u8fa6\u516c\u8a2d\u5099\uff0c\u4ee5\u63d0\u5347\u54e1\u5de5\u751f\u7522\u529b", "\u7cbe\u7c21\u4f01\u696d\u5167\u90e8\u6d41\u7a0b\uff0c\u4ee5\u52a0\u901f\u6c7a\u7b56\u6548\u7387", "\u64c1\u6709\u9ad8\u6548\u80fd\u904b\u7b97\u8cc7\u6e90\u8207\u5f48\u6027\u5132\u5b58\u7a7a\u9593\uff0c\u4ee5\u652f\u63f4 AI \u6a21\u578b\u8a13\u7df4\u8207\u63a8\u7406", "\u589e\u52a0\u90e8\u9580\u4e4b\u9593\u7684\u4ea4\u6d41\u6a5f\u6703\uff0c\u4ee5\u4fc3\u9032\u8de8\u90e8\u9580\u5408\u4f5c"], "ans": "C", "inferred": true, "expl": "\u3010\u7b54\u6848C\u3011\u652f\u63f4\u751f\u6210\u5f0f AI \u7684 IT \u74b0\u5883\u3002\n\u2717(A) \u8fa6\u516c\u8a2d\u5099\u8207 AI \u7121\u95dc\u3002\n\u2717(B) \u6d41\u7a0b\u7cbe\u7c21\u4e0d\u89e3 AI \u9700\u6c42\u3002\n\u2713(C) \u9ad8\u6548\u80fd\u904b\u7b97\u8cc7\u6e90\uff08GPU/TPU\uff09+ \u5f48\u6027\u5132\u5b58\u7a7a\u9593\uff0c\u662f\u652f\u63f4 AI \u6a21\u578b\u8a13\u7df4\u8207\u63a8\u8ad6\u7684\u57fa\u672c\u524d\u63d0\u3002\n\u2717(D) \u8de8\u90e8\u9580\u4ea4\u6d41\u975e IT \u689d\u4ef6\u3002"}, {"id": "114s_s2_20", "exam": "114\u5e74\u6a23\u984c \u79d1\u76ee\u4e8c\uff08\u751f\u6210\u5f0fAI\uff09", "examId": "114s_s2", "no": 20, "q": "A \u4f01\u696d\u60f3\u8981\u5be6\u73fe\u5ba2\u670d\u81ea\u52d5\u5316\uff0c\u5e0c\u671b\u900f\u904e AI \u7406\u89e3\u5ba2\u6236\u767c\u9001\u7684\u6587\u672c\u8a0a\u606f\uff0c\u4e26\u6839\u64da\u6587\u672c\u5167\u5bb9\u8abf\u7528\u76f8\u5c0d\u61c9\u7684\u5716\u7247\u548c\u5f71\u7247\u9032\u884c\u56de\u8986\uff0cA \u4f01\u696d\u61c9\u8a72\u9078\u64c7\u54ea\u4e00\u7a2e\u6a21\u578b\uff1f", "opts": ["\u5f37\u5316\u5b78\u7fd2\u6a21\u578b", "\u591a\u6a21\u614b\u6a21\u578b", "\u5716\u50cf\u5206\u985e\u6a21\u578b", "\u55ae\u6a21\u614b\u5927\u8a9e\u8a00\u6a21\u578b"], "ans": "B", "inferred": true, "expl": "\u3010\u7b54\u6848B\u3011\u6587\u5b57\u8f38\u5165\u2192\u5716\u7247\u5f71\u7247\u56de\u8986\u3002\n\u2717(A) \u5f37\u5316\u5b78\u7fd2\u4e0d\u9069\u5408\u3002\n\u2713(B) \u591a\u6a21\u614b\u6a21\u578b\u53ef\u540c\u6642\u8655\u7406\u6587\u5b57\u8207\u5716\u50cf/\u5f71\u7247\uff0c\u6b63\u89e3\u3002\n\u2717(C) \u5716\u50cf\u5206\u985e\u53ea\u8655\u7406\u55ae\u4e00\u6a21\u614b\u3002\n\u2717(D) \u55ae\u6a21\u614b\u8a9e\u8a00\u53ea\u8655\u7406\u6587\u5b57\u3002"}, {"id": "114s_s2_21", "exam": "114\u5e74\u6a23\u984c \u79d1\u76ee\u4e8c\uff08\u751f\u6210\u5f0fAI\uff09", "examId": "114s_s2", "no": 21, "q": "\u4e0b\u5217\u54ea\u4e00\u7a2e\u60c5\u5883\u6700\u80fd\u5c55\u73fe\u63d0\u793a\u5de5\u7a0b(Prompt Engineering)\u7684\u50f9\u503c\uff1f", "opts": ["\u4f7f\u7528\u8005\u8f38\u5165\u4e00\u500b\u6a21\u7cca\u7684\u554f\u984c\uff0cAI \u7d66\u51fa\u4e00\u500b\u975e\u5e38\u78ba\u5b9a\u7684\u7b54\u6848", "\u4f7f\u7528\u8005\u8f38\u5165\u4e00\u500b\u975e\u5e38\u5177\u9ad4\u7684\u554f\u984c\uff0cAI \u7d66\u51fa\u4e00\u500b\u76f8\u95dc\u4f46\u4e0d\u5b8c\u5168\u7b26\u5408\u7684\u7b54\u6848", "\u4f7f\u7528\u8005\u8f38\u5165\u4e00\u500b\u7cbe\u6e96\u6709\u67b6\u69cb\u7684\u554f\u984c\uff0cAI \u751f\u6210\u7b26\u5408\u67b6\u69cb\u7684\u7b54\u6848", "\u4f7f\u7528\u8005\u8f38\u5165\u4e00\u500b\u7c21\u55ae\u7684\u554f\u984c\uff0cAI \u7d66\u51fa\u4e00\u500b\u975e\u5e38\u8907\u96dc\u7684\u7b54\u6848"], "ans": "C", "inferred": true, "expl": "\u3010\u7b54\u6848C\u3011\u63d0\u793a\u5de5\u7a0b\u50f9\u503c\u9ad4\u73fe\u3002\n\u2717(A) \u6a21\u7cca\u554f\u984c\u4f46\u78ba\u5b9a\u7b54\u6848\u662f\u904b\u6c23\u975e\u50f9\u503c\u3002\n\u2717(B) \u5177\u9ad4\u554f\u984c\u4f46\u7b54\u6848\u4e0d\u5b8c\u5168\u7b26\u5408\u4e0d\u5c55\u73fe\u63d0\u793a\u5de5\u7a0b\u50f9\u503c\u3002\n\u2713(C) \u7cbe\u6e96\u6709\u67b6\u69cb\u7684\u554f\u984c\u2192AI \u751f\u6210\u7b26\u5408\u67b6\u69cb\u7684\u7b54\u6848\uff0c\u6b63\u662f\u63d0\u793a\u5de5\u7a0b\u50f9\u503c\u7684\u6700\u4f73\u9ad4\u73fe\u3002\n\u2717(D) \u7c21\u55ae\u554f\u984c\u8907\u96dc\u7b54\u6848\u4e0d\u76f8\u95dc\u3002"}, {"id": "114s_s2_22", "exam": "114\u5e74\u6a23\u984c \u79d1\u76ee\u4e8c\uff08\u751f\u6210\u5f0fAI\uff09", "examId": "114s_s2", "no": 22, "q": "\u4e0b\u5217\u6558\u8ff0\u4f55\u8005\u6700\u80fd\u53cd\u6620\u751f\u6210\u5f0f AI \u5728\u5716\u50cf\u751f\u6210\u9818\u57df\u7684\u767c\u5c55\u8da8\u52e2\uff1f", "opts": ["\u751f\u6210\u5f0f AI \u76ee\u524d\u50c5\u80fd\u751f\u6210\u57fa\u65bc\u7c21\u55ae\u7b97\u6cd5\u7684\u4f4e\u89e3\u6790\u5ea6\u5716\u50cf\uff0c\u4e14\u7121\u6cd5\u61c9\u7528\u65bc\u9ad8\u89e3\u6790\u5ea6\u6216\u7d30\u7bc0\u8c50\u5bcc\u7684\u5716\u50cf\u5275\u5efa", "\u96a8\u8457\u751f\u6210\u5f0f AI \u6280\u8853\u7684\u9032\u6b65\uff0c\u5716\u50cf\u4e0d\u50c5\u98a8\u683c\u591a\u6a23\uff0c\u4e14\u903c\u771f\u5ea6\u986f\u8457\u63d0\u5347\uff0c\u4e26\u53ef\u8655\u7406\u66f4\u8907\u96dc\u7684\u5716\u50cf\u751f\u6210\u4efb\u52d9", "\u751f\u6210\u5f0f AI \u6280\u8853\u76ee\u7684\u70ba\u52a0\u5feb\u751f\u6210\u901f\u5ea6\uff0c\u53ef\u751f\u6210\u975c\u614b\u5716\u50cf\uff0c\u7121\u6cd5\u751f\u6210 \u52d5\u614b\u5716\u50cf", "\u751f\u6210\u5f0f AI \u5728\u5716\u50cf\u751f\u6210\u65b9\u9762\u7684\u767c\u5c55\u4e3b\u8981\u96c6\u4e2d\u65bc\u5716\u50cf\u98a8\u683c\u8f49\u63db\uff0c\u7121\u6d89\u53ca\u5176\u4ed6\u985e\u578b\u7684\u8996\u89ba\u5167\u5bb9\u751f\u6210"], "ans": "B", "inferred": true, "expl": "\u3010\u7b54\u6848B\u3011\u751f\u6210\u5f0f AI \u5716\u50cf\u751f\u6210\u8da8\u52e2\u3002\n\u2717(A) \u4e0d\u50c5\u4f4e\u89e3\u6790\u5ea6\u3002\n\u2713(B) \u98a8\u683c\u591a\u6a23\u3001\u903c\u771f\u5ea6\u986f\u8457\u63d0\u5347\u3001\u53ef\u8655\u7406\u8907\u96dc\u4efb\u52d9\uff08\u5f71\u7247\u30013D \u7b49\uff09\uff0c\u662f\u7576\u524d\u8da8\u52e2\uff0c\u6b63\u89e3\u3002\n\u2717(C) \u4e0d\u53ea\u975c\u614b\u5716\u50cf\u3002\n\u2717(D) \u4e0d\u50c5\u98a8\u683c\u8f49\u63db\u3002"}, {"id": "114s_s2_23", "exam": "114\u5e74\u6a23\u984c \u79d1\u76ee\u4e8c\uff08\u751f\u6210\u5f0fAI\uff09", "examId": "114s_s2", "no": 23, "q": "\u95dc\u65bc\u751f\u6210\u5f0f AI\uff0c\u4e0b\u5217 A~E \u6558\u8ff0\u54ea\u4e9b\u6b63\u78ba\uff1f\u003cbr\u003eA. \u751f\u6210\u7684\u5167\u5bb9\u4e0d\u6703\u5e36\u6709\u504f\u898b\u003cbr\u003eB. \u5177\u6709\u9ad8\u5ea6\u6e96\u78ba\u6027\uff0c\u4e0d\u6703\u6709\u865b\u5047\u4fe1\u606f\u003cbr\u003eC. \u751f\u6210\u5167\u5bb9\u7684\u6e96\u78ba\u6027\uff0c\u5efa\u8b70\u9700\u8981\u7d93\u904e\u4eba\u985e\u5be9\u6838\u003cbr\u003eD. \u6bcf\u6b21\u751f\u6210\u7684\u5167\u5bb9\u90fd\u53ef\u80fd\u4e0d\u540c\u003cbr\u003eE. \u751f\u6210\u5f0f AI \u5177\u6709\u9ad8\u5ea6\u5b89\u5168\u6027\uff0c\u4e0d\u6703\u5c0e\u81f4\u6578\u64da\u5916\u6d41", "opts": ["C\u3001D", "A\u3001C\u3001D", "A\u3001B\u3001D\u3001E", "A\u3001C\u3001D\u3001E"], "ans": "A", "inferred": true, "expl": "\u3010\u7b54\u6848A\u3011\u751f\u6210\u5f0f AI \u6b63\u78ba\u6558\u8ff0\u3002\nA\u932f\uff08\u6703\u5e36\u504f\u898b\uff09\uff1bB\u932f\uff08\u6709\u5e7b\u89ba\uff09\uff1bE\u932f\uff08\u6709\u8cc7\u5b89\u98a8\u96aa\uff09\uff1bC\u5c0d\uff08\u9700\u4eba\u985e\u5be9\u6838\uff09\uff1bD\u5c0d\uff08\u6bcf\u6b21\u53ef\u80fd\u4e0d\u540c\uff09\u3002\n\u2713(A) C+D \u6b63\u78ba\uff0c\u6b63\u89e3\u3002\n\u2717(B) \u591a\u5217 A\u3002\n\u2717(C) \u591a\u5217 A\u3001B\u3001E\u3002\n\u2717(D) \u591a\u5217 A\u3001E\u3002"}, {"id": "114s_s2_24", "exam": "114\u5e74\u6a23\u984c \u79d1\u76ee\u4e8c\uff08\u751f\u6210\u5f0fAI\uff09", "examId": "114s_s2", "no": 24, "q": "\u4e00\u5bb6\u8de8\u570b\u4f01\u696d\u8a08\u5283\u5728\u8ca1\u52d9\u90e8\u9580\u5c0e\u5165\u751f\u6210\u5f0f AI\uff0c\u4e26\u7d50\u5408\u81ea\u52d5\u5316\u7cfb\u7d71\u9032\u884c\u5831\u544a\u7522\u51fa\u3002\u5c0e\u5165\u6b64\u7cfb\u7d71\u5f8c\uff0c\u6700\u6709\u53ef\u80fd\u5be6\u73fe\u7684\u6548\u76ca\u70ba\u4f55\uff1f", "opts": ["\u589e\u52a0\u8ca1\u52d9\u6536\u76ca", "\u986f\u8457\u63d0\u5347\u5831\u544a\u6e96\u78ba\u6027\u4e26\u6e1b\u5c11\u4eba\u5de5\u932f\u8aa4", "\u52a0\u901f\u5e02\u5834\u63a8\u5ee3\u6d3b\u52d5\u4e26\u63d0\u9ad8\u92b7\u552e\u696d\u7e3e", "\u63d0\u9ad8\u54c1\u724c\u66dd\u5149\u5ea6\u4e26\u589e\u5f37\u5ba2\u6236\u95dc\u4fc2\u7ba1\u7406"], "ans": "B", "inferred": true, "expl": "\u3010\u7b54\u6848B\u3011\u8ca1\u52d9\u90e8 AI \u81ea\u52d5\u5316\u6548\u76ca\u3002\n\u2717(A) \u4e0d\u662f\u76f4\u63a5\u589e\u52a0\u6536\u76ca\u3002\n\u2713(B) \u986f\u8457\u63d0\u5347\u5831\u544a\u6e96\u78ba\u6027\u4e26\u6e1b\u5c11\u4eba\u5de5\u932f\u8aa4\uff0c\u662f AI + \u81ea\u52d5\u5316\u6700\u76f4\u63a5\u7684\u6548\u76ca\u3002\n\u2717(C) \u92b7\u552e\u696d\u7e3e\u8207\u8ca1\u52d9\u5831\u544a\u7121\u76f4\u63a5\u95dc\u806f\u3002\n\u2717(D) \u54c1\u724c\u66dd\u5149\u4e0d\u76f8\u95dc\u3002"}, {"id": "114s_s2_25", "exam": "114\u5e74\u6a23\u984c \u79d1\u76ee\u4e8c\uff08\u751f\u6210\u5f0fAI\uff09", "examId": "114s_s2", "no": 25, "q": "\u67d0\u88fd\u9020\u696d\u5718\u968a\u5efa\u7acb\u7455\u75b5\u5075\u6e2c\u6a21\u578b\u6642\uff0c\u4f7f\u7528\u55ae\u5f35\u7d04 20MB \u7684\u9ad8\u89e3\u6790\u5ea6\u5de5\u696d\u5f71\u50cf\u4f5c\u70ba\u8a13\u7df4\u8cc7\u6599\uff0c\u4e26\u5c07\u6240\u6709\u5f71\u50cf\u5132\u5b58\u65bc NAS(Network Attached Storage)\u4e2d\u3002\u8a13\u7df4\u6642\u900f\u904e PyTorch \u642d\u914d CNN \u6a21\u578b\u65bc GPU \u4e0a\u9032\u884c\uff0c\u5de5\u7a0b\u5e2b\u89c0\u5bdf\u5230 GPU \u4f7f\u7528\u7387\u50c5\u7d04 20%\u81f3 30%\uff0c\u6574\u9ad4\u8a13\u7df4\u6642\u9593 \u8017\u8cbb\u6578\u65e5\u3002\u6839\u64da\u4e0a\u8ff0\u60c5\u5883\uff0c\u9020\u6210 GPU \u5229\u7528\u7387\u504f\u4f4e\u7684\u6700\u53ef\u80fd\u539f\u56e0\u70ba\u4f55\uff1f", "opts": ["\u6a21\u578b\u67b6\u69cb\u904e\u65bc\u8907\u96dc\uff0c\u5c0e\u81f4\u53cd\u5411\u50b3\u64ad\u6642\u9593\u904e\u9577", "\u8a13\u7df4\u8cc7\u6599\u54c1\u8cea\u4e0d\u7a69\u5b9a\uff0c\u9020\u6210\u6a21\u578b\u96e3\u4ee5\u6536\u6582", "\u9ad8\u89e3\u6790\u5f71\u50cf\u5f9e NAS \u8f09\u5165\u7522\u751f I/O(Input/Output)\u74f6\u9838\uff0c\u5c0e\u81f4 GPU \u7b49\u5f85", "\u6279\u6b21\u5927\u5c0f(Batch Size)\u8a2d\u5b9a\u4e0d\u7576\uff0c\u5c0e\u81f4 GPU \u9577\u6642\u9593\u9592\u7f6e"], "ans": "C", "inferred": true, "expl": "\u3010\u7b54\u6848C\u3011GPU \u5229\u7528\u7387\u50c5 20-30%\u3002\n\u2717(A) \u6a21\u578b\u67b6\u6 function buildGrid(){

function getQs(mid){
  if(mid==='mix_all') return shuf(Q.slice());
  if(mid==='mix_s1') return shuf(Q.filter(function(q){return q.examId.endsWith('s1');}));
  if(mid==='mix_s2') return shuf(Q.filter(function(q){return q.examId.endsWith('s2');}));
  return Q.filter(function(q){return q.examId===mid;});
}
function shuf(a){for(var i=a.length-1;i>0;i--){var j=Math.floor(Math.random()*(i+1));var t=a[i];a[i]=a[j];a[j]=t;}return a;}

function startQuiz(){
  if(!selMode)return;
  curQs=getQs(selMode); curIdx=0; ans={};
  var m=MODES.filter(function(x){return x.id===selMode;})[0];
  document.getElementById('qmname').textContent=m.name;

  tLeft=Math.round(curQs.length*108); startTmr();
  showScr('quiz'); renderQ();
}

function startTmr(){

}
function updTmr(){
  var m=Math.floor(tLeft/60),s=tLeft%60,el=document.getElementById('tmr');
  el.textContent=(m<10?'0':'')+m+':'+(s<10?'0':'')+s;
  el.className=tLeft<300?'tmr warn':'tmr';
}

function safe(str){
  return (str||'').replace(/&lt;br&gt;|<br\s*\/?>/gi,'\n')
    .replace(/&rarr;/g,'→').replace(/&larr;/g,'←').replace(/&mdash;/g,'—')
    .replace(/&ndash;/g,'–').replace(/&times;/g,'×').replace(/&middot;/g,'·')
    .replace(/&amp;/g,'&').replace(/&lt;/g,'<').replace(/&gt;/g,'>')
    .replace(/&sup2;/g,'²').replace(/&sup3;/g,'³').replace(/&nbsp;/g,' ')
    .replace(/&[a-z]+;/g,'');
}
function setText(el,str){
  el.innerHTML='';
  safe(str).split('\n').forEach(function(line,i){
    if(i>0)el.appendChild(document.createElement('br'));
    el.appendChild(document.createTextNode(line));
  });
}

  if(a!==undefined){
    fb.style.display='block';
    if(a===q.ans){fb.className='fb ok';fb.textContent='✅ 答對了！';}
    else{fb.className='fb no';fb.textContent='❌ 答錯了！正確答案是 '+q.ans+'：'+safe(q.opts[L.indexOf(q.ans)]||'')+(q.inferred?' （參考答案）':'');}
    if(q.expl){ex.style.display='block';document.getElementById('qexpl-txt').textContent=q.expl;}
    else{ex.style.display='none';}
  }else{fb.style.display='none';ex.style.display='none';}

  document.getElementById('bprev').disabled=curIdx===0;
  var last=curIdx===tot-1,nb=document.getElementById('bnext');
  if(last&&a!==undefined){nb.textContent='完成測驗 ✓';nb.onclick=finish;}
  else{nb.textContent='下一題 →';nb.onclick=nextQ;}
  document.getElementById('qdone').textContent='已作答 '+Object.keys(ans).length+'/'+tot;
}

function pick(i){
  if(ans[curIdx]!==undefined)return;
  ans[curIdx]=['A','B','C','D'][i]; renderQ();
}
function nextQ(){if(curIdx<curQs.length-1){curIdx++;renderQ();}}
function prevQ(){if(curIdx>0){curIdx--;renderQ();}}

function finish(){
  clearInterval(tmrId);
  var tot=curQs.length,c=0,w=0,s=0,wi=[];
  curQs.forEach(function(q,i){
    var a=ans[i];
    if(a===undefined){s++;wi.push({q:q,ua:null});}
    else if(a===q.ans)c++;
    else{w++;wi.push({q:q,ua:a});}
  });
  var pct=Math.round((c/tot)*100),pass=pct>=70;
  document.getElementById('spct').textContent=pct+'%';
  document.getElementById('sring').className='sring '+(pass?'pass':'fail');
  document.getElementById('plbl').textContent=pass?'🎉 恭喜通過！':'😅 繼續加油！';
  document.getElementById('plbl').style.color=pass?'var(--ok)':'var(--err)';
  document.getElementById('sdet').textContent=c+' 題正確 / '+tot+' 題（及格標準：70%）';
  document.getElementById('sc').textContent=c;
  document.getElementById('sw').textContent=w;
  document.getElementById('ss').textContent=s;
  window._wi=wi;
  document.getElementById('rv').style.display='none';
  showScr('result');
}

function showReview(){
  var wi=window._wi||[],rv=document.getElementById('rv');
  if(!wi.length){rv.innerHTML='<div class="stitle">✅ 全部答對！</div>';rv.style.display='block';return;}
  var L=['A','B','C','D'],h='<div class="stitle">❌ 錯題複習（'+wi.length+'題）</div>';
  wi.forEach(function(it){
    var q=it.q,ua=it.ua;
    var co=q.opts[L.indexOf(q.ans)]||'';
    var uo=ua?(q.opts[L.indexOf(ua)]||''):'';
    var inf=q.inferred?' ⚠️參考':'';
    var explH=q.expl?'<div class="we"><strong>💡 解題說明</strong><br>'+q.expl+'</div>':'';
    h+='<div class="wi"><div class="wq"><strong>【'+q.exam+' 第'+q.no+'題】</strong><br>'+safe(q.q).replace(/\n/g,'<br>')+'</div>'+
       (ua?'<div class="wa ya">✗ 你的答案：'+ua+' '+safe(uo)+'</div>':'<div class="wa ya">✗ 未作答</div>')+
       '<div class="wa ca">✓ 正確答案：'+q.ans+' '+safe(co)+inf+'</div>'+explH+'</div>';
  });
  rv.innerHTML=h; rv.style.display='block'; rv.scrollIntoView({behavior:'smooth'});
}

function backMenu(){clearInterval(tmrId);showScr('mode');}
function showScr(n){document.querySelectorAll('.scr').forEach(function(s){s.classList.remove('on');});document.getElementById('scr-'+n).classList.add('on');window.scrollTo(0,0);}

buildGrid();
</script>
</body>
